  text: 漢丞相諸葛忠武侯集重刋道藏輯要漢丞相諸葛忠武侯集卷之七
  hash: sha256:ce9a23d26655b9929b53aa5c56d6c577c31ba1c341f5a47226416410b14d366a
  markers:
  - {type: page-break, offset: 9, content: '', id: CK-KZ_KR5i0078_04p001a}
body:
  text: 三十六世孫羲基編輯遺文黃陵廟記節文僕躬耕南陽之畝遂蒙劉氏顧草廬勢不可御計事善之於是情好日密相拉總帥趨蜀道履黃牛因覩江山之勝亂石排空驚濤拍岸斂巨石於江中崔嵬巑岏列作三峯平治浲水順遵其道非神扶助於禹人力奚能致此耶僕縱步環覽乃見江左大山壁立林麓峯巒如畫熟視於大江重復石壁間有神像影現焉鬢髮鬚眉冠裳宛然如彩畫者前𥪡一旌旗右駐一黃犢猶有董工開導之勢古傳所載黃龍助禹開江治水九載而功成信不誣也惜乎廟貌廢去使人太息神有功助禹開江不事鑿斧順濟舟航當廟食兹土僕復而興之再建其廟號目之曰黃牛廟以顯神功陳仁錫曰此記惜是節文武侯文字絶竒此亦卧龍之片鱗耳陸游云黃牛廟靈感神封嘉應保安侯皆紹興以來制書也其下即無義灘亂石塞中流望之可畏傳云神佐夏禹治水有功故食於此門左右立小石馬廟後叢木似冬青而非葉有黑文類符篆然葉各不同夜舟人來告請無擊更鼓云廟後山中多虎聞鼓則出范成大云黃牛峽上有洺川廟黃牛之神也亦云助禹所疏川者廟在大峯峻壁之上有黃跡如牛一黑跡如人牽之云此其神也順流而下黃牛峽盡則扇子峽過此則峽中灘盡矣梁父吟齊勇士陳開疆顧冶子公孫捷晏嬰讒之景公曰王摘三桃自食其一各令說功高者賜一顆陳顧遂食之公孫自刎而陳顧懷慚亦從而刎侯出齊城見三墳有感而作步出齊城門遙望蕩陰里里中有三墳壘壘正相似問是誰家冢田疆古冶氏力能排南山文能絶地理一朝被讒言二桃殺三士誰能為此謀相國齊晏子白鳩篇翩翩白鳩再飛再鳴懷我君德來集君庭白雀呈瑞素羽明鮮翔庭無翼以應仁乾皎皎鳴鳩或丹或黃樂我君惠振羽來翔東壁餘光魚在江湖惠而不費敬我微軀策我良駟習我驅馳與君周旋樂道忘饑我心虛靜我志霑濡彈琴鼓瑟聊以自娛淩雲登臺浮游太清攀龍附鳳自望身輕司馬季主碑贊真誥云司馬季主漢人也得道尸解留枕席以代形粗似其身不異家人乃葬之於蜀升盤山之南諸葛武侯為之碑贊云玄漠太寂混合陰陽天地交泮萬品滋彰先生理著分别柔剛鬼神以觀六度顯明上後主臣先進虎步監孟琰據武功水東司馬懿因渭水漲以二十日率騎萬人來攻琰營臣作竹橋越水射之賊見橋垂成便引兵退與吳王所送白毦薄少重見辭謝益以增慙遺表伏念臣賦性拙直遭時艱難興師北伐未獲全功何期病在膏肓命垂旦夕伏願陛下清心寡欲約己愛民達孝道於先君布仁心於寰宇提拔逸隱以進賢良屏黜奸讒以厚風俗臣家成都有桑八百株薄田十五頃子孫衣食自有餘饒臣身在外别無調度隨時衣食悉仰於官不别治生以長尺寸臣死之日不使內有餘帛外有贏財以負陛下也與兄子瑜書綏陽小谷雖山崖紀重溪水縱橫難用行軍者邏候往來要道通人今使前軍斫治此道以向陳倉足以扳連賊勢使不得分兵東行又兄嫌白帝兵非精練到所督則先主帳下白毦西方上兵也嫌其少也當復部分江州兵以廣益之又殷往嗣秀才之僑盼者也東吳菰蘆中乃有竒偉如此人又前趙子龍燒赤崖以北閣道緣谷一百餘里其閣梁一頭入山腹其一頭立柱於水中今水大而急不得安柱此其窮極不可强也又頃大山暴出赤崖以南橋閣悉壞時趙子龍與鄧伯苗一戍赤崖屯田一戍赤崖口但得緣崖與伯苗相聞而已又既蒙東朝厚遇依依於子弟又子喬良器為之惻愴見其所與亮器物感用流涕與張裔書去婦不顧門萎韭不入園以婦人之性草菜之情猶有所恥想忠壯者意何所之與陸遜書家旡年老而恪性疏今使典糧穀糧穀軍之最要僕雖在遠竊用不安足下特為啓至尊轉之與步騭書僕前軍在五丈原原在武功西十里馬冢在武功東十餘里有高勢攻之不便是以留耳戒外甥夫志當存高遠慕先賢絶情欲棄凝滯使庶幾之情揭然有所存惻然有所感忍屈伸去細碎廣咨問除嫌吝何損於美趣何患於不濟若志不强毅意不慷慨徒碌碌滯於俗默默束於情永竄伏於凡庸不免於下流也戒子君子之行靜以修身儉以養德非淡泊無以明志非寧靜無以致遠夫學須靜也才須學也非學無以廣才非靜無以成學慆慢則不能研精險躁則不能理性年與時馳意與歲去遂成枯落悲嘆窮廬將復何及也又夫酒之設合禮致情適體歸性禮終而退此和之至也主意未殫賓有餘倦可以至醉無致迷亂教計一歲運用蓬旅簟千萬具寰宇記云渝瀘漢遂合皆出簟子以桃竹為之柳宗元詩桃笙葵扇安可常言以桃竹為笙也方言簟宋魏間謂之笙又作部作匕首五百枚以給騎士又曰敕作部皆作十拆矛以給之又始出營竪矛㦸舒幡旗鳴鼓角行三里辟矛㦸結幡旗鳴鼓角未至營三里復竪矛㦸舒幡旗鳴鼓角至營復結幡旗上鼓角違令者髠格言勢利之交難以經遠士之相知溫不增華寒不改葉貫四時而不衰厯坦險而益固遠涉帖師徒遠涉道路甚艱自及褒斜幸皆無恙使還馳此不復具如稱帖吾心如稱不能為人作輕重張栻曰貞觀政要載公此二語真孔明語也觀廖立李平之事可見矣楊愼曰太平御覽載公語曰我心如稱不能為人作低昻唐朝曾投人啓曰推諸葛之稱心負姜維之斗膽與張魯靈仙養命猶節松霞而享身嗜味奚能尚道陰符經解陳仲醇藏本天性人也人心機也立天之道以定人也侯曰以為立天定人其在於五賊天發殺機龍蛇起陸人發殺機天地反覆侯曰按楚殺漢兵數萬大風杳冥晝晦有若天地反覆其盜機也天下莫能見莫能知君子得之固窮小人得之輕命侯曰夫子太公豈不賢於孫吳韓白所以君子小人異之四子之勇主於殺身固不得其主而見殺矣陰陽相勝之術昭昭乎進乎象矣侯曰竒器者聖智也天垂象聖人則之推甲子畫八卦考蓍龜稽律厯則鬼神之情陰陽之理昭著乎象無不盡矣又曰八卦之象申而用之六十甲子轉而用之神出鬼入萬明一矣兵要杜氏兵典軍已近敵羅落常平明以先發絶軍前十里內各按左右下道亦十里之內數里之外五人為部人持一白幡登高外向明看隱蔽之處軍主轉尋高而前第一見賊轉語後第二第三詣主者白之凡侯見賊百人以下但舉旙指百人以上便舉旙大呼主者遣疾馬往視察之漢丞相諸葛忠武侯集卷之又七便宜十六策治國第一治國之政其猶治家治家者務立其本本立則末正矣夫本者倡始也末者應和也倡始者天地也應和者萬物也萬物之事非天不生非地不長非人不成故人君舉措應天若北辰為之主台輔為之臣佐列宿為之官屬衆星為之人民是以北辰不可變改台輔不可失度列宿不可錯繆此天之象也故立臺榭以觀天文郊祀逆氣以配神靈所以務天之本也耕農社稷山林川澤祀祠祈福所以務地之本也庠序之禮八佾之樂明堂辟雍高牆宗廟所以務人之本也故本者經常之法規矩之要圓鑿不可以方枘鉛刀不可以砍伐此非常用之事不能成其功非常用之器不可成其巧故天失其常則有逆氣地失其常則有枯敗人失其常則有患害經曰非先王之法服不敢服此之謂也君臣第二君臣之政其猶天地之象天地之象明則君臣之道備矣君以施下為仁臣以事上為義二心不可以事君疑政不可以授臣上下好禮則民易使上下和順則君臣之道備矣君以禮使臣臣以忠事君君謀其政臣謀其事政者正名也事者勸功也君勸其政臣勸其事則功名之道俱立矣是故君南面向陽著其聲響臣北面向陰見其形影聲響者教令也形影者功效也教令得中則功立功立則萬物蒙其福是以三綱六紀有上中下上者為君臣中者為父子下者為夫婦各修其道福祚至矣君臣上下以禮為本父子上下以恩為親夫婦上下以和為安上不可以不正下不可以不端上枉下曲上亂下逆故君惟其政臣惟其事是以明君之政修則忠臣之事舉學者思明師仕者思明君故設官職之全序爵祿之位陳璇璣之政建台輔之佐私不亂公邪不干正此治國之道備矣視聽第三視聽之政謂視微形聽細聲形微而不見聲細而不聞故明君視微之幾聽細之大以內和外以外和內故為政之道務於多聞是以聽察採納衆下之言謀及庶士則萬物當其目衆音佐其耳故經云聖人無常心以百姓為心目為心視口為心言耳為心聽身為心安故身之有心若國之有君以內和外萬物昭然觀日月之形不足以為明聞雷霆之聲不足以為聰故人君以多見為智多聞為神夫五音不聞無以别宮商五色不見無以别玄黃蓋聞明君者常若晝夜晝則公事行夜則私事興或有吁嗟之怨而不得聞或有進善之忠而不得信怨聲不聞則枉者不得伸進善不納則忠者不得信邪者容其姦故書云天視自我民視天聽自我民聽此之謂也納言第四納言之政謂為諫諍所以採衆下之謀也故君有諍臣父有諍子當其不義則諍之將順其美匡救其惡惡不可順美不可逆順惡逆美其國必危夫人君拒諫則忠臣不敢進其謀而邪臣專行其政此為國之害也故有道之國危言危行無道之國危行言遜上無所聞下無所說故孔子不耻下問周公不耻下賤故行成名著後世以為聖是以屋漏在下止之在上上漏不止下不可居矣察疑第五察疑之政謂察朱紫之色别宮商之音故紅紫亂朱色淫聲亂正樂亂生於遠疑生於惑物有異類形有同色白石如玉愚者寶之魚目似珠愚者取之狐貉似犬愚者蓄之栝蔞似瓜愚者食之故趙高指鹿為馬秦王不以為疑范蠡貢越美女吳王不以為惑計疑無定事事疑無成功故聖人不可以意說為明必信夫卜占其吉凶書曰三人占必從二人之言而有大疑者謀及庶人故孔子云明君之治不患人之不已知患不知人也不患外不知內惟患內不知外不患下不知上惟患上不知下不患賤不知貴惟患貴不知賤故士為知已者死女為悅已者容馬為策已者馳神為通已者明故人君决獄行刑患其不明或無罪被辜或有罪蒙恕或彊者專辭或弱者侵怨或直者被枉屈者不伸或有信而見疑或有忠而被害此皆天之逆氣災暴之患禍亂之變惟明君治獄案刑問其情辭如不虛不匿不枉不弊觀其往來察其進退聽其聲響瞻其看視形懼聲哀來疾去遲還顧吁嗟此怨結之情不得伸也下瞻盜視見怯退還喘息却聽沉吟腹計語言失度來遲去速不敢反顧此罪人欲自免也孔子曰視其所以觀其所由察其所安人焉廋哉人焉廋哉治人第六治人之政謂道之風化陳示所以也故經云陳之以德義而民興行示之以好惡而民知禁日月之明衆下仰之乾坤之廣萬物順之是以堯舜之君遠夷貢獻桀紂之君諸夏背叛非天移動其人是乃上化使然也故治人猶如養苗先去其穢故國之將興而伐於國國之將衰而伐於山明君之治務知人之所患皂服之吏小國之臣故曰皂服無所不剋莫知其極剋食於民而人有饑乏之變則生亂逆唯勸農業無奪其時唯薄賦斂無盡民財如此富國安家不亦宜乎夫有國有家者不患貧而患不安故唐虞之政利人相逢用天之時分地之利以備凶年秋有餘糧以給不足天下通財路不拾遺民無去就故五霸之世不足者奉於有餘故今諸侯好利利興民爭災害並起强弱相侵躬耕者少末作者多民如浮雲手足不安經云不貴難得之貨使民不為盜不貴無用之物使民心不亂各理其職是以聖人之政治也古者齊景公之時病民不奢侈不遂禮制周秦之宜去文就質而勸民之有利也夫作無用之器聚無益之貨金銀璧玉珠璣翡翠奇珍異寶遠方所出此非庶人之所用也錦繡纂組綺羅綾縠玄黃衣帛此非庶人之所服也雕文刻鏤伎作之巧難成之功妨害農事輜軿出入袍裘索𥜃此非庶人之所飾也宮室堂殿重門畫獸蕭墻數仭冡墓過度竭財高尚此非庶人之所居也經云庶人之所好者唯躬耕勤苦謹身節用以養父母制之以財用之以禮豐年不奢凶年不儉素有蓄積以備其後此治人之道不亦合於四時之氣乎舉措第七舉措之政謂舉直措諸枉也夫治國猶於治身治身之道務在養神治國之道務在舉賢是以養神求生舉賢求安故國之有輔如屋之有柱柱不可細輔不可弱柱細則害輔弱則傾故治國之道舉直措諸枉其國乃安夫柱以直木為堅輔以直士為賢直木出於幽林直士出於衆下故人君選舉必求隱處或有懷寶迷邦匹夫同位或有高才卓絶不見招求或有忠賢孝義鄉里不舉或有隱居以求其志行義以達其道或有忠直於君朋黨相讒堯舉逸人湯招有莘周公采賤皆得其人以致太平故人君懸賞以待功設位以待士不曠庶官闢四門以興治務玄纁以聘幽隱天下歸心而不仁者遠矣夫所用者非所養所養者非所用貧陋為下財色為上讒邪得志忠直遠放玄纁不行焉得賢輔哉若夫國危不治民不安居此失賢之過也夫失賢而不危得賢而不安未之有也為人擇官者亂為官擇人者治是以聘賢求士猶嫁娶之道也未有自嫁之女出財為婦故女慕財聘而達其貞士慕玄纁而達其名以禮聘士而其國乃寧矣考黜第八考黜之政謂遷善黜惡明主在上心昭於天察知善惡廣及四海不敢遺小國之臣下及庶人進用賢良退去貪懦明良上下企及國理衆賢雨集此所以勸善黜惡陳之休咎故考黜之政務知人之所苦其苦有五或有小吏因公為私乘權作姦左手執戈右手治生內侵於官外採於民此所苦一也或有過重罰輕法令不均無罪被辜以致滅身或有重罪得寬扶彊抑弱加以嚴刑枉責其情此所苦二也或有縱罪惡之吏害告訴之人斷絶語辭蔽藏其情掠劫亡命其枉不常此所苦三也或有長吏數易守宰兼佐為政阿私所親枉剋所恨逼切為行偏頗不承法制更因賦斂傍課採利送故待新夤緣徵發詐僞儲備以成家産此所苦四也或有縣官慕功賞罰之際利人之事買賣之費多所裁量專其價數民失其職此所苦五也凡此五事民之五害有如此者不可不黜無此五者不可不遷故書云三載考績三考黜陟幽明治軍第九治軍之政謂治邊境之事匡救大亂之道以威武為政誅暴討逆所以存國家安社稷之計是以有文事必有武備故含血之蟲必有爪牙之用喜則共戲怒則相害人無爪牙故設兵革之器以自輔衛故國以軍為輔君以臣為佐輔彊則國安輔弱則國危在於所任之將也非民之將非國之輔非軍之主故治國以文為政治軍以武為計治國不可以不從外治軍不可以不從內內謂諸夏外謂戎狄戎狄之人難以禮化易以威服禮有所任威有所施是以黃帝戰於涿鹿之野唐堯戰於丹浦之水舜伐有苗禹討有扈自五帝三王至聖之主德化如斯尚加之以威武故兵者凶器不得已而用之夫用兵之道先定其謀然後乃施其事審天地之道察衆人之心習兵革之器明賞罰之理觀敵衆之謀視道路之險别安危之處占主客之情知進退之宜順機會之時設守禦之備彊征伐之勢揚士卒之能圖成敗之計慮生死之事然後乃可出軍任將張擒敵之勢此為軍之大略也夫將者人之司命國之利器先定其計然後乃行其令若漂水暴流其獲若鷹隼之擊物靜若弓弩之張動如機關之發所向者破而勍敵自滅將無思慮士無氣勢不齊其心而專其謀雖有百萬之衆而敵不懼矣非讐不怨非敵不戰工非魯般之目無以見其功巧戰非孫武之謀無以出其計運夫計謀欲密攻敵欲疾獲若鷹擊戰如河决則兵未勞而敵自散此用兵之勢也故善戰者不怒善勝者不懼是以智者先勝而後求戰暗者先戰而後求勝勝者隨道而修途敗者斜行而失路此順逆之計也將服其威士專其力勢不虛動運如圓石從高墜下所向者碎不可救止是以無敵於前無敵於後此用兵之勢也故軍以奇計為謀以絶智為主能柔能剛能弱能强能存能亡疾如風雨舒如江海不動如泰山難知如陰陽無窮如地充實如天不竭如江河終始如三光生死如四時衰旺如五行奇正相生而不可窮故軍以糧食為本兵以奇正為始器械為用委積為備故國困於貴買貧於遠輸攻不可再戰不可三量力而用用多則費罷去無益則國可寧也罷去無能則國可利也夫善攻者敵不知其所守善守者敵不知其所攻故善攻者不以兵革善守者不以城郭是以高城深池不足以為固堅甲鋭兵不足以為彊敵欲固守攻其無備敵欲興陳出其不意我往敵來謹設所居我起敵止攻其左右量其合敵先擊其實不知守地不知戰日可備者衆則專備者寡以慮相備彊弱相攻勇怯相助前後相赴左右相趨如常山之蛇首尾俱到此救兵之道也故勝者全威謀之於身知地形勢不可豫言議之知其得失詐之知其安危計之知其多寡形之知其生死慮之知其苦樂謀之知其善備故兵從生擊死避實擊虛山陵之戰不仰其高水上之戰不逆其流草上之戰不涉其深平地之戰不逆其虛道上之戰不逆其孤此五者兵之利地之所助也夫軍成於用勢敗於謀漏饑於遠輸渴於躬井勞於煩擾佚於安靜疑於不戰惑於見利退於刑罰進於賞賜弱於見逼彊於用勢困於見圍懼於先至驚於夜呼亂於暗昧迷於失道窮於絶地失於㬥卒得於預計故立旌旗以視其目擊金鼓以鳴其耳設斧鉞以齊其心陳教令以同其道興賞賜以勸其功行誅伐以防其僞晝戰不相聞旌旗為之舉夜戰不相見火鼓為之起教令有不從斧鉞為之使不知九地之便則不知九變之道天之陰陽地之形名人之腹心知此三者獲處其功知其士乃知其敵不知其士則不知其敵不知其敵每戰必殆故軍之所擊必先知其左右士卒之心五間之道軍之所親將之所厚非聖智不能用非仁賢不能使五間得其情則民可用國可長保故兵求生則備不得已則鬬靜以理安動以理威無恃敵之不至恃吾之不可擊以近待遠以逸待勞以飽待饑以實待虛以生待死以衆待寡以旺待衰以伏待來整整之旌堂堂之鼓當順其前而覆其後固其險阻而營其表委之以利柔之以害此治軍之道備矣賞罰第十賞罰之政謂賞善罰惡也賞以興功罰以禁姦賞不可不平罰不可不均賞賜知其所施則勇士知其所死刑罰知其所加則邪惡知其所畏故賞不可虛施罰不可妄加賞虛施則勞臣怨罰妄加則直士恨是以羊羹有不均之害楚王有信讒之敗夫將專持生殺之威必生可殺必殺可生忿怒不詳罰賞不明教令不常以私為公此國之五危也賞罰不明教令有不從必殺可生衆姦不禁必生可殺士卒散亡忿怒不詳威武不行賞罰不明下不勸功政教不當法令不從以私為公人有二心故衆姦不禁則不可久士卒散亡其衆必寡威武不行見敵不起下不勸功上無彊輔法令不從事亂不理人有二心其國危殆故防姦以政救奢以儉忠直可使理獄廉平可使賞罰賞罰不曲則人死服路有饑人廄有肥馬可謂亡人而自存薄人而自厚故人君先募而後賞先令而後誅則人親附畏而愛之不令而行賞罰不正則忠臣死於非罪而邪臣起於非功賞賜不避怨讐則齊桓得管仲之力誅罰不避親疏則周公有殺弟之名故書云無偏無黨王道蕩蕩無黨無偏王道平平此之謂也喜怒第十一喜怒之政謂喜不應喜無喜之事怒不應怒無怒之物喜怒之間必明其類怒不犯無罪之人喜不從可戮之士喜怒之際不可不詳喜不可縱有罪怒不可戮無辜喜怒之事不可妄行行其私而廢其功將不可發私怒而興戰必用衆心苟或以私忿而合戰則用衆必敗怒不可以復悅喜不可以復怒故以文為先以武為後先勝則必後負先怒則必後悔一朝之忿而亡其身故君子威而不猛忿而不怒憂而不懼悅而不喜可忿之事然後加之威武威武加則刑罰施刑罰施則衆姦塞不加威武則刑罰不中刑罰不中則衆惡不理其國亡治亂第十二治亂之政謂省官并職去文就質也夫綿綿不絶必有亂結纖纖不伐必成妖孽夫三綱不正六紀不理則大亂生矣故治國者圓不失規方不失矩本不失末為政不失其道萬事可成其功可保夫三軍之亂紛紛擾擾各惟其理明君治其綱紀政治當有先後先理綱後理紀先理令後理罰先理近後理遠先理內後理外先理本後理末先理强後理弱先理大後理小先理身後理人是以理綱則紀張理令則罰行理近則遠安理內則外端理本則末通理强則弱伸理大則小行理上則下正理身則人敬此乃理亂之道也教令第十三教令之政謂上為下教也非法不言非道不行上之所為人之所瞻也夫釋已教人是謂逆政正已教人是為順政故人君先正其身然後乃行其令身不正則令不從令不從則生變亂故為君之道以教令為先誅罰為後不教而戰是謂棄之先習士卒用兵之道其法有五一曰使目習其旌旗指麾之變縱橫之意二曰使耳習聞金鼓之聲動靜行止三曰使心習刑罰之嚴爵賞之利四曰使手習知五兵之便鬬戰之備五曰使足習知周旋走趨之列進退之宜故號為五教教令軍陳各有其道左教青龍右教白虎前教朱雀後教玄武中央軒轅大將軍之所處左矛右㦸前楯後弩中央旗鼓與動俱起聞鼓則進聞金則止隨其指揮五陳乃理正陳之法鼓旗為之主一鼓舉其青旗則為直陳二鼓舉其赤旗則為鋭陳三鼓舉其黃旗則為方陳四鼓舉其白旗則為圓陳五鼓舉其黑旗則為曲陳直陳者木陳也鋭陳者火陳也方陳者土陳也圓陳者金陳也曲陳者水陳也此五行之陳展轉相生衝對相勝相生為救相勝為戰相生為助相勝為敵凡結五陳之法五五相保五人為一長五長為一師五師為一枝五枝為一火五火為一撞五撞為一軍則軍士備矣夫兵利之所便務知節度短者持矛戟長者持弓弩壯者持旌旗勇者持金鼓弱者給糧牧智者為謀主鄉里相比五五相保一鼓整行二鼓習陳三鼓起食四鼓嚴辦五鼓就行聞鼓聽金然後舉旗出兵以次第一鳴鼓三通旌旗發揚舉兵先攻者賞卻退者斬此教令也斬斷第十四斬斷之政謂不從教令之法也其法有七一曰盜二曰輕三曰慢四曰欺五曰背六曰亂七曰誤此治軍之禁也當斷不斷必受其亂故設斧鉞之威以待不從令者誅之軍法異等過輕罰重令不可犯犯令者斬期會不到聞鼓不行乘寬自留避回自止初近後遠喚名不應車甲不具兵器不備此為輕軍輕軍者斬受令不傳傳令不審迷惑吏士金鼓不聞旌旗不覩此謂慢軍慢軍者斬食不稟糧軍不省兵賦賜不均阿私所親取非其物借貸不還奪人頭目以獲其功此為盜軍盜軍者斬變改姓名衣服不鮮旌旗裂壞金鼓不具兵刃不磨器仗不堅矢不著羽弓弩無弦法令不行此為欺軍欺軍者斬聞鼓不進聞金不止按旗不伏舉旗不起指揮不隨避前向後縱發亂行折其弓弩之勢卻退不鬬或左或右扶傷舉死自托而歸此謂背軍背軍者斬出軍行將士卒爭先紛紛擾擾車騎相連咽塞道路後不得先呼喚喧譁無所聽聞失亂行次兵刃中傷長短不理上下縱橫此謂亂軍亂軍者斬屯營所止問其鄉里親近相隨共食相保不得越次彊入他伍干誤次第不可呵止度營出入不由門戶不自起白姦邪所起知者不告罪同一等合人飲酒阿私取受大言警語疑惑吏士此謂誤軍誤軍者斬斬斷之後此萬事乃理也思慮第十五思慮之政謂思近慮遠也夫人無遠慮必有近憂故君子思不出其位思者正謀也慮者思事之計也非其位不謀其政非其事不慮其計大事起於難小事起於易故欲思其利必慮其害欲思其成必慮其敗是以九重之臺雖高必壞故仰高者不可忽其下瞻前者不可忽其後是以秦穆公伐鄭二子知其害吳王受越女子胥知其敗虞受晉璧馬宮之奇知其害宋襄公練兵車目夷知其負凡此之智思慮之至可謂明矣夫隨覆陳之軌追陷溺之後以赴其前何及之有故秦承霸業不及堯舜之道夫危生於安亡生於存害生於利亂生於治君子視微知著見始知終禍無從起此思慮之政也陰察第十六陰察之政譬喻物類以覺悟其意也外傷則內孤上惑則下疑疑則親者不用惑則視者失度失度則亂謀亂謀則國危國危則不安是以思者慮遠遠慮者安無慮者危富者得志貧者失時甚愛大費多藏厚亡竭財相買無功自專憂事衆者煩煩生於怠船漏則水入囊穿則內空山小無獸水淺無魚樹弱無巢牆壞屋傾堤決水漾疾走者仆安行者遲乘危者淺履氷者懼涉泉者溺遇水者渡無楫者不濟失侶者遠顧賞罰者省功不誠者失信唇亡齒寒毛落皮單阿私亂言偏聽者生患善謀者勝惡謀者分善之勸惡如春雨澤騏驥易乘駑駘難習不視者盲不聽者聾根傷則葉枯葉枯則花落花落則實亡柱細則屋傾本細則末撓下小則上崩不辨黑白棄土取石虎羊同羣衣破者補帶短者續弄刀者傷手打跳者傷足洗不必江河要之卻垢馬不必騏驥要之疾足賢不必聖人要之智通總之有五德一曰禁暴止兵二曰賞賢罰罪三曰安仁和衆四曰保人定功五曰豐撓拒讒此之謂五德漢丞相諸葛忠武侯集卷之八將苑五十篇將權夫兵之權也是三軍之司命主將之威勢將能執兵之權操兵之勢以臨其下譬如猛虎加之兩翼翺翔四海隨所遇而施之若將失其權不操其勢亦如魚龍脫於江湖中欲求游泳之勢驀濤戲浪何可得也逐惡夫國軍之弊有五害焉一者結黨相連毀譖賢良二者侈其衣服異其冠帶三者虛誇妖說詭言神道四者專察是非私以動衆五者伺候得失陰結敵人此所謂為奸悖德之人可遠而不可親也知人夫人之性莫難察焉善惡雖殊情貌不一有溫良而為盜者有外恭而內欺者有外勇而內怯者有盡力而不忠者然知人之道有七一曰問之以是非而觀其志二曰窮之以詞而觀其變三曰咨之以謀而觀其識四曰告之以難而觀其勇五曰醉之以酒而觀其性六曰臨之以利而觀其廉七曰期之以事而觀其信將材夫將材有八道之以德齊之以禮知其饑寒察其勞苦此之謂仁將事無苟免不為利撓有死之榮無生之辱此之謂義將貴而不驕勝而不恃賢而能下剛而能忍此之謂禮將奇變莫測動應多端轉禍為福因危制勝此之謂智將進有厚賞退有嚴刑賞不逾時刑不擇貴此之謂信將足輕戎馬氣蓋百夫善用短兵長於劍㦸此之謂步將臨高厯險馳射若飛進則先行退則後殿此之謂騎將氣凌三軍志輕彊敵怯於小戰勇於大鬬此之謂猛將見賢若不及從諫若順流寬而能剛簡而多計此之謂大將將器夫將之器大小不同若乃察其奸伺其禍為衆心所服此十夫之將夙興夜寐言詞密察此百夫之將直而有慮勇而能鬬此千夫之將外貌桓桓中心烈烈知人艱難惜人饑寒此萬人之將近賢進能日愼一日誠信寬大間於理亂此十萬人之將仁愛洽於下信義服鄰國上曉天文下察地理中悉人事四海之內親如室家此天下雄將不可敵也將弊夫為將之道有八弊焉一曰貪而無厭二曰妬賢嫉能三曰信讒好佞四曰料彼不自料五曰猶豫不自決六曰荒淫於酒色七曰奸詐而心怯八曰狂言不以禮將忠兵者凶器將者危任是以氣剛則缺任重則危故善將者不恃强不怙勢寵之不喜辱之不懼見利不貪見色不淫以身徇國一意而已將善夫將有五善四欲五善者謂善知敵之形勢善知進退之道善知國之虛實善知天時人事善知山川坦險四欲者議欲奇保欲密衆欲靜心欲一將剛善將者至剛不可折至柔不可卷故以弱制强以柔制剛純柔純弱其勢必削純剛純强其勢必亡不柔不剛合道之常將驕將不可驕將驕則失禮失禮則人離人離則衆叛將不可吝吝則賞信不行賞信不行則士不致命士不致命則軍無功軍無功則國虛國虛則寇實孔子曰如有周公之才之美使驕且吝其餘不足觀也已將彊將有五彊八惡高節可以勵俗孝弟可以揚名信義可以交友泛愛可以容衆力行可以建功此將之五彊也謀不能料是非理不能任賢良亂不能正刑法富不能濟貧乏智不能備未形慮不能防微密達不能舉所知敗不能無毁謗此之謂八惡也出師古者國有難君簡賢而使之齊三日入廟門面南立將北面太師進斧鉞於君君持斧鉞以柄授於將曰閫外將軍裁之復命曰見其虛則進見其實則止勿以身貴而賤人勿以獨見而違衆勿以巧佞而違忠信士未坐勿坐士未食勿食同寒暑等勞逸齊甘苦均危患此則士必盡命敵必可亡將受詞訖鑿凶門引軍而出君送之跪而捧轂曰進退維時軍中之事不聞君命皆由將出若此則無天於上無地於下無敵於前無主於後是以智者為之慮勇者為之鬬故戰勝於外立功於內揚名於後代福延及於子孫擇材夫師之行也有好鬬樂戰獨取强敵者聚為一徒名曰報國之士有氣蓋三軍材力勇捷者聚為一徒名曰突陳之士有足輕善步走如奔馬者聚為一徒名曰搴旗之士有騎射若飛發無不中者聚為一徒名曰爭鋒之士有射必中中必死者聚為一徒名曰飛馳之士有善發强弩遠而必中者聚為一徒名曰摧鋒之士此六軍之善士各因其能而用之智用夫為將之道必順天因時依人以立勝也故天作時不作而人作謂之逆時時作天不作而人作謂之逆天天作時作而人不作謂之逆人智者不逆天不逆時不逆人也不陳古之善理者不師善師者不陳善陳者不戰善戰者不敗善敗者不亡昔者聖人之致理也安其居樂其業人至老不相攻伐可謂善理者不師若舜修典刑咎繇作士人不犯令刑無所施可謂善師者不陳若禹伐有苖舞千羽而苖民格可謂善陳者不戰若湯武誓師一戎衣而天下大定可謂善戰者不敗若楚昭王遭禍奔秦請救卒能返其國可謂善敗者不亡也將誠書曰狎侮君子罔以盡人心狎侮小人罔以盡人力行兵之要務攬英雄之心嚴賞罰之科總文武之道兼剛柔之術悅禮樂而敦詩書先仁義而後智勇靜若潛魚動若奔獺散其所連折其所强耀以旌旗戒以金鼓退若山移進如風雨擊崩若摧合戰如虎迫而容之利而誘之亂而取之卑而驕之親而離之强而弱之有危者安之有懼者悅之有叛者懷之有𡨚者伸之有强者抑之有弱者扶之有謀者親之有讒者覆之有獲財者與之不恃力而輕敵不傲才而輕下不固寵而作威先計而後動知勝而後戰得其財帛不自寶得其子女不自使將能若此發號施令而人願鬬兵不血刃而敵自敗矣戎備夫國之大務莫大於戎事備若乃失之毫釐差之萬里殺軍獲將勢不踰息可不懼哉故國有難君臣旰食而謀之簡賢料能而任之若乃居安而不思危寇至而不知懼此謂燕巢於幕魚游於鼎亡不待夕矣傳曰不備不可以師又曰國無小有備故也又曰預備無虞善政之道又曰蜂蠆尚有毒而况國乎無備雖衆不可恃也書曰惟事事乃其有備有備無患故三軍之行不可不備也習練夫卒不習練百不當一習而用之一以當百故仲尼曰不教而戰是謂棄之又曰善人教民七年亦可以即戎矣然則士不可不教先訓之以禮義誨之以忠信誡之以典刑威之以賞罰人知其勸矣然後習之或陳而分之坐而起之行而止之前而卻之别而合之散而聚之一人可教十人十人可教百人百人可教千人千人可教萬人以成三軍如此練習之敵必敗矣軍蠧夫三軍之行有探候不謹烽火失度後期犯令不應時機阻亂師徒乍前乍後不合金鼓上不恤下削刻無厭營私徇已不恤饑寒非言妖詞妄陳禍福喧雜驚亂胘惑將吏勇不受制專邪凌上虛竭軍庫以給其身此九者三軍之蠧有之必敗矣腹心夫為將者必有腹心耳目爪牙無腹心者如人夜行無所措手足無耳目者如冥然而居不知運動無爪牙者如饑人食毒物無不死矣故善將者必有博聞多智為腹心沈審謹密為耳目勇捍善敵者為爪牙謹候夫為敗軍喪師未有不因輕敵而致禍也故師出以律失律則凶律道有十五焉一曰慮間諜明也二曰結誶候謹也三曰勇敵衆不撓也四曰廉見得思義也五曰平賞罰均也六曰忍善含恥也七曰寬能容衆也八曰信重然諾也九曰敬禮賢能也十曰明不納讒也十一曰故不遺舊也十二曰仁愛養士卒也十三曰忠以身徇國也十四曰分知止足也十五曰謀自料而後料他也機形夫以愚克智逆也以智克愚順也以智克智機也道有三焉一曰事二曰勢三曰情事機作而不能應非智也勢機動而不能圖非賢也情機發而不能行非勇也善為將者必因機以立勝也重刑吳起曰鼓鼙金鐸所以威耳旌旄旗幟所以威目禁令刑罰所以威心耳威以聲不可不淸目威以容不可不明心威以刑不可不嚴此三者不善害可待也故曰將之所麾莫不必移將之所指莫不必至將之所期莫不必死也善將古之善將者有大經示之以進退而人知禁陳之以德義而人知禮重之以是非而人知勸令之以賞罰而人知信禁禮勸信師之大經也故能戰必勝敵必取也庸衆不然退而不能止進而不能禁善惡混同士無誡勸賞罰不均人不知信故賢良退伏而諂諛進用是以戰必敗散也審因夫因人之勢以伐惡則黃帝不能與爭威矣因人之力以決勝湯武不能與爭功矣善以審因而加之威信則萬夫之雄將可圖而四海之英豪可制矣天勢夫行師之勢有三焉一曰天二曰地三曰人天勢者謂日月淸明五星合度彗孛不生風氣順調地勢者謂險易形殊或石門幽洞羊腸險要或峻嶺重巖洪流千里人勢者謂主聖將賢三軍有禮士卒用命糧甲堅備也善將者因天之時就地之勢依人之利則所向者無敵所擊者萬全矣勝敗賢才居上不肖居下三軍悅樂士卒畏懼相議以勇鬬相望以威武相勸以刑罰此必勝之徵也三軍數驚士卒惰慢下無禮信人不畏法相恐以敵相語以利相囑以禍福相惑以妖言此必敗之徵也假權夫將者人命之所懸也成敗之所繫也禍福之所倚也而上不假之以賞罰亦猶束猿猱之手而責之以騰捷膠離婁之目而使之辨靑黃不可得也若賞在權臣罰不由將人苟自利誰懷鬬心雖伊呂之謀韓白之功不能自衛也故孫武曰將之出也君命有所不受亞夫曰軍中聞將軍令不聞有天子之詔也哀死古之善將者養其人如養愛子有難則以身先之有功則以身後之傷者泣而撫之死者哀而葬之饑者捨食而飼之寒者解衣而衣之賢者禮而祿之勇者賞而勸之將能若此則所向必捷矣三賓夫三軍之行也必有賓客共議得失以資將用有思若懸泉奇謀不測博聞廣見多藝碩才者此萬人之望可以為上賓有猛如熊虎捷若騰猿剛共鐵石利若龍泉此一時之雄也可以為次賓有多言或中薄能小奇此常人之能可引為下賓設應若乃圖難於易為大於小先用賞後用刑此用兵之妙也師徒已列戎騎交馳强弩才臨短兵又接乘威布信敵人告降此用兵之能也身衝矢石爭勝相對成敗各分彼傷我死此用兵之下也便利夫草木叢集利以遊逸重塞山林利以不意晴明無隱利以勇力隘途深草利以潛伏以少擊衆利以日暮以衆擊寡利以淸晨强弩長兵利以捷次踰淵隔水大風暗昧利以搏前擒後也應機夫必勝之術合變之形在於機也非智者孰能與於此乎見機之道莫大於不意故猛虎失隊童子曳㦸而追之蜂蠆入袖壯夫恛惶而失色以其禍出不圖變速非慮也揣能古之善用兵者揣其能而料其勝負主孰聖也將孰賢也吏孰能也糧餉孰豐也士卒孰練也軍容孰整也戎馬孰逸也形勢孰險也賓客孰智也鄰國孰懼也財貨孰多也百性孰安也由此觀之强弱之形可以决矣輕戰螫蟲之觸負其毒也戰士能勇恃其備也所以鋒鋭甲堅則人輕戰故甲不堅密與肉袒同弩不及遠與短兵同射不能中與無兵同探候不謹與無目同將鬬不勇與無將同地勢夫地勢者兵之助也不知戰地而求勝者未之有也山林積石邱阜大川此步兵之地平原小坡蔓衍相屬此車騎之地依山附澗高林深谷此弓弩之地草淺土平可前可後此長㦸之地蘆葦相參竹樹交映此鎗矛之地情勢夫將有勇而輕死者有急而心速者有貪而喜利者有仁而不忍者有智而心怯者有智而心緩者是故勇而輕死者可㬥也急而心速者可久也貪而喜利者可遺也仁而不忍者可勞也智而心怯者可窘也智而心緩者可襲也擊勢古之善將者先探敵情然後圖之師老糧絶百姓愁怨人多疾疫計不先設器械不修卒不習練外救不至途遠日暮士卒勞倦將薄吏輕懈不設備進不暇陳陳而未定行阪涉險半隱半出踰津越河旌旗散亂將士相違戰勝而驕行陳失次兵疲而驚大軍雖給而衆未食自行自止或前或卻擊之無疑若上度下惠信賞必罰陳力就列任賢使能師恭而禮甲兵堅利糧備有餘政教不虛四鄰和睦大國應援敵人有此引而辟之整師夫出師行軍以整為勝若賞罰不明法令不信金之不止鼓之不進雖百萬之師無益於用所謂整師者居則有禮動則有威進不可當退不可追前後應節左右應麾與之安不與之危其衆可合而不可離可用而不可疲也勵士夫用人之道尊之以爵贍之以財則士無不至矣接之以禮勵之以言則士無不死矣畜息不倦法令畫一則士無不服矣先之以身後之以人則士無不勇矣小善必録小功必賞則士無不勸矣自勉夫聖人則天賢人法地智者循古驕者毁至慢者禍及多語者寡信自奉者少恩賞無功者離罰無罪者怨喜怒不常者滅戰道征戰之道晝廣旌旗夜廣火鼓利用短兵巧在奇伏或發於前或發於後聚戰之道利用劍楯將欲圖後先廣其路十里一場五里一堠偃戢旌旗時節金鼓令敵人無所措手足谷戰之道巧於設伏利在勇鬬輕足之士凌其高必死之士殿其後列强弩以衝之持短兵以繼之彼不得前我不得往水戰之道利在舟楫簡練習之士以乘之多張旗幟以惑之發强弩以中之持短兵以捍之設堅柵以衛之順其流以擊之夜戰之道利在機密或潛師銜枚出其不意或多以火鼓亂其耳目馳而攻之可以勝矣和人夫用兵之道要在和人人和則不勸而自戰矣若吏卒相猜士戎不附忠謀不納羣小暗議謗慝芽生雖有湯武之智而不能取勝於匹夫况其衆乎故傳曰兵猶火也不戢將自焚矣察情夫兵起於情近而靜者恃其險也遠而挑戰者欲人之進也衆樹動者來也塵卑而廣者徒來也高而鋭者車來也辭强而進驅者退也卑而益備者進也半進半退者誘也杖而行者饑也見利而不進者勞也鳥集者虛也夜呼者恐也軍擾者將不重也旌幡動者亂也吏怒者倦也數賞者窘也思罰者困也先㬥而後畏其衆者不精之至也來委謝者欲休息也幣重而言甘者誘我也將情夫為將之道軍井未汲將不言渴軍米未炊將不言饑軍火未燃將不言寒軍幕未拽將不言熱夏不操扇冬不服裘雨不張蓋與衆同也威令夫一人之身百萬之衆束肩斂息重足俯聽莫敢仰視法制使然也若乃上無刑罰下無禮義雖貴有天下富有四海而不能自免者桀紂之類是也匹夫操兵之權制之以法令威之以賞罰而人不能逆其命者孫武穰苴之類是也故令不可輕勢不可逆也東夷東夷之性薄禮少義悍急能鬬依山塹海憑險自固若君臣和睦黎民安樂不可圖也上亂下離則可以行問間起則隙生隙生則修德以來之固甲兵以擊之其勢必剋也西戎西戎之性勇悍好利或城居或野處米糧少金貝多故人勇戰鬬難敗其積石以西諸戎種繁地廣形險俗負强狠故人多不臣當候之以外釁伺之以內亂則可破矣南蠻南蠻多種性不帥教連合朋黨失意則叛居洞依山或聚或散西至崑崙東至洋海産奇貨故人貪而勇戰春夏多瘴疫利在疾鬬不可久師也羌狄羌狄居無城郭隨逐水草勢利則南侵勢失則自引去長山廣積足以自衛饑則捕獸飮乳寒則寢皮服裘奔走射獵以殺為務未可以道德綏之未可以兵革服之漢不與戰其略有三漢軍且耕且戰故疲而怯狄騎且牧且獵則逸而勇以疲敵逸以怯敵勇不相鬬此其不可戰一也漢長於步日馳百里狄長於騎日行倍之漢逐狄則運糧負甲而隨之狄逐漢則長驅疾騎而運之運負之勢已殊走逐之形不等此其不可戰二也漢戰多步狄戰多騎爭地之形勢則騎與步遲疾勢懸此其不可戰三也不得已則莫若守邊守邊之道㨂良將而任之訓鋭士而禦之廣公田而實之練士卒以防之多方策以誤之候其隙以間之乘其衰以擊之則國不費而狄已剋矣人不疲而狄已靜矣漢丞相諸葛忠武侯集卷之又八遺事後主初益州大姓雍闓殺太守正昻更以蜀郡張裔為太守闓假鬼教曰張裔府君如瓠壺外雖澤而內實粗殺之不可縛與吳於是執送裔於吳吳王孫權遙用閩為永昌太守遣故劉璋子闡為益州剌史處交益州際牂牁郡丞朱提朱褒領太守恣雎諸葛丞相以初遭大喪未便加兵遣越嶲太守巴西襲祿住安上縣遙領郡從事蜀郡常頎行部南入以都護李嚴書曉諭闓闓答曰愚聞天無二日土無二主今天下派分正朔有三遠人惶惑不知所歸其傲慢如此頎至牂牁收郡主簿考訊姦狀褒因殺頎為亂益州蠻復不從闓闓使建寧孟獲說蠻叟曰官欲得烏狗三百頭膺前盡黑蟎腦三㪷斫木構三丈者三千枚汝能得否蠻以為然皆從闓斫木堅剛性委曲高不至二丈故獲以欺蠻建興三年春侯南征自安上由水路入越嶲别遣馬忠伐牂牁李恢向益州以犍為太守漢王士為益州太守高定元自麾牛定笮卑水多為壘守侯欲俟定元軍衆集合并討之軍卑水定元部曲殺雍闓及士庶等孟獲代闓為王侯既斬定元而馬忠破牂牁李恢敗之於南中分建寧越嶲置雲南郡以呂凱為太守又分建寧牂牁置興古郡以馬忠為牂牁太守移南中徑卒靑羌萬餘家於蜀為五部所當無前號為飛軍分其羸弱配大姓焦雍婁爨孟量毛李為部曲置五部都尉號五子故南人言四姓五子也以蠻多剛狼不賓大姓富豪乃勸令出金帛聘策惡蠻為家部曲得多者奕世襲官於是蠻人貪貨物以漸服屬於漢成蠻漢部曲侯收其俊傑建寧爨習朱提孟琰及獲為官屬習官至領軍琰輔漢將軍獲御史中丞出其金銀丹漆耕牛戰馬給軍國之用夏五月侯渡瀘進征益州生擒孟獲置軍中問曰我軍何如獲對曰恨不相知公易勝耳侯以方務在北面南中好叛亂宜窮其詐乃赦獲使還合軍更戰凡七虜七赦獲等心服蠻漢亦思反善侯復問獲獲對曰明公天威也邊民長不為惡矣秋遂平四郡改益州為建寧以李恢為太守加安漢將軍領交州剌史移治味縣以上俱華陽國志滇域未通中國之先有低牟苴者居永昌哀牢之山麓有婦曰沙一浣䋈水中觸沈木若有感是生九男曰九隆八族種類滋長支裔蔓衍竊據土地散居溪谷分為九十九部其渠酋有六各號為詔蠻語為詔為王其一曰䝉舍詔其二曰浪施詔其三曰鄧貶詔其四曰施浪詔其五曰摩㱔詔其六曰䝉雋詔兵埒不能相君長至漢有仁果時九隆八族之四世孫也强大居昆彌川傳十七世至龍祐那當蜀漢建興三年諸葛武侯南征雍闓師次白崖川獲闓斬之封龍祐那為酋長賜姓張氏割永昌益州地置雲南郡於白崖諸蠻慕武侯之德漸去山林徙居平地建城邑務農桑諸部於是始有姓氏龍祐那之十六世孫曰張樂進求遜位於䝉氏考其時蓋唐世也張氏或稱昆彌國亦稱白國或稱建寧國其年系莫可推詳楊升奄滇記蠻人大種曰昆小種曰叟皆曲頭木耳環鐵裹結無大侯王如汶山漢嘉蠻也蠻中有桀黠能言議屈服種人者謂之耆老便為主論議好譬喻物謂之蠻經今南人言論雖學者亦半引蠻經與蠻為姓曰遑耶諸姓為自有耶世亂犯法轍依之藏匿或曰有為官所法蠻或為報仇與蠻至厚者謂之百世遑耶恩若骨肉為其逋逃之藪故南人輕為禍變恃此也其俗徵巫鬼好詛盟投石結草官常以盟詛要之武侯乃為作圖譜先畫天地日月君長城府次畫神龍龍生蠻及牛馬羊後畫部主吏乘馬幡蓋巡行安恤又畫牽牛負酒齎金寶詣之之象以賜蠻蠻甚重之許致生口直又與瑞錦鐵劵今皆存每剌史校尉至齎以呈詣動亦如之華陽國志中州連滇有三路自卭雅建昌會川渡金沙江入姚安白崖曰古路泰常頞略通五尺道武侯南征乃大闢焉唐曰姚嶲路起瀘州泝永寧走赤水達曲靖曰西路唐天寶中出師伐南詔亦由此進至元世始開郵傳今因之焉出湖藩轉辰沅經貴州曰東路肇自莊蹻立傳則自國朝始也東路由大江捨舟首程曰公安六亭而達孫黃道經故孱陵縣遺甃存焉孱陵罐子皆十里而遙樹多女貞多貴竹楊升奄滇記張溫將使蜀權謂溫曰卿不宜遠出恐諸葛孔明不知吾所以與曹氏通意以故屈卿行若山越都除便欲大搆於蜀行人之義受命不受辭也溫對曰臣入無腹心之規出無專對之用懼無張老延譽之功又無子産陳事之效然諸葛亮達見計數必知神慮屈申之宜加受朝廷天覆之惠推亮之心必無疑二溫至蜀詣闕拜章蜀甚貴其才會稽典録曰餘姚虞俊歎曰張惠恕才多智少華而不實怨之所聚有覆家之禍吾見其兆矣諸葛丞相聞俊憂溫意未之信及溫放黜乃歎俊之有先見亮初聞溫敗未知其故思之數日曰吾已得之矣其人於淸濁太明善惡太分遣衛尉陳震慶權正號權與震升之歃盟交分天下以徐豫幽靑屬吳并凉冀兖屬漢其司州之土以函谷關為界造為盟曰天降喪亂皇綱失敘逆臣乘釁始於董卓終於曹操及操子丕桀逆遺醜偷取天位而睿么麼尋丕凶蹟昔共工亂象而高辛行師三苖干度而虞舜征焉今日滅睿禽其徒黨非漢與吳將復誰在宜先分裂奪其土地使士民之心各知所歸是以春秋晉侯伐衛先分其田斯其義也諸葛丞相德威遠著典戎在外信感陰陽誠動天地重復結盟使東西士民咸共聞知侯引兵出散關圍陳倉起雲梯衝車以臨城魏將郝昭以火箭逆射其梯梯然梯上人皆燒死昭又以繩連石磨壓其衝車衝車折侯乃更為井欄百尺以射城中以土丸填塹欲直攀城昭又於內築重牆侯又為地突欲踊出於城裏昭又於城內穿地橫截之晝夜相攻拒二十餘日會糧盡引去將軍王雙追之擊斬雙斜谷之事司馬懿使二十人就軍營東南角大聲稱萬嵗武侯使問之答曰吳朝有使至請降武侯謂曰計吳朝必無降法卿是六十老翁何須詭誑如此九年春丞相復出圍祁山始以木牛運參軍王平守南圍司馬懿拒侯張郃拒平侯慮糧運不繼設三策告都護李平曰上計斷其後道中計與之持久下計還住黃土時懿等糧亦盡盛夏雨水平恐運漕不給書白侯宜振旅辟尚書郎蔣琬及廣漢李邵巴西馬勳為掾南陽宗豫為主簿皆德舉也秦宓為别駕犍為王梁為功曹梓潼杜微為主簿皆州俊彥也而江夏費禕南郡董允郭攸之始為侍郎贊揚日月李朝字永南弟邵字偉南郪人也王士字義疆從弟甫字國山文表諸弟也先主領牧朝為别駕羣下上先主為漢中王其文朝所造也後丞相亮府辟西曹掾亦有文才兄弟三人號三龍士厯宕渠犍為益州太守甫善言議闕人流美稱自綿竹令為州右職楊戲字文然少與巴西程祁巴郡楊汰蜀郡張表並知名戲每推祁以為冠首丞相亮深識之年二十餘從州書佐為督軍從事職典刑獄論法決疑號為平當何祇漢成都令時郫闕令侯以祇兼之人不敢欺吳主使輔義中郎將吳郡張溫聘於漢自是吳蜀信使不絶時事所宜吳主常令陸遜語侯又刻印置遜所王每與漢主及侯書嘗過示遜輕重可否有所不安每令改定以印封之江表傳曰諸葛亮討賊還成都孫權遣使勞問之送馴象一頭蜀志曰先主平益州賜諸葛亮法正關羽張飛錦各千匹諸葛軍令云今民貧國虛决敵之資惟仰錦耳侯嘗自校簿書主簿楊顒直入諫曰為治有體上下不可相侵請為明公以作家譬之今有人使奴執耕稼婢典炊爨雞主司晨犬主吠盜牛負重載馬涉遠路私業無曠所求皆足雍容高枕飮食而已忽一旦盡欲以身親其役不復付任勞其體力為此碎務形疲神困終無一成豈其智之不如奴婢雞狗哉失為家主之法也是故古人稱坐而論道謂之三公作而行之謂之士大夫故丙吉不問橫道死人而憂牛喘陳平不肯知錢穀之數云自有主者彼誠達於位分之體也今明公為治乃躬自校簿書流汗終日不亦勞乎侯謝之及顒卒侯垂泣三日武侯與宣皇在渭濱將戰宣皇戎衣蒞事使人視武侯乘素輿葛巾持白羽扇指麾三軍各隨其進止宣皇聞而歎曰可謂名士矣今成都出羽扇攢雜鳥毛為之蓋其遺制也裴氏語林武侯以巾幗遺司馬懿巾幗女子未筓之冠蜀中名曇籠蓋笑其堅壁不出如閨女之匿藏也幗音憒同古對切今音與國同非楊升奄本傳載侯性長於巧思損益連弩皆出其意按魏氏春秋云侯損益連弩謂之元戎以鐵為矢長八尺一弩十矢俱發夫弩而謂之連則非一弩也意必數者相連謂之損益者前蓋有此弩至侯而有所損益於其間耳考史魏司馬懿征公孫淵軍至遼東為發石連弩射城中唐李元諒節度隴西築連弩臺盧耽節度四川為大旝連弩南詔憚之則古人攻戰以連弩取勝者多矣今連弩之製不可考說者謂古時西蜀弩兵尤多大者莫踰連弩十矢謂之翔鴻一矢謂之飛鎗通呼為摧山弩即侯所謂元戎也今具其法如此侯嘗欲鑄刀而未得會蒲元為西曹椽性多巧思因委之於斜谷口鎔金造器特異常法刀成以竹筒密納鐵銖滿中舉刀斷之應手虛落若剃水芻牧稱絶當世因曰神刀今之屈耳環者是其遺範也别傅刀劍録曰蜀章武元年辛丑採金牛山鐵鑄八鐵劍各長三尺六寸一先主自佩一與太子一與梁王理一與魯王永一與諸葛亮二與關羽張飛一與趙雲并是亮書作風角處所琴經一卷諸葛亮撰述製琴之始及七絃之音十三𡽪所象之意中興書目兵書匣在定軍山上壁立萬仞非人迹可登凡兩經其地初視匣其色淡紅後則鮮明若更新者顧璘崇寧縣昔武侯以蜀脞脆令鄰邑翊日而市唐中丞吳行魯建德碑司馬德操年小德公十歲兄事之呼作龎公故世人遂謂龎公是德公名非也德公字山民娶諸葛孔明小姊楊去奢侯兄瑾及從弟誕並有成名各在一國于時以為蜀得其龍吳得其虎魏得其狗誕在魏與夏侯玄齊名瑾在吳吳朝服其弘量侯居隆中時有客至屬婦具麵須臾而具侯怪其速後潛窺之見數木人砍麥運磨如飛求傳此術後變其制為木牛流馬云蜀漢時有火濟者從丞相破孟獲有功封羅甸國王即今宣慰使安氏遠祖也滇蠻者十年前大理馬至橫山此蠻亦附以來衣服與中國略同能通華言自云諸葛公戌兵俱桂海虞衡志睿好土功既作許昌宮又治洛陽宮起昭陽太極殿築總章觀高十餘丈力役不已農桑失業諸葛武侯死乃大興宮室晉士燮所謂釋楚為外懼者此也魏志先主定益州用荆楚宿士零陵賴恭為太常後其子肱為丞相西曹令史隨於漢中早夭侯甚惜之與留府長史張裔蔣琬書曰令史失賴肱掾屬喪楊顒為朝中損益多矣張遵飛之孫苞之子尚書郎同諸葛瞻引軍拒鄧艾死於綿竹諸葛武侯造八陳圖於魚復平沙之上壘石為八行相去二丈桓溫征譙縱見之曰此常山蛇勢吾常過之自山上俯視百餘丈凡八行為六十四蕝蕝正圜不見凹凸處如日中蓋影及就視皆卵石漫漫不可辨甚怪也東坡桓宣武溫征蜀猶見武侯時小史年百餘歲桓問諸葛丞相今誰與比意頗欲自矜答云葛公在時亦不覺異自葛公殁後不見其比史萬歲征寧南蠻至南中行數百里見諸葛紀功碑銘其背曰萬歲之後勝我者過此萬歲令左右倒其碑而進破三十餘部諸蠻請降於是勒石頌德隋書神僧傳云梁將王綝與陸法和守巫峽軍次白帝法和謂人曰諸葛孔明可謂名將吾自見之此城旁有其埋弩箭鏃一斛許因插表令掘之如其言龍州武侯廟在宣尉司東一百八十里初州人以鄧艾嘗經於此立廟祀之宋知州洪咨夔毀其像更以諸葛告其民曰毋祀仇讐而忘父母蜀古蹟記云宋曹彬建隆二年為都監伐蜀謁武侯祠視宇第雄觀頗有不平謂左右曰孔明雖忠于漢然疲竭蜀之軍民不能復中原萬一何得為武當因其頽敗者折去之止留其中以祀香火左右皆諫不可俄報中殿摧塌有石碑出土尺許彬驚視之石有刻字宛若新書題云測吾心腹事惟有宋曹彬讀訖下拜曰公神人也小子安能窺測哉遂令蜀守新其祠宇為文祀之而去按此古昔武侯祠也天社任淵記云昭烈廟西偏少南又有别廟忠武侯在焉老柏參天氣象甚古詩人嘗為賦之是矣今武侯祠在百花潭與草堂並列者不知何代增設淳化中李順亂蜀招安使雷有終遣嘉州士人辛怡顯使於南詔至姚州其節度使趙公美以書來迎云當境有瀘水昔諸葛武侯誡曰非貢獻進討不得輒渡此水若必欲過須致祭然後登舟今遣本部軍將齎金龍二條金錢三十文并設酒脯請先祭享而渡乃知南蠻心服雖千年如初嗚呼可謂賢矣宋高宗手書曹操諸葛羊祐三事賜嶽飛南定樓在瀘州治內宋郡守朝公武建取出師表中語為名陸游詩行遍梁州到益州今年又作渡瀘遊江山重復爭供眼風雨縱橫亂入樓房從真成都人工畫人物蕃馬事王建為翰林待詔嘗於宮中畫諸葛武侯渡瀘水圖甲馬如生兼善潑筆鬼神有寧王射獵陳登斫鱠等圖傳於世唐釋天竺亡名未詳何印度人也其貌惡陋纒乾陀色縵條衣穿革屣曳鐵錫化行于京輦當韋南康臯生才三日其家召僧齊此僧不速自來以敝席坐於庭中既而齊畢韋氏令乳母負嬰兒出請衆僧祝願梵僧先從座起攝衣升階視之曰别久無恙乎嬰兒若有喜色相認之意衆皆異之韋君曰此子才生三日耳吾師何言别久也梵僧曰此非檀越所知此諸葛武侯之後身耳今降生於世將為蜀帥必福坤維之人吾往在劔門與為善友故不遠而來此子他日作劔南節度二十年官極貴中書令太尉此外非我所知也父然之因以武字焉後韋臯自少金吾節制劍南軍果遷太尉兼中書令在蜀二十一年卒諡忠武先主章武二年於漢川鑄一鼎名克漢鼎置丙穴中八分書三足又鑄一鼎於永安紀行軍奇變又鑄一鼎於成都武檐山名曰受禪鼎又一鼎於劔口山名曰劔山鼎並小篆書皆武侯迹諸葛武侯斬王雙還定軍山鑄一鼎於漢川其文曰定軍鼎又作八陳鼎於永安皆大篆書又於玄武郡金山鑄二鼎一大一小武侯行軍見此山勢似有王者故鎮之梁虞荔古鼎録漢丞相諸葛忠武侯集卷之九遺蹟侯家於南陽之鄧縣在襄陽城西二十里號曰隆中晉永興中鎮南將軍劉弘至隆中觀侯故宅立碣表閭命太傅椽犍為李興為文見碑記隆中山襄陽縣北二十五里下有隆中書院諸葛武侯隱居地一統志蓮池在沔縣治北其畔有武侯讀書亭遺址每遇花時縣人遊玩一統志諸葛相蜀築臺以集諸儒兼待四方賢士號曰讀書臺在章城門路西今為乘煙觀杜光庭録異記云成都書臺坊武侯宅南乘煙觀內有古井井內有魚長六七寸往往游於井上或取魚水必騰涌相傳其井有龍矣寰宇記臥龍墨池沅江縣西三十里烏龍寺內俗傳漢諸葛武侯滌墨於此寺因名臥龍常德府志諸葛宅在石鼓山漢昭烈牧荆州時侯駐臨蒸調賦以供軍實後廟食於此宋重建張栻為記衡州府志隆中諸葛故宅有舊井一今涸無水盛弘之記云井深五丈廣五尺堂前有三間屋地基丘極高云是避暑臺又有三顧門宅西有山臨水孔明常登之鼓琴以為梁父吟因名此為樂山先有董家居此宅衰殄滅亡後人不敢復憩焉齊建武中有人修井得一石枕高一尺二寸長九寸獻晉安王習鑿齒又為宅銘葛井襄陽縣東二十里荆州記諸葛宅有田即此諸葛井益陽縣東南二里相傳蜀諸葛武侯所鑿諸葛井在大慈寺西里許自上窺之祇見其三邉更一邊不知其際涯也昔孔明鑿此以通井絡王氣俗傳有人入井聞其中有雞聲方輿勝覽大慈寺在華陽西南五里沔水又東徑武侯壘南諸葛武侯所居也南枕沔水水南有亮壘背山向水中有小城回隔難解水經注成都府成都縣太城者南門城也張儀司馬錯所築諸葛武侯以丞相開府領益州牧故晉益州剌史治太城其制因之蜀名勝志古城在榮經縣西五里侯征南屯兵於此唐李德裕增築雅州臥龍巖黔陽縣南四十里傍為諸葛武侯古城其洞廣數十步深數里石壁如飾泉湧不竭有石竈二相傳武侯駐兵處名山縣本志云東北三十四里古土城周七十二丈乃武侯征蠻所築遺址見存諸葛城㳂滋縣西五十里高山上相傳武侯征南時築址跡猶存武侯城在舊黎州城外三里諸葛所築壕塹故壘存焉又有武侯戰場在安靖新寨武侯城在臨安都司城南三十里瀘水東侯所築所謂五月渡瀘處瀘州即擒孟獲之地三交城在寶雞縣西四十里魏司馬懿與侯相拒於此築城漢中郡西縣後魏置嶓冡縣隋為西縣故西樂城在縣西南武侯所立甚險固墓在縣東南以上俱一統志臥龍岡在府城西南七里起自嵩山之南綿亘數百里至此截然而住回旋如巢然草廬在其內前有井靑石為牀有汲綆渠百十道數不能真其下平如掌即公躬耕處舊為祠以奉之元至大中建書院程巨夫作記嘗有道士居住夜聞兵聲懼而移之宣德中有司復新其廬塑其像春秋祭祀前代碑文俱存又南陽縣東北博望鎮南隱山頂上亦有武侯廟襄陽府志臥龍山南漳縣東五十里相傳諸葛武侯耕南陽時嘗遊此葛山諸葛屯營因名有武侯廟祁山在西和縣北七里山上有城極嚴固武侯率諸軍攻之縣又有南北岈二岈有萬餘家侯表言祁山去沮五百里有人萬戶瞻其邱墟信之為殷矣即此漢水北連山秀舉羅峰競峙祁山在嶓冡之西山上有城極為嚴固昔諸葛武侯攻祁山即此城也開山圖曰漢陽西南有祁山溪徑委迤山高巖嶮九州之名岨天下之奇峻瀘州掇旗山諸葛武侯樹旗于此以誓師以上俱一統志耒陽縣東北四十里有相公山侯嘗駐兵於此因名火烽山在中江縣東南諸葛公嘗會於此置烽火潼川府志箕山在褒城縣北十五里山有秦王獵池及內穴道人谷諸葛公遣鄧芝趙雲等出箕谷即此興勢山在洋縣北二十里山形如盆外甚險盤道以上諸葛公嘗戍於此後魏興勢山以此名周地圖云蒲亭縣有鐵山諸葛侯取為刀劍宇文度封鐵山侯即此侯計山在耒陽縣東七十五里山有七十峯上有仙人亭觀音閣亦名侯憩山謂諸葛武侯嘗於此憩息籌計兵事銅鼓山在威淸衛城西四十五里相傳漢諸葛侯征南於此獲銅鼓會軍山潼川治東南一百六十里漢昭烈入蜀武侯張飛略地至此百姓以牛酒犒師故名諸葛山在道海縣東南三里侯南征駐兵於此孟山在榮經縣東二十里諸葛擒孟獲處敘州朱提山西五十里山産銀漢諸葛書曰漢嘉金朱提銀採之不足以食定軍山在沔陽縣東南十里兩峯對峙漢昭烈於此山下作營斬魏夏侯淵山有諸葛巖上有兵書匣其山壁立萬仞非人跡可登其下有八陳圖又有督軍壇鄉人云每陰雨時上有擊鼓聲先主既保有漢中侯之薨也遺令葬於其山因即地勢不起墳壟惟深松茂柏攢蔚川阜莫知墓營所在山東名高平是侯宿營處有廟建康東北十里有鍾山舊名金山漢末金陵尉蔣子文討賊戰亡靈發於山因立蔣侯祠焉故號曰蔣山諸葛亮以為鍾山龍盤即蔣山也以上俱一統志諸葛營在定遠縣西一十里侯討南中過髳州於目直睒北傍山下築營蠻稱望子洞基址尚存楚雄府諸葛營靖州西武侯撫溪洞諸蠻駐此諸葛營黔陽縣有四一渡頭一原神鄉一安江一托口武侯撫綏溪洞諸蠻駐兵於此營壘猶存諸葛營在宜良縣南小石嶺諸葛亮嘗營於此又名諸葛峒以上寰宇記諸葛營在府城東南一十里其東嶽堰內一土墩周回三十餘丈高六尺隨水高下雖盛潦不沒俗為武侯旗臺永昌軍民府志渭川王讓記略云西絶涪水有山曰柏下諸葛公營壘在焉而喬木婆娑者蔣公琰萬秋之宅鍾士季之所嘗致敬也龍透關在嘉定州南七里世傳為諸葛公所立其南七十里為安遠寨亦公征蠻於此屯駐宋元豐中置為寨沔水東徑樂山北昔諸葛亮好為梁甫吟每所登遊故俗以樂山為名水經注石鼻寨在寶雞縣東四十里侯所築以拒郝昭一名石鼻城諸葛寨在長官司西敘州保子寨納溪治西十里世傳武侯征南屯兵於此諸葛寨在德安府羅陂村舊傳武侯所立諸葛壘在秦州東二里俗謂下募城傍有司馬懿壘俗謂上募城魏太和中諸葛武侯攻天水詔懿拒之此其壘也漢陽山北八十里諸葛平西南蠻駐軍此山董王臺石首縣北五十里相傳董允與諸葛武侯駐兵處萬乘湖石首縣東四十里相傳諸葛武侯屯兵於此籌筆驛在廣元武侯出師嘗駐於此以上俱一統志棊盤嶺在府城南五里相傳諸葛宴兵著碁於此有石盤廣六尺棊痕尚存寶慶府沔水又東徑西樂城北城在山上周三十里甚嶮固城側有谷謂之容裘谷道通益州山多羣獠諸葛公築以防遏榮經縣本志云榮水在城北一出相公嶺一出番境經水在城南一出瓦屋山一出改丁河一出汶川按相公嶺者以諸葛丞相征蠻所經也改丁河源出黑石汶川源出卭崍馬耳榮經水北流即武侯七擒孟獲之地上有廟以上水經注將軍池在嶽池縣東五里相傳諸葛嘗駐兵於此順慶府志方輿云萬勝岡在州西有龍觀寺其趾曰百丈山自卭崍或起或伏環繞州治本志云諸葛武侯擒孟獲旋師至此岡下人聚觀之因建亭於上為龍觀亭卭州西百里石盤戍俗呼為望軍頂昔諸葛武侯駐軍於此漢水北出遠山山谷邃嶮人跡罕交溪曰五丈溪水側有黃沙屯諸葛所開也其水南注漢水水經注武侯出師表五月渡瀘今以為瀘州非也瀘州古之江陽而瀘水乃今之金沙江即黑水也其水色黑故以瀘名之爾沉黎古志武侯南征由今黎州路黎州四百餘里至兩林蠻自兩林南瑟琶部三程至嶲州十程至瀘水瀘水四程至弄棟即姚州也今之金沙江在滇蜀之交一在武定府元江驛一在姚安之左卻據沉黎志武侯所渡當今之左卻也瑟琶一作風琶兩林今之卭部長官司也楊升奄勝覽云寶山在瀘州城南初名堡子山為巡檢廨陳公損之移廨山西建堂其上袁公說友榜其堂曰江山平遠易堡子為寶山大書揭之下瞰城郭萬瓦鱗集兩江合流郡國志一名瀘峯山高三十丈地多瘴三四月渡之必死惟五月上旬渡之即無害故諸葛云五月渡瀘也李直土西山堂記云以常璩華陽國志及辛怡顯雲南録考之諸葛渡瀘乃在越嶲之地非瀘之寶山也黑水在城固縣西北諸葛公箋云朝發南鄭暮宿黑水瀘津水東徑不韋縣北兩岸皆高山瀘峯最為傑秀孤高三千餘丈水之左右馬步之徑裁通而特有瘴氣三月四月徑之必死非此時猶令人悶吐五月以後行者差得無害故諸葛武侯表言五月渡瀘并日而食臣非不自惜也瀘水兩峯有殺氣暑月舊不行故武侯以夏渡為艱今昆明道渡所見有武侯道在水浚急而多巉石土人以牛皮為船方涉津涘水經寰宇記云馬湖江從州西南流出東郭與蜀江㕣諸葛武侯五月渡瀘則此水之上流也𤏡溪南溪縣西六十里昔武侯南征𤏡蠻于此歸服又名服溪舊志云福溪寰宇記華陽國志云有漢水入延江本志云漢陽山在縣北八十里漢武通西南夷自此山之南皆漢地故云諸葛武侯征蠻過此今崖壁上鐫武侯征蠻故道六字猶存縣有順應廟乃祀馬謖者大諸葛堰在永昌府城南一十五里其東有東嶽堰及小諸葛堰皆有灌溉之利永昌府志益州記曰江至都安堰其右撿其左其正流遂東郫江之右也因山頽水坐致竹木以溉諸郡又羊摩江灌江西於玉女房下作三石人於白沙郵郵在堰官上立水中刻要江神水竭不至足盛不沒腰是以蜀人旱則藉以為溉雨則不遏其流故記曰水旱從人不知饑饉沃野千里世號陸海謂之天府也俗謂都安之堰亦曰湔堰又謂之金堤左思蜀都賦云西踰金堤者也諸葛北征以此堰農夫國之所資以征丁千二百人主護之有堰官李膺記云玉女房鑿山為穴深數十丈中有廊廡堂室屈曲殆若神功非人力矣七星關七星橋記云關號七星孔明禡牙之地又有滇海曲云神禹導河雙洱水武侯征路七星關楊升奄劍門關在劍州北境大劍山至此兩壁削聳有隘束之路侯因立為劍門後姜維退守以拒魏鍾會即此斜谷關在郿縣西南三十里谷之南口曰褒北口曰斜即侯出師處一統志木門在泰州西南九十里魏張郃追諸葛公於此中飛矢死鞏昌府志赤阪在洋縣東二十里其土色赤魏司馬懿寇蜀漢建興五年丞相出屯兵漢中築城於城固駐兵於赤阪即此寰宇記云宜賓縣本漢南安縣地屬犍為郡諸葛南征於此置郁鄢戍後改為郁鄢縣卭州沉黎縣即侯征羌之路每十里作一石樓令鼓聲相應今蠻人效之所居悉以石為樓九州記邵水在寶慶府城北源出邵陽縣龍山經馬鞍山諸葛武侯廟下號相公潭深不可測流至此合澬水京口有石如羊謂之狠石諸葛武侯嘗坐其上與孫權議拒曹操志狠石有十字斷痕先主與孫權私卜所斷也孫劉同獵醉各據一石羊後名石羊巷永安宮府學宮地先主征吳還至白帝改魚復為永安宮居之明年崩諸葛受遺於此以上一統志劉琦臺襄陽縣城東二里即劉表子琦與武侯謀自安計登樓去梯處襄陽府水經云江水又東徑諸葛亮圖壘南注云石磧平曠望兼川陸有亮所造八陳圖東跨故壘皆纍細石為之自壘西去聚石八行行間相去二尺因曰八陳既成自今行師庶不覆敗皆圖兵勢行藏之權自後深識者所不能了今夏水漂蕩歲月消損高處可二三尺下處磨滅殆盡荆州圖副云永安宮南一里渚下平磧上周回四百一十八丈中有諸葛孔明八陳圖聚細石為之各高五尺廣十圍厯然棊布縱橫相當中間相去九尺正中開南北巷悉廣五尺凡六十四聚或為人散亂及為夏水所沒冬水退復依然如故八陳圖下東西三里有一磧東西一百步南北廣四十步磧上有鹽泉井五口以木為桶昔常取鹽即時沙壅冬出夏沒劉賓客嘉話録云夔州西市俯臨江岸沙石下有諸葛亮八陳圖箕張翼舒鵝形鸛勢聚石分布宛然尚存峽水大時三蜀雪消之際澒湧滉漾可勝道哉大樹十圍枯槎百丈破磑巨石隨波塞川而下水與岸齊人奔山上則聚石為堆者斷可知也及乎水落川平萬物皆失故態惟諸葛陳圖小石之堆標聚行列依然如是者僅已六七百年淘灑推激逮今不動高似孫緯略曰八陳圖在魚復者隨江布勢填石為規前障壁門後倚卻月縱八橫八魁容二丈內面偃月九六鱗差江自岷來奔怒湍激驚雷迅馬不足以敵其雄也徙華變滄不足以窮其力也磊磊斯石載轟載春知幾何年曾不一仄是非天所愛神所警者歟詩林載晉桓溫伐蜀觀八陳圖詩云訪古識其真尋源愛往跡恐君遺事節聊下南山石仍顧謂從事曰此常山蛇勢也諸葛八陳磧在夔城者江沙上碎石行列如引繩春冬時見夏秋沒於水然江漲即浮磧上數十丈比退而陳石如故八陳圖有三處一在新都彌牟鎮一百二十有八當頭陳法也一在夔州六十有四方陳法一在碁盤市一百五十有六下營法也寰宇記云八陳圖在縣北三十里彌牟鎮蜀志亮推演兵法作八陳圖咸得其要李膺益州記云稚子闕北五里有武侯八陳圖土城四門中起六十四魁八八為行魁方一丈高三尺緯略曰八陳圖在新都者峙土為魁植以江石四門二首六十四魁八八成行兩陳並峙周凡四百七十二步魁百有三十也姚安軍民府東山在府城東十里一名飽煙蘿山其西有武侯塔相傳公征南駐兵之所後人建塔於上武侯塔長寧縣東諸葛所建以誓蠻戎者諸葛洞在龍州宣慰司治南石崖屹立傍有石洞數丈相傳諸葛公征九溪蠻嘗過此留宿洞中設一床懸粟一握以馬後遂化為石床石粟至今猶存萬里橋亦名篤泉橋橋之南有篤泉因蜀使費禕聘吳武侯餞之曰萬里之行始於今日故曰萬里橋唐岑參有萬里橋詩保寧府有武侯橋七縱橋在孟山下相傳因諸葛擒孟獲而名處書峽相傳諸葛武侯藏書處通道縣有武侯兵書臺以上寰宇記方與云平羌江在州城北源出西徼繞西北郭謂武侯平羌戎於此雅州志魏了翁朝真觀記略云出少城西北為朝真觀觀中左列有聖母仙師乘烟葛女之祠觀西有武侯祠是侯故宅也故老相傳侯有女于宅中乘雲輕舉唐天寶元年章公始更祠為觀奏名乘烟蜀中志華陽國志延熙二年馬忠定越嶲置赤甲軍常取涪陵之民丞相諸葛亮亦發徑卒三千人為連弩士按志有赤甲戍與黃草峽相近在李渡之上藺市之下杜甫詩云黃草峽西船不歸赤甲山下行人稀即此地也赤崖在府城西侯與兄子瑜書云前趙子龍退軍燒壞赤崖以北閣道云云劍門關棧閣相望顏師古曰棧即閣也按史記蔡澤謂范雎曰今君相秦計不下席坐制諸侯棧道千里通於蜀漢華陽國志云諸葛相蜀鑿石架空始為飛閣以通行道如此則棧閣為二矣水經注方輿勝覽灌縣有老人村在大面山之北昔人避難其中多享年夀故名或云潛夫張不羣入山採藥浹旬不返見一叟致敬而問答曰本丞相范賢之裔知李雄之祚不永挈吾輩居此為終焉之計圖經云即老澤也在靑城北百三十里昔諸葛武侯遷羣獠于山下故名五丈原在郿縣西三十里又云在岐山縣南諸葛公據渭南與魏司馬懿相拒屯兵於此有落星村即長星墜營處上有諸葛祠元時建石碑耒陽縣東五里武侯斬雍闓擒孟獲回軍經此立石紀功歲久字不可辨又相傳武侯立石誓蠻云後有功在吾上者宜立石於右至宋狄靑破儂智高回立碑其右後為雷轟惟存斷碑橫仆其側以上天中記諸葛營在宜良縣南小石嶺侯嘗營於此又名諸葛峒中廣德初鳳伽異築拓東城故有諸葛公石刻文曰碑即仆蠻為漢奴蠻畏誓嘗以石搘捂一統志魏鶴山集有𤏡道諸葛武侯碑又有答馮敘州邦佐謝武侯廟碑啓本志云府城南姜維屯一峰突起高千仞其頂平相傳姜伯約於此駐軍諸葛武侯行廟碑在興元府固縣西唐貞觀十一年置諸葛武侯碑在昭烈帝廟中長慶四年裴度撰柳公綽書成都志武侯碑陰記集古録云唐崔備撰元和二年武元衡刻及其寮屬題名於武侯廟碑陰成都府志蔡山在瀘州城東五里舊傳諸葛侯於此夢見周公助以陰兵因立文憲王廟又名周公山李燾詩巖巒最高頂雲氣時蔚薈倣佛羣仙宅宮闕輝珠貝寰宇記文翁立文學講堂一名周公禮殿按雲南志武侯征西南夢見周公敕所在祀周公也黃陵廟夷陵州西黃牛峽相傳神嘗佐禹治水諸葛武侯建祠一名黃牛廟又名靈感廟武侯墓在沔陽縣東南十里又東南八里亦有祠保寧府志武侯廟在黎平府城南隅黎平府志通志云瀘州寶山之瀘峯有武侯廟每歲蠻人貢馬相率拜於廟前宋劉光祖詩云蜀人所至祠遺像蠻徼猶知問舊碑武侯廟在府城南一十里諸葛擒孟獲屯營於此民懷其德立廟祠之至今土人自稱為諸葛之遺民因名諸葛村元揭徯斯有詩永昌軍民府志八陳廟在新都治二十里即武侯祠前有八陳遺跡諸葛廟均州房縣西長望川諸葛武侯廟景陵縣白湖村諸葛廟雲夢縣北二十里諸葛武侯廟公安縣西孱陵街至元戊子邑民李鎧建諸葛武侯廟在襄陽縣伏龍山唐封武靈王宋賜英惠廟加號仁濟一方感祀焉襄陽府志諸葛武侯廟寶慶府邵陽縣東南二里宋淳祐中建諸葛武侯廟武岡州右宋淳祐中建方輿勝覽云武侯廟在府西南二里今為乘烟觀孔明表云薄田十五頃桑八百株即此地孔明初亡百姓遇節朔各私祭於道上李雄稱王始為廟於少城內桓溫平蜀隤少城獨存武侯廟後封武興王廟至今祠祀不絶武侯廟在司城北三里宋紹興中郡守邵溥因舊鼎新榜曰天威廟又作二室塑唐韋臯李德裕像諸葛武侯廟在府城東南隅銅仁府志先主廟在府城南二里舊在惠陵右附諸葛侯廟唐杜甫詩先主武侯同閟宮本朝洪武初合廟祀之成都府志武侯廟在太原府太谷縣咸陽谷忠賢堂夔州府治內初名歲寒宋慶厯中建取嘗經遊此地者屈原諸葛亮嚴挺之杜甫陸贄韋昭範白居易柳鎮寇準唐介十人畫像於堂中外栽修竹林栗有記王十朋詩六月修筠帶雨移丁寧護取歲寒枝十賢淸節高千古不是此君誰與宜一統志方輿勝覽云武侯廟在八陳圖之臥龍山上有堂曰開濟堂何耆仲小記云堂閲歲久垂壓矣淳熙疆圉作噩瀆山何耆仲假守舉而新之因訪善本重肖侯像摘老杜兩朝開濟老臣心之句以字堂巫山尉任份來董事春二月乙亥落成夔州志諸葛武侯祠東安縣西廣德寺在隆中書院傍唐時建書院祀武侯以寺僧主之明成化中重建夔州臥龍山府治東北五里上有諸葛祠因名有泉極淸冷懷古樓綿竹縣東隆慶初建祀諸葛瞻父子紫巖南軒二先生萬厯元年四川巡撫曾省吾蕩平九絲城都蠻俘獲諸葛武侯銅鼓九十三面擇有聲者六十四面以獻疏略云都蠻呼銅鼓曰諸葛鼓相傳以為寶器審阿大王等執稱鼓有剝蝕有聲響者為上上鼓易牛千頭次者七八百頭遞有等差藏至二三面者即得雄視一方僭稱王號每出劫擊鼓高山諸蠻頃刻雲集集則椎牛數十頭饗蠻乃出劫劫數勝益以鼓為靈臣等細觀所鑄皆奇文異狀相錯蟠僅可辨者雕螭刻鷺間綴蝦蟇其數皆四縉紳父老云諸葛製以鎮蠻若曰鼓去則蠻運終理或然也諸葛鼓乃銅鑄者其形圓上寬而中束下則敞口大約若今楂斗之倒置也面有四水獸四周有細花紋其色不甚碧緑擊之彭彭有聲如鼓云置於水擊之其聲更巨銅鼓交趾服役有頭飛獠子赤裩獠子鼻飮獠子皆窟居巢處好飮酒擊銅鼓鼓初成置庭中招同類來者盈門豪富女子以金銀叉擊鼓叩竟留與主人或云銅鼓乃諸葛征蠻鉦也夔州府江岸與八陳圖相對有石鼓世傳武侯教戰之鼓夔州府志侯初平蠻僥夜聞軍中多謳歌思歸遂詔衆各與一磚曰若輩久苦行役欲遄返耶枕此而臥詰朝扺家矣從者果然不用命者終莫能歸今雲南營內有一城居民皆四川人云即其後也太華山是滇西之會合處皆大銅釘鎮之每一釘拔則蠻必有變者此渡瀘幾時勾當作事真有神耶孫黃驛七亭而達順林坡於塔岡坦於順林望皆烟篁饒水田羅塢樟庒皆十里而遙山多荒茅亭卒吹錫呌竹以代銅鉦順林驛六亭而達灃州絶涔水水淸徹産螺蚌巨者象盤岸有諸葛遺釡二有灃陽橋遇仙橋有車𦙍故里有屈原祠蘭江驛實枕灃水隋僧蜀郡福緣寺釋僧淵以錦水江波沒溺者衆欲於南路駕飛橋昔諸葛公指二江內造七星三鐵錞長八九尺徑三尺許人號鐵鎗擬打橋柱用訖投江須便祈祠方可出水淵造新橋將行𥪡柱其錞自然浮水來至橋津及橋成又自投水高僧傳宋御仗有諸葛公篇袖鎧帽二十五石弩射之不能入以賜殷者規宋書楊愼曰孔明炊釡麻城毛柱史鳳詔為豫言近日平谷縣耕民得一釡以凉水沃之忽自沸以之炊飯即熟釡下有諸葛行窩字鄉民以為中有寶物乃碎之其釡復層中有水火二字亦異哉瑞應圖曰丹甑不炊而自熟玉臯不汲而常滿近此類乎信侯之才藝固后世之神禹周公也世所傳划車弩雞鳴枕不一而已諸葛公之征孟獲人曰蠻地多邪術須禱於神假陰兵以助之然其俗必殺人以其首祭則神享為出兵公不從因雜用羊豕之肉而包之以麵像人頭以祀神亦享焉而為出兵後人由此為饅頭事初紀物蠻酋自謂太保大扺與蠻獠相似但有首領其人椎髻以白紙繫之云尚有諸葛制服也魏略云劉備性好毦適有饋之牛尾者備手結之諸葛亮曰將軍當復有遠志耶止結毦而已備乃投毦曰以忘憂耳按韵寶毦音珥織羽為衣也諸葛亮與吳王書云所送白毦薄少重見辭謝益以增慚齊諧記武岡有幕官因鑿渠得一瓦枕枕之聞其中鳴鼓起擂一更至五更鼓聲次第更轉不差既聞雞鳴亦至三唱而曉扺暮復然其人以為怪而碎之見其中設有機局以應夜氣乃諸葛武侯雞鳴枕也書苑云蜀先主常作三鼎皆武侯篆隸八分極其工妙雲貴土官中門甚低出入必俯首云武侯遺制欲其敬朝廷也稍高其戶者輒禍蜀山谷民皆冠帛巾相傳為諸葛公服所居深遠者後遂不除今蜀人不問有服無服皆帶孝帽市井中人十常八九余嘗以重午登南樓觀競渡戲兩岸男女匝水而聚望之如沙城有司即嚴禁之恬不為止浣水續談明黃中允輝曰陳三謨開府滇中以堪輿家言自命初卜昆明一區欲移幕府剗草得小碑云諸葛禁地皆以鐵錮之又白沙驛形勝稱最而皆蠢蠻陳訝之往尋籠絡已被掘斷亦有小碑曰諸葛禁地先主寓荆州從南陽大姓朝氏貸錢千萬以為軍需諸葛武侯作保劵至宋猶存苖民家家供祀武侯像取穀逐顆剝米以炊日不暇給云亦始自武侯俾終歲勤苦弗獲居間思叛也今雖苦難不敢違其法成都西金容坊有石二株舊曰石笋前秦遺址諸葛武侯掘之有篆字曰蠶叢起國之碑以二石柱橫埋中連以鐵一南一北無所偏倚又五字濁歜燭觸蠲時人莫曉後范長生議曰亥子歲濁字可記主水災寅卯歲歜字可記主饑饉已午歲燭字可記主火災辰戌丑未歲觸字可記主兵災申酉歲蠲字可記主豐稔後以年事推驗悉皆符驗見萬花谷蜀郡臨卭縣有火井漢室之盛則炎赫彌熾桓靈之際火勢漸微諸葛孔明一窺而更盛矣至景曜元年人以燭投即滅其年蜀併於魏異苑按華陽國志臨卭縣有布濮水從布濮來合火井江有火井夜時光映上昭民欲其火光以家火投之頃許如雷聲火熖出通耀數十里以竹筒盛其光藏之可拽行終日不滅也井有二水取井火煮之一斛水得五㪷鹽家火煮之得無幾也道家多作柏葉湯常點益人古柏葉尤奇今益州諸葛武侯廟中有大柏木相傳是蜀世所植故人多採收以作藥其味甘香於常柏也儒林公議云武侯廟前柏圍數丈唐相段文昌有詩石在焉唐末漸枯悴厯王孟二僞國不復生然亦不敢伐之宋乾德五年辛卯夏五月枯柯再榮時人異焉三國迄今千二百餘年矣新枝聳雲枯幹並存夭矯若虯龍陸游劍南藁云唐有節度使取孔明祠柏一小枝以為手板書於圖志非𧦄至今則此柏亦稱靈異著聞極矣嶲州界緣山野間有菜大葉而粗莖其根若大蘿蔔土人蒸煮其根葉而食之可以療饑名之謂諸葛菜云武侯南征用此菜蒔於山中以濟軍食亦猶廣都縣山櫪林謂之諸葛木也諸葛所止令兵士獨種蔓菁者取其才出甲者生陷一也葉舒可煮食二也久居隨以滋長三也棄去不惜四也回則易尋而採之五也冬有根可斸食六也比諸蔬屬其利不亦溥乎三蜀之人今呼蔓菁為諸葛菜江陵亦然劉禹錫嘉話録益州記云綿竹東武山有江池出白蓴其利不亦溥乎三蜀之人最地圖記云是諸葛武侯池中物池是侯所鑿宋元嘉中刺史陸岩嘗取以獻池李膺有記蜀中有小車獨推載八石前如牛頭又有大車用四人推載十石蓋木牛流馬也漢州德陽及峽中定軍山皆有八陳圖定軍山下土堆也陳師道履常後山談叢
