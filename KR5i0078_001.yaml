body:
  text: 漢丞相諸葛忠武侯集漢丞相諸葛忠武侯集敘羲垂髫時父即示以祖長史公與伯父大行公所手鈔羅相忠武侯公書長史公題其簡末云兵燹遺軼欲編彙成書未能也羲受而藏之崇禎壬申承督臨庾適弟倬自白門購書十餘篋來因得茂苑楊去奢所集忠武侯公書乃慨然謂倬吾祖與伯父雅有志而未逮者父以屬我今當相與成之楊本列年譜傳略紹漢連吳等目自云承於婁東王坰丷口伯較之家鈔舊本互有存遺楊謂陳承祚所載侯開務作牧諸篇而裴松之注時時引侯集今俱不可見此蘇東坡葉水心俱有不見全書之恨若心書將苑梁父吟黃牛廟記為後人僞作概去不録茲集惟年譜仍楊之舊餘依家本傳用陳志而節録諸傳附之次遺文次遺事陳圖次遺蹟亡者既無從考存者亦不得遺概晉唐以下詩賦論贊碑頌巨公文人之筆異同之論咸竝載之間有未備俟之他日凡為卷二十有三十六萬三千六百有餘言弟倬曉夜搜討參考羣書精意較讐庶無掃葉之嘆而羲於糠粃斗斛之暇亦輒共編訂遠聘吳中善手付之剞劂兢兢庶詳且愼焉夫去奢冏伯以論世好古採綴研核其言曰追惋散軼彌深豔羡欲用以弘濟世業勸奬忠孝况為之後人乎書成更附宋祖少保公及祖長史公二傳於後寒家系自蜀派宋紹熙間祖諱安節公為福建轉運使始家福建四傅為少保兵部尚書公諱廷瑞去侯二十二世又十二傳乃為祖長史公諱應科家世頗有顯者世次傳志甚詳而獨附此二傳則以忠孝之道奕葉之不墜如此夫論世好古者尚欲勵之天下後世又况淵源可遡弓冶世承而為之後人者乎羲倬撫卷之餘其交相勖勉以勿替祖德而毋負庭訓云崇禎壬申十一月三十六世孫羲頓首謹序於臨庾之公署
