front:
  text: 漢丞相諸葛忠武侯集重刊道藏輯要漢丞相諸葛忠武侯集卷之一
  hash: sha256:697a8b1a88aaa86ac85666c8cc0a53dc92264a7b233689d0aaee7f293afc1087
  markers:
  - {type: page-break, offset: 9, content: '', id: CK-KZ_KR5i0078_02p001a}
body:
  text: 三十六世孫羲基編輯年譜羲謹按古人年譜無事則闕此依楊本歲引時事楊曰維侯降神以挽炎祚而桓靈之傾圯既深操權之竊據巳固是故伊呂之征誅易而侯之興復難時為之也光和以前藴亂未熾黃巾卓操適際侯生特紀厥要以志時艱而事涉魏吳為稍詳焉靈帝光和四年辛酉是歲侯生按建興十二年甲寅丞相亮卒於軍時年五十四則知為辛酉年生是歲皇子協生即獻帝光和五年壬戌是歲以災異博問得失議郎曹操上書切諫光和六年癸亥初巨鹿張角以妖術教授分遣弟子轉相誑誘遂置三十六方大方萬餘人小方六七千方猶將軍也各立羣帥訛言蒼天巳死黃天當立以中常侍為內應約明年甲子內外俱起中平元年甲子春角弟子上書告之詔三公司隸案驗有事角道者誅殺千餘人下冀州逐捕角等角等馳敕諸方一時俱起皆著黃巾為標幟故謂黃巾賊帝召羣臣會議赦天下黨人中平二年乙丑崔烈為司徒因傅母入錢五百萬時人謂之銅臭中平三年丙寅諫議大夫劉陶言天下大亂皆由宦官宦官共譛陶下獄死前司徒陳耽忠正宦官怨之亦陷死獄中中平四年丁卯長沙賊區星自稱將軍詔以議郎孫堅為長沙太守討平之封堅鳥程侯中平五年戊辰太常劉焉建議以刺史威輕宜攺置牧伯侍中董扶私謂焉曰益州有天子氣焉乃求為益州牧州任之重自此始中平六年已巳靈帝崩立皇子辨袁紹勸大將軍何進誅宦官不就進被殺紹遂勒兵捕諸宦官無少長悉誅之召董卓將兵詣京師卓廢帝立陳留王協袁紹奔冀州獻帝初平元年庚午關東諸郡起兵討卓推袁紹為盟主卓遷帝長安劉表為荆州剌史是歲昭烈領平原相以關羽張飛為别部司馬初平二年辛未袁紹使人説韓馥馥讓紹為冀州牧袁術遣孫堅擊劉表表將黃祖部曲射殺堅堅子策年十七有復讐之志徑到夀春見術術以父兵千餘還策表拜懷義校尉初平三年壬申王允使呂布殺董卓卓將校求赦不許武威賈詡勸李催為卓報讐大戰長安中允被殺初平四年癸酉曹操攻陶謙初操父太尉曹嵩避難琅琊為謙别將士卒所殺操引兵擊謙坑殺男女數十萬攻其三縣皆屠之雞犬亦盡興平元年甲戌是年陶謙卒衆推昭烈領徐州牧興平二年乙亥李催郭𣲆共鬬催劫天子泛質公卿遂燒宮殿帝幸弘農長安城空四十餘日按陳志亮早孤從叔父元依荆州牧劉表則知侯寓襄鄧當在此年以後武侯是年十五歲建安元年丙子袁術攻昭烈以爭徐州呂布襲下邳秋七月駕至洛陽曹操迎天子遂遷都許昌孫策取會稽太守王朗迎降策目領會稽太守呂布攻昭烈昭烈敗走歸曹操操表為豫州牧使東擊布二年丁丑韓暹楊奉冦略徐揚間昭烈邀擊斬之三年戊寅曹操禽呂布昭烈從操還許表為左將軍四年巳卯孫策徇豫章太守華歆降初車騎將軍董承稱受帝衣帶中密詔與昭烈共誅曹操會操遣昭烈擊袁術昭烈遂殺徐州刺史車胄東海郡縣多叛操為昭烈五年庚辰董承謀泄操殺承等自擊昭烈拔下邳禽關羽昭烈奔袁紹孫策殺吳郡太守許貢貢奴客為貢報讐射殺策策創甚呼弟權佩以印綬策卒年二十六權時年十九是年關羽為曹操斬袁紹將顏良盡封操所賜而奔昭烈於袁軍六年辛巳曹操擊昭烈昭烈奔劉表表使屯新野七年壬午袁紹自軍敗慙憤發病嘔血死曹操責孫權任子張昭等猶豫不決權引周瑜與定議遂不送質八年癸未孫權西伐黃祖討山冦悉平之九年甲申曹操攻袁尚尚奔中山十年乙酉曹操攻袁談斬之十一年丙戌荆州豪傑歸昭烈者日益多表疑其心陰禦之使拒夏侯惇于禁等於博望昭烈設伏自燒屯偽遁惇等追之伏發見敗十二年丁亥是年昭烈見孔明於隆中時年二十七後主禪生於荆州按章武三年癸卯太子禪即位年十七則知為丁亥年生正侯出隆中之歲也十三年戊子罷三公官曹操自為丞相操殺太中大夫孔融劉表卒子琮降操昭烈走當陽侯奉命使吳與周瑜魯肅等破操於赤壁以侯為軍師中郎將十四年巳丑孫權分南岸地給昭烈十五年庚寅昭烈自詣孫權求都督荆州有孔明諫孤莫行之語以龎統為治中與侯並為軍師是歲周瑜卒十六年辛卯曹操以子丕為丞相副益州别駕張松勸劉璋迎昭烈昭烈西上侯與雲長守荆州十七年壬辰孫權徙治陵作石頭城攺陵為建業劉璋殺張松敕關戍勿通昭烈昭烈怒斬璋將楊懷高沛進攻涪城十八年癸巳曹操攻孫權權率衆禦之相守月餘操還操自為魏王加九錫昭烈舉兵向雒劉璋諸將皆敗退多降昭烈自十三年至此侯在荆州十九年甲午是歲龎統卒侯留關羽守荆州自率張飛趙雲等分定郡縣成都平昭烈領益州牧以侯為益州太守是歲操使華歆等收皇后璽綬并二皇子皆鴆殺之二十年乙未立操女為皇后昭烈聞曹操將攻漢中求和於孫權遂分荆州以湘水為界二十一年丙申曹操進爵為王二十二年丁酉操設天子旌旗出入稱警蹕京兆金禕與少府耿紀司直韋晃太醫令吉本本子邈邈弟穆謀挾天子以攻操是歲魯肅卒二十三年戊戌吉邈等衆潰見殺曹操自將擊昭烈昭烈屯陽平二十四年巳亥昭烈自陽平南渡沔水遣黃忠擊斬夏侯淵遂定漢中進位漢中王是年關羽攻曹仁于禁等七軍皆沒孫權稱臣於操呂蒙陸遜以詐取江陵羽卒陳羣等勸操纂漢二十五年庚子魏曹丕黃初元年曹操死子丕纂漢封漢帝為山陽公昭烈皇帝章武元年辛丑魏黃初二年蜀中傳言漢帝遇害於是漢中王發喪制服侯與羣下勸稱尊號夏四月王即皇帝位以侯為丞相章武二年壬寅魏黃初三年吳黃武元年帝恥關羽之殁自將擊孫權為陸遜所敗入白帝城攺白帝為永安孫權請和遣鄭泉來聘帝使太中大夫宗瑋報之漢吳復通是歲孫權受曹丕封為吳王攺元黃武張飛卒以侯領司隸校尉章武三年癸卯夏五月以後即後帝建興元年魏黃初四年吳黃武元年二月侯至永安四月帝崩於永安年六十三侯受遺詔奉喪還成都五月太子禪即位時年十七封丞相亮為武鄉侯兼領益州牧政事皆決於亮使鄧芝聘吳朱褒高定等叛是歲魏華歆王朗陳羣等各有書與侯欲使稱藩侯不答作正議文載傳建興二年甲辰魏黃初五年吳黃武三年吳張溫來聘復使鄧芝聘吳是歲務農殖穀閉關息民建興三年乙巳魏黃初六年吳黃武四年侯率衆南征斬雍闓七擒孟獲建興四年丙午魏黃初七年吳黃武五年五月曹丕死丕子睿立建興五年丁未魏太和元年吳黃武六年三月侯率衆伐魏上表出師是歲侯子瞻生按建興十二年甲寅侯在武功與兄瑾書云瞻今已八歲又按景耀元年癸未瞻戰死年三十七則知為丁未年生建興六年戊申魏太和二年吳黃武七年春侯率諸軍伐魏有出師表關中響震前軍馬謖違侯節度敗於街亭疏請自貶詔以亮為右將軍行丞相事拔西縣千餘家還漢中十一月復上表出師圍陳倉糧盡引還斬其追將王雙二表俱載傳建興七年已酉魏太和三年吳龍元年伐魏攻武都陰平郭淮敗走遂拔二郡復策拜丞相夏四月孫權稱帝使以並尊二帝來告遣衛尉陳震往賀因與吳盟建興八年庚戌魏太和四年吳黃龍二年魏曹真司馬懿入冦侯次於城固以待之魏延敗郭淮於陽溪建興九年辛亥魏太和五年吳黃龍三年伐魏圍祁山始以木牛運大敗司馬懿獲甲首三千級玄鎧五千領角弩三千一百張糧盡引退斬其追將張郃建興十年壬子魏太和六年吳嘉禾元年是年休士勸農教兵講武建興十一年癸丑魏青龍元年吳嘉禾二年是年運米斜谷口治邸閣息民休士三年而後用之建興十二年甲寅魏青龍二年吳嘉禾三年遣使約吳同時大舉由斜谷出師始以流馬運乃分兵屯田為久住計與司馬懿相守百餘日侯數挑戰懿不出乃遺懿巾幗婦人之服八月丞相亮卒於軍中年五十四遺命退軍節度司馬懿追之敗走是年漢獻帝亦殂於魏按侯於獻帝生同辛酉殁同甲寅固巳巧合且帝以八月葬而侯八月卒不尤異哉鳴呼漢不亡則侯不死侯死而漢乃真亡矣綱目劉備見諸葛亮於隆中特筆也終綱目未有書見賢者於是特書交豫之也備之業定於隆中終綱目書見賢一而已書法漢中王即皇帝位以諸葛亮為丞相書即皇帝位何正統也故孫曹皆斥姓名書稱皇帝立后立太子皆不書皇所以殊之於正統也書法帝崩於永安丞相亮受遺詔輔政太子禪即位封亮為武鄉侯領益州牧自宣帝之末書受遺詔是後無聞焉於是復書亮其人也司馬懿書受遺不書詔書法丞相亮南征丞相亮討雍闓誅之遂平四郡丞相亮率諸軍出屯漢中以圖中原劉縯之起書曰興復帝室特筆也於是特書曰以圖中原其豫亮以討復之義矣自是亮五伐魏必書丞相若右將軍豫之也書法丞相亮伐魏戰於街亭敗績詔貶亮右將軍行丞相事街亭之敗違命者馬謖耳而以丞相亮書之者權歸主將也貶官三等自請者孔明耳而以詔貶亮書之者命出於上也惟孔明身任討伐之責事幼主而無二心是以所書如此綱目亦豈私於孔明者哉發明右將軍亮伐魏圍陳倉不克而還斬其追將王雙右將軍亮伐魏拔武都陰平復拜丞相魏冦漢中丞相亮出次成固魏師還書魏以冦尊漢也書法綱目凡諸侯之于王室蠻狄之于中國僣偽之于正統或加兵犯境則書曰冦非此類則不書諸葛孔明左右昭烈為漢討賊聲大義於天下功雖不就名則正矣自陳夀志三國以魏為主通鑑因之紀年故於孔明伐魏之舉反以入冦書之則是以討賊之人名之為賊耳綱目既以昭烈紹漢之統故於魏兵犯境書之為冦然後名正言順而正偽之辨始明故非好為立異也正前人之未正卒歸之是亦所以更相發明云耳九原可作竊為司馬光必有取於斯言發明丞相亮以蔣琬為長史亮敗魏司馬懿於鹵城殺其將張郃司馬懿用兵如神算無遺策未易敵也然每與丞相亮交鋒動輒敗北是以其徒有畏蜀如虎之譏而陳夀乃以將略非亮所長貶之今觀綱目書此不曰亮敗魏軍而曰亮敗司馬懿者見其所對者勍敵而非脆敵亮能勝之則其將略果有大過人者然則夀之妄肆譏評其説不攻自破矣世以成敗論人若夀輩者非一可勝嘆哉發明丞相亮伐魏丞相亮進軍渭南魏大將軍司馬懿引兵拒守亮始分兵屯田丞相武鄉侯諸葛亮卒於軍嗚呼亮自經略中原至是首尾僅八載綱目五書伐魏一戰街亭一次成固一圍陳倉祁山一拔武都陰平一斬王雙敗司馬懿殺張郃至於是舉書進軍渭南分兵屯田懿雖引軍拒守甘受巾幗婦人之服勢已窮蹙而亮乃告終天不祚漢使之功業不就謂之何哉然亮受遺託孤之際蓋嘗以竭股肱之力效忠貞之節繼之以死為告至其出軍上表又以鞠躬盡瘁死而後已為言由今觀之可謂不食其言矣書卒於軍以見殁於王事之實其討賊之義死而不屈至今凛凛猶有生氣其視曹馬輩欺孤弱寡狐媚以取人家國者曾犬彘之不若世豈可以成敗論人物哉不有綱目特書屢書表而出之則孔明亦若而人耳噫發明漢丞相諸葛忠武侯集卷之二傳諸葛亮字孔明琅琊陽都人也漢司隸校尉諸葛豐後也父𡋣字君貢漢末為太山郡丞亮早孤從父玄為袁術所署豫章太守玄將亮及亮弟均之官會漢朝更選朱皓代玄玄素與荆州牧劉表有舊往依之獻帝春秋曰初豫章太守周術病卒劉表上諸葛玄為豫章太守治南昌漢朝聞周術死遣周皓代玄皓從揚州太守劉繇求兵擊玄玄退屯西城皓入南昌建安二年正月西城民反殺玄送首詣繇此書所云與本傳不同卒亮躬耕隴畝好為梁父吟漢晉春秋曰亮家於南陽之鄧縣在襄陽城西二十里號曰隆中身長八尺每自比於管仲樂毅時人莫之許也惟博陵崔州平潁川徐庶元直與亮友善謂為信然按崔氏譜州平太尉列子均之弟也魏略曰亮在荆州以建安初與潁川石廣元徐元直汝南孟公威等俱遊學三人務於精熟而亮獨觀其大略每晨夜從容常抱膝長嘯而謂三人曰卿三人仕進可至刺史郡守也三人問其所至亮但笑而不言後公威思鄉里欲北歸亮謂之曰中國饒士大夫遨遊何必故鄉耶臣松之以為魏略此言謂諸葛為公威計者可也若謂兼為已言可謂未達其心矣老氏稱知人者智自知者明凡在賢達之流固必兼而有焉以諸葛之鑒識豈不能自審其分乎夫其高吟俟時情見乎言志氣所存既已定於其始矣若使遊步中華騁其龍光豈夫多士所能沈翳哉委質魏氏展其器能誠非陳長文司馬仲達所能頡頑而况於餘哉苟不患功業不就道之不行雖志恢宇宙而終不北向者蓋以權御巳移漢祚將傾方將翊贊宗傑以興微繼絶克復為巳任故也豈其區區利在邊鄙而巳乎此相如所謂鵾鵬已翔於遼廓而羅者猶視於藪澤者矣公威名建在魏亦貴達時先主屯新野徐庶見先主先主器之謂先主曰諸葛孔明者卧龍也將軍豈願見之乎襄陽記曰劉備訪世事於司馬德操德操曰儒生俗士豈識時務識時務者在乎俊傑此間自有伏龍鳳雛問為誰曰諸葛孔明龎士元也先主曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之由是先主遂詣亮凡三往乃見因屏人曰漢室傾頺姦臣竊命主上蒙塵孤不度德量力欲信大義於天下而智術淺短遂用猖獗至于今日然志猶未已君謂計將安出亮答曰自董卓以來豪傑並起跨州連郡者不可勝數曹操比於袁紹則名微而衆寡然操遂能克紹以弱為強者非惟天時抑亦人謀也今操已擁百萬之衆挾天子以令諸侯此誠不可與之爭鋒孫權據有江東巳厯三世國險而民附賢能為之用可以為援而不可圖也荆州北據漢沔利盡南海東連吳會西通巴蜀此用武之國而其主不能守此殆天所以資將軍將軍豈有意乎益州險塞沃野千里天府之土高祖因之以成帝業劉璋暗弱張魯在北民殷國富而不知存恤智能之士思得明君將軍既帝室之胄信義著於四海總攬英雄思賢如渴若跨有荆益保其險阻西和諸戎南撫蠻越外結好孫權內修政理天下有變則命一上將將荆州之軍以向宛洛將軍身率益州之衆以出秦川百姓孰敢不簞食壺漿以迎將軍者乎誠如是則霸業可成漢室可興矣先主曰善於是與亮情好日密關羽張飛等不悅先主解之曰孤之有孔明猶魚之有水也願諸君勿復言羽飛乃止魏略曰劉備屯於樊城是時曹公方定河北亮知荆州次當受敵而劉表性緩不曉軍事亮乃北行見備備與亮非舊又以其年少以諸生意待之坐集既畢衆賓皆去而亮獨留備亦不問其所欲言備性好結毦時適有人以氂牛尾與備者備因手自結之亮乃進曰明將軍當復有遠志但結毦而巳耶備知亮非常人也乃投毦而言曰是何言與我聊以忘憂耳亮遂言曰將軍度劉鎮南孰與曹公耶備曰不及亮又曰將軍自度何如也備曰亦不如曰今皆不及而將軍之衆不過數千人以此待敵得無非計乎備曰我亦愁之當若之何亮曰今荆州非少人也而著籍者寡平居發調則人心不悅可語鎮南令國中凡有遊戶皆使自實因録以益衆可也備從其計故衆遂強備由此知亮有英略乃以上客禮之九州春秋所言亦如之臣松之以為亮表云先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之事則非亮先詣備明矣雖聞見異辭各生彼此然乖背至是亦良為可怪劉表長子琦亦深器亮表受後妻之言愛少子琮不悅於琦琦每欲與亮謀自安之術亮輒拒塞未與處畫琦乃將亮遊觀後園共上高樓飮宴之間令人去梯因謂亮曰今日上不至天下不至地言出子口入於吾耳可以言未亮答曰君不見申生在內而危重耳在外而安乎琦意感悟陰規出計會黃祖死得出遂為江夏太守俄而表卒琮聞曹公來征遣使請降先主在樊聞之率其衆南行亮與徐庶並從為曹公所追被獲庶母庶辭先主而指其心曰本欲與將軍共圖王霸之業者以此方寸之地也今已失老母方寸亂矣無益於事請從此别遂詣曹公魏略曰庶先名福本單家子少好任俠擊劍中平末嘗為人報讐白堊突面被髮而走為吏所得問其姓名閉口不言吏乃於車上立柱維磔之擊鼓以令於巿𨞬莫敢識者而其黨伍共篡解之得脫於是感激棄其刀戟更疏巾單衣折節學問始詣精舍諸生聞其前作賊不肯與共止福乃卑躬早起常獨掃除動靜先意聽習經業義理精熟遂與同郡石韜相親愛初平中中州兵起乃與韜南客荆州到又與諸葛亮特相善及荆州內附孔明與劉備相隨去福與韜俱來北至黃初中韜仕厯郡守典農校尉福至右中郎將御史中丞逮太和中諸葛亮出隴右聞元直龎士元才如比歎曰魏殊多士邪何彼二人不見用乎庶後數年病卒有碑在彭城今猶存焉先主至於夏口亮曰事急矣請奉命求救於孫將軍時權擁軍在柴桑觀望成敗亮説權曰海內大亂將軍起兵據有江東劉豫州亦收衆漢南與曹操並爭天下今操芟夷大難略已平矣遂破荆州威震四海英雄無所用武故豫州遁逃至此將軍量力而處之若能以吳越之衆與中國抗衡不如早與之絶若不能當何不案兵束甲北面而事之今將軍外託服從之名而內懷猶豫之計事急而不斷禍至無日矣權曰苟如君言劉豫州何不遂事之乎亮曰田橫齊之壯士耳猶守義不辱况劉豫州王室之胄英才蓋世衆士慕仰若水之歸海若事之不濟此乃天也安能復為之下乎權勃然曰吾不能舉全吳之地十萬之衆受制於人吾計決矣非劉豫州莫可以當曹操者然豫州新敗之後安能抗此難乎亮曰豫州軍雖敗於長阪今戰士還者及關羽水軍精甲萬人劉琦合江夏戰士亦不下萬人曹操之衆遠來疲弊聞追豫州輕騎一日一夜行三百餘里此所謂強弩之末勢不能穿魯縞者也兵法忌之日必蹶上將軍且北方之人不習水戰又荆州之民附操者逼兵勢耳非心服也今將軍誠能命猛將統兵數萬與豫州協規同力破操軍必矣操軍破必北還如此則荆吳之勢強鼎足之形成矣成敗之機在於今日權大悅即遣周瑜程普魯肅等水軍三萬隨亮詣先主并力拒曹袁子曰張子布薦亮於孫權亮不肯留人問其故曰孫將軍可謂人主然觀其度能賢亮而不能盡亮吾是以不留臣松之以為袁孝尼著文立論甚重諸葛之為人至如此言則失之殊遠觀亮君臣相遇可謂希世一時終始之分誰能間之寧有中違斷金甫懷擇主設使權盡其量便當翻然去就乎葛生行巳豈其然哉關羽為曹公所獲遇之甚厚可為能盡其用矣猶義不背本曾為孔明之不若雲長乎曹公敗於赤壁引軍歸鄴先主遂收江南以亮為軍師中郎將使督零陵桂陽長沙三郡調其賦稅以充軍實零陵先賢傳云亮時住臨蒸建安十六年益州牧劉璋遣法正迎先主使擊張魯亮與關羽鎮荆州先主自葭萌還攻璋亮與張飛趙雲等率衆泝江分定郡縣與先主共圍成都成都平以亮為軍師將軍署左將軍府事先主外出亮常鎮守成都足食足兵二十六年羣下勸先主稱尊號先主未許亮説曰昔吳漢耿弇等初勸世祖即帝位世祖辭讓前後數四耿純進言曰天下英雄喁喁冀有所望如不從議者士大夫各歸求主無為從公也世祖感純言深至遂然諾之今曹氏纂漢天下無主大王劉氏苖族紹世而起今即帝位乃其宜也士大夫隨大王久勤苦者亦欲望尺寸之功如純言耳先主於是即帝位策亮為丞相曰朕遭家不造奉承大統競競業業不敢康寧思靖百姓懼未能綏於戲丞相亮其悉朕意無怠輔朕之闕助宣重光以照明天下君其勗哉亮以丞相録尚書事假節張飛卒後領司隸校尉蜀記曰晉初扶風王駿鎮關中司馬高平劉寶長史熒陽桓隰諸官屬士大夫共論諸葛亮于時談者多譏亮託身非所勞困蜀民力小謀大不能度德量力金城郭沖以為亮權智英略有踰管晏功業未濟論者惑焉條亮五事隱沒不聞於世者寶等亦不能復難扶風王慨然善沖之言臣松之以為亮之異美誠所願聞然沖之所説實皆可疑謹隨事難之如左其一事曰亮刑法峻急刻剝百姓自君子小人咸懷怨歎法正諫曰昔高祖入關約法三章秦民知德今君假借威力跨據一州初有其國未垂惠撫且客主之義宜相降下願緩刑弛禁以慰其望亮答曰君知其一未知其二秦以無道政苛民怨匹夫大呼天下土崩高祖因之可以弘濟劉璋暗弱自焉以來有纍世之恩文法羈縻互相承奉德政不舉威刑不肅蜀土人士專權自恣君臣之道漸以陵替寵之以位位極則賤順之以恩恩竭則慢所以致弊實由於此吾今威之以法法行則知恩限之以爵爵加則知榮榮恩並濟上下有節為治之要於斯而著難曰案法正在劉主前死今稱法正諫則劉主在也諸葛職為股肱事歸元首劉主之世亮猶未領益州慶賞刑政不出於已尋沖所述亮答專自有其能有違人臣自處之宜以亮謙順之體殆必不然又云亮刑法峻急刻剝百姓未聞善政以刻剝為稱其二事曰曹公遣刺客見劉備方得交接開論伐魏形勢甚合備計稍欲親近刺者尚未得便會既而亮入魏客神色失措亮因而察之亦知非常人須臾客如厠備謂亮曰向得奇士足以助君補益亮問所在備曰起者其人也亮徐歎曰觀客色動而神懼視低而忤數姦形外漏邪心內藏必曹氏刺客也追之巳越墻而走難曰凡為刺客皆暴虎憑河死而無悔者也劉主有知人之鑒而惑於此客則此客亦一時之奇士也又語諸葛云足以助君補益則亦諸葛之流亞也凡如諸葛之儔鮮有為人作刺客者矣時主亦當惜其器用必不投之死地也且此人不死要應顯達為魏竟是誰乎何其寂滅而無聞章武三年春先主於永安病篤召亮於成都屬以後事謂亮曰君才十倍曹丕必能安國終定大事若嗣子可輔輔之如其不才君可自取亮涕泣曰臣敢竭股肱之力效忠貞之節繼之以死先主又為詔敕後主曰汝與丞相從事事之如父孫盛曰夫杖道挾義體存信順然後能匡主濟功終定大業語曰奕者舉棊不定猶不勝其偶况量君之才否而二三其節何以摧服強鄰囊括四海者乎備之命亮亂孰甚焉世或有謂備欲以固委付之人且以一蜀人之志君子曰不然苟所寄忠賢則不須若斯之誨如非其人不宜啓篡逆之塗是以古之顧命必貽話言詭偽之辭非託孤之謂幸值劉禪暗弱無猜險之性諸葛威略足以檢衛異端故使異同之心無由自起耳不然殆生疑隙不逞之釁謂之為權不亦惑哉建興元年封亮武鄉侯開府治事頃之又領益州牧政事無巨細咸決於亮南中諸郡並皆叛亂亮以新遭大喪故未便加兵且遣使聘吳因結和親遂為與國亮集曰是歲魏司徒華歆司空王朗尚書令陳羣太史令許芝謁者僕射諸葛璋各有書於亮陳天命人事欲使舉國稱藩亮遂不報書作正議曰昔在項羽起不由德雖處華夏秉帝者之勢卒就湯鑊為後永戒魏不審鑑今次之矣免身為幸戒在子孫而二三子各以耆艾之齒承偽指而進書有若崇疏稱莽之功亦將逼於元禍苟免者邪昔世祖之創迹舊基奮羸卒數千摧莽強旅四十餘萬於昆陽之郊夫據道討淫不在衆寡及至孟德以其譎勝之力舉數十萬之師救張郃於陽平勢窮慮悔僅能自脫辱其鋒鋭之衆遂喪漢中之地深知神器不可妄獲旋還未至感毒而死子桓淫逸繼之以篡縱使二三子多逞蘇張詭靡之説奉進歡兜滔天之辭欲以誣毁唐帝諷解禹稷所謂徒喪文藻煩勞翰墨者矣夫大人君子之所不為也又軍誡曰萬人必死橫行天下昔軒轅氏整卒數萬制四方定海內况以數十萬之衆據道而臨有罪可得干擬者哉三年春亮率衆南征詔賜亮金鈇鉞一具曲蓋一前後羽葆鼓吹各一部虎賁六十人事在亮集其秋悉平軍資所出國以富饒漢晉春秋曰亮在南中所在戰捷聞孟獲者為蠻漢之所服募生致之既得使觀於營陳之間問曰此軍何如獲對曰向者不知虛實故敗今蒙賜觀看營陳若祗如此即定易勝耳亮笑縱使更戰七縱七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣遂至滇池南中平皆即其渠率而用之或以諫亮亮曰若留外人則當留兵兵留則無所食一不易也加蠻新傷破父兄死喪留外人而無兵者必成禍患二不易也又蠻纍有廢殺之罪自嫌釁重若留外人終不相信三不易也今吾欲使不留兵不運糧而綱紀粗定蠻漢粗安故耳乃治戎講武以俟大舉五年率諸軍北駐漢中臨發上疏曰先帝創業未半而中道崩殂今天下三分益州疲弊此誠危急存亡之秋也然侍衛之臣不懈於內忠志之士忘身於外者蓋追先帝之殊遇欲報之於陛下也誠宜開張聖聽以光先帝遺德恢弘志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宮中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之理不宜偏私使內外異法也侍中侍郎郭攸之費褘董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宮中之事事無大小悉以咨之然後施行必能裨補闕漏有所廣益將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵為督愚以為營中之事悉以咨之必能使行陳和睦優劣得所親賢臣遠小人此先漢所以興隆也親小人遠賢臣此後漢所以傾頺也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史參軍此悉貞良死節之臣願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕於南陽苟全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣臣松之案劉備以建安十三年敗遣亮使吳亮以建興五年抗表北伐自傾覆至此整二十年然則備始與亮相遇在敗軍之前二年時也先帝知臣謹愼故臨崩寄臣以大事也受命以來夙夜憂歎恐託付不效以傷先帝之明故五月渡瀘深入不毛漢書地理志曰瀘河水出牂牁郡句町縣今南方已定兵甲已足當奬率三軍北定中原庶竭駑鈍攘除姦凶興復漢室還於舊都此臣所以報先帝而忠陛下之職分也至於斟酌損益進盡忠言則攸之褘允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈責攸之褘允等之慢以彰其咎陛下亦宜自謀以咨輒車言善道察納雅言深追先帝遺詔臣不勝受恩感激今當遠離臨表涕零不知所言遂行屯於沔陽郭沖三事曰亮屯於陽平遣魏延諸軍并兵東下亮惟留萬人守城晉宣帝率二十萬衆拒亮而與延軍錯道徑至前當亮六十里所偵候白宣帝説亮在城中兵少力弱亮亦知宣帝垂至已與相逼欲前赴延軍相去又遠回迹反追勢不相及將士失色莫知其計亮意氣自若敕軍中皆卧旗息鼓不得妄出菴幔又令大開四城門掃地𨚫灑宣帝常謂亮持重而猥見勢弱疑其有伏兵於是引軍北趨山明日食時亮謂參佐拊手大笑曰司馬懿必謂吾怯將有強伏循山走矣候邏還白如亮所言宣帝後知深以為恨難曰案陽平在漢中亮初屯陽平宣帝尚為荆州都督鎮宛城至曹真死後始與亮於關中相抗禦耳魏嘗遣宣帝自宛由西城伐蜀值霖雨不果此之前後無復有於陽平交兵事就如沖言宣帝既舉二十萬衆已知亮兵少力弱若疑其有伏正可設防持重何至便走乎案魏延傳云延每隨亮出輒欲請精兵萬人與亮異道會於潼關亮制而不許延常謂亮為怯歎已才用之不盡也亮尚不以延為萬人别統豈得如沖言頓使將重兵在前而以輕弱自守乎且沖與扶風王言顯彰宣帝之短對子毁父理所不容而云扶風王慨然善沖之言故知此書舉引皆虛六年春揚聲由斜谷道取郿使趙雲鄧芝為疑軍據箕谷魏大將曹真舉衆拒之亮身率諸軍攻祁山戎陳整齊賞罰肅而號令明南安天水安定三郡叛魏應亮關中響震魏略曰始國家以蜀中惟有劉備備既死數歲蜀寂然無聞是以略無備預而卒聞亮出朝野恐懼隴右祁山尤甚故三郡同時應亮魏明帝西鎮長安命張郃拒亮亮使馬謖督諸軍在前與郃戰於街亭謖違亮節度舉動失宜大為郃所破亮拔西縣千餘家還於漢中郭沖四事曰亮出祁山隴西南安二郡應時降圍天水拔冀城獲薑維驅略士女數千人還蜀人皆賀亮亮顏色愀然有戚容謝曰普天之下莫非漢民國家威力未舉使百姓困於豺狼之吻一夫有死皆亮之罪以此相賀能不為愧於是蜀人咸知亮有吞魏之志非惟拓境而已難曰亮有吞魏之志久矣不始於此衆人方知也且於時師出無成傷缺而反者衆三郡歸降而不能有薑維天水之匹夫耳獲之則於魏何損拔西縣千家不補街亭所喪以何為功而蜀人相賀乎戮謖以謝衆上疏曰臣以弱才叨竊非據親秉旄鉞以厲三軍不能訓章明法臨事而懼至有街亭違命之闕箕谷不戒之失咎皆在臣授任無方臣明不知人恤事多暗春秋責帥臣職是當請自貶三等以督厥咎於是以亮為右將軍行丞相事所總統如前漢晉春秋曰或勸亮更發兵者亮曰大軍在祁山箕谷皆多於賊而不能破賊為賊所破者則此病不在兵少也在一人耳今欲滅兵省將明罰思過校變通之道於將來若不能然者雖兵多何益自今已後諸有忠慮於國但勤攻吾之闕則事可定賊可死功可蹻足而待矣於是考微勞甄壯烈引咎責躬布所失於天下厲兵講武以為後圖戎士簡練民忘其敗矣亮聞孫權破曹休魏兵東下關中虛弱十一月上言曰先帝慮漢賊不兩立王業不偏安故託臣以討賊也以先帝之明量臣之才故知臣伐賊才弱敵強也然不伐賊王業亦亡惟坐待亡孰與伐之是故託臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛并日而食臣非不自惜也顧王業不可得偏全於蜀都故冒危難以奉先帝之遺意也而議者謂為非計今賊適疲於西又務於東兵法乘勞此進趨之時也謹陳其事如左高帝明並日月謀臣淵深然陟險被創危然後安今陛下未及高帝謀臣不如良平而欲以長計取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計動引聖人羣疑滿腹衆難塞胸今歲不戰明年不征使孫䇿坐大遂并江東此臣之未解二也曹操智計殊絶於人其用兵也髣佛孫吳然困於南陽險於烏巢危於祁連逼於黎陽幾敗北山殆死潼關然後偽定一時耳况臣才弱而欲以不危而定之此臣之未解三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圖之委任夏侯而夏侯敗亡先帝每稱操為能猶有此失况臣駑下何能必勝此臣之未解四也自臣到漢中中間期年耳然喪趙雲陽羣馬玉閻芝丁立白夀劉郃鄧銅等及曲長屯將七十餘人突將無前賓叟青羌散騎武騎一千餘人此皆數十年之內所糾合四方之精鋭非一州之所有若復數年則損三分之二也當何以圖敵此臣之未解五也今民窮兵疲而事不可息事不可息則住與行勞費正等而不及早圖之欲以一州之地與賊持久此臣之未解六也夫難平者事也昔先帝敗軍於楚當此時曹操拊手謂天下巳定然後先帝東連吳越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後吳更違盟關羽毁敗秭歸蹉跌曹丕稱帝凡事如是難可逆料臣鞠躬盡瘁死而後已至於成敗利鈍非臣之明所能逆覩也於是有散關之役此表亮集所無出張儼默記冬亮復出散關圍陳倉曹真拒之亮糧盡而還魏將王雙率騎追亮亮與戰破之斬雙七年亮遣陳式攻武都陰平魏雍州剌史郭淮率衆欲擊式亮自出至建威淮退還遂平二郡漢丞相諸葛忠武侯集卷之三傳蜀志詔䇿亮曰街亭之役君引愆深自貶抑重違君意聽順所守前年耀師馘斬王雙今歲爰征郭淮遁走降集氐羌興復二郡威震凶暴功勳顯然方今天下騷擾元惡未梟君受大任而久自挹損非所以光揚洪烈矣今復君丞相君其勿辭漢晉春秋曰是歲孫權稱尊號其羣臣以並尊二帝來告議者咸欲絶其盟好亮曰權有僭逆之心久矣國家所以略其釁情者求犄角之援也今若加顯絶便當移兵東戍與之角力須并其土乃議中原彼賢才尚多將相緝穆未可一朝定也頓兵相持坐而須老使北賊得計非算之上者昔孝文卑辭丐奴先帝優與吳盟皆應權變通弘思遠益非匹夫之為分者也今議者咸以權利在鼎足不能併力且志望已滿無上岸之情推此皆似是而非也何者其智力不侔故限江自保權之不能越江猶魏賊之不能渡漢非力有餘而利不取也若夫大軍致討彼上當分裂其地以為後規下當略民廣境示武於內非端坐者也若就其不動而睦於我我之北伐無東顧之憂河南之衆不得盡西此之為利亦巳深矣權僭之罪未宜明也乃遣衛尉陳震慶權正號九年亮復出祁山以木牛運漢晉春秋曰亮圍祁山招鮮卑軻比能比能等至故北地石城以應亮於是魏大司馬曹真有疾司馬宣王自荆州入朝魏明帝曰西方事重非君莫可付者乃使西屯長安督張郃費曜戴陵郭淮等宣王使曜陵留精兵四千守上邽餘衆悉出西救祁山郃欲分兵駐雍郿宣王曰料前軍能獨當之者將軍言是也若不能當而分為前後此楚之三軍所以為黥布禽也遂進亮分兵留攻自逆宣王於上邽郭淮費曜等徼亮亮破之因大芟刈其麥與宣王遇於上邽之東斂兵依險軍不得交亮引而還宣王尋亮至於鹵城張郃曰彼遠來逆我我請戰不得謂我利不在戰欲以長計制之也且祁山知大軍以在近人情自固可止屯於此分為奇兵示出其後不宜進前而不敢逼坐失民望也今亮縣軍食少亦行去矣宣王不從故尋亮既至又登山掘營不肯戰賈栩魏平數請戰因曰公畏蜀如虎奈天下笑何宣王病之諸將咸請戰五月辛巳乃使張郃攻無當監何千於南圍自案中道向亮亮使魏延高翔吳班赴拒大破之獲甲首三千級玄鎧五千領角弩三千一百張宣王還保營糧盡退軍與魏將張郃交戰射殺郃郭沖五事曰魏明帝自征蜀幸長安遣宣王督張郃諸軍雍涼徑卒三十餘萬潛軍密進規向劍閣亮時在祁山旌旗利器守在險要十二更下在者八萬時魏軍治陳幡兵適交參佐咸以賊衆強盛非力所制宜權停下兵一月以併聲勢亮曰吾統武行師以大信為本得原失信古人所惜去者束裝以待期妻子鶴望而計日雖臨征難義所不廢皆催遣令去於是去者感悅願留一戰住者憤踴思致死命相謂曰諸葛公之恩死猶不報也臨戰之日莫不拔刀爭先以一當十殺張郃𨚫宣王一戰大尅此信之由也難曰臣松之案亮前出祁山魏明帝身至長安耳此年不復自來且亮大軍在關壟魏人何由得越亮徑向劍閣亮既出戰場本無久住之規而方休兵還蜀皆非經通之言孫盛習鑿齒搜求異同罔有所遺而並不多載沖言知其乖剌矣十二年春亮率大衆由斜谷出以流馬運據武功五丈原與司馬宣王對於渭南亮每患糧不繼使已志不伸是以分兵屯田為久住之基耕者雜於渭濱居民之間而百姓安堵軍無私焉漢晉春秋曰亮自至數挑戰宣王亦表固請戰使衛尉辛毗持節以制之薑維謂亮曰辛佐治仗節而到賊不復出矣亮曰彼本無戰情所以固請戰者以示武於其衆耳將在軍君命有所不受苟能制吾豈千里而請戰耶魏氏春秋曰亮使至問其寢食及其事之煩簡不問戎事使對曰諸葛公夙興夜寐罰二十以上皆親攬焉所噉食不至數升宣王曰亮將死矣相持百餘日其年八月亮疾病卒於軍時年五十四魏書曰亮糧盡勢窮憂恚嘔血一夕燒營遁走入谷道發病卒漢晉春秋曰亮卒於郭氏塢晉陽秋曰有星赤而芒角自東北西南流投於亮營三投再還往大還小俄而亮卒臣松之以為亮在渭濱魏人躡迹勝負之形未可測量而云嘔血蓋因亮自亡而自誇大也夫以孔明之略豈為仲達嘔血乎及至劉琨喪師與晉元帝箋亦云亮軍敗嘔血此則引虛記以為言也其云入谷而卒緣蜀人入谷發喪故也及軍退宣王案行其營壘處所曰天下奇才也漢晉春秋曰楊儀等整軍而出百姓奔告宣王宣王追焉薑維令儀反旗鳴鼓若將向宣王者宣王乃退不敢逼於是儀結陳而去入谷然後發喪宣王之退也百姓為之諺曰死諸葛走生仲達或以告宣王宣王曰吾能料生不便料死也亮遺命葬漢中定軍山因山為墳冡足容棺斂以時服不須器物詔䇿曰惟君體資文武明睿篤誠受遺託孤匡輔朕躬繼絶興微志存靖亂爰整六師無歲不征神武赫然威震八荒將建殊功於季漢參伊周之巨勳如何不弔事臨垂克遘疾隕喪朕用傷悼肝心若裂夫崇德序功紀行命諡所以光昭將來刋載不朽今使使持節左中郎將杜瓊贈君丞相武鄉侯印綬諡君為忠武侯魂而有靈嘉茲寵榮嗚呼哀哉鳴呼哀哉初亮自表後主曰成都有桑八百株薄田十五頃子孫衣食自有餘饒至於臣在外任無别調度隨身衣食悉仰於官不别治生以長尺寸若臣死之日不使內有餘帛外有贏財以負陛下及卒如其所言亮性長於巧思損益連弩木牛流馬皆出其意推演兵法作八陳圖咸得其要云魏氏春秋曰亮作八務七戒六恐五懼皆有條章以訓厲臣子又損益連弩謂之元戎以鐵為矢矢長八寸一弩十矢俱發亮集載木牛流馬法木牛方腹曲頭一腳四足頭入領中舌著於腹載多而行少特行者數十里羣行者二十里曲為牛頭雙為牛腳橫為牛領轉為牛足覆為牛背方為牛腹垂者為牛舌曲者為牛肋刻者為牛齒立者為牛角細者為牛鞅攝者為牛鞦軸牛仰雙轅人行六尺牛行四步載一歲糧日行二十里而人不勞流馬肋長三尺五寸廣三寸厚二寸二分左右同前軸孔分墨去頭四寸徑中二寸前腳孔分墨二寸去前軸孔四寸五分廣一寸前杠孔去前腳孔分墨二寸七分孔長二寸廣一寸後軸孔去前杠分墨一尺五分大小與前同後腳孔分墨去後軸孔三寸五分大小與前同後杠孔去後腳孔分墨二寸七分後載尅去後杠孔分墨四寸五分前杠長一尺八寸廣二寸厚一寸五分後杠與等板方囊二枚厚八分長二尺七寸高一尺六寸五分廣一尺六寸每枚受米二斛三斗從上杠孔去肋下七寸前後同上杠孔去下杠孔分墨一尺三寸孔長一寸五分廣七分八孔同前後四腳廣二寸厚一寸五分形制如象靬長四寸徑面四寸三分孔徑中三腳杠長二尺一寸廣一寸五分厚一寸四分同杠耳亮言教書奏多可觀别為一集景曜六年春詔為亮立廟於沔陽襄陽記曰亮初亡所在各求為立廟朝議以禮秩不聽百姓遂因時節私祭之於道陌上言事者或以為可聽立廟於成都者後主不從步兵校尉習隆中書郎向充等共上表曰臣聞周人懷召伯之德甘棠為之不伐越王思范蠡之功鑄金以存其像自漢興以來小善小德而圖形立廟者多矣况亮德範遐邇勳蓋季世興王室之不壞實斯人是賴而蒸嘗止於私門廟像闕而莫立使百姓巷祭戎蠻野祀非所以存德念功述追在昔者也今若盡順民心則瀆而無典建之京師又逼宗廟此聖懷所以惟疑也臣愚以為宜因近其墓立之於沔陽使所親屬以時賜祭凡其臣故吏欲奉祠者皆限至廟斷其私祀以崇正禮於是始從之秋魏鎮西將軍鍾會征蜀至漢川祭亮之廟令軍士不得於亮墓所左右芻牧樵採亮弟均官至長水校尉亮子瞻嗣爵襄陽記曰黃承彥者高爽開列為沔南名士謂諸葛孔明曰聞君擇婦身有醜女黃頭黑色而才堪相配孔明許即載送之時人以為笑樂鄉里諺曰莫作孔明擇婦正得阿承醜女諸葛氏集目録開府作牧第一權制第二南征第三北出第四計算第五訓厲第六綜核上第七綜核下第八雜言上第九雜言下第十貴和第十一兵要第十二傅運第十三與孫權書第十四與諸葛瑾書第十五與孟達書第十六廢李平第十七法檢上第十八法檢下第十九科令上第二十科令下第二十一軍令上第二十二軍令中第二十三軍令下第二十四右二十四篇凡十萬四千一百一十二字臣夀等言臣前在著作郎侍中領中書監濟北侯臣荀勗中書令關內侯臣和嶠奏使臣定故蜀丞相諸葛亮故事亮毗佐危國負阻不賓然猶存録其言恥善有遺誠是大晉光明至德澤被無疆自古以來未之有倫也輒刪除復重隨類相從凡為二十四篇篇名如右亮少有逸羣之才英霸之器身長八尺容貌甚偉時人異焉遭漢末擾亂隨叔父玄避難荆州躬耕於野不求聞達時左將軍劉備以亮有殊量乃三顧亮於草廬之中亮深謂備雄姿傑出遂解帶寫誠厚相結納及魏武帝南征荆州劉琮舉州委質而備失勢衆寡無立錐之地亮時年二十七乃建奇䇿身使孫權求援吳會權既宿服仰備又覩亮奇雅甚敬重之即遣兵三萬人以助備備得用與武帝交戰大破其軍乘勢克捷江南悉平後備又西取益州益州既定以亮為軍師將軍備既稱尊號拜亮為丞相録尚書事及備殂沒嗣子幼弱事無巨細亮皆專之於是外連東吳內平南越立法施度整理戎旅工械技巧物究其極科教嚴明賞罰必信無惡不懲無善不顯至於吏不容姦人懷自厲道不拾遺強不侵弱風化肅然也當此之時亮之素志進欲龍驤虎視包括四海退欲跨陵邊疆震蕩宇內又自以為無身之日則未有能蹈涉中原抗衡上國者是以用兵不戢屢耀其武然亮才於治戎為長奇謀為短理民之幹優於將略而所與對敵或值人傑加衆寡不侔攻守異體故雖連年動衆未能有克昔蕭何薦韓信管仲舉王子城父皆忖已之長未能兼有故也亮之器能政理抑亦管蕭之亞匹也而時之名將無城父韓信故使功業陵遲大義不及耶蓋天命有歸不可以智力爭也青龍二年春亮帥衆出武功分兵屯田為久駐之基其秋病卒黎庶追思以為口實至今梁益之民咨述亮者言猶在耳雖甘棠之詠召公鄭人之歌子産無以遠譬也孟軻有云以逸道使民雖勞不怨以生道殺人雖死不忿信矣論者或怪亮文彩不豔而過於丁寧周至臣愚以為咎繇大賢也周公聖人也考之尚書咎繇之謨略而雅周公之誥煩而悉何則咎繇與舜禹共談周公與羣下矢誓故也亮所與言盡衆人凡士故其文指不得及遠也然其聲教遺言皆經事綜物公誠之心形於文墨足以知其人之意理而有補於當世伏惟陛下邁蹤古聖蕩然無忌故雖敵國誹謗之言咸肆其辭而無所革諱所以明大通之道也謹録寫上詣著作臣夀誠惶誠恐頓首頓首死罪死罪泰始十年二月一日癸巳平陽侯相臣陳夀上喬字伯松亮兄瑾之第二子也本字仲愼與兄元遜俱有名於時論者以為喬才不及兄而性業過之初亮未有子求喬為嗣瑾啓孫權遣喬來西亮以喬為巳適子故易其字焉拜為駙馬都尉隨亮至漢中亮與兄瑾書曰喬本當還成都今諸將子弟皆得傳運思惟宜同榮辱今使喬督五六百兵與子弟傳於谷中書在亮集年二十五建興元年卒子攀官至行護軍翊武將軍亦早卒諸葛恪見誅於吳子孫皆盡而亮自有胄裔故攀還復為瑾後瞻字思遠建興十二年亮出武功與兄瑾書曰瞻今已八歲聰慧可愛嫌其早成恐不為重器耳年十七尚公主拜騎都尉其明年為翰林中郎將屢遷射聲校尉侍中尚書僕射加軍師將軍瞻工書畫強識念蜀人追思亮咸愛其才敏每朝廷有一善政佳事雖非瞻所建倡百姓皆相傳告曰葛侯之所為也是以美聲溢譽有過其實景耀四年為行都護衛將軍與輔國大將軍南鄉侯董厥並平尚書事六年冬魏征西將軍鄧艾伐蜀自陰平由景谷道旁入瞻督諸軍至涪停住前鋒破退還住綿竹艾遣書誘瞻曰若降者必表為琅琊王瞻怒斬艾使遂戰大敗臨陳死時年三十七衆皆離散艾長驅至成都瞻長子尚與瞻俱沒于寶曰瞻雖智不足以扶危勇不足以拒敵而能外不負國內不改父之志忠孝存焉華陽國志曰尚歎曰父子荷國重恩不早斬黃皓以致傾敗用生何為乃馳赴魏軍而死次子京及攀子顯等咸熙元年內移河東案諸葛氏譜云京字行宗晉泰始起居注載詔曰諸葛亮在蜀盡其心力其子瞻臨難而死義天下之善一也其孫京隨才署吏後為郿令尚書僕射山濤啓事曰郿令諸葛京祖父亮遇漢亂分隔父子在蜀雖不達天命要為盡心所事京治郿自復有稱臣以為宜以補東宮舍人以明事人之理副梁益之論京位至廣州剌史董厥者丞相亮時為府令史亮稱之曰董令史良士也吾每與之言思愼宜適徙為主簿亮卒後稍遷至尚書僕射代陳祗為尚書令遷為大將軍平臺事而義陽樊建代焉案晉百官表董厥字龔襲亦義陽人建字長元延熙二十四年以校尉使吳值孫權病篤不自見建權問諸葛恪曰樊建何如宗預也恪對曰才識不及預而雅性過之後為侍中守尚書令自瞻厥建統事薑維常征伐在外宦人黃皓竊弄機柄咸共將護無能匡矯孫盛異同記曰瞻厥等以維好戰無功國內疲弊宜表後主召還為益州剌史奪其兵權蜀長老猶有瞻表以閻宇代維故事晉永和三年蜀史常璩説蜀長老云陳夀嘗為瞻吏為瞻所辱故因此事歸惡黃皓而云瞻不能匡矯也然建特不與皓和好往來蜀破之明年春厥建俱詣京都同為相國參軍其秋並兼散騎常侍使蜀慰勞漢晉春秋曰樊建為給事中晉武帝問諸葛亮之治國建對曰聞惡必改而不矜過賞罰之信足感神明帝曰善哉使我得此人以自輔豈有今日之勞乎建稽首曰臣竊聞天下之論皆謂鄧艾見枉陛下知而不理此豈馮唐之所謂雖得頗牧而不能用者乎帝笑曰吾方欲明之卿言起我意於是發詔治艾焉評曰諸葛亮之為相國也撫百姓示儀軌約官職從權制開誠心布公道盡忠益時者雖讐必賞犯法怠慢者雖親必罰服罪輸情者雖重必釋遊辭巧飾者雖輕必戮善無微而不賞惡無纎而不貶庶事精練物理其本循名責實虛偽不齒終於邦域之內咸畏而愛之刑政雖峻而無怨者以其用心平而勸戒明也可謂識治之良才管蕭之亞匹矣然連年動衆未能成功蓋應變將略非其所長歟袁子曰或問諸葛亮何如人也袁子曰張飛關羽與劉備俱起爪牙腹心之臣而武人也晚得諸葛亮因以為佐相而羣臣悅服劉備足信亮足重故也及其受六尺之孤攝一國之政事凡庸之君專權而不失禮行君事而國人不疑如此即以為君臣百姓之心欣戴之矣行法嚴而國人悅服用民盡其力而下不怨及其兵出入如賓行不寇芻蕘者不獵如在國中其用兵也止如山進退如風兵出之日天下震動而人心不憂亮死至今數十年國人歌思如周人之思召公也孔子曰雍也可使南面諸葛亮有焉又問諸葛亮始出隴右南安天水安定三郡人反應之若亮速進則三郡非中國之有也而亮徐行不進既而官兵上隴三郡復亮無尺寸之功失此機何也袁子曰蜀兵輕鋭良將少亮始出未知國中強弱是以疑而嘗之且大會者不求近功所以不進也曰何以知其疑也袁子曰初出遲重屯營重復後轉降未進兵欲戰亮勇而能鬬三郡反而不速應此其疑徵也曰何以知其勇而能鬬也袁子曰亮之在街亭也前軍大破亮屯去數里不救官兵相接又徐行此其勇也亮之行軍安靜而堅重安靜則易動堅重則可以進退亮法令明賞罰信士卒用命赴險而不顧此所以能鬬也曰亮帥數萬之衆其所興造若數十萬之功是其奇者也所至營壘井竈圊溷藩籬障塞皆應繩墨一月之行去之如始至勞費而徒為飾好何也袁子曰蜀人輕脫亮故堅用之曰何以明其然也袁子曰亮治實而不治名志大而所欲遠非求近速者也曰亮好治官府次舍橋梁道路此非急務何也袁子曰小國賢才少故欲其尊嚴也亮之治蜀田疇辟倉廪實器械利蓄積饒朝會不譁路無醉人夫本立故末治有餘力而後及小事此所以勸其功也曰子之論諸葛亮則有證也以亮之才而少其功何也袁子曰亮持本者也其於應變則非所長也故不敢用其短曰然則吾子美之何也袁子曰此固賢者之遠矣安可以備體責也夫能知所短而不用此賢者之大也知所短則知所長矣夫前識與言而不中亮之所不用也此吾之所謂可也吳大鴻臚張儼作默記其述佐篇論亮與司馬宣王書曰漢朝傾覆天下崩壞豪傑之士競希神器魏氏跨中土劉氏據益州並稱兵海內為世霸王諸葛司馬二相遭值際會託身盟主或收功於蜀漢或册名於伊洛備丕既歿後嗣繼統各受保阿之任輔翼幼主不負然諾之成亦一國之宗臣霸王之賢佐也厯前以觀近事二相優劣可得而詳也孔明起巴蜀之地蹈一州之土方之大國其戰士人民蓋有九分之一也而以貢贄大吳抗對北敵至使耕戰有伍刑法整齊提步卒數萬長驅祁山慨然有飲馬河洛之志仲達據天下十倍之地仗兼并之衆據牢城擁精鋭無擒敵之意務自保全而已使彼孔明自來自去若此人不亡終其志意連年運思刻日興謀則涼雍不解甲中國不釋鞍勝負之勢以決矣昔子産治鄭諸侯不敢加兵蜀相其近之矣方之司馬不亦優乎或曰兵者凶器戰者危事也有國者不務保安境內綏靜百姓而好開闢土地征伐天下未為得計也諸葛丞相誠有匡佐之才然處孤絶之地戰士不滿五萬自可閉關守險君臣無事空勞師旅無歲不征未能進咫尺之地開帝王之基而使國內受其荒殘西土苦其役調魏司馬懿才用兵衆未易可輕量敵而進兵家所愼若丞相必有以䇿之則未見坦然之勳若無䇿以裁之則非明哲之謂海內歸向之意也余竊疑焉請問其説答曰蓋聞湯以七十里文王以百里之地而有天下皆用征伐而定之揖讓而登王位者惟舜禹而已今魏蜀為敵戰之國勢未俱王自操備時強弱懸殊而備猶出兵陽平擒夏侯淵羽圍襄陽將降曹仁生獲于禁當時北邊大小憂懼孟德身出南陽樂進徐晃等為救圍不即解故蔣子通言彼時有徙許渡河之計會國家襲取南郡羽乃解軍玄德與操智力多少士衆衆寡用兵行軍之道不可同年而語猶能暫以取勝是時又無大吳犄角之勢也今仲達之才減於孔明當時之勢異於曩日玄德尚與抗衡孔明何以不可出軍而圖敵耶昔樂毅以弱燕之衆兼從五國之兵長驅強齊下七十餘城今蜀漢之卒不少燕軍君臣之接信於樂毅加以國家為脣齒之援東西相應首尾如蛇形勢重大不比於五國之兵也何憚於彼而不可哉夫兵以奇勝制敵以智土地廣狹人馬多少未可偏恃也余觀彼治國之體當時既肅整遺教在後及其辭意懇切陳進取之圖忠謀謇謇義形於主雖古之管晏何以加之乎蜀記曰晉永興中鎮南將軍劉弘至隆中觀亮故宅立碣表其閭命太傅掾犍為李興為文曰天子命我於沔之陽聽鼓鞞而永思庶先哲之遺光登隆山以望遠軾諸葛之故鄉蓋神物應機大器無方通人靡滯大德不常故谷風發而騶虞嘯雲雷升而潛鱗驤摯解褐於三聘尼得招而褰裳管豹變於受命貢感激以回莊異徐生之摘寶釋卧龍於深藏偉劉氏之傾蓋嘉吾子之周行夫有知已之主則有竭命之良固所以三分我漢鼎跨帶我邊荒抗衡我北面馳騁我魏疆者也英哉吾子獨含天靈豈神之奇豈人之精何思之深何德之清異世通夢恨不同生推子八陳不在孫吳木牛之奇則亦般模神弩之功一何微妙千井齊甃又何祕要昔在顚夭有名無迹孰若吾儕良籌妙畫藏文既沒以言見稱又未若子言行並徵夷吾反玷樂毅不終奚比於爾明哲守沖臨終受寄讓過許繇負扆蒞事民言不流刑中於鄭教美於魯蜀民知恥河渭安堵匪皋則伊寧彼管晏豈徒聖宣慷慨屢歎昔爾之隱卜惟此宅仁智所處能無規廓日居月諸時殞其夕誰能不殁貴有遺格惟子之勳移風來世詠歌餘典懦夫將厲遐哉邈矣厥規卓矣凡若吾子難可究已疇昔之乖萬里殊塗今我來思覿爾故墟漢高歸魂於豐沛太公五世而反周思魍魎以髣佛冀影響之有餘魂而有靈豈其識諸
