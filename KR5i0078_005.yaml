偉開心見誠兩不疑指掌經綸見尚遲華容空令一兔走滎水徒慙六出奇堂堂雲長悲莫救區區陸子能深計相國空懷十倍才孫曹弱子皆為帝王雙血寒鐵兜鍪張郃魂銜金僕姑皇天竟失中流柱江水空流八陳圖雲龍風虎護儲胥白日高懸照肝膽徒令忠憤貫乾坤每讀令人動悽慘南陽三顧圖黎充輝烏散巢成漢樹空孫郎奇氣捲江東英雄鼎足三分勢祗在茅廬一語中題卧龍圖李賢漢家神器風波舟奸雄環顧涎欲流斯時誰有匡扶具南陽嘉遁阿衡儔帝室之胄何英偉草廬三顧驚神鬼幡然感激釋耕耘一旦君臣若魚水鼎分畢竟不能休務償初志復神州永安遺恨抱終古出師二表俱嘉猷巴水祠堂宛如故劍閣荒蕪流馬路七擒南僥讋天威八陳夔城訝神護營中星隕渭濱秋五丈原頭殺氣收歸櫬猶能走仲達運移漢祚終難留英雄千載空惆悵商周人物能多讓世間成敗不足憑卧龍遺址人爭訪南陽卧龍圖羅倫三分天下羽書馳龍卧南陽未起時海內風塵皆羿莽眼中魚水是湯伊未除漢賊身先死便絶江流恨不移曉霧一綃巾幗在靑山千古笑曹丕題諸葛武侯畫像王柏隆中高卧匪無情鼎峙規模豈素心自是將軍三顧晚坐看世變轉移深題武侯像陳淳國勢三分陳磧空郤將輕素寫遺容漢中晏駕英雄老世上何人識卧龍武侯祠像郝子玉籌筆造仇事可哀長星飛墜蜀山摧三分豈是平生志十倍寧論蓋世才壞壁丹靑仍白羽斷碑文字只蒼苔夜深老木風聲惡尚想褒斜萬馬來武侯像鄭元祐魚水君臣百世師風雲蛇鳥識旌旗三分天下何經意恨未中原復本支題武侯畫像顧祿南陽隴上躬耕翁磊落自是人中龍抱膝長歌古梁父眼空四海誰英雄涿郡劉郎漢宗室三謁殷勤訪籌策君臣契合片言間魚水相歡託交密鄴中未易窺曹公援兵先結孫江東赤壁磯頭大風轉舟師百萬烟塵空天意由來助仁德神謀亦豈非功力蛟龍未必在池中全蜀江山笑談得尋常事業奚足言出師誓欲淸中原高光故物不忍棄赤龍再使飛靑天兩表忠言何厯厯一點精誠貫天日三代名臣訓誥文又復從公手中出七番擒縱鬼神驚八陳風雲變化生橫行萬里誰能敵俯視群雄自可平孰意皇天竟冥漠五丈原頭將星落素服空聞後主迎黃泉不見英魂作至今遺像傳人間凝然不動如邱山小儒再拜瞻圖畫一曲長歌涕淚澘八陳八陳圖桓溫訪古識其真尋源愛往跡恐君遺事節聊下南山石八陳圖杜甫功蓋三分國名成八陳圖江流石不轉遺恨失吞吳東坡志林僕嘗夢見人云是杜子美謂僕曰世人多誤會豫八陳圖詩以為先主武侯欲與關羽復仇故恨不能滅吳非也我意本謂吳蜀唇齒之國不當相圖晉之所以能取蜀者以蜀有吞吳之意此為恨耳此理甚長子美死四百年而猶不忘詩區區自别其意真書生習氣耶八陳劉禹錫軒皇傳上略蜀相運神機水落龍蛇出沙平鵝鸛飛波濤無動勢鱗甲避餘威會有知兵者臨流指是非八陳磧蘇軾平沙何茫茫髣佛見石蕝縱橫滿江上歲歲沙水齧孔明死已久誰復辨行列神兵非學到自古不留訣至人已心悟後世徒妄說自從漢道衰蜂起盡奸傑英雄不相下禍難久連結驅民市無烟戰野江流血萬人賭一擲殺盡如沃雪不為久遠計草草常無法孔明最後起意欲掃羣孽崎嶇事節制隱忍久不決志大遂成迂歲月去如瞥六師紛未整一旦英氣歇唯餘八陳圖千古壯夔峽八陳磧蘇轍漲江吹八陳江落陳如故我來苦寒後平沙如匹素乘高望遺迹磊磊六四數遙指如布棊就視不知處世稱諸葛公用衆有法度區區落褒斜軍旅無濶步中原竟不到置陳狹無所茫茫平沙中積石排隊伍獨使後世人知我非莾鹵奈何長蛇形千古竟不悟惟餘桓元子久視不能去八陳李興宗江從岷來觸瞿唐夏潦潰裂怒勢張霜溝水落洲渚露纍纍江石堆作行半斜半直半疏密方營周匝門東出相傳呵護有鬼神驚波不能移寸尺想見當年諸葛公綸巾羽扇揮愁風令嚴部伍寂如水出沒變化機無窮乾坤不足當經理寫留古法艮岑趾上灘下峽一千年多少英雄測玄旨小兒元子强多知常山蛇勢吾能窺灞上枋頭真絶倒空使虬髯論崛奇斫輪不可傳其子此公天機緘骨髓奈何螟蝗生蝮蝎炎劉已灰吹不起天教三馬食一槽老馬蹄囓暫咆哮渭陽巾幗勢將蹶大星夜隕西軍號嗚呼興衰盡天意中原板蕩今六紀典午骨肉正相殘欲拯塗炭嗟誰使大官酣燕芻豢餘小官局蹐塵埃裏舉目厭厭九泉人誰訪草廬談世事向來韜略機莫投而今投機大良籌君不見峽山深深茅舍底有人抱膝高聲謳陪安撫大卿登八陳臺覽觀諸葛公遺像偶成長句張縯白帝城西魚復浦十月江平見津滸當年壘石紛成行此地卧龍經講武轅門外建嚴中權列陳相承存後伍何人蛇勢識常山未數魚麗矜鄭拒懸知精神貫金石尚想號令嚴鉦鼓老兵料敵應疑生川后澄波其敢侮向令赤伏有餘符下睨皇州直指取云何遺跡司神明獨靳豐功被寰宇高城置酒共臨眺往事興懷增歎撫巍然王佐三代前信矣名言照千古舊經云八陳圖銘石刻在磧中今不復見張季長詩刻銘久伏水底碑教戰時存山下鼓自注云有圖銘巨石今伏水底又云山下有石鼓相傳為武侯教戰之音也彌牟鎮八陳圖詩王剛中我稽八陳圖規模載方冊朅來鎮西蜀䕫門觀壘石賦詩百數字字字究來厯進涉漢川西彌牟鎮之北平原列堆阜灘石同一式細思作者意孔明有深策高岸或為谷灘石存遺跡江海變桑田平原猶可覓故今兩處存千載必一得再歌遂成篇應有智者識灘石八陳圖行王剛中我生孔明後相望九百載我想孔明賢巍然伊呂配奇謀勇略號雄師大節英風蓋當代木牛流馬何足言八陳遺蹤千古在我行已度瞿唐門長灘石壘差參分洪纖高下尺寸等猶有當年節制存四頭八尾觸處首敵衝中央兩皆救握奇如樞運無窮七縱七擒仍敢攻規模黃帝已垂文後來得者惟將軍唐宗李靖拾遺意樂舞幡表徒繽紛長江之上石蟠結江波洶湧石不滅使君何事遽剗除中夜風雷吼天闕明朝依舊石縱橫神物護持人始驚向來守蜀用此法誰知石壘真金城嗟乎孔明遇不遇遇則劉公恢大度國險地狹民力微法出萬全勢未具嗟乎孔明以此用於吳長江內固魏可圖嗟乎孔明以此用於魏掃平三分歸一篲祗應所遇勢不同勢既不同功亦異嗟乎孔明之心如石堅欲扶大厦持危顚事之不就則天耳安肯俯首從曹袁嗟乎孔明如生石不老後世用兵無草草忽然變作六花看便失本原難按考請觀壘石韜機籌江流東去自悠悠英豪得此石外指長與君王靖邊壘臣野李諶謁丞相祠登開濟堂俯八陳圖覩新帥張卿與侍郎林公舊題倡和皆慨想當時英烈嘆誦久之惟瀼東流囓城入江且為民病願以不能轉者一轉兹水輒借韻賦之人言忠孝不磨滅神物護持存水滸千年陵谷幾變遷此石不移自章武本由黃帝古兵法六十四以八為伍髯孫且懼生達走賊操遊魂何敢拒刻銘沙伏水底碑教戰石存山下鼓一片丹心天地間萬世聞風猶禦侮我來起敬凛如生再拜一言公必取瀼流東截陳圖前寖墮城壁頽民宇能安拳石止波流願回瀼患思民撫常使夔人知感公踏磧年年弔千古八陳圖陳謙武侯陳法洞萬古所至壘石傳岷嶓意令他時人共識不輕蜀血丹秦戈沔陽舊壘已荒草道元往記空摩娑廣都鄉名至今在鄉老相戒不敢磨八八成行被隆上兩陳二首形無頗乾坤門戶取法象未顯奇正相交加惟有江流魚復浦因水成勢雄平沙前方壁門儼營制後如偃月不可傞七八為經分㦸立九六為緯摽鱗差妙哉隆中先天學陳規八卦森包羅六十四陳極卦變縱橫百出無贅牙更參禮經得深旨畫前邱井分八家及其變動不可常玄前八佾舞象犧四頭八尾法制定四正四奇合變多紛紛紜紜未易亂渾渾沌沌誰能遮晉家將軍最倔强到此驚見常山蛇既識端中相應法何為征伐復成訛乃知天玄與地祕奇才不出空咨嗟緬懷牧郊釣璜客止齊步伐聲無譁陰經軍志八為用指麾昧爽趨朝歌春秋搜乘慚蕪率猶有魚麗參鸛鵝欃槍何事風霾急紛披誰恤孤鮐髽長平埋肉滿山谷昆陽積骸如亂麻自注孫經雜水陳華容道上霄焚葭苟無法制驅市人參肉偃首胡足呀鷗鳬宇令此荒廢直到分鼎成山河雜耕未盡星斗泣節制惜不開中華觸之可勝不可敗侮亡取亂明羲娥英雄相待得英衛翻為圓陳鋪六花功成演作破陳樂八舞校隊猶餘葩貞觀以來遽絶筆潼關散卒奔濤斜古人紙上己糟粕況乃沙石喧江沱天公幸自惜人命約束澒湧嚴誰何捐圖尋跡望千載嵩雲晝銷高嵯峨八陳懷古吳寬遺壘不可數神謀亦壯哉誰言愧將略敵自服奇才狐鼠悲吳魏風雲護草萊彌牟還廟貌長嘯使人哀武侯八陳圖一在䕫府曹學佺鼎足三分事己成圖開八陳舊知名喧豗峽浪終難破錯落江沙若不明人日尚傳來踏磧將星遙映在行營至今千載無人識獨有桓溫鑒别精一在新都彌牟鎮曹學佺廣漢南來近蜀都江城辨色己馳驅曉雲不散彌牟鎮春草橫生八陳圖自愧書生行部日得知丞相苦心無由來沃野稱千里處處桑麻望不孤漢丞相諸葛忠武侯集卷之十二終
