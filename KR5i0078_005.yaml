body:
  text: 三十六世孫羲基編輯八陳刻八陳圖舊序東萊藍章諸葛武侯推演兵法作八陳圖嚴從謂其出於風后握機文以豫言之握機文乃依托為之者非風后也實八陳圖之注耳獨孤及之圖記以為得于黃帝書之外篇者亦非也馬隆八陳贊又握機文之注耳其見于李靖問對者亦阮逸之僞書也圖之蹟有四一在沔陽一在新都一在魚復一在南市豫嘗至沔陽拜武侯之墓而訪其舊壘已不可識聞新都南市者亦殘破不可考唯魚復者迄今如故豫使人圖而觀之六十四壘布于前者八陳也二十四壘環于後者卻月陳也六十有四重易之卦也二十有四作易之畫也卦定于方以知故八陳象之畫起于圓而神故卻月陳象之卦自畫起方自圓生壁門者陰陽之象也握奇者虛中之象也奇正之變皆出于此奇亦為正之正正亦為奇之奇彼此相用循環無窮桓溫曰是常山蛇勢者亦妄言耳常山蛇謂之率然蓋高直陳也非八陳也李筌太白陰經以天地風雲為正龍虎鳥蛇為奇亦出臆見至謂教戰有圖而戰陳無圖者尤大謬也頃者蜀盜弄兵豫奉詔致討督師駐漢中因取八陳圖而推演之自六十四壘分內外前後四隅又變而為八陳縱橫開闔鈎聯蟠屈各有條理以之訓練而行伍始嚴整可觀矣三復考訂命武都人龍正圖之而注其左自將領以至士卒人給一本誦而習之鳴呼廢陳形而用兵者妄也執陳形而求勝者愚也平居練兵如身運臂而臂運指無不如意則禦寇而搏擊焉一陰一陽變化出沒而莫有逆吾命者矣孫武曰鬬亂而不可亂形圓而不可破非武侯之圖其孰能與于此哉藍公八陳合變圖說敘維揚徐昻諸葛八陳昉于黃帝風后而實得于心法非專推演也故其壘石于沙縱橫皆八其曰天衡地軸天前衝後衝地前衝後衝與夫曰風曰雲者陳之名也六十有四者陳之多寡相乘之數也布之各有其方列之各有其位遊兵二十四陳在六十四陳之後名曰卻月陳開閣作止間隊與八陳皆同下營之際環衛于後出入神速應敵取勝者此總圖之合歟若其內外之分為天覆地載左右之分為風揚雲垂前後四隅之分為龍飛為虎翼為鳥翔為蛇蟠者此八圖之變歟合不自合而包含無盡變不徒變而應敵無方堅如磐石觸之者碎熾如烈火犯之者焦此司馬懿所以甘受巾幗之辱而終不敢輕出以取敗也武侯已矣而陳圖之在白帝城魚復洲者固自若也晉馬隆以三千步卒破樹機能數萬騎以復涼洲者按此圖也厥後兵家者流但以資談說而不以教行伍雖師律提綱具載圖說而于總圖後少卻月陳圖是無遊兵也無遊兵何以取勝而禦猝然之變也哉東萊藍公以大都憲典兵漢中景慕武侯遣使魚復圖其猶在之壘石而諦觀之加以推演詢問講究之久一旦恍然似有以得其指要者復得武都士人龍正者諳練陳圖與語吻合深加賞識遂命取小石于廳事後布以合之起以變之其合其變應手而成于是以其法教諸將士驗其可與有為也遂著之圖說比舊加詳而擺陳變陳之舉實發所未發也刋以成書自將領以至士卒人給一本誦而習之無何精熟敵愾之氣十倍尋常矣乃制為衝陳之法遴選勇鋭以衝之將士欣躍思欲一逞由是威武奮揚屢戰屢勝雖公之忠貞知勇有過人者何莫而不自八陳圖說中來邪若夫陳圖之說之用于方來則亦存乎某人也云爾八陳號令凡遇操練之日侵晨赴各地方每隊七行七層以三千人之上四隊合為一隊二萬人之上四陳合為一陳二十萬人之上四部合為一部俱分兩層駐劄聞中軍號笛響馬步官旗詣中軍聽發放訖回還各隊傳令諭衆不許喧譁及錯亂隊伍聞中軍第一聲哱囉響各隊步兵皆集騎兵解絆牽馬第二聲哱囉響步兵舉旗騎兵乘馬第三聲哱囉響點鼓間隊出緩行一鼓一蹻至十八步中軍放炮一箇磨旗三次發喊三聲戰聲喇叭響發鼓急行十八步金響止單擺開鑼響放銃弓弩槍牌皆作戰勢官軍齊唱護護護三聲哵咧響發喊摔𨦐響收隊駐為第一陳再點鼓後面隊盡出緩行過第一陳前十八步放炮一箇磨旗一次發喊一聲戰聲喇叭響發鼓急行十七步金響止單擺開鑼響放銃弓弩槍牌皆作戰勢齊唱殺殺殺三聲哵咧響發喊摔𨦐響收隊駐為第二陳三次點鼓後第一陳又間隊出緩行過第一陳前十八步放炮一箇磨旗一次發喊一聲戰聲喇叭響發鼓急行十八步金響止單擺開鑼響放銃弓弩槍牌皆作戰勢齊唱突突突三聲哵咧響發喊摔𨦐響收隊駐為第三陳四次點鼓後第二陳亦間隊出緩行過第三陳前十八步放炮一箇磨旗一次發喊一聲戰聲喇叭響發鼓急行十八步金響止單擺開鑼響放銃弓弩槍牌如前作勢齊唱訶訶訶三聲哵咧響發喊摔𨦐響收隊駐為第四陳中軍放起火三枝點鼓每陳皆間隊出前行十八步止各趨原分地方下營左右前後縱橫擺成行列面俱朝外金響止戰聲喇叭響單擺開如陳總圖隅落鈎連以成八陳之規哵咧響發喊率𨦐響收隊若欲衝演變陳者先整前哨金鼓旗二對響器二副金二口鑼二面鼓十二面摔𨦐二箇大銃四口中軍金鼓旗幡如舊聽本哨官八天陳內用次中軍舉玄黃二色旗為一變天覆地載二陳放炮一箇點鼓該天陳隊往南緩行布天陳該地陳隊往北緩行布地陳各至地界磨旗一次發喊一聲戰聲喇叭響發鼓急趨下營金響止單擺開鑼響放銃弓弩槍牌皆作戰勢齊唱護護護三聲哵咧響發喊摔𨦐響收隊中軍放起火三枝二陳皆動復回總陳打得勝鼓哱囉喇叭號笛齊響各歸原地若再變陳亦如前撥旗鼓響器等件聽左哨官入陳用中軍舉五綵五暈二旗則為第二變風揚雲垂二陳放炮一箇點鼓該風陳隊往西緩行布風陳該雲陳隊往東緩行布雲陳其進止動蕩回營號頭皆准前例但唱殺殺殺三聲若再變陳右哨官入陳中軍舉靑白二旗為第三變龍飛虎翼二陳放炮一箇點鼓該龍陳隊往東南布龍陳該虎陳隊往西北布虎陳但唱突突突三聲其進止動蕩號頭皆同前例若再變陳後哨官入陳中軍舉赤黑二旗為第四變鳥翔蛇蟠二陳放炮一箇點鼓該鳥陳隊往東北布鳥陳該蛇陳隊往西南布蛇陳但唱訶訶訶三聲其號頭皆與前同八陳圖推演八陳始於隊伍而成營陳武經總要凡百人曰隊二隊曰宮二宮曰曲二曲曰部伍者五行生成之數也陳者八卦之象也八卦之象生於太極太極生兩儀兩儀生四象四象生八卦故將臺左列四陳右列四陳兩儀之象也左前十六隊左後十六隊右前十六隊右後十六隊四象之四象也南八隊北八隊東八隊西八隊東南八隊東北八隊西南八隊西北八隊八卦之象也遊兵者二十四氣之象也合圖遊兵環伏於後二層卻月其義未顯惟變圖分為兩哨左列十二陳右列十二陳宛然天道之周旋然則十四陳者對待之陰陽也二十四陳者流行之陰陽也易有交易變易之義而八陳有分合變合之精所以五人為伍十五為一隊加五旗軍而五十有五終於生成之數也天一地二天三地四天五地六天七地八天九地十天數二十有五地數三十凡天地之數五十有五所以成變化而行鬼神也八隊為一陳有四百四十人每隊以五十五人乘之八陳為一部有三千五百二十人而為小成可變兩也每陳四百四十人乘之其郤月遊兵不載焉即一變而為天覆地載二陳回營已畢又二變而為風揚雲垂二陳回營已畢又三變而為龍飛虎翼二陳回營已畢又四變而鳥翔蛇蟠二陳是也八部為一將有二萬八千一百六十人而為中成八陳齊可變也每小成三千五百二十人加遊兵一千三百二十八人以全隊出攻全隊留守南一部變天覆陳北一部變地載陳東一部變雲垂陳西一部變風揚陳東南一部變龍飛陳西北一部變虎翼陳東北一部變鳥翔陳西南一部變蛇蟠陳遊兵卻月於外有變仍分兩哨一守一攻其號令約束前後左右大小將士各司其局特八門中軍專設守警權命悉由中將以制治焉其所以謂天地風雲為四正龍虎鳥蛇為四奇者豈兵家策應而有常形哉如八面有警則八面正兵為正遊兵為奇如四面正向有警則出四面正兵夾擊豈非奇乎如四警有警則出四正兵夾擊豈非所謂正亦以為奇乎是以活物隨形應變以勢非知道者其能然哉終於六十四卦也八將為一軍有二十二萬五千二百八十人而為大成故韓信曰多多益善每中成二萬八千一百六十人加遊兵一萬五百六十人共有三十萬九千七百六十人以前隊出攻前隊留守南一將變八陳東西四隅各變八陳遊兵一依中成分列隨機應變號令約束前後左右大小將士各司其局特八門中軍專設守警權命悉由大將以裁成焉其布列營陳以將臺左列四陳右列四陳分作兩層駐劄而為小將左列四部右列四部亦分兩層而為中將左列四將右列四將亦分兩層而為大將其制陳以千人可布六華陳每面用六十步六華陳起於李靖外六軍一曰前鋒一曰後軍一曰左虞候一曰右虞候一曰左廂軍一曰右廂軍環而圍之象六出華中軍為奇外六軍為正內分三道其隔落鈎連曲折相對與八陳者同但八陳者方陳也六華陳者圓陳也以小成三千五百二十人可布八陳每面用一百二十步以中成二萬八千一百六十人每面用六百步以大成二十二萬五千二百八十人每面用一千二百步此言一面開方所用地步其小成每隊相離十八步中成每陳相離八十六步大成每部相離一百七十二步此言四方相離步則內餘數步加中軍而為閏也小成小將居之中成中將居之大成大將居之是謂握奇之說也或本握機以天後衝四隊東北西北風雲各二隊定作一號以地後衝四隊東北西北風雲各二隊定作二號以後地軸地後衝各二隊定作三號以後地軸四隊左右後天衡各二隊定作四號以前地軸四隊左右前天衡各二隊定作五號以前地軸地前衝各二隊左右前天衡各二隊定作六號以地前衝四隊東南西南風雲各二隊定作七號以天前衡四隊東南西南風雲各二隊定作八號書於本隊旗上布陳下營不得錯亂聞中軍舉號每陳皆間隊一二五六號先出三十六步止單擺開戰畢仍收作八陳為第一陳二次舉號三四七八號出過第一陳前三十六步止單擺開戰畢仍收作八陳為第二陳三次舉號第一陳又間隊每陳出五六號過第二陳前三十六步止單擺開戰畢仍收作八陳為第三陳四次舉號第二陳又間隊每陳出七八號過第三陳前三十六步止單擺開戰畢仍收作八陳為第四陳次視中軍舉起火點鼓每陳又間隊一三五七號不動二四六八號出前行十八步止天前衝四陳居前天後衝四陳居後天衡十六隊居兩端地軸十二陳居中間地前衝六陳居前地後衝六陳居後風八陳居四維雲八陳居四角自然而成八陳之規也直衝南前一面之法如遇左右後有警行陳始亦依前例定號以次壘衝則不雜亂而整矣遊兵二十四陳分列兩哨每哨十二陳三陳定作一號共作四號分列兩層進止開闔間隊與八陳皆同惟下營之際掣環於後而伏之取勝衝擊全在乎遊兵也總衝四陳之圖八陳小成之圖八陳中成之圖八陳大成之圖八陳分撥總圖總圖如陰陽之互藏其宅八陳分變實淸濁之異其施故天雲龍鳥四陳屬陽淸而垣居東南地風虎蛇四陳屬陰濁而垣居西北遊兵亦各以類相從進退開闢一陰一陽不啻春秋之有分節啓閉之有顯藏然元氣未嘗不周流統貫於其中是故大將者馭衆行師之元氣也智慮少滯則兵形無所不攝運動失度外邪得以乘隙而八三軍之司命無寄寓矣可不慎歟天覆陳八陳變例天覆陳贊天陳十六外方內圓四維風揚其形象天為陳之主為兵之先善用三軍其形不偏內外之分為第一變外之分變為天覆陳有風無雲用總陳外面之隊以右天前衝二隊列前居正南以東南西南風各二隊列天衝兩維以左右前天衡各四隊列前中以左右天前後衝各二隊列兩端以左右後天衡各四隊列後中以左天後衝二隊列後以東北西北風各二隊列後兩維謂風附天而形圓也地載陳贊地陳十二其形正方雲主四角冲敵難當其體莫測動用無窮獨立不可配之於陽內之分變為地載陳有雲無風用總陳中間之隊以左地後衝三隊列前居正北以東北西北雲各二隊列地後衝兩角以左右後地軸各三隊列左右中以左右前地軸各三隊列後地軸之左右以左右地前後衝各三隊列軸之兩端以右地前衝三隊列後以東南西南雲各二隊列地前衝兩角謂雲附地而形方是也風揚陳風揚陳贊風無正形附之於天變而為蛇其意漸玄風能鼓物萬物撓焉蛇能為繞三軍懼焉左右之分為第二變右之分變為風揚陳有風無雲用總陳右一半隊以右天前衝二隊列前居正西以西北西南風各二隊列天前衝兩維以右前地軸三隊列前中以右前後天衝各四隊列地軸左右以東北東南風各二隊列衡兩端以後地軸二隊列後中以右地前後衝各三隊列地軸兩維以右天後衝二隊列後謂風附衡而形鋭是也雲垂陳雲垂陳贊雲附於地始則無形變為翔鳥其狀乃成鳥能突擊雲能晦冥千變萬化金革之聲左之分變為雲垂陳有雲無風用總陳左一半隊以左天後衝二隊列前居正東以左右地前後衝各三隊列天後衝兩維以左後地軸三隊列前中以左前後天衡各四隊次列後地軸之左右以左前地軸三隊列天衡之中以東南東北雲各二隊列天衡兩端以左天前衝二隊列後居正西以西南西北雲各二隊列天前衝兩維謂雲附衡而形有聚有散也龍飛陳龍飛陳贊天地後衝龍變其中有爪有足有背有胸潛則不測動則無窮陳形赫然象名為龍前後之分為第三變後之分變為龍飛陳有雲無風用總陳後一半隊以東南東北雲各二隊列東南為兩翼以左後天衡四隊列前為首以左天後衝二隊列天衡次以左地後衝三隊列天衝次以左右後地軸各三隊列地衝中以右地後衝三隊列地軸次以右天前衝二隊列地衝次以右天衡四隊列後為尾以西南西北雲各二隊列衡二維為翼謂雲從龍而形象龍也虎翼陳虎翼陳贊天地前衝變為虎翼伏虎將摶盛其威力淮陰用之變為無極垓下之會魯公莫測前之分變為虎翼陳有風無雲用總陳前一半隊以西北西南風各二隊列西北二維為前足以右前天衡四隊列前為首以右天前衝二隊列天衡之次以前左右地軸各三隊列中之左右以左右地前衝各三隊列地軸兩廂為翼以左天前衝二隊列地軸之次以左前天衡四隊列後為尾以東北東南風各二隊列天衡二維為後足謂風從虎而形象虎也鳥翔陳鳥翔陳贊鷙鳥將搏必先翺翔勢凌霄漢飛禽伏藏審之而下必有中傷一夫突擊三軍莫當四隅之分為第四變東北西南二隅變為鳥翔陳有雲無風用總陳二隅之隊以左天後衝二隊列前居東北為首以右天前衝二隊列後為尾以左後地軸三隊列天衝右以右前地軸三隊列天衝左以左後天衡四隊列軸右以右前天衡四隊列軸左以左地後衝三隊列天衡右以右地前衝三隊列天衡左以東北東南雲各二隊列地衝右為羽翼以西北西南雲各二隊列地衝左為羽翼謂雲附衝而形象鳥翔也蛇蟠陳蛇蟠陳贊風為蛇蟠附天成形勢能圍繞性能屈伸四奇之中與虎為鄰後變常山首尾相因西北東南二隅變為蛇蟠陳有風無雲用總陳二隅之隊以右後地軸三隊列前居西南為首以左前地軸三隊列後為尾以右後天衡四隊列軸右以左前天衡四隊列軸左以右地後衝三隊列天衡右以左地前衝三隊列天衡左以右天後衝二隊列地衝右以左天前衝二隊列地衝左以西北風二隊列天衝右以西南風二隊列天衝左以東北風二隊列西北風右以東南風二隊列西南風左謂風附軸而形象蛇蟠也常山蛇陳常山蛇陳又圖右以常山陳步卒五部凡四千人居中前後左右等軍量山川土地之形按陳而居可以逸待勞以飽待饑其揚奇備伏皆馬騎分而為八凡二千人逐便而居以應權也六鼓舉龍旗則為常山矣古今以來臨戎對敵每作四面陳周回受敵以為必勝儻若選鋒而擊之其陳必破此非天殃將之失也亦或作長陳或作蛇陳皆以隊伍步騎相接或被敵破一處即敗散不全大將避潰師之罪移過於下遂使驍勇小將無罪受誅今則畫成定制各立陳名部曲分鬬各明奇正若失一陳則斬一將形勢既就與戰陳相應猶手臂相救以此攻守萬無一失然以中軍為中黃陳次有若前衝後衝左突右擊白雲靑蛇大赤大黑摧凶決勝先鋒破敵以二除中黃之外餘十二陳以應十二辰大黑子大赤午破敵丑左突寅靑蛇卯摧凶辰前衝巳先鋒未右擊申白雲酉決勝戌後衝亥漢丞相諸葛忠武侯集卷之十一傳别傳諸葛亮字孔明琅琊陽都人蚤孤從父玄依劉表亮從玄來荆州玄死遂家於南陽隆中幼與潁川徐庶元直及石廣元孟公威遊學三人務為精熟亮獨觀其大略每晨夜從容抱膝長嘯而謂三子曰卿等可至郡守剌史問其所志但笑而不言公威念鄉欲還亮曰中國饒士大夫遨遊何必故鄉耶稍長躬耕隴畝好為梁父吟時人莫測也惟與庶及博陵崔州平友善而重龎德公每獨拜牀下德公亦稱之為臥龍沔南名士黃承彥謂亮聞君擇婦身有醜女才堪相配亮許即載送之諺曰莫學孔明擇婦正得阿承醜女建安十二年左將軍豫州牧劉玄德來荆州訪世事於襄陽司馬德操德操曰腐儒俗士豈識時務識時務者在俊傑此間自有伏龍鳳雛問為誰曰諸葛孔明龎士元也及屯新野徐庶見左將軍器之庶曰諸葛孔明者臥龍也將軍豈願見之乎曰君與俱來庶曰此人可就見不可屈致將軍宜枉駕顧之遂詣亮凡三往乃見因屏人曰漢室傾頽奸臣竊命主上䝉塵孤不度德量力欲信大義於天下而智識淺短遂用猖獗至於今日然志則不已君謂計將安出亮曰自董卓以來豪傑竝起跨州連郡者不可勝數曹操比於袁紹則名微而衆寡然操遂能克紹以弱為强非惟天時抑亦人謀也今操擁百萬之衆挾天子而令諸侯此誠不可與爭鋒孫權據有江東巳厯三世國險民附賢能為之用此可與為援而不可圖也荆州北據漢沔利盡南海東連吳會西通巴蜀此用武之國而其主不能守此殆天所以資將軍將軍豈有意乎益州險塞沃野千里天府之土高祖由之成帝業劉璋暗弱張魯在北民殷國富而不知存恤智能之士思得明君將軍既帝室之胄信義著於四海總攬英雄思賢如渴若跨有荆益保其巖阻西和諸戎南撫蠻越外結好孫權內修政理天下有變則命一上將將荆州之軍以向宛洛將軍身率益州之衆出於秦川百姓孰不簞食壺漿以迎將軍者乎誠如是則王業可成漢室可興矣左將軍曰善於是與亮情好日密關羽張飛等不悅左將軍曰孤有孔明猶魚之有水也願諸君勿復言亮時年二十七劉表愛少子琮長子琦不自安問亮以計亮不對他日獨與升高樓撤梯而後問之亮曰君不見申生在內而危重耳在外而安乎琦感悟求出守江夏明年表卒琮立會曹操南侵琮遣使迎降而不以告操兵至宛左將軍始聞之亮說曰攻琮荆州可有也左將軍不忍乃引去荆人多歸之衆至十餘萬操引精騎急追及於長坂左將軍棄妻子獨與亮等數十騎走至夏口亮曰事急矣請奉命求救於孫將軍時權擁兵柴桑觀望成敗亮說權曰海內大亂將軍起兵據有江東劉豫州亦收衆漢南與曹操共爭天下今操芟夷大難略已平矣遂破荆州威震四海英雄無所用武故豫州遁逃至此將軍量力而處之若能以吳越之衆與中國抗衡不如早與之絶若不能當何不按兵束甲北面而事之今將軍外託服從之名而內懷猶豫之計事急而不斷禍至無日矣權曰苟如君言劉豫州何不遂事之乎亮曰田橫齊之壯士耳猶守義不辱况劉豫州王室之胄英才蓋世衆士仰慕若水之歸海事之不濟此乃天也安能復為之下乎權勃然曰吾不能舉全吳之地十萬之衆受制於人吾計決矣非劉豫州莫可以當曹操者然豫州新敗之後安能抗此難乎亮曰豫州軍雖敗於長坂今戰士還者及關羽水軍精甲萬人劉琦合江夏戰士亦不下萬人曹操之衆遠來疲弊聞追豫州一日夜行三百餘里此所謂强弩之末勢不能穿魯縞也故兵法忌之曰必蹶上將且北方之人不習水戰又荆州之民附操者逼兵勢耳非心服也將軍誠能命猛將統兵數萬與豫州協規同力破操軍必矣操軍破必北還如此則荆吳之勢强鼎足之形成成敗之機在於今日權大悅即遣周瑜程普魯肅等水軍三萬隨亮詣左將軍併力拒操遂破操於赤壁左將軍南征收江南以亮為軍師中郎將使督零陵桂陽長沙三郡調賦稅以充軍實羣下推左將軍為荆州牧治公安孫權來請結好左將軍欲往見之亮以為不可左將軍固往至則周瑜果請留之權不從左將軍既歸嘆曰天下智謀之士所見略同如此十六年益州牧劉璋遣法正迎左將軍亮關羽等留守荆璋命左將軍擊張魯十七年返兵擊璋十八年圍亮與張飛趙雲等泝江定白帝江州江陽十九年與左將軍會圍成都成都平左將軍領益州牧以亮為軍師將軍署左將軍府事於是竝用羣才凡劉璋所嘗授任及其婚姻與所排擯忌恨悉別其器能處以顯任有志之士無不競勸亮佐益州政尚嚴法正謂亮曰高祖八關約法三章秦民知德宜緩刑弛禁以慰新附亮曰秦政苛急天下土崩高祖因之可以弘濟劉璋暗弱自焉以來文法羈縻互相承奉德政不舉威刑不肅蜀土人士專權自恣君臣之道漸以陵替寵之以位位極則賤順之以恩恩竭則慢所以致弊實由於此吾今威之以法法行則知恩限之以爵爵加則知榮榮恩竝濟上下有節為治之要於斯著矣左將軍領兵向漢中亮鎮守成都足食足兵左將軍嘗急調兵亮以問蜀部從事楊洪洪曰漢中益之咽喉今日之事男子當戰女子當運發兵何疑亮乃表洪為蜀郡太守調度皆辦亮用人惟其才能不論資厯先後洪初為李平功曹及平遷犍為守洪已為蜀郡洪門下書佐何秪有才智舉郡吏數年拔守廣漢時洪猶在蜀郡也西土皆服亮能盡時人器用類如此二十一年曹操為魏王二十二年操建天子旌旗出警八蹕二十四年左將軍敗操兵於漢中亮帥羣下上左將軍為漢中王表聞漢帝時孫權稱藩於操遂襲殺關羽取荆州二十五年亮勸漢中王誅劉封封本寇氏之子王至荆州以未有繼嗣育而子之後與孟達守上庸關羽呼封達自助不肯往後與達忿爭達叛降魏封破敗還成都亮以封凶猛易世之後終難制御故勸王正其罪而誅之是歲冬曹丕篡立改元黃初明年傳聞漢帝被弒漢中王發喪制服羣下請稱尊號王未許亮曰曹氏篡漢天下無主大王劉氏苖裔紹世而起乃其宜也王從之夏四月丙午即皇帝位改元章武以亮為氶相録尚書事假節策曰朕遭家不造奉天大統兢兢業業不敢康寧思靖百姓懼未能綏於戲丞相亮其悉朕意無怠輔朕之闕助宣重光以昭明天下君其勗哉於是置百官立宗廟祫祭高皇帝以下皆亮實左右之是歲秋帝忿關羽之敗帥諸軍伐吳以報怨亮留守成都明年春亮聞帝兵敗還永安嘆曰使法孝直在必能諫上不東行也帝不豫二年春召亮會永安亮至永安四月病篤謂亮曰君才十倍曹丕必能安國終定大事嗣子可輔輔之如其不才君可自取亮涕泣曰臣敢不竭股肱之力效忠貞之節繼之以死又為詔戒勑其子且曰汝與丞相從事事之如父帝崩亮得遺詔太子即位於成都改元建興封亮武鄉侯領益州牧事無巨細皆決於亮亮發教羣下曰夫參署者集衆思慮廣忠益也若遠小嫌難相違覆曠闕損矣違覆而得中猶棄敝蹻而獲珠玉然人心苦不能盡惟徐元直處兹不惑又董幼宰參署七年事有不至至于十反來相啓告苟能慕元直之什一幼宰之殷勤有忠於國則亮可以少過矣又曰初交州平屢聞得失後交元直勤見啓誨前參事於幼宰每言則盡後從事於偉度數有諫止雖姿性鄙暗不能悉納然與此四子終始好合亦足以明其不疑於直言也幼宰名和嘗與亮同署左將軍府事偉度亮主簿胡濟也自昭烈駐永安吳人懼有後圖復來請和會昭烈崩亮方慮恐權有異計尚書鄧芝見亮曰主上幼弱新立宜遣大使往申吳好亮曰吾思之久矣未得其人耳今始得之芝問誰亮曰即使君也自遣芝往孫權悅通好如初亮引一時名士如蔣琬張裔等皆入丞相幕府又妙簡舊德使佐益州於是以秦宓為别駕王梁為功曹杜微為主簿譙周為勸學從事皆行義素著鄉里敬慕之杜微者節尤高自先主定蜀微常稱病聾閉戶不出及亮辟置輿而致之既至力求去亮於座與書曰曹丕篡弒自立是猶土龍芻狗之有名也欲與羣賢因其邪僞以正道滅之丕方大興勞役以向吳楚今因不多務且閉境勸農育養民物竝治甲兵以待其挫然後伐之可使兵不戰民不勞而天下定也君但當以德輔時不責君軍事何為汲汲求去微乃留亮更薦為諫議大夫先是益州郡渠帥雍闓殺太守而附吳吳以闓為永昌太守永昌功曹呂凱府丞王伉率吏士閉境拒守闓不能進使郡人孟獲誘扇諸髳牂牁太守朱褒越雋髳王高定皆應闓亮以新遭大喪亦撫而未討閉關息民勸農殖穀魏司徒華歆等扺亮諷使稱藩亮不報書作正議以示人其大略曰昔世祖創迹舊基奮羸卒數千摧莽彊旅四十萬於昆陽之郊據道討淫不在衆寡軍誡曰萬人必死橫行天下昔軒轅氏整卒數萬制四方定海內而况以數十萬之衆據正道而臨有罪可得而千擬哉三年春始率衆南征四郡詔賜金鈇鉞一具曲蓋一前後羽葆鼓吹各一部虎賁六十人亮至南首表呂凱王伉執忠守義拜凱雲南太守伉永昌太守竝封亭侯進兵越嶲所在戰捷遂斬雍闓高定惟孟獲收闓餘衆以拒獲素為髳漢所服亮募生致之既得使觀營陳之間問曰此軍何如獲曰向不知虛實故敗今直易勝耳亮笑而縱之使更戰七戰七擒而亮猶遣獲獲止不去曰公天威也南人不復返矣遂至滇池四郡皆平即其渠帥而用之或以諫亮亮曰若留外人則當留兵兵留則無所食如夷新傷破父兄死喪留外人而無兵必生患又蠻纍有廢殺之罪自知釁重留外人終不相信今吾欲不留兵運糧而紀綱粗定蠻漢粗安不亦可乎乃悉收其豪傑孟獲等以為官屬出其金銀丹漆耕牛戰馬以給軍國之用終亮世髳不復反十二月亮還至成都治戎講武以候大舉方是時田疇辟倉廩實法度修立軍旅整理工械技巧物究其極吏不容奸人懷自厲彊不侵弱朝會不譁道不拾遺亦無醉人其餘力所及官府次舍橋梁道路無不繕理五年三月亮統諸軍將北駐漢中帝下詔曰朕聞天地之道福仁而禍淫善積者昌惡積者喪古今常數也是以湯武修德而主桀紂極暴而亡曩者漢祚中微網漏凶慝董卓造難震蕩京畿曹操階禍竊執天衡內懷無君之心子丕孤竪敢尋亂階盜據神器更姓改物世濟其凶當此之時皇極幽昧天下無主則我帝命隕越於下昭烈皇帝體明睿之德光縯文武應乾坤之運出身平難經營四方人鬼同謀百姓與能兆民欣戴建位易號丕承天序補弊興衰存復祖業誕膺皇綱不墜於地萬國未靖早世遐殂朕以幼冲繼統鴻基未習保傅之訓而嬰祖宗之重六和壅否社稷不建永惟所以念在匡救光載前緒未有攸濟朕甚懼焉是以夙興夜寐不敢自逸每從菲薄以益國用勸分務穡以阜民財授方任能以參其聽斷私降意以養將士欲奮劍長驅指討凶逆朱旗未舉而丕復殞喪斯所謂不然我薪而自焚也殘類餘醜又支天禍恣雎河洛阻兵未弭諸葛丞相弘毅忠壯忘身憂國先帝託以天下以朂朕躬今授之以旄鉞之重付之以專命之權統領步騎二十萬衆董督元戎恭行天罰除患寧亂克復舊都在此行也昔項籍總一彊衆跨州兼土所務者大然卒敗垓下死於東城宗族如焚為笑千載皆不以義陵上虐下故也今賊效尤天人所怨奉時宜速庶憑炎精祖宗威靈相助之福所向必克吳王孫權同恤灾患潛軍合謀掎角其後凉州諸國王各遣月支康居胡侯支富康植等二十餘人詣受節度大軍北出便欲率將兵馬奮戈先驅天命既集人事又至師貞勢并必無敵矣夫王者之兵有征無戰尊而且義莫敢抗也故鳴條之役兵不血刃牧野之師商人倒戈今旌麾首路其所經至亦不欲窮兵黷武有能棄邪從正簞食壺漿迎王師者國有常典封寵小大各有品限及魏之宗族枝葉中外有能規利害審順逆之數來詣降者皆原除之昔輔果絶親於智氏而䝉全宗之福此前世之明驗也若其沉迷不返將助亂人不式王命戮及妻孥罔有攸赦廣宣恩威誅其元帥弔其殘民他如詔書律令丞相其露布天下使稱朕意焉亮命張裔參軍蔣琬留統府事辟尹默來敏為軍祭酒霍戈姚伸等皆入幕府竝進文武之士亮稱之曰忠益者莫大於進人進人者各務其所尚今姚椽並存剛柔以廣文武之用可謂博雅矣願諸椽各舉此事長水校尉廖立見亮舉師對蔣琬等以為不然且誹謗先帝訾毁衆臣亮奏以為亂政廢為庶人徙汶山亮以帝富於春秋忠邪難辨深為根本至計臨發上疏云云遂行屯於沔陽亮以轉漕回遠使子喬親帥諸將子弟轉運於谷中孟達既北赴魏有李鴻者降蜀為亮言叛人王沖見達稱明公切齒於達欲收其妻子者達曰諸葛公見顧有本末必不爾亮復以書遺達令自拔達欲舉新城郡歸蜀亮至漢中達每通其情會魏司馬懿覺引兵誅達六年正月亮在漢中欲出兵攻魏與羣下謀之丞相司馬魏延曰魏夏侯楙少主壻也怯而無謀願假延精兵五千負糧五千直從褒中出循秦嶺而東當子午而北不過十日可至長安比東方相合聚尚二十許日而公從斜谷來亦足以達如此則一舉而咸陽以西可定也亮以為不如從坦道平取為正不用延計揚聲由斜谷取郿使將軍趙雲為疑兵據箕谷魏遣曹真都督關右軍郿亮身率大軍攻祁山戎陳整齊號令明肅南安天水安定三郡應亮魏朝恐懼關中響震羣臣莫知計所出魏主睿如長安命將軍張郃督馬步五萬拒亮初越嶲太守馬謖才器過人好論軍計亮深加器異及攻南方謖為亮言攻心為上卒如其計昭烈臨終謂亮曰馬謖言過其實不可大用亮以為不然以謖為參軍每引見談論自晝達夜及出軍祁山謖督諸軍在前與張郃戰於街亭違亮節度舉措煩擾舍水上山不下據城裨將王平連規諫不用遂大為郃所敗士卒離散獨平將千人自持收合諸營遺棄而還亮屯去謖數里徐行引退拔西縣千餘家歸漢中收謖下獄戮以謝衆為之流涕自臨祭待其遺孤若平生蔣琬後詣漢中問亮天下未定戮智計之士豈不惜乎亮流涕曰孫武所以能制勝於天下者用法明也四海分裂兵交方始若復廢法何用討賊邪亮又誅將軍張休李盛奪將軍黃襲等兵是時趙雲等亦敗於箕谷不至重傷貶雲位號旌賞王平加拜參軍統五部進位討寇將軍封亭侯上疏自劾曰臣以弱才叨竊非據親秉旄鉞以厲三軍不能訓章明法臨事而懼至有街亭違命之闕箕谷不戒之失咎皆在臣授任無方臣明不知人恤事多暗春秋責帥臣職是當請自貶三等以督厥咎詔以亮為右將軍行丞相事所總統如前亮之出師衆才五萬或勸亮發兵者亮曰大軍在祁山箕谷皆多於賊而不能破賊為所破者則此病不在兵少也在一人耳今欲減兵省將明罰思過校變通之道於將來若不能然者雖兵多何益自今以後諸有忠慮於國但勤攻吾之闕則事可定賊可死功可蹻足而待矣於是考微勞甄壯烈引咎責躬布所失於天下厲兵講武以為後圖戎士簡練民忘其敗矣亮之出祁山天水功曹姜維降亮以其敏於軍事心存漢室辟為室椽史典軍事平三郡有功封亭侯是歲十一月亮以孫權破曹休魏兵東下上疏云云遂出散關急攻陳倉魏遣曹真救陳倉張郃繼之會亮糧盡引去魏將王雙率騎追亮亮與戰破之斬雙七年春亮遣將軍陳式攻武都陰平二郡魏雍州剌史郭淮引兵救之亮次建威淮退遁遂拔二郡蜀人皆以賀亮亮愀然曰普天之下莫非漢民國家威力未舉使百姓困於豺狼之吻一夫有死皆亮之罪以此相賀能無愧乎詔策亮曰街亭之敗咎由馬謖而君引愆深自貶抑重違君意順聽所守前年耀師馘斬王雙今歲爰征郭淮遁走降集氐羌興復二郡威震凶暴功勳顯然方今天下騷擾元惡未裊君受大任幹國之重而久自抑損非所以光揚洪烈也今復君丞相君其勿辭夏吳孫權僭稱尊號其羣臣以竝尊二帝來告議者以為交之無益明體弗順宜顯明正義絶其盟好亮獨曰權有僭逆之心久矣國家所以略其釁情者求掎角之援也今若加顯絶讐我必深便當移兵東戍與之角力須并其土乃議中原彼賢才尚多將相輯睦未可一朝定也頓兵相持坐而須老使北賊得計非算之上者孝文卑詞胸奴先帝復與吳盟皆應權通變弘思遠益非匹夫之為分者也今議者咸以權利在鼎足不能并力且志望已滿無上岸之情推此皆似是而非也何者其勢不侔故限江自保權之不能越江猶魏賊之不能渡漢非力有餘而利不取也若大軍致討彼上當分裂其土以為後規下當略民廣境示武於內非端坐者也若就其不動而睦於我我之北伐無東顧之憂河南之衆不得盡西此之為利亦已深矣權僭之罪未宜明也乃遣衛尉陳震往賀權權約中分天下冬亮徙府營於南山下原山築漢城於沔陽築樂城於成固八年夏魏使大司馬曹真由斜谷率諸將數道竝進大將軍司馬懿泝漢水由西域與真會秋亮次成固赤坂以待之召前將軍李平將兵二萬赴漢中表平子豐為江州都督典平後事會天大雨月餘棧道斷絶魏主睿令真等引師退亮使司馬魏延西入羌中大破魏將費曜郭淮於陽溪是歲亮遷蔣琬為長史亮數出外琬在成都常足食足兵以相供給亮每云公琰託志忠雅當與吾共贊王業者九年二月亮復出祁山以木牛流馬及連弩皆亮所制也亮圍祁山招鮮卑軻比能比能至北地石城應亮魏曹真有疾魏主睿謂司馬懿曰西方事重非君莫可付者使西屯長安督張郃費曜戴陵郭淮等以禦之三月懿使曜陵留精兵四千守上邽餘衆悉出救祁山亮分兵留攻而自逆懿於上邽淮曜等邀亮亮破之因大芟其麥與懿遇於上邽東懿斂兵依險兵不敢交亮引還懿隨亮至鹵城又登山掘營不肯戰其下謂懿曰公畏蜀如虎奈天下笑何皆請戰懿病之六月使郃攻無當監何平於南圍自案中道向亮時蜀兵更下者十二魏軍始陳番兵適交參佐俱言賊衆彊盛宜權留更卒張助聲勢亮曰吾統武行師大信為本得原失信古人所惜更者束裝以待期妻子鶴望而計日雖臨征難義不廢也督遣令行於是去者願留一戰止者憤踊思致死命使魏延高翔吳班與懿戰大破之獲甲首三千級懿走保營六月亮以糧盡退師懿使張郃襲攻至木門亮與戰又敗之射死郃八月廢中都護李平徙梓橦郡方亮在祁山平掌運事值天霖雨糧運不繼平遣參軍報亮來還亮承以退平聞軍退乃更陽驚曰軍糧饒足何以便歸又表帝謂軍僞退以誘賊亮出其前後手筆書疏本末平頓首謝罪於是亮表平罪惡曰今篡賊未滅社稷多難國事惟和可以克捷不可包含以危大業遂廢徙焉平子豐時為亮幕府參軍亮與書曰吾與君父子戮力以奬漢室謂至心感動終始可保何圖中乖若都護思負一意君推心從事否可復通逝可復還也平嘗與亮書勸受錫進爵亮報之曰吾本東方下士誤用於先帝位極人臣祿賜百億討賊未效知己未答而方寵齊晉坐自貴大豈其義乎若滅魏斬睿帝還故居與諸子並升可也亮自是歲冬以連年出師息民休士益勸農講武運米集斜谷邸閣三年而後用之亮用兵出入如賓踐敵境而芻蕘者不止師止如山進退如風出征之日天下震動而人心不憂雖數萬之衆而所興造若數十萬之功所至營壘井竈圊溷藩籬障塞皆應繩墨一月之行去之如始至發教軍事文彩不豔過於丁寧而經事綜物公誠之心形於文墨夙興夜寐罰二十以上皆親省覽亮嘗自挍簿書主簿楊顒直入諫以為疲神碎務亮謝之及顒死為之泣涕三日十二年二月亮悉大衆十萬由斜谷出始以流馬運遣使約吳同時大舉四月至郿軍於渭水南據武功五丈原司馬懿渡渭背水為壘以拒亮亮每患糧運不繼使已志不伸乃分兵屯田為久駐之基耕者雜於渭濱居民之間而百姓安堵軍無私焉亮數挑戰懿不敢出亮遣遺巾幗懿患之上表請戰魏主睿使辛毗仗節為軍師以制之亮謂其下曰彼本無戰情所以固請戰者示武於其衆耳將在軍君命有所不受苟能制吾豈千里而請戰耶相持百餘日會秋亮有疾日侵密表帝曰臣若不幸後事宜以付蔣琬時帝亦遣尚書僕射李福省侍因咨以國家大計別去數日復還亮曰知君還意近言語雖彌日有所不盡更來求決耳所問者公琰其宜也福復請亮曰文禕可以繼之又問其次亮不答文禕即費禕也初琬為廣都長昭烈嘗奄至廣都琬衆事不治且復沉醉昭烈大怒將加戮亮曰琬社稷之器非百里才其為政以安民為本不事修飾願加察乃解禕為黃門侍郎亮南征還羣僚迎謁於數十里外年位多在禕右者而亮獨命禕同載衆皆易觀至是又並稱之後相繼總政事皆稱賢相云八月亮疾病授長史楊儀司馬費禕護軍姜維等退師節度有星墜於營中亮薨年五十四長史楊儀等整軍而出人往告懿懿勒兵追之姜維令儀反旗鳴鼓若將向北者懿復引退不敢逼儀得結陳去入谷而後發哀秦人為之諺曰死諸葛走生仲達懿按行亮營壘歎曰天下奇才也亮遺命葬漢中定軍山因山為墳冡足容棺斂以時服不須器物詔䇿曰惟君體資文武明睿篤誠受遺託孤匡輔朕躬繼絶興微志存靖亂爰整六師無歲不征神武赫然威震八荒將建殊功於季漢參伊周之巨勳如何不弔事臨垂克遘疾殞喪朕用傷悼肝心若裂夫崇德序功紀行命諡所以光昭將來刋載不朽今贈君丞相武鄉侯印綬諡君忠武侯初亮自表帝曰成都有桑八百株薄田十五頃子孫衣食自有餘饒至於臣在外任别無調度隨身衣食悉仰於官不别治生以長尺寸若臣死之日不使內有餘帛外有贏財以負陛下訖如其言亮為相十四年昭烈及後主即位才兩赦或言大惜赦者亮曰治世以大德不以小惠若劉景升季玉父子歲歲赦宥何補於治亮所廢李平常冀得自補復聞亮薨䇿後人不能發憤死廖立亦垂涕嘆曰吾終為左袵矣亮既沒吏民歌思不忘多請為亮立廟朝議以禮秩不聽百姓以時節私祭之於道路言事者或以為可聽立廟成都後主不從步兵校尉習隆等表曰亮德範邇遐勳蓋季世興王室之不壞實斯人是賴而蒸嘗止於私門廟貌闕而莫立使百姓巷祭戎蠻野祀非所以存德念功述追在昔者也今若盡順民心則瀆而無典建之京師又逼宗廟此聖懷所以為疑也臣愚以為宜因近其墓立之於沔陽使所親屬以時祀祭凡其臣故吏欲奉祠者皆限至廟斷其私祀以崇正禮從之時亮薨一十有八年矣亮作八務七戒六恐五懼皆有條章以訓厲臣子晉著作佐郎陳夀定著亮文集凡二十四篇開府作牧權制計算南征北出綜核訓厲貴和傳運軍令法檢兵要等皆名篇之目又作八陳圖蓋黃帝太公邱井法人莫曉也亮駕馭諸將曲盡其情昭烈嘗令黃忠為後將軍亮曰忠名望素非關馬之倫今遽令同列馬超張飛親見其功尚可喻旨羽遙聞之將不悅昭烈不聽頃之䇿馬為前將軍羽果大怒曰大丈夫終不與老兵同列費詩說之始拜命魏延楊儀皆小人之難養者且不相能然延驍勇善撫士儀有幹用亮使儀當勞劇延冒險阻皆受命捐軀不敢辭難及亮沒乃舉兵相圖以死亮長史張裔嘗稱亮曰公賞不遺遠罰不阿近爵不可以無功取刑不可以貴勢免此賢愚所以僉忘其身也陳夀評曰亮之為相國也撫百姓示儀軌約官職從權制開誠心布公道盡忠益時者雖讐必賞犯法怠慢者雖親必罰服罪輸情者雖重必釋游辭巧飾者雖輕必戮善無微而不賞惡無纎而不貶庶事精練物理其本循名責實虛僞不齒經載十二而年名不易軍旅屢興而赦不妄下袁暐稱之曰受六尺之孤攝一國之政事凡庸之君專權而不失禮行君事而國人不疑樊建稱之曰聞惡必改而不矜過賞罰之信足感神明亮子瞻嗣爵漢丞相諸葛忠武侯集卷之十二詩祠廟謁諸葛廟劉希夷孤雲何其高明月不可繫灼灼抱此心與世自涇渭釋來從所歡感亂亦歔欷咨惟今之人竊國未云恥白首入吳市秋風恐燕水區區袁與曹等是刺客耳而我於其間秉義不敢墜哀音回衡飈淸義動幽邃天心固難亮吾獨信所履溶溶日間雲漠漠點寒砌饑鼯墮蒼瓦淡薄公所憩靜然相英姿孤懷亦差慰武侯祠杜甫丞相祠堂何處尋錦官城外柏森森映階碧草自春色隔葉黃鸝空好音三顧頻繁天下計兩朝開濟老臣心出師未捷身先死長使英雄淚滿襟諸葛廟杜甫久遊巴子國屢入武侯祠竹日斜虛寢溪風滿薄帷君臣當共濟賢聖亦同時翊戴歸先主并吞更出師蟲蛇穿畫壁巫覡醉蛛絲歘憶吟梁父躬耕起未遲三山林栗詩序云侯祠舊在西山歲久摧圯永嘉王詹事帥夔日移置陳磧淳熙漕使張著庭重修武侯廟杜甫遺廟丹靑落空山草木長猶聞辭後主不復卧南陽武侯祠武少儀執簡焚香入廟門武侯神像儼如存因機定蜀延衰漢以計連吳振弱孫欲盡智能傾寇盜善持忠節輔庸昏宣王請戰貽巾幗始見才吞亦氣吞武侯祠楊汝士古柏森然地修嚴蜀相祠一過榮異代三顧盛當時功德流何遠馨香薦未衰敬名探國志飾像慰氓思昔謁從征蓋今聞擁信旗固宜光寵下有淚刻前碑武侯祠陳薦建安綱紀如線微高光基業春氷危姦豪拔劍將羣盜驅龍控虎爭雄雌武侯當日卧南陽韜稜晦角陰營為高吟梁甫比管樂胸中造化無人知東吳北魏至强大不肯逆德為其師先主歘聞元直語三往咨求當世宜勤勤陳說扶漢室慷慨感義許驅馳一說孫權敗曹操劉氏遂肇中興基申明號令鼓雷電勖勵士卒獰蛟螭分留猛將控荆渚翼戴昭烈來坤維獻皇遘害首勸進應天嗣位開羣疑本謀憑藉蜀富庶養威用作并吞資大勳未集昭烈崩遵守顧命如周伊均平賞罰重恩信比屋道路皆熙熙七擒孟獲除後患至今南詔崇靈祠東征直據五丈原欲復咸鎬綏華夷上承先帝創業意下副四海蒼生思推忠仗順氣百倍俯視敵衆真嬰兒流星落帳芒角惡暴然不起軍如癡仲達雖走禪終虜人謀不可違天時精魂埋沒已千歲奈無英傑齊高規朔方男子過廟下秋天寥落霜風悲林梢脫葉響颯颯烟頭暮雨揚寒妖狐怪兔穴壞壁饑鴉餓鵲啼枯枝樵兒敲斷段尹石苔蘚斕斑斐相碑手植徑柏尚蒼翠疑有神靈潛護持晬容昏剝堂廡陋龍祠神廟窮珍奇吾心切切慕風概灑淚踟蹰成此詩諸葛廟竇叔向永安宮外有祠堂魚水恩深祚不長角立一方初退舍擬稱三漢更圖王人同過隙無留影石在窮沙尚啓行歸蜀降吳竟何事為陵為谷任蒼蒼武侯廟柯甲巴江一線束巴山不礙登高氣象寬寺隱蟠龍松影亂碑殘科斗蘚痕漫十分㶑灧隨宜暖一酌泓澄徹骨寒欲雪孔明千古恨令人勇跨玉驄鞍武侯廟朱煥野性從來物外便瘦笻拄到臥龍巔下臨斗絶疑無地峻極盤旋別有天遠遠峯巒猶帶雪蒼蒼竹柏幾經年武侯向日三分國大士今朝一派泉休泥遺編論往事且將此水滌真田淵源瑩潔惟方寸世界收藏幾大千武侯廟王十朋臥龍起南陽不為鼎一足託名蜀丞相相漢非相蜀武侯祠王十朋八陳圖旁丞相祠風雲慘淡會當時功成豈止三分漢才大非惟十倍丕渭上忽傳司馬走蜀中長起臥龍思我來再拜瞻遺像淚滿襟如老杜詩武侯新祠王十朋山藏古寺柏靑靑地重端因蜀相登沙上不聞江轉石人間幾見谷為陵龍蛇樹影搖千尺玉雪花枝吐萬層堪歎草廬誰復顧凄然香火卻依僧臥龍山武侯祠用前韻王十朋我輩逢山眼即靑臥龍頂上喜同登圖留沙磧懷諸葛詩誦江濆憶少陵巫峽雲飛天一握瞿唐魚化浪三層籃輿又向人間去回首林泉愧老僧臥龍山謁武侯祠次前韻張震勳業場中托汗靑詩書壇上復誰登顧廬可是依玄德一釣何妨屈子陵力挽狂瀾休轉石功虧纍土不成層他年一笑三生夢應愧多情碧眼僧臥龍山謁武侯祠次前韻查籥山巔祠貌儼丹靑干載懷人為一登隱隱故營連白帝茫茫恨水向西陵石根蘭芷香無價雲頂松杉翠作層人事天機古難料詩成試語定中僧武侯祠數椽寥落白雲封古柏森森積翠濃臣主羈孤終意氣干戈經濟尚從容邊關那得傳流馬古廟猶疑隱臥龍民力西南今更竭經營何計步奇蹤謁武侯祠四首吳之皡奉命來西蜀停車拜武侯故山猶在望千古若相求魚水隆中意風雲渭北愁不知何感慨淚與水東流又出谷吟梁父飄然仙子顏一朝來白帝六出到祁山愁積靑城雪腸回岷水灣蜀民常永歎丞相不來還又古今多將相誰者是吾師意氣如公旦文章似楚辭談兵無敵手立政有奇思何處求肝膽風霜上古祠又翠柏尚陰陰西風吹好音依稀行役地寥廓古賢心戰伐事已往英雄氣尚生山川殊自好感往意何深武侯祠李仙品五丈原荒未可尋獨留遺廟倚江岑由來西土嚴堪治卻怪南人縱亦擒海內鼎分孤鵲遁隆中雲臥一龍吟鞠躬死後猶餘恨翠柏黃鸝自古今武侯祠朱熹空山臥龍處蒼峭神所鑿下有寒潭幽上有明河落我來愛佳名小築倚幽壑永念千載人丹靑豈今昨英姿儼繪事凜若九原作寒藻薦芳馨飛泉奉明酌公來識此意顧步慘不樂抱膝一長吟神交付冥漠拜武侯祠有序唐莊王孔明佐昭烈復漢室開誠心布公道可以為萬世相天下者之法矣綱常之道賴以不泯後之君子因是而正誼明道以扶世立教當百世祀之可也今城西臥龍岡為侯發迹之地建祠肖貌血食有年暇日往謁祠下訝其棟宇傾圯心欲新之既而遂形於夢寐感悟之餘乃命工重加修葺告成之日敬潔醴牲奠焉因贅一律時正德丙寅秋吉也曉來床下拜遺風新宇輝煌禮合崇光嶽有靈頻我夢山河無語肅神宮桂漿鳴鼓喧瑤席甲馬屯雲駐碧空願得淯陽私舊澤常教禾黍報年豐謁武侯祠唐藩三城康穆王古柏年深翠色屯龍岡迢遞接荆門魏吳未滅星先隕天地昭臨節尚存二表已深為國計一心誠切報君恩叢祠俯仰應增感五丈原頭日易昏武侯祠唐藩文城恭靖王炎鼎將移世運窮先生何事老隆中若教新野無徐庶誰識南陽有臥龍三顧草廬知節操兩封師表見精忠當時若遇初升日應使張韓立下風遊臥龍岡拜孔明祠藩蕩陰王臥龍岡下試重遊步入祠堂謁武侯碑上莓苔春雨足草迷田野暮雲愁鼎成炎漢三分國力挽殘陽四十秋垂世文章昭日月出師二表見忠猷臥龍祠陳珂扶持漢室傾心力成敗由天豈自由伯業一匡真不易遺才三代向誰求補天鍊石功難晦挽日麾戈志未酬終