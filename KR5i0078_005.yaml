  text: 漢丞相諸葛忠武侯集重刋道藏輯要漢丞相諸葛忠武侯集卷之十
  hash: sha256:d3d4d4863e9c56abf12167b8195d12b331a514e21541cbb7953f9bdfeb676740
  markers:
