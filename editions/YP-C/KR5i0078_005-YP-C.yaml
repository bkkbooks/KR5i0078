body:
  text: 三十六世孫羲基編輯八陣刻八陣圖舊序東萊藍章諸葛武侯推演兵法作八陣圖嚴從謂其出於風后握機文以予言之握機文乃依托爲之者非風后也實八陣圖之註耳獨孤及之圖記以爲得于黃帝書之外篇者亦非也馬隆八陣贊又握機文之註耳其見于李靖問對者亦阮逸之僞書也圖之蹟有四一在沔陽一在新都一在魚復一在南市予嘗至沔陽拜武侯之墓而訪其舊壘已不可識聞新都南市者亦殘破不可考唯魚復者迄今如故予使人圖而觀之六十四壘布于前者八陣也二十四壘環于後者卻月陣也六十有四重易之卦也二十有四作易之畫也卦定于方以知故八陣象之畫起于圓而神故卻月陣象之卦自畫起方自圓生壁門者陰陽之象也握奇者虛中之象也奇正之變皆出于此奇亦爲正之正正亦爲奇之奇彼此相用循環無窮桓温曰是常山蛇勢者亦妄言耳常山蛇謂之率然蓋高直陣也非八陣也李筌太白陰經以天地風雲爲正龍虎鳥蛇爲奇亦出臆見至謂教戰有圖而戰陣無圖者尤大謬也頃者蜀盜弄兵予奉詔致討督師駐漢中因取八陣圖而推演之自六十四壘分内外前後四隅又變而爲八陣縱橫開闔鈎聯蟠屈各有條理以之訓練而行伍始嚴整可觀矣三復考訂命武都人龍正圖之而註其左自將領以至士卒人給一本誦而習之鳴呼廢陣形而用兵者妄也執陣形而求勝者愚也平居練兵如身運臂而臂運指無不如意則禦寇而搏擊焉一陰一陽變化出沒而莫有逆吾命者矣孫武曰鬬亂而不可亂形圓而不可破非武侯之圖其孰能與于此哉藍公八陣合變圖說敘維揚徐昻諸葛八陣昉于黃帝風后而實得于心法非專推演也故其壘石于沙縱橫皆八其曰天衡地軸天前衝後衝地前衝後衝與夫曰風曰雲者陣之名也六十有四者陣之多寡相乘之數也布之各有其方列之各有其位遊兵二十四陣在六十四陣之後名曰卻月陣開閤作止間隊與八陣皆同下營之際環衞于後出入神速應敵取勝者此總圖之合歟若其内外之分爲天覆地載左右之分爲風揚雲垂前後四隅之分爲龍飛爲虎翼爲鳥翔爲蛇蟠者此八圖之變歟合不自合而包含無盡變不徒變而應敵無方堅如磐石觸之者碎熾如烈火犯之者焦此司馬懿所以甘受巾幗之辱而終不敢輕出以取敗也武侯已矣而陣圖之在白帝城魚復洲者固自若也晉馬隆以三千步卒破樹機能數萬騎以復涼洲者按此圖也厥後兵家者流但以資談說而不以教行伍雖師律提綱具載圖說而于總圖後少卻月陣圖是無遊兵也無遊兵何以取勝而禦猝然之變也哉東萊藍公以大都憲典兵漢中景慕武侯遣使魚復圖其猶在之壘石而諦觀之加以推演詢問講究之久一旦恍然似有以得其指要者復得武都士人龍正者諳練陣圖與語脗合深加賞識遂命取小石于廳事後布以合之起以變之其合其變應手而成于是以其法教諸將士驗其可與有爲也遂著之圖說比舊加詳而擺陣變陣之舉實發所未發也刋以成書自將領以至士卒人給一本誦而習之無何精熟敵愾之氣十倍尋常矣乃制爲衝陣之法遴選勇銳以衝之將士欣躍思欲一逞由是威武奮揚屢戰屢勝雖公之忠貞知勇有過人者何莫而不自八陣圖說中來邪若夫陣圖之說之用于方來則亦存乎某人也云爾八陣號令凡遇操練之日侵晨赴各地方每隊七行七層以三千人之上四隊合爲一隊二萬人之上四陣合爲一陣二十萬人之上四部合爲一部俱分兩層駐劄聞中軍號笛響馬步官旗詣中軍聽發放訖回還各隊傳令諭眾不許喧嘩及錯亂隊伍聞中軍第一聲哱囉響各隊步兵皆集騎兵解絆牽馬第二聲哱囉響步兵舉旗騎兵乘馬第三聲哱囉響點鼓間隊出緩行一鼓一蹻至十八步中軍放礮一箇磨旗三次發喊三聲戰聲喇叭響發鼓急行十八步金響止單擺開鑼響放銃弓弩槍牌皆作戰勢官軍齊唱䕶䕶䕶三聲哵咧響發喊摔𨦐響收隊駐爲第一陣再點鼓後面隊盡出緩行過第一陣前十八步放礮一箇磨旗一次發喊一聲戰聲喇叭響發鼓急行十七步金響止單擺開鑼響放銃弓弩槍牌皆作戰勢齊唱殺殺殺三聲哵咧響發喊摔𨦐響收隊駐爲第二陣三次點鼓後第一陣又間隊出緩行過第一陣前十八步放礮一箇磨旗一次發喊一聲戰聲喇叭響發鼓急行十八步金響止單擺開鑼響放銃弓弩槍牌皆作戰勢齊唱突突突三聲哵咧響發喊摔𨦐響收隊駐爲第三陣四次點鼓後第二陣亦間隊出緩行過第三陣前十八步放礮一箇磨旗一次發喊一聲戰聲喇叭響發鼓急行十八步金響止單擺開鑼響放銃弓弩槍牌如前作勢齊唱訶訶訶三聲哵咧響發喊摔𨦐響收隊駐爲第四陣中軍放起火三枝點鼓每陣皆間隊出前行十八步止各趨原分地方下營左右前後縱橫擺成行列面俱朝外金響止戰聲喇叭響單擺開如陣總圖隅落鈎連以成八陣之規哵咧響發喊率𨦐響收隊若欲衝演變陣者先整前哨金鼓旗二對響器二副金二口鑼二面鼓十二面摔𨦐二箇大銃四口中軍金鼓旗旛如舊聽本哨官八天陣内用次中軍舉玄黃二色旗爲一變天覆地載二陣放礮一箇點鼓該天陣隊往南緩行布天陣該地陣隊往北緩行布地陣各至地界磨旗一次發喊一聲戰聲喇叭響發鼓急趨下營金響止單擺開鑼響放銃弓弩槍牌皆作戰勢齊唱護護護三聲哵咧響發喊摔𨦐響收隊中軍放起火三枝二陣皆動復回總陣打得勝鼓哱囉喇叭號笛齊響各歸原地若再變陣亦如前撥旗鼓響器等件聽左哨官入陣用中軍舉五綵五暈二旗則爲第二變風揚雲垂二陣放礮一箇點鼓該風陣隊往西緩行布風陣該雲陣隊往東緩行布雲陣其進止動盪回營號頭皆准前例但唱殺殺殺三聲若再變陣右哨官入陣中軍舉青白二旗爲第三變龍飛虎翼二陣放礮一箇點鼓該龍陣隊往東南布龍陣該虎陣隊往西北布虎陣但唱突突突三聲其進止動盪號頭皆同前例若再變陣後哨官入陣中軍舉赤黑二旗爲第四變鳥翔蛇蟠二陣放礮一箇點鼓該鳥陣隊往東北布鳥陣該蛇陣隊往西南布蛇陣但唱訶訶訶三聲其號頭皆與前同八陣圖推演八陣始於隊伍而成營陣武經總要凡百人曰隊二隊曰宮二宮曰曲二曲曰部伍者五行生成之數也陣者八卦之象也八卦之象生於太極太極生兩儀兩儀生四象四象生八卦故將臺左列四陣右列四陣兩儀之象也左前十六隊左後十六隊右前十六隊右後十六隊四象之四象也南八隊北八隊東八隊西八隊東南八隊東北八隊西南八隊西北八隊八卦之象也遊兵者二十四氣之象也合圖遊兵環伏於後二層卻月其義未顯惟變圖分爲兩哨左列十二陣右列十二陣宛然天道之周旋然則十四陣者對待之陰陽也二十四陣者流行之陰陽也易有交易變易之義而八陣有分合變合之精所以五人爲伍十五爲一隊加五旗軍而五十有五終於生成之數也天一地二天三地四天五地六天七地八天九地十天數二十有五地數三十凡天地之數五十有五所以成變化而行鬼神也八隊爲一陣有四百四十人每隊以五十五人乘之八陣爲一部有三千五百二十人而爲小成可變兩也每陣四百四十人乘之其郤月遊兵不載焉卽一變而爲天覆地載二陣回營已畢又二變而爲風揚雲垂二陣回營已畢又三變而爲龍飛虎翼二陣回營已畢又四變而鳥翔蛇蟠二陣是也八部爲一將有二萬八千一百六十人而爲中成八陣齊可變也每小成三千五百二十人加遊兵一千三百二十八人以全隊出攻全隊留守南一部變天覆陣北一部變地載陣東一部變雲垂陣西一部變風揚陣東南一部變龍飛陣西北一部變虎翼陣東北一部變鳥翔陣西南一部變蛇蟠陣遊兵卻月於外有變仍分兩哨一守一攻其號令約束前後左右大小將士各司其局特八門中軍專設守警權命悉由中將以制治焉其所以謂天地風雲爲四正龍虎鳥蛇爲四奇者豈兵家策應而有常形哉如八面有警則八面正兵爲正遊兵爲奇如四面正向有警則出四面正兵夾擊豈非奇乎如四警有警則出四正兵夾擊豈非所謂正亦以爲奇乎是以活物隨形應變以勢非知道者其能然哉終於六十四卦也八將爲一軍有二十二萬五千二百八十人而爲大成故韓信曰多多益善每中成二萬八千一百六十人加遊兵一萬五百六十人共有三十萬九千七百六十人以前隊出攻前隊留守南一將變八陣東西四隅各變八陣遊兵一依中成分列隨機應變號令約束前後左右大小將士各司其局特八門中軍專設守警權命悉由大將以裁成焉其布列營陣以將臺左列四陣右列四陣分作兩層駐劄而爲小將左列四部右列四部亦分兩層而爲中將左列四將右列四將亦分兩層而爲大將其制陣以千人可布六華陣每面用六十步六華陣起於李靖外六軍一曰前鋒一曰後軍一曰左虞候一曰右虞候一曰左廂軍一曰右廂軍環而圍之象六出華中軍爲奇外六軍爲正内分三道其隔落鈎連曲折相對與八陣者同但八陣者方陣也六華陣者圓陣也以小成三千五百二十人可布八陣每面用一百二十步以中成二萬八千一百六十人每面用六百步以大成二十二萬五千二百八十人每面用一千二百步此言一面開方所用地步其小成每隊相離十八步中成每陣相離八十六步大成每部相離一百七十二步此言四方相離步則内餘數步加中軍而爲閏也小成小將居之中成中將居之大成大將居之是謂握奇之說也或本握機以天後衝四隊東北西北風雲各二隊定作一號以地後衝四隊東北西北風雲各二隊定作二號以後地軸地後衝各二隊定作三號以後地軸四隊左右後天衡各二隊定作四號以前地軸四隊左右前天衡各二隊定作五號以前地軸地前衝各二隊左右前天衡各二隊定作六號以地前衝四隊東南西南風雲各二隊定作七號以天前衡四隊東南西南風雲各二隊定作八號書於本隊旗上布陣下營不得錯亂聞中軍舉號每陣皆間隊一二五六號先出三十六步止單擺開戰畢仍收作八陣爲第一陣二次舉號三四七八號出過第一陣前三十六步止單擺開戰畢仍收作八陣爲第二陣三次舉號第一陣又間隊每陣出五六號過第二陣前三十六步止單擺開戰畢仍收作八陣爲第三陣四次舉號第二陣又間隊每陣出七八號過第三陣前三十六步止單擺開戰畢仍收作八陣爲第四陣次視中軍舉起火點鼓每陣又間隊一三五七號不動二四六八號出前行十八步止天前衝四陣居前天後衝四陣居後天衡十六隊居兩端地軸十二陣居中間地前衝六陣居前地後衝六陣居後風八陣居四維雲八陣居四角自然而成八陣之規也直衝南前一面之法如遇左右後有警行陣始亦依前例定號以次壘衝則不雜亂而整矣遊兵二十四陣分列兩哨每哨十二陣三陣定作一號共作四號分列兩層進止開闔間隊與八陣皆同惟下營之際掣環於後而伏之取勝衝擊全在乎遊兵也總衝四陣之圖八陣小成之圖八陣中成之圖八陣大成之圖八陣分撥總圖總圖如陰陽之互藏其宅八陣分變實清濁之異其施故天雲龍鳥四陣屬陽清而垣居東南地風虎蛇四陣屬陰濁而垣居西北遊兵亦各以類相從進退開闢一陰一陽不啻春秋之有分節啟閉之有顯藏然元氣未嘗不周流統貫於其中是故大將者馭眾行師之元氣也智慮少滯則兵形無所不攝運動失度外邪得以乘隙而八三軍之司命無寄寓矣可不慎歟天覆陣八陣變例天覆陣贊天陣十六外方内圓四維風揚其形象天爲陣之主爲兵之先善用三軍其形不偏内外之分爲第一變外之分變爲天覆陣有風無雲用總陣外面之隊以右天前衝二隊列前居正南以東南西南風各二隊列天衝兩維以左右前天衡各四隊列前中以左右天前後衝各二隊列兩端以左右後天衡各四隊列後中以左天後衝二隊列後以東北西北風各二隊列後兩維謂風附天而形圓也地載陣贊地陣十二其形正方雲主四角冲敵難當其體莫測動用無窮獨立不可配之於陽内之分變爲地載陣有雲無風用總陣中間之隊以左地後衝三隊列前居正北以東北西北雲各二隊列地後衝兩角以左右後地軸各三隊列左右中以左右前地軸各三隊列後地軸之左右以左右地前後衝各三隊列軸之兩端以右地前衝三隊列後以東南西南雲各二隊列地前衝兩角謂雲附地而形方是也風揚陣風揚陣贊風無正形附之於天變而爲蛇其意漸玄風能鼓物萬物撓焉蛇能爲繞三軍懼焉左右之分爲第二變右之分變爲風揚陣有風無雲用總陣右一半隊以右天前衝二隊列前居正西以西北西南風各二隊列天前衝兩維以右前地軸三隊列前中以右前後天衝各四隊列地軸左右以東北東南風各二隊列衡兩端以後地軸二隊列後中以右地前後衝各三隊列地軸兩維以右天後衝二隊列後謂風附衡而形銳是也雲垂陣雲垂陣贊雲附於地始則無形變爲翔鳥其狀乃成鳥能突擊雲能晦冥千變萬化金革之聲左之分變爲雲垂陣有雲無風用總陣左一半隊以左天後衝二隊列前居正東以左右地前後衝各三隊列天後衝兩維以左後地軸三隊列前中以左前後天衡各四隊次列後地軸之左右以左前地軸三隊列天衡之中以東南東北雲各二隊列天衡兩端以左天前衝二隊列後居正西以西南西北雲各二隊列天前衝兩維謂雲附衡而形有聚有散也龍飛陣龍飛陣贊天地後衝龍變其中有爪有足有背有胸潛則不測動則無窮陣形赫然象名爲龍前後之分爲第三變後之分變爲龍飛陣有雲無風用總陣後一半隊以東南東北雲各二隊列東南爲兩翼以左後天衡四隊列前爲首以左天後衝二隊列天衡次以左地後衝三隊列天衝次以左右後地軸各三隊列地衝中以右地後衝三隊列地軸次以右天前衝二隊列地衝次以右天衡四隊列後爲尾以西南西北雲各二隊列衡二維爲翼謂雲從龍而形象龍也虎翼陣虎翼陣贊天地前衝變爲虎翼伏虎將摶盛其威力淮陰用之變爲無極垓下之會魯公莫測前之分變爲虎翼陣有風無雲用總陣前一半隊以西北西南風各二隊列西北二維爲前足以右前天衡四隊列前爲首以右天前衝二隊列天衡之次以前左右地軸各三隊列中之左右以左右地前衝各三隊列地軸兩廂爲翼以左天前衝二隊列地軸之次以左前天衡四隊列後爲尾以東北東南風各二隊列天衡二維爲後足謂風從虎而形象虎也鳥翔陣鳥翔陣贊鷙鳥將搏必先翺翔勢凌霄漢飛禽伏藏審之而下必有中傷一夫突擊三軍莫當四隅之分爲第四變東北西南二隅變爲鳥翔陣有雲無風用總陣二隅之隊以左天後衝二隊列前居東北爲首以右天前衝二隊列後爲尾以左後地軸三隊列天衝右以右前地軸三隊列天衝左以左後天衡四隊列軸右以右前天衡四隊列軸左以左地後衝三隊列天衡右以右地前衝三隊列天衡左以東北東南雲各二隊列地衝右爲羽翼以西北西南雲各二隊列地衝左爲羽翼謂雲附衝而形象鳥翔也蛇蟠陣蛇蟠陣贊風爲蛇蟠附天成形勢能圍繞性能屈伸四奇之中與虎爲隣後變常山首尾相因西北東南二隅變爲蛇蟠陣有風無雲用總陣二隅之隊以右後地軸三隊列前居西南爲首以左前地軸三隊列後爲尾以右後天衡四隊列軸右以左前天衡四隊列軸左以右地後衝三隊列天衡右以左地前衝三隊列天衡左以右天後衝二隊列地衝右以左天前衝二隊列地衝左以西北風二隊列天衝右以西南風二隊列天衝左以東北風二隊列西北風右以東南風二隊列西南風左謂風附軸而形象蛇蟠也常山蛇陣常山蛇陣又圖右以常山陣步卒五部凡四千人居中前後左右等軍量山川土地之形按陣而居可以逸待勞以飽待饑其揚奇備伏皆馬騎分而爲八凡二千人逐便而居以應權也六鼓舉龍旗則爲常山矣古今以來臨戎對敵每作四面陣周囘受敵以爲必勝儻若選鋒而擊之其陣必破此非天殃將之失也亦或作長陣或作蛇陣皆以隊伍步騎相接或被敵破一處卽敗散不全大將避潰師之罪移過於下遂使驍勇小將無罪受誅今則畫成定制各立陣名部曲分鬬各明奇正若失一陣則斬一將形勢旣就與戰陣相應猶手臂相救以此攻守萬無一失然以中軍爲中黃陣次有若前衝後衝左突右擊白雲青蛇大赤大黑摧凶決勝先鋒破敵以二除中黃之外餘十二陣以應十二辰大黑子大赤午破敵丑左突寅青蛇卯摧凶辰前衝巳先鋒未右擊申白雲酉決勝戌後衝亥漢丞相諸葛忠武侯集巻之十一傳别傳諸葛亮字孔明瑯琊陽都人蚤孤從父玄依劉表亮從玄來荆州玄死遂家於南陽隆中幼與潁川徐庶元直及石廣元孟公威遊學三人務爲精熟亮獨觀其大畧每晨夜從容抱膝長嘯而謂三子曰卿等可至郡守剌史問其所志但笑而不言公威念鄕欲還亮曰中國饒士大夫遨遊何必故鄉耶稍長躬耕隴畝好爲梁父吟時人莫測也惟與庶及博陵崔州平友善而重龎德公每獨拜牀下德公亦稱之爲臥龍沔南名士黃承彥謂亮聞君擇婦身有醜女才堪相配亮許卽載送之諺曰莫學孔明擇婦正得阿承醜女建安十二年左將軍豫州牧劉玄德來荆州訪世事於襄陽司馬德操德操曰腐儒俗士豈識時務識時務者在俊傑此間自有伏龍鳳雛問爲誰曰諸葛孔明龎士元也及屯新野徐庶見左將軍器之庶曰諸葛孔明者臥龍也將軍豈願見之乎曰君與俱來庶曰此人可就見不可屈致將軍宜枉駕顧之遂詣亮凡三往乃見因屏人曰漢室傾頽奸臣竊命主上䝉塵孤不度德量力欲信大義於天下而智識淺短遂用猖獗至於今日然志則不已君謂計將安出亮曰自董卓以來豪傑竝起跨州連郡者不可勝數曹操比於袁紹則名微而眾寡然操遂能克紹以弱爲强非惟天時抑亦人謀也今操擁百萬之眾挾天子而令諸侯此誠不可與爭鋒孫權據有江東巳厯三世國險民附賢能爲之用此可與爲援而不可圖也荆州北據漢沔利盡南海東連吴會西通巴蜀此用武之國而其主不能守此殆天所以資將軍將軍豈有意乎益州險塞沃野千里天府之土高祖由之成帝業劉璋闇弱張魯在北民殷國富而不知存恤智能之士思得明君將軍旣帝室之冑信義著於四海總攬英雄思賢如渴若跨有荆益保其巖阻西和諸戎南撫蠻越外結好孫權内修政理天下有變則命一上將將荆州之軍以向宛洛將軍身率益州之眾出於秦川百姓孰不簞食壺漿以迎將軍者乎誠如是則王業可成漢室可興矣左將軍曰善於是與亮情好日密關羽張飛等不悅左將軍曰孤有孔明猶魚之有水也願諸君勿復言亮時年二十七劉表愛少子琮長子琦不自安問亮以計亮不對他日獨與升高樓撤梯而後問之亮曰君不見申生在内而危重耳在外而安乎琦感悟求出守江夏明年表卒琮立會曹操南侵琮遣使迎降而不以告操兵至宛左將軍始聞之亮說曰攻琮荆州可有也左將軍不忍乃引去荆人多歸之眾至十餘萬操引精騎急追及於長坂左將軍棄妻子獨與亮等數十騎走至夏口亮曰事急矣請奉命求救於孫將軍時權擁兵柴桑觀望成敗亮說權曰海内大亂將軍起兵據有江東劉豫州亦收眾漢南與曹操共爭天下今操芟夷大難畧已平矣遂破荆州威震四海英雄無所用武故豫州遁逃至此將軍量力而處之若能以吳越之眾與中國抗衡不如早與之絶若不能當何不按兵束甲北面而事之今將軍外託服從之名而内懷猶豫之計事急而不斷禍至無日矣權曰苟如君言劉豫州何不遂事之乎亮曰田橫齊之壯士耳猶守義不辱况劉豫州王室之冑英才蓋世眾士仰慕若水之歸海事之不濟此乃天也安能復爲之下乎權勃然曰吾不能舉全吳之地十萬之眾受制於人吾計決矣非劉豫州莫可以當曹操者然豫州新敗之後安能抗此難乎亮曰豫州軍雖敗於長坂今戰士還者及關羽水軍精甲萬人劉琦合江夏戰士亦不下萬人曹操之眾遠來疲弊聞追豫州一日夜行三百餘里此所謂强弩之末勢不能穿魯縞也故兵法忌之曰必蹶上將且北方之人不習水戰又荆州之民附操者逼兵勢耳非心服也將軍誠能命猛將統兵數萬與豫州協規同力破操軍必矣操軍破必北還如此則荆吳之勢强鼎足之形成成敗之機在於今日權大悅卽遣周瑜程普魯肅等水軍三萬隨亮詣左將軍併力拒操遂破操於赤壁左將軍南征收江南以亮爲軍師中郎將使督零陵桂陽長沙三郡調賦稅以充軍實羣下推左將軍爲荆州牧治公安孫權來請結好左將軍欲往見之亮以爲不可左將軍固往至則周瑜果請留之權不從左將軍旣歸嘆曰天下智謀之士所見畧同如此十六年益州牧劉璋遣法正迎左將軍亮關羽等留守荆璋命左將軍擊張魯十七年返兵擊璋十八年圍亮與張飛趙雲等泝江定白帝江州江陽十九年與左將軍會圍成都成都平左將軍領益州牧以亮爲軍師將軍署左將軍府事於是竝用羣才凡劉璋所嘗授任及其婚姻與所排擯忌恨悉別其器能處以顯任有志之士無不競勸亮佐益州政尙嚴法正謂亮曰高祖八關約法三章秦民知德宜緩刑弛禁以慰新附亮曰秦政苛急天下土崩高祖因之可以弘濟劉璋闇弱自焉以來文法覊縻互相承奉德政不舉威刑不肅蜀土人士專權自恣君臣之道漸以陵替寵之以位位極則賤順之以恩恩竭則慢所以致弊實由於此吾今威之以法法行則知恩限之以爵爵加則知榮榮恩竝濟上下有節爲治之要於斯著矣左將軍領兵向漢中亮鎭守成都足食足兵左將軍嘗急調兵亮以問蜀部從事楊洪洪曰漢中益之咽喉今日之事男子當戰女子當運發兵何疑亮乃表洪爲蜀郡太守調度皆辦亮用人惟其才能不論資厯先後洪初爲李平功曹及平遷犍爲守洪已爲蜀郡洪門下書佐何秪有才智舉郡吏數年㧞守廣漢時洪猶在蜀郡也西土皆服亮能盡時人器用類如此二十一年曹操爲魏王二十二年操建天子旌旗出警八蹕二十四年左將軍敗操兵於漢中亮帥羣下上左將軍爲漢中王表聞漢帝時孫權稱藩於操遂襲殺關羽取荆州二十五年亮勸漢中王誅劉封封本寇氏之子王至荆州以未有繼嗣育而子之後與孟達守上庸關羽呼封達自助不肯往後與達忿爭達叛降魏封破敗還成都亮以封凶猛易世之後終難制御故勸王正其罪而誅之是𡻕冬曹丕篡立改元黃初明年傳聞漢帝被弒漢中王發喪制服羣下請稱尊號王未許亮曰曹氏篡漢天下無主大王劉氏苖裔紹世而起乃其宜也王從之夏四月丙午卽皇帝位改元章武以亮爲氶相錄尙書事假節策曰朕遭家不造奉天大統兢兢業業不敢康甯思靖百姓懼未能綏於戲丞相亮其悉朕意無怠輔朕之闕助宣重光以昭明天下君其勗哉於是置百官立宗廟祫祭高皇帝以下皆亮實左右之是𡻕秋帝忿關羽之敗帥諸軍伐吳以報怨亮留守成都明年春亮聞帝兵敗還永安嘆曰使法孝直在必能諫上不東行也帝不豫二年春召亮會永安亮至永安四月病篤謂亮曰君才十倍曹丕必能安國終定大事嗣子可輔輔之如其不才君可自取亮涕泣曰臣敢不竭股肱之力效忠貞之節繼之以死又爲詔戒勑其子且曰汝與丞相從事事之如父帝崩亮得遺詔太子卽位於成都改元建興封亮武鄉侯領益州牧事無巨細皆決於亮亮發教羣下曰夫參署者集眾思慮廣忠益也若遠小嫌難相違覆曠闕損矣違覆而得中猶棄敝蹻而獲珠玉然人心苦不能盡惟徐元直處兹不惑又董幼宰參署七年事有不至至于十反來相啟吿苟能慕元直之什一幼宰之殷勤有忠於國則亮可以少過矣又曰初交州平屢聞得失後交元直勤見啟誨前參事於幼宰每言則盡後從事於偉度數有諫止雖姿性鄙暗不能悉納然與此四子終始好合亦足以明其不疑於直言也幼宰名和嘗與亮同署左將軍府事偉度亮主簿胡濟也自昭烈駐永安吳人懼有後圖復來請和會昭烈崩亮方慮恐權有異計尙書鄧芝見亮曰主上幼弱新立宜遣大使往申吳好亮曰吾思之久矣未得其人耳今始得之芝問誰亮曰卽使君也自遣芝往孫權悅通好如初亮引一時名士如蔣琬張裔等皆入丞相幕府又玅簡舊德使佐益州於是以秦宓爲别駕王梁爲功曹杜微爲主簿譙周爲勸學從事皆行義素著鄉里敬慕之杜微者節尤高自先主定蜀微常稱病聾閉戶不出及亮辟置轝而致之旣至力求去亮於座與書曰曹丕篡弑自立是猶土龍芻狗之有名也欲與羣賢因其邪僞以正道滅之丕方大興勞役以向吳楚今因不多務且閉境勸農育養民物竝治甲兵以待其挫然後伐之可使兵不戰民不勞而天下定也君但當以德輔時不責君軍事何爲汲汲求去微乃留亮更薦爲諫議大夫先是益州郡渠帥雍闓殺太守而附吳吳以闓爲永昌太守永昌功曹呂凱府丞王伉率吏士閉境拒守闓不能進使郡人孟獲誘扇諸髳牂牁太守朱褒越雋髳王高定皆應闓亮以新遭大喪亦撫而未討閉關息民勸農殖穀魏司徒華歆等扺亮諷使稱藩亮不報書作正議以示人其大畧曰昔世祖創迹舊基奮羸卒數千摧莽彊旅四十萬於昆陽之郊據道討淫不在眾寡軍誡曰萬人必死橫行天下昔軒轅氏整卒數萬制四方定海内而况以數十萬之眾據正道而臨有罪可得而千擬哉三年春始率眾南征四郡詔賜金鈇鉞一具曲葢一前後羽葆鼓吹各一部虎賁六十人亮至南首表呂凱王伉執忠守義拜凱雲南太守伉永昌太守竝封亭侯進兵越嶲所在戰捷遂斬雍闓高定惟孟獲收闓餘眾以拒獲素爲髳漢所服亮募生致之旣得使觀營陣之間問曰此軍何如獲曰向不知虛實故敗今直易勝耳亮笑而縱之使更戰七戰七擒而亮猶遣獲獲止不去曰公天威也南人不復返矣遂至滇池四郡皆平卽其渠帥而用之或以諫亮亮曰若留外人則當留兵兵留則無所食如夷新傷破父兄死喪留外人而無兵必生患又蠻累有廢殺之罪自知釁重留外人終不相信今吾欲不留兵運糧而紀綱粗定蠻漢粗安不亦可乎迺悉收其豪傑孟獲等以爲官屬出其金銀丹漆耕牛戰馬以給軍國之用終亮世髳不復反十二月亮還至成都治戎講武以候大舉方是時田疇辟倉廩實法度修立軍旅整理工械技巧物究其極吏不容奸人懷自厲彊不侵弱朝會不譁道不拾遺亦無醉人其餘力所及官府次舍橋梁道路無不繕理五年三月亮統諸軍將北駐漢中帝下詔曰朕聞天地之道福仁而禍淫善積者昌惡積者喪古今常數也是以湯武修德而主桀紂極暴而亡曩者漢祚中微網漏凶慝董卓造難震蕩京畿曹操階禍竊執天衡内懷無君之心子丕孤竪敢尋亂階盜據神器更姓改物世濟其凶當此之時皇極幽昧天下無主則我帝命隕越於下昭烈皇帝體明睿之德光縯文武應乾坤之運出身平難經營四方人鬼同謀百姓與能兆民欣戴建位易號丕承天序補弊興衰存復祖業誕膺皇綱不墜於地萬國未靖早世遐殂朕以幼冲繼統鴻基未習保傅之訓而嬰祖宗之重六和壅否社稷不建永惟所以念在匡救光載前緖未有攸濟朕甚懼焉是以夙興夜寐不敢自逸每從菲薄以益國用勸分務穡以阜民財授方任能以參其聽斷私降意以養將士欲奮劍長驅指討凶逆朱旗未舉而丕復殞喪斯所謂不然我薪而自焚也殘類餘醜又支天禍恣雎河洛阻兵未弭諸葛丞相弘毅忠壯忘身憂國先帝託以天下以朂朕躬今授之以旄鉞之重付之以專命之權統領步騎二十萬眾董督元戎恭行天罰除患甯亂克復舊都在此行也昔項籍總一彊眾跨州兼土所務者大然卒敗垓下死於東城宗族如焚爲笑千載皆不以義陵上虐下故也今賊效尤天人所怨奉時宜速庶憑炎精祖宗威靈相助之福所向必克吳王孫權同卹灾患潛軍合謀掎角其後凉州諸國王各遣月支康居胡侯支富康植等二十餘人詣受節度大軍北出便欲率將兵馬奮戈先驅天命旣集人事又至師貞勢并必無敵矣夫王者之兵有征無戰尊而且義莫敢抗也故鳴條之役兵不血刃牧野之師商人倒戈今旌麾首路其所經至亦不欲窮兵黷武有能棄邪從正簞食壺漿迎王師者國有常典封寵小大各有品限及魏之宗族枝葉中外有能規利害審順逆之數來詣降者皆原除之昔輔果絶親於智氏而䝉全宗之福此前世之明驗也若其沉迷不返將助亂人不式王命戮及妻孥罔有攸赦廣宣恩威誅其元帥弔其殘民他如詔書律令丞相其露布天下使稱朕意焉亮命張裔參軍蔣琬留統府事辟尹默來敏爲軍祭酒霍戈姚伸等皆入幕府竝進文武之士亮稱之曰忠益者莫大於進人進人者各務其所尙今姚椽並存剛柔以廣文武之用可謂博雅矣願諸椽各舉此事長水校尉廖立見亮舉師對蔣琬等以爲不然且誹謗先帝訾毁眾臣亮奏以爲亂政廢爲庶人徙汶山亮以帝富於春秋忠邪難辨深爲根本至計臨發上疏云云遂行屯於沔陽亮以轉漕囘遠使子喬親帥諸將子弟轉運於谷中孟達旣北赴魏有李鴻者降蜀爲亮言叛人王沖見達稱明公切齒於達欲收其妻子者達曰諸葛公見顧有本末必不爾亮復以書遺達令自拔達欲舉新城郡歸蜀亮至漢中達每通其情會魏司馬懿覺引兵誅達六年正月亮在漢中欲出兵攻魏與羣下謀之丞相司馬魏延曰魏夏侯楙少主壻也怯而無謀願假延精兵五千負糧五千直從褒中出循秦嶺而東當子午而北不過十日可至長安比東方相合聚尙二十許日而公從斜谷來亦足以達如此則一舉而咸陽以西可定也亮以爲不如從坦道平取爲正不用延計揚聲由斜谷取郿使將軍趙雲爲疑兵據箕谷魏遣曹眞都督關右軍郿亮身率大軍攻祁山戎陣整齊號令明肅南安天水安定三郡應亮魏朝恐懼關中響震羣臣莫知計所出魏主叡如長安命將軍張郃督馬步五萬拒亮初越嶲太守馬謖才器過人好論軍計亮深加器異及攻南方謖爲亮言攻心爲上卒如其計昭烈臨終謂亮曰馬謖言過其實不可大用亮以爲不然以謖爲參軍每引見談論自晝達夜及出軍祁山謖督諸軍在前與張郃戰於街亭違亮節度舉措煩擾舍水上山不下據城裨將王平連規諫不用遂大爲郃所敗士卒離散獨平將千人自持收合諸營遺棄而還亮屯去謖數里徐行引退拔西縣千餘家歸漢中收謖下獄戮以謝眾爲之流涕自臨祭待其遺孤若平生蔣琬後詣漢中問亮天下未定戮智計之士豈不惜乎亮流涕曰孫武所以能制勝於天下者用法明也四海分裂兵交方始若復廢法何用討賊邪亮又誅將軍張休李盛奪將軍黃襲等兵是時趙雲等亦敗於箕谷不至重傷貶雲位號旌賞王平加拜參軍統五部進位討寇將軍封亭侯上疏自劾曰臣以弱才叨竊非據親秉旄鉞以厲三軍不能訓章明法臨事而懼至有街亭違命之闕箕谷不戒之失咎皆在臣授任無方臣明不知人卹事多闇春秋責帥臣職是當請自貶三等以督厥咎詔以亮爲右將軍行丞相事所總統如前亮之出師眾纔五萬或勸亮發兵者亮曰大軍在祁山箕谷皆多於賊而不能破賊爲所破者則此病不在兵少也在一人耳今欲減兵省將明罰思過校變通之道於將來若不能然者雖兵多何益自今以後諸有忠慮於國但勤攻吾之闕則事可定賊可死功可蹻足而待矣於是考微勞甄壯烈引咎責躬布所失於天下厲兵講武以爲後圖戎士簡練民忘其敗矣亮之出祁山天水功曹姜維降亮以其敏於軍事心存漢室辟爲室椽史典軍事平三郡有功封亭侯是𡻕十一月亮以孫權破曹休魏兵東下上疏云云遂出散關急攻陳倉魏遣曹眞救陳倉張郃繼之會亮糧盡引去魏將王雙率騎追亮亮與戰破之斬雙七年春亮遣將軍陳式攻武都陰平二郡魏雍州剌史郭淮引兵救之亮次建威淮退遁遂拔二郡蜀人皆以賀亮亮愀然曰普天之下莫非漢民國家威力未舉使百姓困於豺狼之吻一夫有死皆亮之罪以此相賀能無愧乎詔策亮曰街亭之敗咎由馬謖而君引愆深自貶抑重違君意順聽所守前年耀師馘斬王雙今𡻕爰征郭淮遁走降集氐羗興復二郡威震凶暴功勳顯然方今天下騷擾元惡未裊君受大任幹國之重而久自抑損非所以光揚洪烈也今復君丞相君其勿辭夏吳孫權僭稱尊號其羣臣以竝尊二帝來吿議者以爲交之無益明體弗順宜顯明正義絶其盟好亮獨曰權有僭逆之心久矣國家所以畧其釁情者求掎角之援也今若加顯絶讐我必深便當移兵東戍與之角力須并其土乃議中原彼賢才尙多將相輯睦未可一朝定也頓兵相持坐而須老使北賊得計非算之上者孝文卑詞匈奴先帝復與吳盟皆應權通變弘思遠益非匹夫之爲分者也今議者咸以權利在鼎足不能并力且志望已滿無上岸之情推此皆似是而非也何者其勢不侔故限江自保權之不能越江猶魏賊之不能渡漢非力有餘而利不取也若大軍致討彼上當分裂其土以爲後規下當畧民廣境示武於内非端坐者也若就其不動而睦於我我之北伐無東顧之憂河南之眾不得盡西此之爲利亦已深矣權僭之罪未宜明也乃遣衞尉陳震往賀權權約中分天下冬亮徙府營於南山下原山築漢城於沔陽築樂城於成固八年夏魏使大司馬曹眞由斜谷率諸將數道竝進大將軍司馬懿泝漢水由西域與眞會秋亮次成固赤坂以待之召前將軍李平將兵二萬赴漢中表平子豐爲江州都督典平後事會天大雨月餘棧道斷絶魏主叡令眞等引師退亮使司馬魏延西入𦍑中大破魏將費曜郭淮於陽谿是𡻕亮遷蔣琬爲長史亮數出外琬在成都常足食足兵以相供給亮每云公琰託志忠雅當與吾共贊王業者九年二月亮復出祁山以木牛流馬及連弩皆亮所制也亮圍祁山招鮮卑軻比能比能至北地石城應亮魏曹眞有疾魏主叡謂司馬懿曰西方事重非君莫可付者使西屯長安督張郃費曜戴陵郭淮等以禦之三月懿使曜陵留精兵四千守上邽餘眾悉出救祁山亮分兵留攻而自逆懿於上邽淮曜等邀亮亮破之因大芟其麥與懿遇於上邽東懿斂兵依險兵不敢交亮引還懿隨亮至鹵城又登山掘營不肯戰其下謂懿曰公畏蜀如虎奈天下笑何皆請戰懿病之六月使郃攻無當監何平於南圍自案中道向亮時蜀兵更下者十二魏軍始陣番兵適交參佐俱言賊眾彊盛宜權留更卒張助聲勢亮曰吾統武行師大信爲本得原失信古人所惜更者束裝以待期妻子鶴望而計日雖臨征難義不廢也督遣令行於是去者願留一戰止者憤踊思致死命使魏延高翔吳班與懿戰大破之獲甲首三千級懿走保營六月亮以糧盡退師懿使張郃襲攻至木門亮與戰又敗之射死郃八月廢中都護李平徙梓橦郡方亮在祁山平掌運事值天霖雨糧運不繼平遣參軍報亮來還亮承以退平聞軍退乃更陽驚曰軍糧饒足何以便歸又表帝謂軍僞退以誘賊亮出其前後手筆書疏本末平頓首謝罪於是亮表平罪惡曰今篡賊未滅社稷多難國事惟和可以克捷不可包含以危大業遂廢徙焉平子豐時爲亮幕府參軍亮與書曰吾與君父子戮力以奬漢室謂至心感動終始可保何圖中乖若都護思負一意君推心從事否可復通逝可復還也平嘗與亮書勸受錫進爵亮報之曰吾本東方下士誤用於先帝位極人臣祿賜百億討賊未効知己未答而方寵齊晉坐自貴大豈其義乎若滅魏斬叡帝還故居與諸子並升可也亮自是𡻕冬以連年出師息民休士益勸農講武運米集斜谷邸閣三年而後用之亮用兵出入如賓踐敵境而蒭蕘者不止師止如山進退如風出征之日天下震動而人心不憂雖數萬之眾而所興造若數十萬之功所至營壘井竈圊溷藩籬障塞皆應繩墨一月之行去之如始至發教軍事文彩不豔過於丁甯而經事綜物公誠之心形於文墨夙興夜寐罰二十以上皆親省覽亮嘗自挍簿書主簿楊顒直入諫以爲疲神碎務亮謝之及顒死爲之泣涕三日十二年二月亮悉大眾十萬由斜谷出始以流馬運遣使約吳同時大舉四月至郿軍於渭水南據武功五丈原司馬懿渡渭背水爲壘以拒亮亮每患糧運不繼使已志不伸乃分兵屯田爲久駐之基耕者雜於渭濱居民之間而百姓安堵軍無私焉亮數挑戰懿不敢出亮遣遺巾幗懿患之上表請戰魏主叡使辛毗仗節爲軍師以制之亮謂其下曰彼本無戰情所以固請戰者示武於其眾耳將在軍君命有所不受苟能制吾豈千里而請戰耶相持百餘日會秋亮有疾日侵密表帝曰臣若不幸後事宜以付蔣琬時帝亦遣尙書僕射李福省侍因諮以國家大計別去數日復還亮曰知君還意近言語雖彌日有所不盡更來求決耳所問者公琰其宜也福復請亮曰文禕可以繼之又問其次亮不答文禕卽費禕也初琬爲廣都長昭烈嘗奄至廣都琬眾事不治且復沉醉昭烈大怒將加戮亮曰琬社稷之器非百里才其爲政以安民爲本不事修飾願加察乃解禕爲黃門侍郞亮南征還羣僚迎謁於數十里外年位多在禕右者而亮獨命禕同載眾皆易觀至是又並稱之後相繼總政事皆稱賢相云八月亮疾病授長史楊儀司馬費禕護軍姜維等退師節度有星墜於營中亮薨年五十四長史楊儀等整軍而出人往吿懿懿勒兵追之姜維令儀反旗鳴鼓若將向北者懿復引退不敢逼儀得結陣去入谷而後發哀秦人爲之諺曰死諸葛走生仲達懿按行亮營壘歎曰天下奇才也亮遺命葬漢中定軍山因山爲墳冡足容棺歛以時服不須器物詔䇿曰惟君體資文武明睿篤誠受遺託孤匡輔朕躬繼絕興微志存靖亂爰整六師無𡻕不征神武赫然威震八荒將建殊功於季漢參伊周之巨勳如何不弔事臨垂克遘疾殞喪朕用傷悼肝心若裂夫崇德序功紀行命諡所以光昭將來刋載不朽今贈君丞相武鄕侯印綬諡君忠武侯初亮自表帝曰成都有桑八百株薄田十五頃子孫衣食自有餘饒至於臣在外任别無調度隨身衣食悉仰於官不别治生以長尺寸若臣死之日不使内有餘帛外有贏財以負陛下訖如其言亮爲相十四年昭烈及後主卽位纔兩赦或言大惜赦者亮曰治世以大德不以小惠若劉景升季玉父子𡻕𡻕赦宥何補於治亮所廢李平常冀得自補復聞亮薨䇿後人不能發憤死廖立亦垂涕嘆曰吾終爲左袵矣亮旣没吏民歌思不忘多請爲亮立廟朝議以禮秩不聽百姓以時節私祭之於道路言事者或以爲可聽立廟成都後主不從步兵校尉習隆等表曰亮德範邇遐勳葢季世興王室之不壞實斯人是賴而蒸甞止於私門廟貌闕而莫立使百姓巷祭戎蠻野祀非所以存德念功述追在昔者也今若盡順民心則凟而無典建之京師又偪宗廟此聖懷所以爲疑也臣愚以爲宜因近其墓立之於沔陽使所親屬以時祀祭凡其臣故吏欲奉祠者皆限至廟斷其私祀以崇正禮從之時亮薨一十有八年矣亮作八務七戒六恐五懼皆有條章以訓厲臣子晉著作佐郎陳夀定著亮文集凡二十四篇開府作牧權制計算南征北出綜覈訓厲貴和傳運軍令法檢兵要等皆名篇之目又作八陣圖葢黃帝太公邱井法人莫曉也亮駕馭諸將曲盡其情昭烈甞令黃忠爲後將軍亮曰忠名望素非關馬之倫今遽令同列馬超張飛親見其功尙可喻旨羽遥聞之將不悅昭烈不聽頃之䇿馬爲前將軍羽果大怒曰大丈夫終不與老兵同列費詩說之始拜命魏延楊儀皆小人之難養者且不相能然延驍勇善撫士儀有幹用亮使儀當勞劇延冒險阻皆受命捐軀不敢辭難及亮没乃舉兵相圖以死亮長史張裔甞稱亮曰公賞不遺遠罰不阿近爵不可以無功取刑不可以貴勢免此賢愚所以僉忘其身也陳夀評曰亮之爲相國也撫百姓示儀軌約官職從權制開誠心布公道盡忠益時者雖讐必賞犯法怠慢者雖親必罰服罪輸情者雖重必釋游辭巧飾者雖輕必戮善無微而不賞惡無纎而不貶庶事精練物理其本循名責實虛僞不齒經載十二而年名不易軍旅屢興而赦不妄下袁暐稱之曰受六尺之孤攝一國之政事凡庸之君專權而不失禮行君事而國人不疑樊建稱之曰聞惡必改而不矜過賞罰之信足感神明亮子瞻嗣爵漢丞相諸葛忠武侯集巻之十二詩祠廟謁諸葛廟劉希夷孤雲何其高明月不可繫灼灼抱此心與世自涇渭釋來從所歡感亂亦歔欷咨惟今之人竊國未云恥白首入吳市秋風恐燕水區區袁與曹等是刺客耳而我於其間秉義不敢墜哀音回衡飈清義動幽邃天心固難亮吾獨信所履溶溶日間雲漠漠點寒砌饑鼯墮蒼瓦澹薄公所憇靜然相英姿孤懷亦差慰武侯祠杜甫丞相祠堂何處尋錦官城外栢森森映堦碧草自春色隔葉黃鸝空好音三顧頻繁天下計兩朝開濟老臣心出師未捷身先死長使英雄淚滿襟諸葛廟杜甫久遊巴子國屢入武侯祠竹日斜虛寢溪風滿薄帷君臣當共濟賢聖亦同時翊戴歸先主并吞更出師蟲蛇穿畫壁巫覡醉蛛絲歘憶吟梁父躬耕起未遲三山林栗詩序云侯祠舊在西山𡻕久摧圯永嘉王詹事帥夔日移置陣磧淳熙漕使張著庭重修武侯廟杜甫遺廟丹青落空山草木長猶聞辭後主不復卧南陽武侯祠武少儀執簡焚香入廟門武侯神像儼如存因機定蜀延衰漢以計連吳振弱孫欲盡智能傾㓂盜善持忠節輔庸昏宣王請戰貽巾幗始見才吞亦氣吞武侯祠楊汝士古栢森然地修嚴蜀相祠一過榮異代三顧盛當時功德流何遠馨香薦未衰敬名探國志飾像慰甿思昔謁從征葢今聞擁信旗固宜光寵下有淚刻前碑武侯祠陳薦建安綱紀如綫微高光基業春氷危姦豪拔劍將羣盜驅龍控虎爭雄雌武侯當日卧南陽韜稜晦角陰營爲高吟梁甫比管樂胸中造化無人知東吳北魏至强大不肯逆德爲其師先主歘聞元直語三往咨求當世宜勤勤陳說扶漢室忼慨感義許驅馳一說孫權敗曹操劉氏遂肇中興基申明號令鼓雷電勖勵士卒獰蛟螭分留猛將控荆渚翼戴昭烈來坤維獻皇遘害首勸進應天嗣位開羣疑本謀憑藉蜀富庶養威用作并吞資大勳未集昭烈崩遵守顧命如周伊均平賞罰重恩信比屋道路皆熙熙七擒孟獲除後患至今南詔崇靈祠東征直據五丈原欲復咸鎬綏華夷上承先帝創業意下副四海蒼生思推忠仗順氣百倍俯視敵眾眞嬰兒流星落帳芒角惡暴然不起軍如癡仲達雖走禪終虜人謀不可違天時精魂埋没已千𡻕奈無英傑齊高規朔方男子過廟下秋天寥落霜風悲林梢脫葉響颯颯烟頭暮雨颺寒妖狐恠兎穴壞壁饑鵶餓鵲啼枯枝樵兒敲斷段尹石苔蘚斕斑斐相碑手植勁柏尙蒼翠疑有神靈潛護持晬容昏剝堂廡陋龍祠神廟窮珍奇吾心切切慕風槪灑淚踟蹰成此詩諸葛廟竇叔向永安宮外有祠堂魚水恩深祚不長角立一方初退舍擬稱三漢更圖王人同過隙無留影石在窮沙尙啟行歸蜀降吳竟何事爲陵爲谷任蒼蒼武侯廟柯甲巴江一綫束巴山不礙登高氣象寛寺隱蟠龍松影亂碑殘科斗蘚痕漫十分㶑灧隨宜暖一酌泓澄徹骨寒欲雪孔明千古恨令人勇跨玉驄鞍武侯廟朱煥野性從來物外便瘦笻拄到臥龍巓下臨斗絕疑無地峻極盤旋別有天遠遠峯巒猶帶雪蒼蒼竹柏幾經年武侯向日三分國大士今朝一派泉休泥遺編論往事且將此水滌眞田淵源瑩潔惟方寸世界收藏幾大千武侯廟王十朋臥龍起南陽不爲鼎一足託名蜀丞相相漢非相蜀武侯祠王十朋八陣圖旁丞相祠風雲慘淡會當時功成豈止三分漢才大非惟十倍丕渭上忽傳司馬走蜀中長起臥龍思我來再拜瞻遺像淚滿襟如老杜詩武侯新祠王十朋山藏古寺柏青青地重端因蜀相登沙上不聞江轉石人間幾見谷爲陵龍蛇樹影搖千尺玉雪花枝吐萬層堪歎草廬誰復顧凄然香火卻依僧臥龍山武侯祠用前韻王十朋我輩逢山眼卽青臥龍頂上喜同登圖留沙磧懷諸葛詩誦江濆憶少陵巫峽雲飛天一握瞿唐魚化浪三層籃輿又向人間去囘首林泉媿老僧臥龍山謁武侯祠次前韻張震勳業場中托汗青詩書壇上復誰登顧廬可是依玄德一釣何妨屈子陵力挽狂瀾休轉石功虧累土不成層他年一咲三生夢應愧多情碧眼僧臥龍山謁武侯祠次前韻查籥山巓祠貌儼丹青干載懷人爲一登隱隱故營連白帝茫茫恨水向西陵石根蘭芷香無價雲頂松杉翠作層人事天機古難料詩成試語定中僧武侯祠數椽寥落白雲封古柏森森積翠濃臣主覊孤終意氣干戈經濟尙從容邊關那得傳流馬古廟猶疑隱臥龍民力西南今更竭經營何計步奇蹤謁武侯祠四首吳之皡奉命來西蜀停車拜武侯故山猶在望千古若相求魚水隆中意風雲渭北愁不知何感慨淚與水東流又出谷吟梁父飄然仙子顏一朝來白帝六出到祁山愁積青城雪腸迴岷水灣蜀民常永歎丞相不來還又古今多將相誰者是吾師意氣如公旦文章似楚辭談兵無敵手立政有奇思何處求肝胆風霜上古祠又翠柏尙陰陰西風吹好音依稀行役地寥廓古賢心戰伐事已往英雄氣尙生山川殊自好感往意何深武侯祠李仙品五丈原荒未可尋獨留遺廟倚江岑由來西土嚴堪治卻恠南人縱亦擒海内鼎分孤鵲遁隆中雲臥一龍唫鞠躬死後猶餘恨翠柏黃鸝自古今武侯祠朱熹空山臥龍處蒼峭神所鑿下有寒潭幽上有明河落我來愛佳名小築倚幽壑永念千載人丹青豈今昨英姿儼繪事凜若九原作寒藻薦芳馨飛泉奉明酌公來識此意顧步慘不樂抱膝一長吟神交付冥漠拜武侯祠有序唐莊王孔明佐昭烈復漢室開誠心布公道可以爲萬世相天下者之法矣綱常之道賴以不冺後之君子因是而正誼明道以扶世立教當百世祀之可也今城西臥龍岡爲侯發迹之地建祠肖貌血食有年暇日往謁祠下訝其棟宇傾圯心欲新之旣而遂形於夢寐感悟之餘乃命工重加修葺告成之日敬潔醴牲奠焉因贅一律時正德丙寅秋吉也曉來床下拜遺風新宇輝煌禮合崇光嶽有靈頻我夢山河無語肅神宮桂漿鳴鼓喧瑤席甲馬屯雲駐碧空願得淯陽私舊澤常教禾黍報年豐謁武侯祠唐藩三城康穆王古柏年深翠色屯龍岡迢遞接荆門魏吳未滅星先隕天地昭臨節尙存二表已深爲國計一心誠切報君恩叢祠俯仰應增感五丈原頭日易昏武侯祠唐藩文城恭靖王炎鼎將移世運窮先生何事老隆中若教新野無徐庶誰識南陽有臥龍三顧草廬知節操兩封師表見精忠當時若遇初昇日應使張韓立下風遊臥龍岡拜孔明祠藩蕩陰王臥龍岡下試重遊步入祠堂謁武侯碑上莓苔春雨足草迷田野暮雲愁鼎成炎漢三分國力挽殘陽四十秋垂世文章昭日月出師二表見忠猷臥龍祠陳珂扶持漢室傾心力成敗由天豈自由伯業一匡眞不易遺才三代向誰求補天鍊石功難晦挽日麾戈志未酬終古英靈含永恨臨風有淚欲零眸武侯祠曹璉一帶長江遶故墟孔明曾此結茅廬韜光久負商伊志枉顧頻勞漢冑車八陣圖成終不朽三分國定欲何如觀風偶過躬耕隴慨想長吟恨有餘臥龍祠顧福臥龍岡下野雲屯長慨當年舊棘門國據三分惟死誓名高二表若生存曹瞞父子眞無道漢室君臣自有恩血食南陽千古祀廟堂香火慘黃昏臥龍祠祁鳳淯陽門外草蕭蕭丞相祠堂路不遙耕隱岡形迷故址斷碑文字記前朝風雲尙想當年會祭享猶勤此郡僚禮樂未興征伐寢英雄千載恨難消臥龍祠習韶襄陽塘下江水流臥龍不起江雲愁高歌梁父橫六合白頭不見天涯秋夕陽茅屋都如水怪見將軍吐虹氣片言許國失英雄魚水波濤坐中起炎精煜煜蜀天高瀟洒萬里吹鴻毛圖陳八陣垂宇宙勛名誰復論蕭曹鼎湖龍去青山杳星墜轅門蜀山曉畫圖空寫漢官儀千載人間出師表題諸葛祠胡希顏拂拂旌麾日正長驅車特拜臥龍岡敝廬陳迹生荒蘚越世高風吹野棠忠節已昭蜀社稷才名猶紀漢文章也知千百年來後尙有餘光射草堂臥龍岡謁武侯祠李翰海嶽同雲起臥龍出師二表見孤忠長星忽爲營前殞大業終墮再造功八陣有圖留漢沔六韜無地斬奸雄草廬遺址多年後贏得知音作閟宮諸葛武侯廟章孝標木牛零落地圖殘山姥燒錢古柏寒七縱七擒何處在茅花櫪葉葢神壇諸葛祠次韻張維荆州初定更西屯長憶當年入劒門赫赫威聲曾顯著堂堂遺像儼生存三分猶自摧强敵兩表還將報國恩漢業未興人去久一天風日自朝昏拜諸葛武侯祠彭澤丞相祠堂盛楚西千年香火重雕題古湫雲暗神蛟宅老木風生鉄馬嘶威到七擒無僰緬圖開八陣走鯨鯢臥龍岡上高囘首陡覺江東鄴下低拜諸葛武侯祠唐皋誰復扶將漢業西曹瞞墓石不堪題草廬永固龍方臥銅雀纔荒馬尙嘶巾幗有人空畏虎郊原無地解封鯢獨憐憤絶荀文若祠下經過首合低拜諸葛武侯祠王鴻儒蒼烟喬木蔭西東中有丹青一畝宮師出當年威可想名傳絶徼古誰同葛羅唐室誇文事爨翫隋朝競武功風俗變華知有事遺容終古配猶龍拜諸葛武侯祠毛澄討賊心如逝水東還將黜罰慮深宮漢家天下誰當有王佐規模自不同魏號縱尊非大義益州雖小是全功要知成敗難先睹莫把三分笑伏龍拜諸葛武侯祠秦金天下奇才出統軍陣圖龍虎際風雲七囘擒縱眞能事一語輸降豈浪云恥共魏吳成鼎峙忍聞南北竟瓜分轅門昨夜瞻星隕囘首西山日已曛拜諸葛武侯祠李充嗣炎燼重噓氣槩雄池中雲雨化蛇龍一行上表千行涕三代遺才異代逢營壘江頭還似舊君臣地下定相從錦官城外森森柏猶肅風霜滅魏容拜諸葛武侯祠汪玄錫金湯遙逼灞陵東禾黍離離滿故宮銅雀臺中春正好杜鵑聲裏恨誰同圖開八陣無遺算業正三分未竟功地下主臣如覿面雄飛還共鼎湖龍登五丈原謁武侯廟何景明風日高原暮松杉古廟陰三分扶漢業萬里出師心星落營空在雲橫陣已沉千秋一瞻眺梁爲父誰吟題武侯祠尙王絅龍臥南陽數代英將軍何處早聞名功成詎止三分策師出誰知二表情筆底天威操復縱帳前生氣死猶驚燕書故在閒相儗梁父吟成意未平謁諸葛武侯祠蕭鳴鳳氣聚崇岡紫翠深百年懷抱此登臨山連嵩岳來天地名與人龍並古今瞿峽風雲時變現中原牛馬幾銷沉誰將清世調元手會取三分創業心過南陽謁忠武侯祠賈詠大名宇宙垂芳久忠武丹青照冊香輔漢半殂天可弔呑吳遺恨失堪傷百年禮樂應誰待三代人才信足當兩地古祠多古柏臥龍元自起南陽過拜武侯祠牛鳳熟讀雄文識指歸忠臣肝膽照晴暉益州名義一朝正吳魏兵戈萬載非天下奇才能見幾雲中高鳥只孤飛論功擬德伊周侶成敗無勞作剌譏謁武侯祠簡霄草廬己定乾坤計高臥甯爲逸豫謀十倍才猷眞陋魏三分事業足安劉龍岡終古勳名在魚水當年意氣投大運終移難獨復雲霄杳杳望伊周謁諸葛祠重有所感劉漳清風千載謁茅廬綠樹深深聽野烏渭水有田當易魏瞿塘列陣欲吞吳英雄兩漢誰高下籌策三分定有無天意不然人可奈至今遺恨噎眞儒謁先主廟廟舊在永安宮南今移白帝城内杜甫慘澹風雲會乘時各有人力侔分社稷志屈偃經綸復漢留長策中原仗老臣雜耕心未已嘔血事酸辛霸氣西南歇雄圖厯數屯錦江原過楚劍閣復通秦舊俗存祠廟空山泣鬼神虛簷交鳥道枯木半龍鱗竹送清溪月苔移玉座春閭𨶒兒女換歌舞𡻕時新絶域歸舟遠荒城繫馬頻如何對搖落况乃久風塵孰與關張竝功臨耿鄧親應天才不小得士契無鄰遲暮堪帷幄飄零且釣緡向來憂國淚寂寞灑衣巾先主廟岑參先主與武侯相逢雲雷際感通君臣分義激魚水契遺廟空蕭然英靈貫千𡻕先主廟張儼雄名垂竹帛荒陵壓阡陌終古更何聞悲風入松栢先主廟劉夢得天下英雄氣千秋尙凜然勢分三足鼎業復五銖錢得相能開國生兒不象賢凄凉蜀故妓來舞魏宮前三忠祠李夢陽憶昔漢諸葛龍起答三顧志決竟星隕嘔血爲軍務鄂國與信國屹屹兩玉柱殺身不殺國𡨚憤水東注往事勒鍾鼎新廟傍官路慘慘冠劍竝凜凜生魂聚翠旗晚明滅往往鬼神駐懷嘆各不申翻然向烟霧我征久奔迫過此敢相屢時來展肅謁繫馬門前樹香臺野蘝上羅幔虫蟻蛀烈士爲吞聲清風激頑懦題張翼德祠張士懷天下英雄只豫州阿瞞不共戴天讐山河割據三分國宇宙威名丈八矛江上祠堂嚴劍佩人間刁斗見銀鈎空餘諸葛秦川表左袒何人復爲劉圖像題諸葛武侯卧龍岡三顧圖解縉百二山河龍彩滅漢家蒿萊滿宫闕中山帝子絶世賢散盡旌旗計成拙倉皇落日南陽低抱膝窮簷聞馬嘶陰陰桑樹轉疎影何意忽感王孫知曹瞞欺孤如蜮鬼豈料君臣得魚水三回鞭轡入柴扉主賔顏色皆英偉開心見誠兩不疑指掌經綸見尙遲華容空令一兔走滎水徒慙六出奇堂堂雲長悲莫救區區陸子能深計相國空懷十倍才孫曹弱子皆爲帝王雙血寒鐵兠鍪張郃魂啣金僕姑皇天竟失中流柱江水空流八陣圖雲龍風虎護儲胥白日高懸照肝膽徒令忠憤貫乾坤每讀令人動悽慘南陽三顧圖黎充輝烏散巢成漢樹空孫郎奇氣捲江東英雄鼎足三分勢祗在茅廬一語中題卧龍圖李賢漢家神器風波舟奸雄環顧涎欲流斯時誰有匡扶具南陽嘉遯阿衡儔帝室之冑何英偉草廬三顧驚神鬼幡然感激釋耕耘一旦君臣若魚水鼎分畢竟不能休務償初志復神州永安遺恨抱終古出師二表俱嘉猷巴水祠堂宛如故劍閣荒蕪流馬路七擒南儌讋天威八陣夔城訝神護營中星隕渭濱秋五丈原頭殺氣收歸櫬猶能走仲達運移漢祚終難留英雄千載空惆悵商周人物能多讓世間成敗不足憑卧龍遺址人爭訪南陽卧龍圖羅倫三分天下羽書馳龍卧南陽未起時海内風塵皆羿莽眼中魚水是湯伊未除漢賊身先死便絕江流恨不移曉霧一綃巾幗在青山千古笑曹丕題諸葛武侯畫像王柏隆中高卧匪無情鼎峙規模豈素心自是將軍三顧晚坐看世變轉移深題武侯像陳湻國勢三分陣磧空郤將輕素寫遺容漢中晏駕英雄老世上何人識卧龍武侯祠像郝子玉籌筆造仇事可哀長星飛墜蜀山摧三分豈是平生志十倍甯論蓋世才壞壁丹青仍白羽斷碑文字只蒼苔夜深老木風聲惡尙想褒斜萬馬來武侯像鄭元祐魚水君臣百世師風雲蛇鳥識旌旗三分天下何經意恨未中原復本支題武侯畫像顧祿南陽隴上躬耕翁磊落自是人中龍抱膝長歌古梁父眼空四海誰英雄涿郡劉郞漢宗室三謁殷勤訪籌策君臣契合片言間魚水相歡託交宻鄴中未易窺曹公援兵先結孫江東赤壁磯頭大風轉舟師百萬烟塵空天意由來助仁德神謀亦豈非功力蛟龍未必在池中全蜀江山笑談得尋常事業奚足言出師誓欲清中原高光故物不忍棄赤龍再使飛青天兩表忠言何厯厯一點精誠貫天日三代名臣訓誥文又復從公手中出七番擒縱鬼神驚八陣風雲變化生橫行萬里誰能敵俯視群雄自可平孰意皇天竟冥漠五丈原頭將星落素服空聞後主迎黃泉不見英魂作至今遺像傳人間凝然不動如邱山小儒再拜瞻圖畫一曲長歌涕淚澘八陣八陣圖桓温訪古識其眞尋源愛往跡恐君遺事節聊下南山石八陣圖杜甫功葢三分國名成八陣圖江流石不轉遺恨失吞吳東坡志林僕嘗梦見人云是杜子羙謂僕曰世人多誤會予八陣圖詩以爲先主武侯欲與關羽復仇故恨不能滅吳非也我意本謂吳蜀唇齒之國不當相圖晉之所以能取蜀者以蜀有吞吳之意此爲恨耳此理甚長子美死四百年而猶不忘詩區區自别其意眞書生習氣耶八陣劉禹錫軒皇傳上畧蜀相運神機水落龍蛇出沙平鵝鸛飛波濤無動勢鱗甲避餘威會有知兵者臨流指是非八陣磧蘇軾平沙何茫茫髣髴見石蕝縱橫滿江上𡻕𡻕沙水齧孔明死已久誰復辨行列神兵非學到自古不留訣至人已心悟後世徒妄說自從漢道衰蜂起盡奸傑英雄不相下禍難久連結驅民市無烟戰野江流血萬人賭一擲殺盡如沃雪不爲久遠計草草常無法孔明最後起意欲掃羣孽崎嶇事節制隱忍久不決志大遂成迂𡻕月去如瞥六師紛未整一旦英氣歇唯餘八陣圖千古壯夔峽八陣磧蘇轍漲江吹八陣江落陣如故我來苦寒後平沙如匹素乘高望遺迹磊磊六四數遙指如布棊就視不知處世稱諸葛公用眾有法度區區落褒斜軍旅無濶步中原竟不到置陣狹無所茫茫平沙中積石排隊伍獨使後世人知我非莾鹵奈何長蛇形千古竟不悟惟餘桓元子久視不能去八陣李興宗江從岷來觸瞿唐夏潦潰裂怒勢張霜溝水落洲渚露纍纍江石堆作行半斜半直半疏宻方營周匝門東出相傳呵護有鬼神驚波不能移寸尺想見當年諸葛公綸巾羽扇揮愁風令嚴部伍寂如水出没變化機無窮乾坤不足當經理寫留古法艮岑趾上灘下峽一千年多少英雄測玄旨小兒元子强多知常山蛇勢吾能窺灞上枋頭眞絶倒空使虬髯論崛奇斵輪不可傳其子此公天機緘骨髓奈何螟蝗生蝮蝎炎劉已灰吹不起天教三馬食一槽老馬蹄囓暫咆哮渭陽巾幗勢將蹶大星夜隕西軍號嗚呼興衰盡天意中原板蕩今六紀典午骨肉正相殘欲拯塗炭嗟誰使大官酣燕芻豢餘小官跼蹐塵埃裏舉目厭厭九泉人誰訪草廬談世事向來韜畧機莫投而今投機大良籌君不見峽山深深茅舍底有人抱膝高聲謳陪安撫大卿登八陣臺覽觀諸葛公遺像偶成長句張縯白帝城西魚復浦十月江平見津滸當年壘石紛成行此地卧龍經講武轅門外建嚴中權列陣相承存後伍何人蛇勢識常山未數魚麗矜鄭拒懸知精神貫金石尙想號令嚴鉦鼓老兵料敵應疑生川后澄波其敢侮向令赤伏有餘符下睨皇州直指取云何遺跡司神明獨靳豐功被寰宇高城置酒共臨眺往事興懷增歎撫巍然王佐三代前信矣名言炤千古舊經云八陣圖銘石刻在磧中今不復見張季長詩刻銘久伏水底碑教戰時存山下鼓自註云有圖銘巨石今伏水底又云山下有石鼓相傳爲武侯教戰之音也彌牟鎭八陣圖詩王剛中我稽八陣圖規模載方冊朅來鎭西蜀䕫門觀壘石賦詩百數字字字究來厯進涉漢川西彌牟鎭之北平原列堆阜灘石同一式細思作者意孔明有深策高岸或爲谷灘石存遺跡江海變桑田平原猶可覓故今兩處存千載必一得再歌遂成篇應有智者識灘石八陣圖行王剛中我生孔明後相望九百載我想孔明賢巍然伊呂配奇謀勇畧號雄師大節英風葢當代木牛流馬何足言八陣遺蹤千古在我行已度瞿唐門長灘石壘差參分洪纖高下尺寸等猶有當年節制存四頭八尾觸處首敵衝中央兩皆救握奇如樞運無窮七縱七擒仍敢攻規模黃帝已垂文後來得者惟將軍唐宗李靖拾遺意樂舞旛表徒繽紛長江之上石蟠結江波洶湧石不滅使君何事遽剗除中夜風雷吼天闕明朝依舊石縱橫神物䕶持人始驚向來守蜀用此法誰知石壘眞金城嗟乎孔明遇不遇遇則劉公恢大度國險地狹民力㣲法出萬全勢未具嗟乎孔明以此用於吳長江内固魏可圖嗟乎孔明以此用於魏掃平三分歸一篲祗應所遇勢不同勢旣不同功亦異嗟乎孔明之心如石堅欲扶大厦持危顚事之不就則天耳安肯俯首從曹袁嗟乎孔明如生石不老後世用兵無草草忽然變作六花看便失本原難按考請觀壘石韜機籌江流東去自悠悠英豪得此石外指長與君王靖邊壘臣埜李訦謁丞相祠登開濟堂俯八陣圖覩新帥張卿與侍郎林公舊題倡和皆慨想當時英烈嘆誦久之惟瀼東流囓城入江且爲民病願以不能轉者一轉兹水輒借韻賦之人言忠孝不磨滅神物護持存水滸千年陵谷幾變遷此石不移自章武本由黃帝古兵法六十四以八爲伍髯孫且懼生達走賊操遊魂何敢拒刻銘沙伏水底碑教戰石存山下鼓一片丹心天地間萬世聞風猶禦侮我來起敬凛如生再拜一言公必取瀼流東截陣圖前寖墮城壁頽民宇能安拳石止波流願回瀼患思民撫常使夔人知感公踏磧年年弔千古八陣圖陳謙武侯陣法洞萬古所至壘石傳岷嶓意令他時人共識不輕蜀血丹秦戈沔陽舊壘已荒草道元往記空摩娑廣都鄉名至今在鄉老相戒不敢磨八八成行被隆上兩陣二首形無頗乾坤門戶取法象未顯奇正相交加惟有江流魚復浦因水成勢雄平沙前方壁門儼營制後如偃月不可傞七八爲經分㦸立九六爲緯摽鱗差妙哉隆中先天學陣規八卦森包羅六十四陣極卦變縱橫百出無贅牙更參禮經得深旨畫前邱井分八家及其變動不可常玄前八佾舞象犧四頭八尾法制定四正四奇合變多紛紛紜紜未易亂渾渾沌沌誰能遮晉家將軍最倔强到此驚見常山蛇旣識端中相應法何爲征伐復成訛乃知天玄與地秘奇才不出空咨嗟緬懷牧郊釣璜客止齊步伐聲無譁陰經軍志八爲用指麾昧爽趨朝歌春秋蒐乘慚蕪率猶有魚麗參鸛鵝欃槍何事風霾急紛披誰恤孤鮐髽長平埋肉滿山谷昆陽積骸如亂麻自注孫經雜水陣華容道上霄焚葭苟無法制驅市人參肉偃首胡足呀鷗鳬宇令此荒廢直到分鼎成山河雜畊未盡星斗泣節制惜不開中華觸之可勝不可敗侮亡取亂明羲娥英雄相待得英衞翻爲圓陣鋪六花功成演作破陣樂八舞校隊猶餘葩貞觀以來遽絶筆潼關散卒奔濤斜古人紙上己糟粕況乃沙石喧江沲天公幸自惜人命約束澒湧嚴誰何捐圖尋跡望千載嵩雲晝銷高嵯峨八陣懷古吳寛遺壘不可數神謀亦壯哉誰言愧將畧敵自服奇才狐鼠悲吳魏風雲護草萊彌牟還廟貌長嘯使人哀武侯八陣圖一在䕫府曹學佺鼎足三分事己成圖開八陣舊知名喧豗峽浪終難破錯落江沙若不明人日尙傳來踏磧將星遙映在行營至今千載無人識獨有桓温鑒别精一在新都彌牟鎭曹學佺廣漢南來近蜀都江城辨色己馳驅曉雲不散彌牟鎭春草橫生八陣圖自媿書生行部日得知丞相苦心無由來沃野稱千里處處桑麻望不孤漢丞相諸葛忠武侯集巻之十二終
