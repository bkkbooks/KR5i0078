front:
  text: 漢丞相諸葛忠武侯集重刋道藏輯要漢丞相諸葛忠武侯集卷之四
  hash: sha256:7a1b27ce0ce9252846a81ab8bd9634197fc6f7d7b4f2cfed78a2aabf60b2dc22
  markers:
  - {type: page-break, offset: 9, content: '', id: CK-KZ_KR5i0078_03p001a}
body:
  text: 三十六世孫羲基畫甫附傳先主傳建安十二年先主屯樊不知曹公卒至至宛乃聞之遂將其眾去比到當陽眾十餘萬輜重數千兩日行十餘里别遣關羽乗船數百艘使會江陵或謂先主曰宜速行保江陵今雖擁大眾被甲者少若曹公兵至何以拒之先主曰夫濟大事必以人爲本今人歸吾吾何忍棄去習鑿齒曰先主雖顚沛險難而信義愈明勢偪事危而言不失道追景升之顧則情感三軍戀赴義之士則甘與同敗觀其所以結物情者豈徒投醪撫寒含蓼問疾而已哉其終濟大業不亦宜乎曹公以江陵有軍實恐先主據之乃釋輜重輕軍到襄陽聞先主已過曹公將精騎五千急追之一日一夜行三百餘里及於當陽之長坂先主棄妻子與諸葛亮張飛趙雲等數十騎走曹公大獲其人眾輜重先主斜趣漢津適與羽船會得濟沔遇表長子江夏太守琦眾萬餘人與俱到夏口先主遣諸葛亮自結於孫權江表傳曰孫權遣魯肅弔劉表二子并令與備相結肅未至而曹公已濟漢津肅故進前與備相遇於當陽因宣權旨論天下事勢致殷勤之意且問備曰豫州今欲何至備曰與蒼梧太守吳臣有舊欲往投之肅曰孫討虜聰明仁惠敬賢禮士江表英豪咸歸附之已據有六郡兵精糧多足以立事今爲君計莫若遣腹心使自結於東崇連和之好共濟世業而云欲投吳臣臣是凡人偏在遠郡行將爲人所併豈足托乎備大喜進住鄂縣卽遣諸葛亮隨肅詣孫權結同盟誓權遣周瑜程普等水軍數萬與先主并力江表傅曰備從魯肅計進住鄂縣之樊口諸葛亮詣吳未還備聞曹公軍下恐懼日遣邏吏於水次候望權軍吏望見瑜船馳往白備備曰何以知之非靑徐軍邪吏對曰以船知之備遣人慰勞之瑜曰有軍任不可得委署倘能屈威誠副其所望備謂關羽張飛曰彼欲致我我今自結託於東而不往非同盟之意也乃乘單舸往見瑜問曰今拒曹公深爲得計戰卒有幾瑜曰三萬人備曰恨少瑜曰此自足用豫州但觀瑜破之備欲呼魯肅等共會語瑜曰受命不得妄委署若欲見子敬可别過之又孔明已俱來不過三兩日到也備雖深愧異瑜而心未許之能必破北軍也故差池在後將二千人與羽飛俱未肯係瑜蓋爲進退之計也孫盛曰劉備雄才處必亡之地吿急於吳而獲奔助無緣復顧望江渚而懷後計江表傳之言當是吳人欲專美之辭與曹公戰於赤壁大破之焚其舟船先主與吳軍水陸竝進追到南郡時又疾疫北軍多死曹公引歸江表傅曰周瑜爲南郡太守分南岸地以給備備别立營於油江口改名爲公安劉表吏士見從北軍多叛來投備備以瑜所給地少不足以安民後從權借荆州數郡劉琦病死羣下推先主爲荆州牧治公安權稍畏之進妹固好先主至吳見權綢繆甚洽山陽公載記曰備還謂左右曰孫車騎長上短下其難爲下吾不可以再見之乃晝夜兼行臣松之案魏書載劉備與孫權語與蜀志述諸葛亮與權語正同劉備未破魏軍之前尚未與孫權相見不得有此說故知蜀志爲是獻帝春秋曰孫權欲與備共取蜀遣孫瑜率水軍住夏口備不聽軍過謂瑜曰汝欲取蜀吾當被髮入山不失信於天下也使關羽屯江陵張飛屯秭歸諸葛亮據南郡備自住潺陵權因召瑜還十六年益州牧劉璋遥聞曹公將遣鍾繇等向漢中討張魯内懷恐懼别駕從事蜀郡張松說璋曰曹公兵强無敵於天下若因張魯之資以取蜀土誰能禦之者乎璋曰吾固憂之而未有計松曰劉豫州使君之宗室而曹公之深讐也善用兵若使之討魯魯必破魯破則益州强曹公雖來無能爲也璋然之遣法正將四千人迎先主前後賂遺以巨億計正因陳益州可取之䇿吳書曰備先見張松後得法正皆厚以恩遇接納盡其殷勤之歡因問蜀中闊狹兵器府庫人馬眾寡及諸要害道里遠近松等具言之又畫地圖山川處所由是盡知益州虛實也先主留諸葛亮闗羽等據荆州將步卒數萬人入益州至涪璋統出迎相見甚歡張松令法正白先主及謀臣龎統進說便可於會所襲璋先主曰此大事也不可倉卒璋推先主行大司馬領司隸校尉先主亦推璋持鎮西大將軍領益州牧璋增先主兵使擊張魯又令督白水軍先主并軍三萬餘人車甲器械資貨甚盛是𡻕璋還成都先主北到葭萌未卽討魯厚樹恩德以取衆心明年曹公征孫權權約先主相救先主遣使告璋曰曹公征吳吳憂危急孫氏與孤本爲唇齒又樂進在青泥與關羽相拒今不往救羽進必大克轉侵州界其憂有甚於魯魯自守之賊不足慮也乃從璋求萬兵及資寶欲以東行璋但許兵四千其餘皆給半魏書曰備因激怒其衆曰吾爲益州征强敵師徒勤瘁不遑甯居今積帑藏之財而恡於賞功望士大夫爲出死力戰其可得乎張松書與先主及法正曰今大事垂可立如何釋此去乎松兄廣漢太守肅懼禍及已自璋發其謀於是璋收斬松嫌隙始搆矣益部耆舊雜記曰張肅有威儀容貎甚偉松爲人短小放蕩不治節操然識達精果有才幹劉璋遣詣曹公曹公不甚禮松主簿楊修深器之白公辟松公不納修以公所撰兵書示松松宴飲之間一看便闇誦修以此益竒之璋勅關戍諸將文書勿復關通先主先主大怒召璋白水軍督楊懷責以無禮斬之乃使黃忠卓膺勒兵向璋先主徑至關中質諸將并士卒妻子引兵與忠膺等進到涪據其城璋遣劉璝冷苞張任鄧賢等拒先主於涪皆破敗退保綿竹璋復遣李嚴督綿竹諸軍嚴率眾降先主先主軍益强分遣諸將平下屬縣諸葛亮張飛趙雲等將兵泝流定白帝江州江陽惟關羽留鎭荆州先主進軍圍時璋子循守城被攻且一年十九年夏城破益部耆舊雜記曰劉璋遣張任劉璝等率精兵拒捍先主於涪爲先主所破退與璋子循守城任勒兵出於雁橋戰復敗禽任先主聞任之忠勇令軍降之任厲聲曰老臣終不復事二主矣乃殺之先主歎息焉進圍成都數十日璋出降傅子曰初劉備襲蜀丞相掾趙戩曰劉備其不濟乎拙於用兵每戰必敗奔亡不暇何以圖人蜀雖小區險固四塞獨守之國難卒并也徵士傅幹曰劉備寛仁有度能得人死力諸葛亮達治知變正而有謀而爲之相張飛關羽勇而有義皆萬人之敵而爲之將此三人者皆人傑也以備之畧三傑佐之何爲不濟也章武元年夏四月大赦改年以諸葛亮爲丞相許靖爲司徒置百官立宗廟祫祭高皇帝以下三年春二月丞相亮自成都到永安三月黃元進兵攻臨卭縣遣將軍陳䀜討元元軍敗順流下江爲其親兵所縳生致成都斬之先主病篤託孤於丞相亮尙書令李嚴爲副夏四月癸已先主殂于永安宫時年六十三諸葛集載先主遺詔勅後主曰朕初疾但下痢耳後轉雜他病殆不自濟人五十不稱夭年已六十有餘何所復恨不復自傷但以卿兄弟爲念謝君到說丞相歎卿智量甚大增修過於所望審能如此吾復何憂勉之勉之勿以惡小而爲之勿以善小而不爲惟賢惟德能服於人汝父德薄勿效之可讀漢書禮記閑暇厯觀諸子及六韜商君書益人意智聞丞相爲冩申韓管子六韜一通已畢未送道亡可自更求聞達臨終時呼魯王與語吾亡之後汝兄弟父事丞相令卿與丞相共事而已亮上言於後主曰伏惟大行皇帝邁仁樹德覆幬無疆昊天不弔寢疾彌留今月二十四日奄忽升遐臣妾號咷若喪考妣乃顧遺詔事惟太宗動容損益百寮發哀滿三日除服到葬期復如禮其郡國太守相都尉縣令長三日便除服臣亮親受勅戒震畏神靈不敢有違臣請宣下奉行五月梓宫自永安還成都諡曰昭烈皇帝秋八月葬惠陵評曰先主之弘毅寛厚知人待士蓋有高祖之風英雄之器焉及其舉國託孤於諸葛亮而心神無貮誠君臣之至公古今之盛軌也機權幹畧不逮魏武是以基宇亦狹然折而不撓終不爲下者抑揆彼之量必不容已非唯競利且以避害云爾後主傳章武三年夏五月後主襲位于成都時年十七尊皇后曰皇太后大赦改元魏畧曰初備在小沛不意曹公卒至遑遽棄家屬後奔荆州禪時年數𡻕竄匿隨人西入漢中爲人所賣及建安十六年關中破亂扶風人劉括避亂入漢中買得禪問知其良家子遂養爲子與娶婦生一子初禪與備相失時識其父字玄德比舍人有姓簡者及備得益州而簡爲將軍備遣簡到漢中舍都邸禪乃詣簡簡相檢訉事皆符驗簡喜以語張魯魯乃洗沐送詣益州備乃立以爲太子初備以諸葛亮爲太子太傅及禪立以亮爲丞相委以諸事謂亮曰政由葛氏祭則寡人亮亦以禪未閑於政遂總内外臣松之案二主𡚱子傳曰後主生于荆州後主傳云初卽帝位年十七則建安十二年生也十三年敗於長阪備棄妻子走趙雲傳曰雲身抱弱子以免卽後主也如此備與禪未嘗相失也又諸葛亮以禪立之明年領益州牧其年與主簿杜微書曰朝廷今年十八與禪傳相應理當非虛而魚豢云備敗於小沛禪是年始生及奔荆州能識其父字玄德計當五六𡻕備則敗於小沛時建安五年也至禪初立首尾二十四年禪應過三十矣以事相驗理不得然此則魏錄之妄說乃至二百餘言異也又案諸書記及諸葛亮集亮亦不爲太子太傳建興元年夏牂牁太守朱褒擁郡反魏氏春秋曰初益州從事常房行部聞褒將有異志收其主簿案問殺之褒怒攻殺房誣以謀反諸葛亮誅房諸子徙其四弟於越嶲欲以安之褒猶不悛改遂以郡叛應雍闓臣松之案以爲房爲褒所誣執政所宜澄察安有妄殺不辜以悅奸慝斯殆妄矣先是益州郡有大姓雍闓反流太守張裔於吳據郡不賓越嶲蠻王高定亦背叛是𡻕立皇后張氏遣尙書郞鄧芝固好於吳吳王孫權與蜀和親使聘是𡻕通好二年務農殖穀閉關息民三年春三月丞相亮南征四郡四郡皆平改益州郡爲建甯郡分建甯永昌郡爲雲南郡又分建甯牂牁爲興古郡十二月亮還成都四年春都護李嚴自永安還住江州築大城五年春丞相亮出屯漢中營沔北陽平石馬諸葛集載禪三月下詔曰朕聞天地之道福仁而禍滛善積者昌惡積者喪古今常數也是以湯武修德而王桀紂極暴而亡曩者漢祚中微網漏凶慝董卓造難震蕩京畿曹操階禍竊執天衡殘剝海内懷無君之心子丕孤𥪡敢尋亂階盗據神器更姓改物世濟其凶當此之時皇極幽昧天下無主則我帝命隕越于下昭烈皇帝體明睿之德光演文武應乾坤之運出身平難經營四方人鬼同謀百姓與能兆民欣戴奉順符䜟建位易號丕丞天序補弊興衰存復祖業誕膺皇綱不墜於地萬國未靜早世遐殂朕以幼冲繼統鴻基未習保傅之訓而膺祖宗之重六合壅否社稷不建永惟所以念在匡救光載前緒未有攸濟朕甚懼焉是以夙興夜寐不敢自逸每從菲薄以益國用勸分務穯以阜民財授方任能以參其聽斷私降意以養將士欲奮劔長驅指討凶逆朱旗未舉而丕復隕喪斯所謂不然我薪而自焚也殘類餘醜又支天禍恣雎河洛阻兵未弭諸葛丞相弘毅忠壯忘身憂國先帝託以天下以勗朕躬今授之以旄鉞之重付之以專命之權統領步騎二十萬衆董督元戎恭行天伐除患甯亂克復舊都在此行也昔項籍總一彊衆跨州兼土所務者大然卒敗垓下死於東城宗族如焚爲笑千載皆以不義陵上虐下故也今賊傚尤天人所怨奉時宜速庶憑炎精祖宗威靈相助之福所向必克吳王孫權同恤災患潛軍合謀𢰤角其後涼州諸國王各遣月支康居胡侯支富康植等二十餘人詣受節度大軍北出便欲率將兵馬奮戈先驅天命旣集人事又至師貞勢并必無敵矣夫王者之兵有征無戰尊而且義莫敢抗也故鳴條之役軍不血刃牧野之師商人倒戈今旍麾首路其所經至亦不欲窮兵極武有能棄邪從正簞食壺漿以迎王師者國有常典封寵大小各有品限及魏之宗族支葉中外有能規利害審逆順之數來詣降者皆原除之昔輔果絶親於智氏而䝉全宗之福微子去殷項伯歸漢皆受茅土之慶此前世之明驗也若其迷沉不反將助亂人不式王命戮及妻孥罔有攸赦廣宣恩威貸其元帥弔其殘民他如詔書律令丞相其露布天下使稱朕意焉六年春亮出攻祁山不克冬復出㪚關圍陳倉糧盡退魏將王雙率軍追亮亮與戰破之斬雙還漢中七年春亮遣陳式攻武都陰平遂克定二郡冬亮徙府營於南山下原上築漢樂二城是𡻕孫權稱帝與蜀約盟共交分天下八年秋魏使司馬懿由西城張郃由子午曹眞由斜谷欲攻漢中丞相亮待之於城固赤阪大雨道絕眞等皆還是𡻕魏延破魏雍州剌史郭淮于陽谿徙魯王永爲甘陵王梁王理爲安平王皆以魯梁在吳分界故也九年春二月亮復出軍圍祁山始以木牛運魏司馬懿張郃救祁山夏六月亮糧盡退軍郃追至青封與亮交戰被箭死秋八月都護李平廢徙梓潼郡漢晉春秋曰冬十月江陽至江州有鳥從江南飛渡江北不能達墮水死者以千數十年亮休士勸農於黃沙作流馬木牛畢教兵講武十一年冬亮使諸軍運米集於斜谷口治斜谷邸閤是𡻕南蠻劉胄反將軍馬忠破平之十二年春二月亮由斜谷出始以流馬運秋八月亮卒于渭濱征西大將軍魏延與丞相長史楊儀爭權不和舉兵相攻延敗走斬延首儀率諸軍還成都大赦以左將軍吳壹爲車騎將軍假節督漢中以丞相留府長史蔣琬爲尙書令總統國事陳夀後主評曰任賢相則爲循理之君惑閹豎則爲昏闇之后傳曰素無常唯所染之信矣哉禮國君繼體踰年改元而章武之三年則革稱建興考之古義體理爲違又國不置史注記無官是以行事多遺災異靡書諸葛亮雖達於爲政凡此之類猶有未周焉然經載十二而年名不易軍旅屢興而赦不妄下不亦卓乎自亮没後兹制漸虧優劣著矣華陽國志曰丞相亮時有言公惜赦者亮答曰治世以大德不以小惠故匡衡吳漢不願爲赦先帝亦言吾周旋陳元方鄭康成間每見啟告治亂之道悉矣曾不語赦也若劉景升季玉父子𡻕𡻕赦宥何益於治臣松之以爲赦不妄下誠爲可稱至於年名不易猶所未達案建武建安之號皆久而不改未聞前史以爲美談經載十二蓋何足云豈别有他意求之未至乎亮殁後延熙之號數盈二十兹制漸虧事又不然也先主甘皇后沛人也先主臨豫州住小沛納以爲妾先主數喪嫡室常攝内事隨先主於荆州産後主值曹公軍至追及先主於當陽長阪于時困偪棄后及後主賴趙雲保護得免於難后卒葬于南郡章武二年追諡皇思夫人遷葬於蜀未至而先主殂隕丞相亮上言皇思夫人履行修仁淑慎其身大行皇帝昔在上將𡣕配作合載育聖躬大命不融大行皇帝存時篤義垂恩念皇思夫人神柩在遠飄颻特遣使者奉迎會大行皇帝崩今皇思夫人神柩以到又梓宫在道園陵將成安厝有期臣輒與太常丞賴恭等議禮記曰立愛自親始教民孝也立敬自長始教民順也不忘其親所由生也春秋之義母以子貴昔高皇帝追尊太上昭靈夫人爲昭靈皇后孝和皇帝改葬其母梁貴人尊號曰恭懷皇后孝愍皇帝亦改葬其母王夫人尊號曰靈懷皇后今皇思夫人宜有尊號以慰寒泉之思輒與恭等案諡法宜曰昭烈皇后詩曰穀則異室死則同穴禮云上古無合葬中古後因時方有故昭烈皇后宜與大行皇帝合葬臣請太尉告宗廟布露天下具禮儀别奏制曰可諸葛瑾字子瑜琅琊陽郡人也爲孫權長史建安二十年權遣瑾使蜀與其弟亮但公會相見退無私面瑾之在南郡人有密讒瑾者此語頗流聞於外陸遜表保明瑾無此宜以散其意權報曰子瑜與孤從事積年恩如骨肉深相明究其爲人非道不行非義不言玄德昔遣孔明至吳孤嘗語子瑜曰卿與孔明同産且弟隨兄於義爲順何以不留孔明孔明若留從卿者孤當以書解玄德意自隨人耳子瑜答孤言弟亮委質定分義無二心弟之不留猶瑾之不往也其言足貫神明今豈當有此乎孤前得妄語文疏卽封示子瑜并手筆與子瑜卽得其報論天下君臣大節一定之分孤與子瑜可謂神交非外言所間也知卿意至輒封來表以示子瑜使知卿意關羽傳先主西定益州拜羽董督荆州事羽聞馬超來降舊非故人羽書與諸葛亮問超人才可誰比類亮知羽護前乃答之曰孟起兼資文武雄烈過人一世之傑黥彭之徒當與翼德竝驅爭先猶未及髯之絕倫逸羣也羽美鬚髯故亮謂之髯羽省書大悅以示賓客關興字安國少有令問丞相諸葛亮深器異之弱冠爲侍中中監軍黃忠字漢升南陽人也荆州牧劉表以爲中郞將與表從子磐共守長沙攸縣及曹公克荆州假行裨將軍仍就故任統屬長沙太守韓玄先主南定諸郡忠遂委質隨從入蜀自葭萌受任還攻劉璋忠常先登䧟陣勇毅冠三軍益州旣定拜爲討虜將軍建安二十四年於漢中定軍山擊夏侯淵淵衆甚精忠摧鋒必進勸率士卒金鼓振天歡聲動谷一戰斬淵淵軍大敗遷征西將軍是𡻕先主爲漢中王欲用忠爲後將軍諸葛亮曰忠之名望素非關馬之倫也而今便令同列馬張在近親見其功尙可喻指關遥聞之恐必不悅得無不可乎先主曰吾自當解之遂與羽等齊位賜爵關内侯明年卒追諡剛侯趙雲字子龍常山眞定人也先主自葭萌還攻劉璋召諸葛亮亮率雲與張飛等俱泝江西上平定郡縣至江州分遣雲從外水上江陽與亮會于成都建興元年爲中護軍征南將軍封永昌亭侯遷鎭東將軍五年隨諸葛亮駐漢中明年亮出軍揚聲由斜谷道曹眞遣大將當之亮令雲與鄧芝往拒而身攻祁山雲芝兵弱敵强失利於箕谷然歛眾固守不至大敗軍退貶爲鎭軍將軍雲别傳曰亮曰街亭軍退兵將不復相錄箕谷軍退兵將初不相失何故芝答曰雲身自斷後軍資什物畧無所棄兵將無縁相失雲有軍資餘絹亮使分賜將士雲曰軍事無利何爲有賜其物請悉入赤岸府庫須十月爲冬賜亮大善之龎統字士元襄陽人也少時樸鈍未有識者永川司馬𡽪淸雅有知人鑒統弱冠往見𡽪𡽪採桑於樹上坐統在樹下共語自晝至夜𡽪甚異之稱統當爲南州士之冠冕由是漸顯襄陽記曰諸葛孔明爲卧龍龎士元爲鳳雛司馬德操爲水鏡皆龎德公語也德公襄陽人孔明每至其家獨拜牀下德公初不令止統初守耒陽令在縣不治免官吳將魯肅遺先主書曰龎士元非百里才也使處治中别駕之任始當展其馬翼足耳諸葛亮亦言之先主先主與譚大器之以爲治中從事江表傳曰先主與統從容宴語問曰卿爲周公瑾功曹孤到吳聞此人密有白事勸仲謀相留有之乎在君爲君卿其無隱統對曰有之備歎息曰孤時危急當有所求故不得不往殆不免周瑜之手天下智謀之士所見畧同耳時孔明諫孤莫行其意獨篤亦慮此也孤以仲謀所防在北當賴孤爲援故決意不疑此誠出於險塗非萬全之計也進圍縣統率眾攻城爲流矢所中卒時年三十六先主痛惜言則流涕拜統父議郞遷諫議大夫諸葛亮親爲之拜追賜統爵關内侯諡曰靖侯法正傳先主旣定益州以正爲蜀郡太守揚武將軍外統都畿内爲謀主一飡之德睚眦之怨無不報復擅殺毁傷巳者數人或謂諸葛亮曰法正於蜀郡太縱橫將軍宜啟主公抑其威福亮答曰主公之在公安也北畏曹操之强東憚孫權之逼近則懼孫夫人生變於肘腋之下當斯之時進退狼跋法孝直爲之輔翼令翻然翺翔不可復制如何禁止孝直使不得行其意邪初孫權以妹妻先主妹才㨗剛猛有諸兄之風侍婢百餘人皆親執刀侍立先主每入衷心常懔懔亮又知先主雅愛信正故言如此卒時年四十五先主爲之流涕者累日諡曰翼侯賜子邈爵關内侯官至奉車都尉漢陽太守諸葛亮與正雖好尙不同以公義相取亮每竒正智術先主旣稱尊號將東征孫權以復關羽之恥羣臣多諫上不從章武二年大軍敗績還住白帝亮歎曰法孝直若在則能制主上令不東行就復東行必不傾危矣許靖年逾七十愛樂人物誘納後進清談不倦丞相諸葛亮皆爲之拜簡雍字憲和涿郡人也少與先主有舊隨從周旋先主至荆州雍與麋竺孫乾同爲從事中郞常爲談客往來使命先主入益州劉璋見雍甚愛之先主圍成都遣雍往說璋璋遂與雍同輿而載出城歸命先主拜雍爲昭德將軍優游風議性簡傲跌宕在先主坐席猶箕踞傾倚威儀不肅自縱適諸葛亮已下則獨擅一榻項枕卧語無所爲屈時天旱禁酒釀者有刑吏於人家索得釀具論者欲令與作酒者同罰雍與先主游觀見一男女行道謂先主曰彼人欲行淫何以不縳先主曰卿何以知之雍對曰彼有其具與欲釀者同先主大笑而原欲釀者雍之滑稽皆此類也伊籍字機伯山陽人少依邑人鎭南將軍劉表先主之在荆州籍常往來自託表卒遂隨先主南渡江從入益州益州旣定以籍爲左將軍從事中郞見待亞於簡雍孫乾等遣東使於吳孫權聞其才辯欲逆拆以辭籍適入拜權曰勞事無道之君乎籍卽對曰一拜一起未足爲勞籍之機㨗類皆如此權甚異之後遷昭文將軍與諸葛亮法正劉巴李嚴共造蜀科蜀科之制由此五人焉秦宓字子勅廣漢綿竹人也建興二年丞相亮領益州牧選宓迎爲别駕尋拜左中郞將長水校尉吳遣使張温來聘百官皆往餞焉眾人皆集而宓未往亮累遣使促之温曰彼何人也亮曰益州學士也及至温問曰君學乎宓曰五尺童子皆學何必小人温復問曰天有頭乎宓曰有之温曰在何方也宓曰在西方詩曰乃眷西顧以此推之頭在西方温曰天有耳乎宓曰天處高而聽卑詩云鶴鳴九臯聲聞于天若其無耳何以聽之温曰天有足乎宓曰有詩云天步艱難之子不猶若其無足何以步之温曰天有姓乎宓曰有温曰何姓宓曰姓劉温曰何以知之答曰天子姓劉故以此知之温曰日生於東乎宓曰雖生於東而没於西答問如響應聲而出於是温大敬服宓之文辯皆此類也遷大司農漢丞相諸葛忠武侯集卷之五附傳董和字幼宰南郡枝江人也先主定蜀徵和爲掌軍中郞將與軍師將軍諸葛亮竝署左將軍大司馬府事獻可替否共爲交歡自和居官食祿外牧殊域内幹機衡二十餘年死之日家無儋石之財亮後爲丞相教與羣下曰夫參署者集眾思廣忠益也若遠小嫌難相違覆曠闕損矣違覆而得中猶棄弊蹻而獲珠玉然人心苦不能盡惟徐元直處兹不惑又董幼宰參署七年事有不至至于十反來相啟告苟能慕元直之十一幼宰之殷勤有忠於國則亮可少過矣又曰昔初交州平屢聞得失後交元直勤見啟誨前參事於幼宰每言則盡後從事於偉度數有諫止雖姿性鄙暗不能悉納然與此四子終始好合亦足以明其不疑於直言也其追思和如此偉度者姓胡名濟義陽人爲亮主簿有忠藎之效故見褒述亮卒爲中典軍統諸軍封成陽亭侯遷中監軍前將軍督漢中假節領兖州剌史至右驃騎將軍濟弟博厯長水校尉尙書劉巴字子初零陵烝陽人也曹公征荆州先主奔江南荆楚羣士從之如雲而巴北詣曹公曹公辟爲掾使招納長沙零陵桂陽會先主畧有三郡巴不得反使遂遠適交趾零陵先賢傳云巴往零陵事不成欲由交州道還京師時諸葛亮在臨烝巴與亮書曰乘危厯險到值思義之民自與之眾承天之心順物之性非余身謀所能勸動若道窮數盡將託命於滄海不復顧荆州矣亮追謂曰劉公雄才蓋世據有荆土莫不歸德天人去就已可知矣足下欲何之巴曰受命而來不成當還此其宜也足下何言耶先主深以爲恨巴復從交趾至蜀俄而先主定益州巴辭謝罪負先主不責而諸葛孔明數稱薦之先主辟爲左將軍西曹掾零陵先賢傳曰張飛嘗就巴宿巴不與語飛遂忿恚諸葛亮謂巴曰張飛雖實武人敬慕足下主公今方收拾文武以定大事足下雖天素高亮宜少降意也巴曰大丈夫處世當交四海英雄如何與兵子共語乎備聞之怒曰孤欲定天下而子初專亂之其欲還北假道於此豈欲成孤事耶備又曰子初才智絕人如孤可任用之非孤者難獨任也亮亦曰運籌䇿於幃幄之中吾不如子初遠矣若提枹鼓會軍門使百姓喜勇當與人議之耳初攻劉璋備與士眾約若事定府庫百物孤無預焉及拔成都士眾皆捨干戈赴諸藏競取寶物軍用不足備甚憂之巴曰易耳但當鑄直百錢平諸物賈令吏爲官市備從之數月之間府庫充實零陵先賢傳曰輔吳將軍張昭嘗對孫權論巴褊阨不當拒張飛太甚權曰若令子初隨世沈浮容悅玄德交非其人何足稱爲高士乎馬良字季常襄陽宜城人也兄弟五人竝有才名鄕里爲之諺曰馬氏五常白眉最良良眉中有白毛故以稱之先主領荆州辟爲從事及先主入蜀諸葛亮亦從後往良留荆州與亮書曰聞城已㧞此天祚也尊兄應期贊世配業光國魄兆見矣臣松之以爲良蓋與亮結爲兄弟或相與有親亮年長良故呼亮爲尊兄耳夫變用雅慮審貴垂明於以簡才宜適其時若乃和光悅遠邁德天壤使時閒於聽世服於道齊高妙之音正鄭衞之聲竝利於事無相奪倫此乃管絃之至牙曠之調也雖非鍾期敢不擊節先主辟良爲左將軍掾後遣使吳良謂亮曰今銜國命協穆二家幸爲良介於孫將軍亮曰君試自爲文良卽爲草曰寡君遣掾馬良通聘繼好以紹昆吾豕韋之勳其人吉士荆楚之令鮮於造次之華而有克終之美願降心存納以慰將命權敬待之先主稱尊號以良爲侍中及東征吳遣良入武陵招納五溪南蠻南蠻渠帥皆受印號咸如意指會先主敗績於宦陵良亦遇害先主拜良子秉爲騎都尉良弟謖字幼常以荆州從事隨先主入蜀除綿竹成都令越嶲太守才器過人好論軍計丞相諸葛亮深加器異先主臨薨謂亮曰馬謖言過其實不可大用君其察之亮猶不然以謖爲參軍每引見談論自晝達夜襄陽記曰建興三年亮征南中謖送之數十里亮曰雖共謀之厯年今可更惠良規謖對曰南中恃其險阻不服久矣雖今日破之明日復反耳今公方傾國北伐以事彊賊彼知官勢内虛其叛亦速若殄盡遺類以除後患旣非仁者之情且又不可倉卒也夫用兵之道攻心爲上攻城爲下心戰爲上兵戰爲下願公服其心而已亮納其䇿赦孟獲以服南方故終亮之世南方不敢復反建興六年亮出軍向祁山時有宿將魏延吳壹等論者皆言以爲宜令爲先鋒而亮違眾拔謖統大眾在前與魏將張郃戰于街亭爲郃所破士卒離㪚亮進無所據退軍還漢中謖下獄物故亮爲之流涕良死時年三十六謖年三十九襄陽記曰謖臨終與亮書曰明公視謖猶子謖視明公猶父願深惟殛鯀興禹之義使平生之交不虧於此謖雖死無恨於黃壤也于時十萬之眾爲之垂泣亮自臨祭待其遺孤若平生蔣琬後詣漢中謂亮曰昔楚殺得臣然後文公喜可知也天下未定而戮智計之士豈不惜乎亮流涕曰孫武所以能制勝於天下者用法明也是以楊干亂法魏絳戮其僕四海分裂兵交方始若復廢法何用討賊耶陳震字孝起南陽人也建興七年孫權稱尊號以震爲衞尉賀權踐阼諸葛亮與兄瑾書曰孝起忠純之性老而益篤及其贊述東西歡樂和合有可貴者震到武昌孫權與震升壇㰱盟交分天下以徐豫幽青屬吳并凉冀兖屬蜀其司州之土以函谷關爲界震還封城陽亭侯九年都護李平坐誣罔廢諸葛亮與長史蔣琬侍中董允書曰孝起前臨至吳爲吾說正方腹中有鱗甲鄕黨以爲不可近吾以爲鱗甲者但不當犯之耳不圖復有蘇張之事出於不意可使孝起知之十三年震卒子濟嗣董允字休昭掌軍中郞將和之子也先主立太子允以選爲舍人徙洗馬後主襲位遷黃門侍郞丞相亮將北征住漢中慮後主富於春秋朱紫難别以允秉心公亮欲任以宫省之事上疏曰侍中郭攸之費褘侍郞董允等先帝簡拔以遺陛下至於斟酌規益進盡忠言則其任也愚以爲宫中之事事無大小悉以咨之必能裨補闕漏有所廣益若無興德之言則戮允等以彰其慢亮尋請褘爲參軍允遷爲侍中領虎賁中郞將統宿衞親兵攸之性素和順備員而已楚國先賢傳曰攸之南陽人以器業知名於時獻納之任允皆專之矣允處事爲防制甚盡匡救之理後主常欲采擇以充後宫允以爲古者天子后𡚱之數不過十二今嬪嬙已具不宜增益終執不聽後主益嚴憚之允嘗與尙書令費褘中典軍胡濟等共期游宴嚴駕已辦而郞中襄陽董恢詣允修敬恢年少官微見允停出逡巡求去允不許曰本所以出者欲與同好游談也今君已自屈方展闊積舍此之談就彼之宴非所謂也乃命解驂褘等罷駕不行其守正下士凡此類也襄陽記曰董恢字休緒襄陽人入蜀以宣信中郞副費褘使吳孫權嘗大醉問褘曰楊儀魏延牧𥪡小人也雖嘗有鳴吠之益於時務然旣已任之勢不得輕若一朝無諸葛亮必爲禍亂矣諸君憒憒曾不知防慮於此豈所謂貽厥孫謀乎褘愕然四顧視不能卽答恢目褘曰可速言儀延之不協起於私忿耳而無黥韓難御之心也今方掃除彊賊混一區夏功以才成業由才廣若捨此不任防其後患是猶備有風波而逆廢舟楫非長計也權大笑樂諸葛亮聞之以爲知言還未滿三日辟爲丞相府屬遷巴郡太守臣松之案漢晉春秋亦載此語不云董恢所教辭亦小異此二書俱出習氏而不同若此本傳云恢年少官微若已爲丞相府屬出作巴郡則官不微矣以此疑習氏之言爲不審的也吕乂字季陽南陽人也遷巴西太守丞相諸葛亮連年出軍調發諸郡多不相救乂募取兵五千人詣亮慰喻檢制無逃竄者徙爲漢中太守兼領督農供繼軍糧亮卒累遷廣漢蜀郡太守蜀郡一都之會戸口眾多又亮卒之後士伍亡命更相重冒姦巧非一乂到官爲之防禁開喻勸導數年之中漏脫自出者萬餘口後入爲尙書代董允爲尙書令眾事無留門無停賔彭羕字永年廣漢人身長八尺容貌甚偉姿性驕傲多所輕忽羕仕州不過書佐後又爲眾人所謗毁於州牧劉璋璋髠鉗羕爲徒隸會先主入蜀泝流北行羕欲納說先主乃往見龎統統與羕非故人又適有賓客羕徑上統牀卧謂統曰須客罷當與卿善談統客旣罷往就羕坐羕又先責統食然後共語因留信宿至于經日統大善之而法正宿自知羕遂竝致之先主先主亦以爲竒數令羕宣傳軍事指授諸將奉使稱意識遇日加成都旣定先主領益州牧拔羕爲治中從事羕起徒步一朝處州人之上形色囂然自矜得遇滋甚諸葛亮雖外接待羕而内不能善屢密言先主羕心大志廣難可保安先主旣敬信亮加察羕行事意以稍疎左遷羕爲江陽太守羕聞當遠出私情不悅往詣馬超超問羕曰卿才具秀拔主公相待至重謂卿當與孔明孝直諸人齊足竝驅甯當外授小郡失人本望乎羕曰老革荒悖可復道耶楊雄方言曰滅鰓乾都耆革老也郭璞注曰革老者皮色枯瘁之形也臣松之以爲皮去毛曰革古者以革爲兵故語稱兵革革猶兵也羕罵備爲老革猶言老兵也又謂超曰卿爲其外我爲其内天下不足定也超羈旅歸國常懷危懼聞羕言大驚默然不答羕退具表羕辭於是收羕付有司羕於獄中與諸葛亮書曰僕昔有事於諸侯以爲曹操暴虐孫權無道振威闇弱其惟主公有霸王之器可與興業致治故乃翻然有輕舉之志會公來西僕因法孝直自衒鬻龎統斟酌其間遂得詣公於葭萌指掌而談論治世之務講霸王之義建取益州之䇿公亦宿慮明定卽相然贊遂舉事焉僕於故州不免凡庸憂於罪罔得遭風雲激矢之中求君得君志行名顯從布衣之中擢爲國士盗竊茂才分子之厚誰復過此臣松之以爲分子之厚者羕言劉主分兒子厚恩施之於已故其書後語云負我慈父罪有百死也羕一朝狂悖自求苴醢爲不忠不義之鬼乎先民有言左手據天下之圖右手刎咽喉愚夫不爲也况僕頗别菽麥者哉所以有怨望意者不自度量苟以爲首興事業而有投江陽之論不解主公之意意卒感激頗以被酒侻失老語此僕之下愚薄慮所致主公實未老也且夫立業豈在老少西伯九十甯有衰意負我慈父罪有百死至於内外之言欲使孟起立功北州戮力主公共討曹操耳甯敢有他志邪孟起說之是也但不分别其間痛人心耳昔每與龎統共相誓約庶託足下末蹤盡心於主公之業追名古人載勳竹帛統不幸而死僕敗以取禍自我致之將復誰怨足下當世伊吕也宜善與主公計事濟其大猷天明地察神祇有靈復何言哉貴使足下明僕本心耳行矣努力自愛自愛羕竟誅死廖立字公淵武陵臨沅人先主領荆州牧辟爲從事年未三十擢爲長沙太守先主入蜀諸葛亮鎭荆土孫權遣使通好於亮因問士人皆誰相經緯者亮答曰龐統廖立楚之良材當贊興世業者也建安二十年權遣吕䝉奄襲南三郡立脫身走自歸先主先主素識待之不深責也以爲巴郡太守二十四年先主爲漢中王徵立爲侍中後主襲位徙長水校尉立本意自謂才名宜爲諸葛之貳而更㳺散在李嚴等下常懷怏怏後丞相椽李郃蔣琬至立計曰軍當遠出𡖖諸人好諦其事昔先主不取漢中走與吳人爭南三郡卒以三郡與吳人徒勞役吏士無益而還旣亡漢中使夏侯淵張郃深入于巴幾喪一州後至漢中使關侯身死無孑遺上庸覆敗徒失一方是羽怙恃勇名作軍無法直以意突耳故前後數喪師眾也如向朗文恭凡俗之人耳恭作治中無綱紀朗昔奉馬良兄弟謂爲聖人今作長史素能合道中郞郭演長從人者耳不足與經大事而作侍中今弱世也欲任此三人爲不然也王連流俗苟作掊克使百姓疲弊以致今日郃琬具白其言於諸葛亮亮表立曰長水校尉廖立坐自貴大臧否羣士公言國家不任賢達而任俗吏又言萬人率者皆小子也誹謗先帝疵毁眾臣人有言國家兵眾簡練部伍分明者立舉頭視屋憤咤作色曰何足言凡如是者不可勝數羊之亂羣猶能爲害况立託在大位中人以下識眞僞邪亮集有亮表曰立奉先帝無忠孝之心守長沙則開門就敵領巴郡則有闇昧闟葺其事隨大將軍則誹謗譏訶侍梓宫則挾刃斷人頭於梓宫之側陛下卽位之後普增職號立隨比爲將軍面語臣曰我何宜在諸將軍中不表我爲卿上當在五校臣答將軍者隨大比耳至於𡖖者正方亦未爲卿也且宜處五校自是之後怏怏懷恨詔曰三苗亂政有虞流宥廖立狂惑朕不忍刑亟徙不毛之地於是廢立爲民徙汶山郡立躬率妻子耕殖自守聞諸葛亮卒垂泣歎曰吾終爲左袵矣後監軍姜維率偏軍經汶山詣立稱立意氣不衰言論自若立遂終於徙所妻子還蜀李嚴字正方南陽人也章武二年先主徵嚴詣永安宫拜尙書令三年先主疾病嚴與諸葛亮竝受遺詔輔少主以嚴爲中都護統内外軍事留鎭永安建興元年封都鄉侯假節加光祿勳四年轉爲前將軍以諸葛亮欲出軍漢中嚴當知後事移屯江州留護軍陳到駐永安皆統屬嚴嚴與孟達書曰吾與孔明俱受寄託憂深責重思得良伴亮亦與達書曰部分如流趣捨罔滯正方性也其見貴重如此諸葛亮集有嚴與亮書勸亮宜受九錫進爵稱王亮答書曰吾與足下相知久矣可不復相解足下方誨以光國戒之以勿拘之道是以未得默已吾本東方下士誤用於先帝位極人臣祿賜百億今討賊未效知已未答而方寵齊晉坐自貴大非其義也若滅魏斬叡帝還故居與諸子竝升雖十命可受况於九耶八年遷驃騎將軍以曹眞欲三道向漢川亮命李嚴將二萬人赴漢中亮表嚴子豐爲江州都督督軍典嚴後事亮以明年當出軍命嚴以中都護署府事嚴改名爲平九年春亮軍祁山平催督運事秋夏之際値天霖雨運糧不繼平遣參軍狐忠督軍成藩喻指呼亮來還亮承以退軍平聞軍退乃更陽驚說軍糧饒足何以便歸欲以解已不辦之責顯亮不進之愆也又表後主說軍僞退欲以誘賊與戰亮具出其前後手筆書疏本末平違錯章灼平辭窮情竭首謝罪負於是亮表平曰自先帝崩後平所在治家尙爲小惠安身求名無憂國之事臣當北出欲得平兵以鎭漢中平窮難縱横無有來意而求以五郡爲巴州剌史去年臣欲西征欲令平主督漢中平說司馬懿等開府辟召臣知平鄙情欲因行之際偪臣取利也是以表平子豐督主江州隆崇其遇以取一時之務平至之日都委諸事羣臣上下皆怪臣待平之厚也正以大事未定漢室傾危伐平之短莫若褒之然謂平情在於榮利而已不意平心顚倒乃爾若事稽留將致禍敗是臣不敏言多增咎亮公文上尙書曰平爲大臣受恩過量不思忠報橫造無端危恥不辦迷罔上下論獄棄科導人爲姦情狹志狂若無天地自度姦露嫌心遂生聞軍臨至西嚮託疾還沮漳軍臨至沮復還江陽平參軍狐忠勤諫乃止今簒賊未滅社稷多難國事惟和可以克㨗不可包含以危大業輒與行中軍師車騎將軍都鄉侯臣劉琰使持節前軍師征西大將軍領凉州剌史南鄭候臣魏延前將軍都亭侯臣袁綝左將軍領荆州剌史高陽鄉侯臣吳壹督前部右將軍玄鄉侯臣高翔督後部後將軍安樂亭侯臣吳班領長史綏軍將軍臣楊儀督左部行中監軍揚武將軍臣鄧芝行前監軍征南將軍臣劉巴行中護軍偏將軍臣費褘行前護軍偏將軍漢成亭侯臣許允行左護軍篤信中郞將臣丁咸行右護軍偏將軍臣劉敏行護軍征南將軍當陽亭侯臣姜維行中典軍討㓂將軍臣上官雝行中參軍昭武中郞將臣胡濟行參軍建義將軍臣𨶒宴行參軍偏將軍臣爨習行參軍裨將軍臣杜義行參軍武畧中郞將臣杜祺行參軍綏戎都尉臣盛勃領從事中郞武畧中郞將臣樊岐等議輒解平任免官祿節傳印綬符䇿削其爵土乃廢平爲民徙梓潼郡諸葛集又與平子豐教曰吾與君父子戮力以奬漢室此神明所聞非但人知之也表都護典漢中委君於東關者不與人議也謂至心感動終始可保何圖中乖乎昔楚卿屢絀亦乃克復思道則福應自然之數也願寛慰都護勤追前闕今雖解任形業失故奴婢賓客百數十人君以中郞參軍居府方之氣類猶爲上家若都護思負一意君與公琰推心從事者否可復通逝可復還也詳思斯戒明吾用心臨書長歎涕泣而巳十二年平聞亮卒發病死平嘗冀亮當自補復䇿後人不能故以激憤也馬忠字德信巴西閬中人也建興元年丞相亮開府以忠爲門下督三年亮入南拜忠牂牁太守郡丞朱褒反叛亂之後忠撫育䘏理甚有威惠八年召爲丞相參軍副長史蔣琬署留府事明年亮出祁山忠詣亮所經營戎事軍還督將軍張嶷等討汶山郡叛羌十一年南宦豪帥劉胄反擾亂諸郡徵庲降都督張翼還以忠代翼忠遂斬胄平南士加忠監軍奮威將軍封博陽亭侯忠爲人寛濟有度量詼調大笑忿怒不形於色然處事能斷威恩竝立是以蠻宦畏而愛之及卒莫不自致喪庭流涕盡哀爲之立廟祀劉琰字威碩魯國人也有風流善談論後主立封都鄉侯班位每亞李嚴爲衞尉中軍師後將軍遷車騎將軍然不豫國政但領兵千餘隨丞相亮諷議而已車服飲食號爲侈靡侍婢數十皆能爲聲樂又悉教誦讀魯靈光殿賦建興十年與前軍師魏延不和言語虛誕亮責讓之琰與亮箋謝曰琰禀性空虛本薄操行加有酒荒之病自先帝以來紛紜之論殆將傾覆頗䝉明公本其一心在國原其身中穢垢扶持全濟致其祿位以至今日間者迷醉言有違錯慈恩含忍不致之於理使得全完保育性命雖必克已責躬改過投死以誓神靈無所用命則靡寄顔於是亮遣琰還成都官位如故魏延字文長義陽人也建興元年封都亭侯五年諸葛亮駐漢中更以延爲督前部領丞相司馬凉州剌史八年使延西入羌中魏後將軍費瑶雍州剌史郭淮與延戰於陽谿延大破淮等遷爲前軍師征西大將軍假節進封南鄭侯延每隨亮出輒欲請兵萬人與亮異道會于潼關如韓信故事亮制而不許延常謂亮爲怯歎恨已才用之不盡魏畧曰夏侯楙爲安西將軍鎭長安亮於南鄭與羣下計議延曰聞夏侯楙少主壻也怯而無謀今假延精兵五千負糧五千直從褒中出循秦嶺而東當子午而北不過十日可到長安楙聞延奄至必乘船逃走長安中惟有御史京兆太守耳橫門邸閣與散民之穀足周食也比東方相合聚尙二十許日而公從斜谷來必足以達如此則一舉而咸陽以西可定矣亮以爲此縣危不如安從坦道可以平取隴右十全必克而無虞故不用延計延旣善養士卒勇猛過人又性矜高當時皆避下之唯楊儀不假借延延以爲至忿有如水火十二年亮出北谷口延爲前鋒出亮營十里延夢頭上生角以問占夢趙直直詐延曰夫麒麟有角而不用此不戰而賊欲自破之象也退而告人曰角之爲字刀下用也頭上用刀其凶甚矣秋亮病因密與長史楊儀司馬費褘護軍姜維等作身殁之後退軍節度令延斷後姜維次之若延或不從命軍便自發亮適卒秘不發喪儀令褘往揣延意指延曰丞相雖亡吾自見在府親官屬便可將喪還葬吾自當率諸軍擊賊云何以一人死廢天下之事耶且魏延何人當爲楊儀所部勒作斷後將乎因與褘共作行留部分令褘手書與已連名告下諸將褘紿延曰當爲君還解楊長史長史文吏稀更軍事必不違命也褘出門馳馬而去延尋悔追之已不及矣延遣人覘儀等遂使欲案亮成規諸營相次引軍還延大怒乘儀未發率所領徑先南歸所過燒絕閣道延儀各相表叛逆一日之中羽檄交至後主以問侍中董允留府長史蔣琬琬允咸保儀疑延儀等槎山通道晝夜兼行亦繼延後延先至據南谷口遣兵逆擊儀等儀等令何平在前禦延平叱延先登曰公亡身尙未寒汝輩何敢乃爾延士眾知曲在延莫爲用命軍皆㪚延獨與其子數人逃亡奔漢中儀遣馬岱追斬之魏畧曰諸葛亮病謂延等云我之死後但謹自守愼勿復來也令延攝行已事密持喪去延遂匿之行至褒口乃發喪亮長史楊儀宿與延不和見延攝行軍事懼爲所害乃張言延欲舉眾北附遂率其眾攻延延本無此心不戰軍走追而殺之臣松之以爲此蓋敵國傳聞之言不得與本傳爭審楊儀字威公襄陽人也建興三年丞相亮以爲參軍署府事將南行五年隨亮漢中八年遷長史加綏軍將軍亮數出軍儀常規畫分部籌度糧穀不稽思慮斯湏便了軍戎節度取辦於儀亮深惜儀之才幹憑魏延之驍勇常恨二人之不平不忍有所偏廢也十二年隨亮出屯谷口亮卒于敵場儀旣領軍還又誅討延自以爲功勳至大宜當代亮秉政呼都尉趙正以周易筮之卦得家人默然不悅而亮平生密指以儀性狷狹意在蔣琬琬遂爲尙書令益州剌史儀至拜爲中軍師無所統領從容而巳初儀爲先主尙書琬爲尙書郞後雖俱爲丞相參軍長史儀每從行當其勞劇自惟年官先琬才能踰之於是怨憤形于聲色歎咤之音發于五内時人畏其言語不節莫敢從也唯後軍師費褘往慰省之儀對褘恨望前後云云又語褘曰往者丞相亡没之際吾若舉軍以就魏氏處世甯當落度如此邪令人追悔不可復及褘密表其言十三年廢儀爲民徙漢嘉郡儀至徙所復上書誹謗辭指激切遂下郡收儀儀自殺王連字文儀南陽人也建興元年拜屯騎校尉領丞相長史封平陽亭侯時南方諸郡不賓諸葛亮將自征之連諫以爲此不毛之地疫癘之鄕不宜以一國之望冒險而行亮慮諸將才不及巳意欲必往而連言輒懇至故停留者久之會連卒子山嗣官至江陽太守向寵先主時爲牙門將秭歸之敗寵營特完建興元年封都亭侯後爲中部督典宿衞兵諸葛亮當北行表與後主曰將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以眾論舉寵爲督愚以爲營中之事悉以咨之必能使行陣和睦優劣得所也遷中領軍延熙三年征漢嘉南蠻遇害寵弟充歴射聲校尉尙書張裔字君嗣蜀郡成都人也治公羊春秋博涉史漢汝南許文休入蜀謂裔幹理敏㨗是中夏鍾元常之倫也劉璋時舉孝廉爲魚復長還州署從事領帳下司馬張飛自荆州由墊江入璋授裔兵拒張飛於德陽陌下軍敗還成都爲璋奉使詣先主先主許以禮其君而安其人也裔還城門乃開先主以裔爲巴郡太守還爲司金中郞將典作農戰之器先是益州郡殺太守正昂耆率雍闓恩信著於南土使命周旋遠通孫權乃以裔爲益州太守徑往至郡闓遂趦䞡不賓假鬼教曰張府君如瓠壺外雖澤而内實麤不足殺令縳與吳於是遂送裔於權會先主薨諸葛亮遣鄧芝使吳亮令芝言次可從權請裔裔自至吳數年流徒伏匿權未之知也故許芝遣裔裔臨發權乃引見問裔曰蜀卓氏寡女亡奔司馬相如貴土風俗何以乃爾乎裔對曰愚以卓氏之寡女猶賢於買臣之妻權又謂裔曰君還必用事西朝終不作田父於閭里也將何以報我裔對曰裔負罪而歸將委命有司若䝉儌倖得全首領五十八已前父母之年也自此以後大王之賜也權言笑歡悅有器裔之色裔出閤深悔不能陽愚卽便就舡倍道兼行權果追之裔已入永安界數十里追者不能及旣至蜀丞相亮以爲參軍署府事又領益州治中從事亮出駐漢中裔以射聲校尉領留府長史常稱曰公賞不遺遠罰不阿近爵不可以無功取刑不可以貴勢免此賢愚之所以僉亡其身者也其明年北詣亮諮事送者數百車乘盈路裔還書與所親曰近者涉道晝夜接賓不得甯息人自敬丞相長史男子張君嗣附之疲倦欲死其談啁流速皆此類也臣松之以爲談啁貴於機㨗書疏可容留意今因書疏之巧以著談啁之速非其理也漢丞相諸葛忠武侯集卷之六附傳楊洪字季休犍爲武陽人也先主爭漢中急書發兵軍師將軍諸葛亮以問洪洪曰漢中則益州咽喉存亡之機會若無漢中則無蜀矣此家門之禍也方今之事男子當戰女子當運發兵何疑時蜀郡太守法正從先主北行亮於是表洪領蜀郡太守眾事皆辦遂使卽眞頃之轉爲益州治中從事先主征吳不克還住永安漢嘉太守黃元素爲諸葛亮所不善聞先主疾病懼有後患舉郡反燒臨卭城時亮東行省疾成都單虛是以元益無所憚洪卽啓太子遣其親兵使將軍陳曶鄭綽討元眾議以爲元若不能圍成都當由越巂據南中洪曰元素性凶暴無他恩信何能辦此不過乘水東下冀主上平安面縳歸死如其有異奔吳求活耳勅曶綽但於南安峽口遮卽便得矣曶綽承洪言果生獲元洪建興元年賜爵關内侯復爲蜀郡太守忠節將軍後爲越騎校尉領郡如故五年丞相亮北住漢中欲用張裔爲留府長史問洪何如洪對曰裔天姿明察長於治劇才誠堪之然性不公平恐不可專任不如留向朗朗情僞差少裔隨從目下效其器能於事兩善初裔少與洪親善裔流放在吳洪臨裔郡裔子郁給郡吏微過受罰不特原假裔後還聞之深以爲恨與洪情好有損及洪見亮出至裔許具說所言裔答洪曰公留我了矣明府不能止時人或疑洪意自欲作長史或疑洪知裔自嫌不願裔處要職典後事也後裔與司鹽校尉岑述不和至於忿恨亮與裔書曰君昔在桓下營懷吾之用心食不知味後流迸南海相爲悲歎寢不安席及其來還委付大任同奬王室自以爲與君古之石交也石交之道舉讐以相益割骨肉以相明猶不相謝也况吾但委噫於元儉而君不能忍邪論者由是明洪無私洪少不好學問而忠淸欵亮憂公如家事繼母至孝六年卒官始洪爲李嚴功曹嚴未至犍爲而洪已爲蜀郡洪迎門下書佐何祗有才䇿功幹舉郡吏數年爲廣漢太守時洪亦尙在蜀郡是以西土咸服諸葛亮能盡時人之器用也何祗字君肅少寒貧爲人寛厚通濟體甚壯大又能飲食好聲色不持節儉故時人少貴之者初往郡後爲督軍從事時諸葛亮用法峻密陰聞祗游戲放縱不勤所職當奄往錄獄眾人咸爲祗懼衹密聞之夜張火見囚讀諸解狀諸葛晨往祗悉已闇誦答對解釋無所凝滯亮甚異之出補成都令時郫縣令缺以祗兼二縣戸口猥多切近都治饒諸奸穢每比人常眠睡値其覺寤輒得奸詐眾咸畏祇之發摘或以爲有術無敢欺者使人投算祗聽其讀而心計之不差升合其精如此費詩字公舉犍爲南安人也建興三年隨諸葛亮南行歸至漢陽縣降人李鴻來詣亮亮見鴻時蔣琬與詩在坐鴻曰閒過孟達許適見王冲從南來言往者達之去就明公切齒欲誅達妻子賴先主不聽耳達曰諸葛公見顧有本末終不爾也盡不信冲言委仰明公無復已已亮謂琬詩曰還都當有書與子度相聞詩進曰孟達小子昔事振威不忠後又背叛先主反覆之人何足與書邪亮默然不答亮欲誘達以爲外援竟與達書曰往年南征𡻕未及還適與李鴻會於漢陽承知消息慨然永嘆以存足下平素之心豈徒空託名榮貴爲華離乎鳴呼孟子斯實劉封侵陵足下以傷先主待士之義又鴻道王冲造作虛語云足下量度吾心不受冲說尋表明之言追平生之好依依東望故遣有書達得亮書數相交通辭欲叛魏魏遣司馬宣王征之卽斬滅達亮亦以達無欵誠之心故不救助也蔣琬秉政以詩爲諫議大夫卒於家杜微字國輔梓潼涪人也少受學於廣漢任安劉璋辟爲從事以疾去官及先主定蜀微常稱聾閉門不出建興二年丞相亮領益州牧選迎皆妙簡舊德以秦宓爲别駕王梁爲功曹微爲主簿微固辭轝而致之旣至亮引見微微自陳謝亮以微不聞人語於坐上與書曰服聞德行饑渴厯時清濁異流無緣咨覯王元泰李伯仁王文儀楊季休丁君幹李永南兄弟文仲寶等每歎高志未見如舊猥以空虛統領貴州德薄任重慘慘憂慮朝廷主公今年始十八天姿仁敏愛德下士天下之人思慕漢室欲與君因天順民輔此明主以隆季興之功著勳於竹帛也以爲賢愚不相爲謀故自割絕守勞而已不圖自屈也微自乞老病求歸亮又與書答曰曹丕篡弑自立爲帝是猶土龍芻狗之有名也欲與羣賢因其邪僞以正道滅之怪君未有相誨便欲求還於山野丕又大興勞役以向吳楚今因丕多務且以閉境勤農育養民物竝治甲兵以待其挫然後伐之可使兵不戰民不勞而天下定也君但當以德輔時耳不責君軍事何爲汲汲欲求去乎其敬微如此拜爲諫議大夫以從其志周羣字仲直巴西閬中人也父舒字叔布少學術於廣漢楊厚名亞董扶任安羣少受學於舒專心候業所言多中先主定蜀署儒林校尉先主欲與曹公爭漢中問羣羣對曰當得其地不得其民也若出徧軍必不利當戒愼之時州後部司馬蜀張裕亦曉占候而天才過羣裕字南和諫先主曰不可爭漢中軍必不利先主竟不用裕言果得地而不得民也遣將軍吳蘭雷同等入武都皆没不還悉如羣言於是舉羣茂才裕又私言人曰𡻕在庚子天下當易代劉氏祚盡矣主公得益州九年之後寅夘之間當失之人密白其言初先主與劉璋會涪時裕爲璋從事侍坐其人饒鬚先主嘲之曰昔吾居涿縣特多毛姓東西南北皆諸毛也涿令稱曰諸毛繞涿居乎裕卽答曰昔有作上黨潞長遷爲涿令涿令者去官還家時人與書欲署潞則失涿欲署涿則失潞乃署曰潞涿君先主無鬚故裕以此及之先主常銜其不遜加忿其漏言乃顯裕諫爭漢中不驗下獄將誅之諸葛亮表請其罪先主答曰芳蘭生門不得不鉏裕遂棄市後魏氏之立先主之薨皆如裕所刻又曉相術每舉鏡視面自知刑死未嘗不撲之於地也羣卒子臣頗傳其術來敏字敬達義陽新野人來歙之後也後主踐阼爲虎賁中郎將丞相亮住漢中請爲軍祭酒輔軍將軍坐事去職亮集有教曰將軍來敏對上官顯言新人有何功德而奪我榮資與之邪諸人共憎我何故如是敏年老狂悖生此怨言昔成都初定議者以爲來敏亂羣先帝以新定之際故遂含容無所禮用後劉子初選以爲太子家令先帝不悅而不忍拒也後主卽位吾闇於知人遂復擢爲將軍祭酒違議者之審見背先帝所疎外自謂能以敦厲薄俗帥之以義今旣不能表退職使閉門思愆尹默字思潛梓潼涪人也益部多貴今文而不崇章句默知其不博乃遠游荆州從司馬德操宋仲子等受古學皆通諸經史又專精於左氏春秋自劉歆條例鄭眾賈逵父子陳元方服䖍注說咸畧誦述不復按本先主定益州領牧以爲勸學從事及立太子默爲僕射以左氏傳授後主後主踐阼拜諫議大夫丞相亮住漢中請爲軍祭酒亮卒還成都拜大中大夫卒子宗傳其業爲博士譙周字允南巴西西充國人也父山并字榮始治尙書兼通諸經及圖緯州郡辟請皆不應州就假師友從事周幼孤與母兄同居旣長耽古篤學家貧未嘗問産業誦讀典籍欣然獨笑以忘寢食研精六經尤善書札頗曉天文而不以留意諸子文章非心所存不悉徧視也身長八尺體貌素朴性推誠不飾無造次辯論之才然潛識内敏建興中丞相亮領益州牧命周爲勸學從事蜀記曰周初見亮左右皆笑旣出有司請推笑者亮曰孤尙不能忍况左右乎亮卒於敵庭周在家聞問卽便奔赴尋有詔書禁斷惟周以速行得達黃權字公衡巴西閬中人也先主東伐吳以權爲鎭北將軍督江北軍以防魏師南軍敗績先主引退而道隔絕權不得還故率將所領降于魏有司執法白收權妻子先主曰孤負黃權權不負孤也待之如初臣松之以爲漢武用虛罔之言滅李陵之家劉主拒憲司所執宥黃權之室二主得失縣邈遠矣詩云樂只君子保艾爾後其劉主之所謂也魏文帝謂權曰君捨逆効順欲追蹤陳韓邪權對曰臣過受劉主殊還降吳不可還蜀無路是以歸命且敗軍之眾免死爲幸何古人之可慕也文帝善之蜀降人或云誅權妻子權知其虛言未便發喪漢魏春秋曰文帝詔令發喪權答曰臣與劉葛推誠相信明臣本志疑惑未實請湏後問後得審問果如所言及先主薨問至魏羣臣咸賀而權獨否司馬宣王深器之問權曰蜀中有卿輩幾人權笑而答曰不圖明公見顧之重也宣王與諸葛亮書曰黃公衡快士也每坐起歎述足下不去口實卒諡曰景侯子邕嗣邕無子絕權留蜀子崇爲尙書郞隨衛將軍諸葛瞻拒鄧艾到涪縣瞻盤桓未進崇屢勸瞻宜速行據險無令敵得入平地瞻猶豫未納崇至於流涕會艾長驅而前瞻𨚫戰至綿竹崇帥厲軍士期於必死臨陣自殺李恢字德昂建甯俞元人也章武元年庲降都督鄧方卒先主問恢誰可代者恢對曰人之才能各有長短故孔子曰其使人也器之且夫明主在上則臣下盡情是以先零之役趙充國曰莫若老臣臣竊不自揆惟陛下察之先主笑曰孤之本意亦已在卿矣遂以恢爲庲降都督使持節領交州剌史住平蠻縣臣松之訉之蜀人云庲降地名去蜀二千餘里時未有甯州號爲南中立此職以總攝之晉泰始中分爲甯州先主薨高定恣雎於越嶲雍闓䟦扈於建甯朱襃反叛於牂牁丞相亮南征先由越嶲而恢案道向建甯諸縣大相糾合圍恢軍於昆明時恢眾少敵倍又未得亮聲息紿謂南人曰官軍糧盡欲規退還吾中間久斥鄕里乃今得旋不能復北欲還與汝等同計謀故以誠相告南人信之故圍守怠緩於是恢出擊大破之追犇逐北南至槃江東接牂牁與亮聲勢相連南土平定恢軍功居多封漢興亭侯加安漢將軍後軍還南蠻復叛殺害守將恢身往撲討鉏盡惡類徙其豪帥于成都賦出叟濮耕牛戰馬金銀犀革充繼軍資于時費用不乏建興七年以交州屬吳解恢刺史更領建甯太守以還居本郡徙居漢中九年卒子遺嗣恢弟子球羽林右部督隨諸葛瞻拒鄧艾臨陣授命死于緜竹吕凱字季平永昌不韋人也孫盛蜀世譜曰初秦徙吕不韋子弟宗族於蜀漢漢武帝時開西南蠻置郡縣徙吕氏以充之因曰不韋縣仕郡五官掾功曹時雍闓等聞先主薨於永安驕黠滋甚都護李嚴與闓書六紙解喻利害闓但答一紙曰蓋聞天無二日土無二王今天下鼎立正朔有三是以遠人惶惑不知所歸也其桀慢如此闓爲永昌太守永昌旣在益州郡之西道路雍塞與蜀隔絕而郡太守改易凱與府丞蜀郡王伉帥厲吏民閉境拒闓闓數移檄永昌稱說云云凱答檄曰天降喪亂奸雄乘釁天下切齒萬國悲悼臣妾大小莫不思竭筋力肝腦塗地以除國難伏惟將軍世受漢恩以爲當躬聚黨眾率先啟行上以報國家下不負先人書功竹帛遺名千載何期臣僕吳越背本就末乎昔舜勤民事隕于蒼梧書籍嘉之流聲無窮崩于江浦何足可悲文武受命成王乃平先帝龍興海内望風宰臣聰睿自天降康而將軍不覩盛衰之紀成敗之符譬如野火在原蹈履河氷火滅氷泮將何所依附曩者將軍先君雍侯造怨而封竇融知興歸志世祖皆流名後葉世歌其美今諸葛丞相英才挺出深覩未萌受遺託孤翊贊季興與眾無忌錄功忘瑕將軍若能翻然改圖易跡更步古人不難追鄙土何足宰哉蓋聞楚國不恭齊桓是責夫差僭號晉人不長况臣於非主誰肯歸之邪竊惟古義臣無越境之交是以前後有來無往重承吿示發憤忘食故畧陳所懷惟將軍察焉凱恩威内著爲郡中所信故能全其節及丞相南征討闓旣發在道而闓已爲高定部曲所殺亮至南上表曰永昌郡吏吕凱府丞王伉等執忠絕域十有餘年雍闓高定偪其東北而凱等守義不與交通臣不意永昌風俗敦直乃爾以凱爲雲南太守封陽遷亭侯會爲叛蠻所害子祥嗣而王伉亦封亭侯爲永昌太守王平字子均巴西岩渠人也建興六年屬參軍馬謖先鋒謖舍水上山舉錯煩擾平連規諫謖謖不能用大敗於街亭眾盡星散惟平所領千人鳴鼓自持魏將張郃疑其伏兵不往偪也於是平徐徐收合諸營遺迸率將士而還丞相亮旣誅馬謖及將軍張休李盛奪將軍王襲等兵平特見崇顯加拜參軍統五部兼當營事進位討㓂將軍封亭侯九年亮圍祈山平别守南圍魏大將軍司馬宣王攻亮張郃攻平平堅守不動郃不能克十二年亮卒於武功軍退還魏延作亂一戰而敗平之功也遷後典軍安漢將軍副車騎將軍吳壹住漢中又領漢中太守十五年進封安漢侯代壹督漢中蔣琬字公琰零陵湘鄉人也弱冠與外弟泉陵劉敏俱知名琬以州書佐隨先主入蜀除廣都長先主嘗因游觀奄至廣都見琬眾事不理時又沈醉先主大怒將加罪戮軍師將軍諸葛亮請曰蔣琬社稷之器非百里之才也其爲政以安民爲本不以修飾爲先願主公重加察之先主雅敬亮乃不加罪倉卒但免官而已建興元年丞相亮開府辟琬爲東曹椽舉茂才琬固讓劉邕陰化龎延廖淳亮教答曰思惟背親捨德以殄百姓眾人旣不隱於心實又使遠近不解其義是以君宜顯其功舉以明此選之淸重也遷爲參軍五年亮住漢中琬與長史張裔統留府事八年代裔爲長史加撫軍將軍亮數外出琬常足食足兵以相供給亮每言公琰託志忠雅當與吾共贊王業者也密表後主曰臣若不幸後事宜以付琬亮卒以琬爲尙書令俄而加行都護假節領益州剌史遷大將軍錄尙書事封安陽亭侯時新喪元帥遠近危悚琬出類㧞萃處羣僚之右旣無戚容又無喜色神守舉止有如平日由是眾望漸服子斌嗣爲綏武將軍漢城護軍魏大將軍鍾會至漢城與斌書曰巴蜀賢智文武之士多矣至於足下諸葛思遠譬諸草木吾氣類也桑梓之敬古今所敦西到欲奉瞻尊太君公侯墓當灑掃墳塋奉祠致敬願告其所在斌答書曰知惟臭味意眷之隆雅託通流未拒來謂也亡考昔遭疾疚亡於涪縣卜云其吉遂安厝之知君西邁乃欲屈駕修敬墳墓視予猶父顔子之仁也聞命感愴以增情思會得斌書報嘉歎意義及至涪如其書云費褘字文偉江夏鄳人也少孤依族父伯仁伯仁姑益州牧劉璋之母也璋遣使迎仁仁將褘遊學入蜀會先主定蜀褘遂留益土與汝南許叔龍南郡董允齊名時許靖喪子允與褘欲共會其葬所允白父和請車和遣開後鹿車給之允有難載之色褘便從前先上及至喪所諸葛亮及諸貴人悉集車乘甚鮮允猶神色未泰而褘晏然自若持車人還和問之知其如此乃謂允曰吾常疑汝於文偉優劣未别也而今而後吾意了矣先主立太子褘與允俱爲舍人遷庶子後主踐位爲黃門侍郞丞相亮南征還羣寮於數十里逢迎年位多在褘右而亮特命褘同載由是眾人莫不易觀亮以初從南歸以褘爲昭信校尉使吳孫權性旣滑稽嘲啁無方諸葛恪羊道等才博果辯論難鋒至褘辭順義篤據理以答終不能屈褘别傳曰孫權每别酌好酒以飲褘視其已醉然後問以國事并論當世之務辭難累至褘輒辭以醉退而撰次所問事事條答無所遺失權甚器之謂褘曰君天下淑德必當股肱蜀朝恐不能數來也褘别傳曰權乃以手中常所執寶刀贈之褘答曰臣以不才何以堪明命然刀所以討不庭禁暴亂者也但願大王勉建功業同奬漢室臣雖闇弱終不負東顧還遷爲侍中亮北住漢中請褘爲參軍以奉使稱旨頻頻至吳建興八年轉爲中護軍後又爲司馬值軍師魏延與長史楊儀相憎惡每至竝坐爭論延或舉刃挺儀儀泣涕橫集褘常入其坐間諫喻分别終亮之世各盡延儀之用者褘匡救之力也亮卒褘爲後軍師頃之代蔣琬爲尙書令褘别傳曰于時軍國多事公務煩猥褘識悟過人每省讀書記目暫視已究其意旨其速數倍於人終亦不忘常以朝晡聽事其間接納賓客飲食嬉戲加之博奕每盡人之歡事亦不廢董允代禕爲尙書令欲斆禕之所行旬日之中事多愆滯允乃歎曰人才力相縣若此甚遠非吾之所及也聽事終日猶有不暇爾琬自漢中還涪禕遷大將軍錄尙書事延熙七年魏軍次于興勢假禕節率眾往禦之光祿大夫來敏至禕許别求共圍棊于時羽檄交馳人馬擐甲嚴駕已訖禕與敏留意對戲色無厭倦敏曰向𦕬觀試君耳君信可人必能辨賊者也禕至敵遂退封成鄉侯姜維字伯約天水冀人也丞相亮辟爲倉曹椽加奉義將軍封當陽亭者侯時二十七亮與留府長史張裔參軍蔣琬書曰姜伯約忠勤時事思慮精密考其所有永南季常諸人不如也其人凉州上士也又曰湏先教中虎步兵五六千人姜伯約甚敏於軍事旣有膽義深解兵意此人心存漢室而才兼於人畢教軍事當遣詣宫覲見主上亮卒維還成都維自以練西方風俗兼負其才武欲誘諸羌胡以爲羽翼謂自隴以西可斷而有也每欲興軍大舉費禕常裁制不從與其兵不過萬人漢晉春秋曰費禕謂維曰吾等不如丞相亦已遠矣丞相猶不能定中夏况吾等乎且不如保國治民敬守社稷如其功業以俟能者無以爲希冀儌倖而決成敗於一舉若不如志悔之無及鄧艾前據成都維等初聞諸葛瞻破或聞後主欲固守成都或聞欲東入吳或聞欲南入建甯於是引軍由廣漢郪道以審虛實尋被後主勅令乃投戈放甲詣會於涪軍前將士咸怒援刀砍石千寶晉記云會謂維曰來何遲也維正色流涕曰今日見此爲速矣會甚竒之會厚待維等皆權還其印號節蓋會與維出則同轝坐則同席謂長史杜預曰以伯約比中土名士公休太初不能勝也世語曰時蜀官屬皆天下英俊無出維右會旣構鄧艾艾檻車徵因將維等詣成都自稱益州牧以叛漢晉春秋曰會陰懷異圖維見而知其心謂可構成擾亂以圖克復也乃詭說會曰聞君自淮南已來算無遺䇿晉道克昌皆君之力今復定蜀威德振世民高其功主畏其謀欲以此安歸乎夫韓信不背漢於擾攘以見疑於旣平大夫種不從范蠡於五湖卒伏劍而妄死彼豈闇主愚臣哉利害使之然也今君大功旣立大德已著何不法陶朱公泛舟絕迹全功保身登峨嵋之領而從赤松游乎會曰君言遠矣我不能行且爲今之道或未盡于此也維曰其他則君智力之所能無煩於老夫矣由是情好歡甚華陽國志曰維教會誅北來諸將旣死徐欲殺會盡坑魏兵還復蜀祚密書與後主曰願陛下忍數日之辱臣欲使社稷危而復安寰宇傾而復奠孫盛晉陽秋曰盛以永和初從安西將軍平蜀見諸故老言姜維旣降之後密與劉襌表疏說欲僞服事鍾會因殺之以復蜀土會事不㨗遂至遂滅蜀人于今傷之盛以爲古人云非所困而困焉名必辱北所據而據焉身必危旣辱且危死期將至其姜維之謂乎鄧艾之入江由士眾鮮少維進不能奮節綿竹之下退不能總帥五將擁衛蜀主思後圖之計而乃反覆於逆順之間希違情於難冀之會以衰弱之國而屢觀兵於三秦巳滅之邦冀理外之竒舉不亦闇哉臣松之以爲盛之譏維又爲不當于時鍾會大眾旣造劒閣維與諸將列營守險會不得進巳議還計全蜀之功幾乎立矣但鄧艾詭道傍入出於其後諸葛瞻旣敗成都自潰維若回軍救内則會乘其背當時之勢焉得兩濟而責維不能奮節綿竹擁衞蜀主非其理也會欲盡坑魏將以舉大事授維重兵使爲前驅若令魏將皆死兵事在維手殺會復蜀不爲難也夫功成理外然後爲竒不可以事有差失而抑謂不然設使田單之計邂逅不會復可謂之愚闇哉欲授維兵五萬人使爲前驅魏將士憤發殺會及維維妻子皆伏誅世語曰維死時見剖胆如斗大郤正著論論維曰姜伯約據上將之重處羣臣之右宅舍弊薄資財無餘側室無妾媵之䙝後庭無聲樂之娛衣服取供輿馬取備飲食節制不奢不約官給費用隨手消盡察其所以然者非以激貪厲濁抑情自割也直謂如是爲足不在多求凡人之談常譽成毁敗扶高抑下咸以姜維投厝無所身死宗滅以是貶削不復料擿異乎春秋褒貶之義矣如姜維之樂學不倦清素節約自一時之儀表也鄧芝字伯苗義陽新野人漢司徒禹之後也漢末入蜀未見知待時益州從事張裕善相芝往從之裕謂芝曰君年過七十位至大將軍封侯芝聞巴西太守龐羲好士往依焉先主定益州芝爲郫邸閣督先主出至郫與語大竒之擢爲郫令遷廣漢太守所在清嚴有治績入爲尙書先主薨於永安先是吳王孫權請和先主累遣宋瑋費禕等與相報答丞相諸葛亮深慮權聞先主殂隕恐有異計未知所如芝見亮曰今主上幼弱初在位宜遣大使重申吳好亮答之曰吾思之久矣未得其人耳今日始得之芝問其人爲誰亮曰卽使君也乃遣芝修好於權權果狐疑不時見芝芝乃自表請見權曰臣今來亦欲爲吳非但爲蜀也權乃見之語芝曰孤誠願與蜀和親然恐蜀主幼弱國小勢偪爲魏所乘不自保全以此猶豫耳芝對曰吳蜀二國四州之地大王命世之英諸葛亮亦一時之傑也蜀有重險之固吳有二江之阻合此二長共爲脣齒進可并兼天下退可鼎足而立此理之自然也大王今若委質於魏魏必上望大王之入朝下求太子之内侍若不從命則奉辭伐叛蜀必順流見可而進如此江南之地非復大王之有也權默然良久曰君言是也遂自絕魏與蜀連和遣張温報聘於蜀蜀復令芝重往權謂芝曰若天下太平二主分治不亦樂乎芝對曰夫天無二日土無二王如并魏之後大王未深識天命者也君各茂其德臣各盡其忠將提袍鼓則戰爭方始耳權大笑曰君之誠欵乃當爾邪權與亮書曰丁厷掞張掞音夷念反或作豔臣松之案漢書禮樂志曰長離前掞光耀明左思蜀都賦摛藻掞天庭孫權蓋謂丁厷之言多浮豔也陰化不盡和合二國唯有鄧芝及亮北住漢中以芝爲中監軍揚武將軍亮卒遷前軍師前將軍領兖州剌史封陽武亭侯頃之爲督江州權數與芝相聞饋遺優渥延熙六年就遷爲車騎將軍後假節十一年涪陵國人殺都尉反叛芝率軍征討卽梟其渠帥百姓安堵華陽國志曰芝征涪陵見玄猿緣山芝性好弩手自射猿中之猿㧞其箭卷木葉塞其創芝曰嘻吾違物之性其將死矣一日芝見猿抱子在樹上引弩射之中猿母其子爲拔箭以木葉塞創芝乃歎息投弩水中自知當死十四年卒芝爲大將軍二十餘年賞罰明斷善䘏卒伍身之衣食資仰於官不苟素儉然終不治私産妻子不免饑寒死之日家無餘財性剛簡不飾意氣不得士類之和於時人少所敬貴唯器異姜維云子良襲爵景耀中爲尙書左選郞晉朝廣漢太守張翼字伯恭犍爲武陽人也建興九年爲庲降都督綏南中郞將翼性持法嚴不得殊俗之歡心耆率劉胄背叛作亂翼舉兵討胄胄未破會被徵當還羣下咸以爲宜便馳騎卽罪翼曰不然吾以蠻南蠢動不稱職故還耳然代人未至吾方臨戰塲當運糧積穀爲滅賊之資豈可以黜退之故而廢公家之務乎於是統攝不懈代到乃發馬忠因其成基以破殄胄丞相亮聞而善之亮出武功以翼爲前軍都督領扶風太守亮卒拜前領軍追論討劉胄功賜爵關内侯
