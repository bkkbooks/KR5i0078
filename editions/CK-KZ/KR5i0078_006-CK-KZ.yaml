front:
  text: 漢丞相諸葛忠武侯集重刋道藏輯要漢丞相諸葛忠武侯集卷之十三
  hash: sha256:5b441beada2ec82057debde34e1a86ac57a3f65b4a7d44864cf604cb79a603bc
  markers:
  - {type: page-break, offset: 9, content: '', id: CK-KZ_KR5i0078_06p001a}
body:
  text: 三十六世孫羲基編輯詩遺蹟詠懷古迹二首杜甫諸葛大名垂宇宙宗臣遺像肅淸高三分割據紆籌策萬古雲霄一羽毛伯仲之間見伊呂指揮若定失蕭曹運移漢祚終難復志決身殱軍務勞蜀主窺吳幸三峽崩年亦在永安宮翠華想像空山裏玉殿虛無野寺中古廟杉松巢水鶴𡻕時伏臘走村翁武侯祠屋長隣近一體君臣祭祀同諸葛武侯草廬馮志卧龍人去遠此地尙名岡身應營星隕心期國祚長老臣猶有像炎漢已無光所幸遺民在憑君一勸耕拜武侯草廬葉桂章隆中人去已千秋祠宇依然枕碧流使節臨風還命駕攜朋落日更登樓秦關數出星先墮漢業三分志未酬獨取英雄走司馬却憐成敗繫炎劉拜武侯草廬劉相此地當年隱卧龍蒼蒼老檜尙凌空自言管樂堪前並信視曹吳亦下風三顧屈身勤帝胄一心許國失奸雄登臨幾度追遺跡千載令人景慕同謁諸葛草廬樊繼祖仰止久懷龍卧處秋風長嘆草廬深陣排雲鳥吞吳魏氣塞河山壯古今誓表光昭靑史上忠魂飄𣺌白雲岑將星一殞漢祚去休把興亡論亮心武侯書堂陸游沔陽道中草離離卧龍老矣空遺祠當時典午稱猾賊氣喪不敢當王師定軍山前寒食路至今人祀丞相墓松栢想像梁父吟尙憶幡然答三顧出師一表千載無遠比管樂葢有餘世上俗人甯辨此高臺當日讀何書書臺宋京君不見孔明書臺遺廟旁古書不見臺荒凉卧龍未起蜀天遠茅廬日日空南陽赤符光寒白水涸秣陵王氣猶能作璋若嬰兒操虎狼脫去荆州殊不惡十倍奇才安用書此臺昔時知有無蜀人思君識故處未若江水存兵圖黃冠所居門第改祇有坊名今尙在安得臺邊見古人秋草重生類書帶南陽道中許渾月斜孤舘傍村行野店高低帶古城籬上曉花齋後落井邊秋葉社前生饑烏索哺隨雛呌乳㹀慵歸望犢鳴荒草連天風動地不知誰學武侯耕南陽胡曾世亂英雄百戰餘孔明方此樂耕鋤蜀王不自垂三顧爭得先生出舊廬次南陽陳去非今日東北雲景象何佳哉我馬且勿驅當有急雨來春寒欺客子滿意旗下杯百年耳頻熱萬事首不囘卧龍今何之有塜已半摧空餘喬木地薄暮鴉徘徊懷古視落日愧我非長才却憑破鞍去風林生一哀隆中蘇軾諸葛來西國千年愛未衰今朝遊故里蜀客不勝悲誰言襄陽野生此萬乘師山中有遺貌矯矯龍之姿龍蟠山水秀龍去淵潭移空餘蜿蜒迹使我寒涕垂隆中十詠王鉞一脉深情起卧龍獨憐未遂濟時功古今多少英雄淚盡在先生此井中六角井錦官城外栢森森幾度曾歌杜父吟今日亭前見顔色風霜不改𡻕寒心古栢亭春色離離鎖暮烟英雄一去幾千年自從伊尹耕莘後只有隆中一片田躬耕田寂寂雲巖草樹深不求聞達自長吟先生一去無遺嚮尙有誰知晏子心梁父吟慨想先生抱膝時滿懷幽思有誰知於今一片蒼苔石勝似襄陽墮淚碑抱膝石洞門風雨水深寒天巧潛通石眼寬說與世間剛不信卧龍猶在此中蟠老龍洞黃水溪流若掌平一泓放出水雲淸有人覩物思玄德曾向小虹橋上行小虹橋一曲溪流幾許深三分事業已消沈水光依舊淸如鏡照見武侯忠義心半月溪萬叠雲深掃不開半星無處着塵埃就中結箇茆菴了只許淸風明月來野雲菴蜀主虛勞枉顧心中原未復大星沈老夫記得少陵語常使英雄淚滿襟武侯祠諸葛村揭傒斯炎精厭東都卧龍起南陽漢業入三顧蜀日宣重光豈伊三川阻况在兵力强八陣通神明二表貫穹蒼大運有隆替吾君自虞唐煌煌千萬師聲威摇八荒大星隕渭南萬古一悲傷但使漢賊分安有終不亡桓桓蕭將軍雙旌出永昌下馬城南祠爲我酹一觴九日登卧龍岡唐憲王淯水東流去𣺌茫一灣迴遶卧龍岡霜飛平野楓林赤日暎疎籬菊蕋黃智畧未應儔管樂英雄必竟服關張臨風不用論成敗二表忠肝萬古香春日遊卧龍岡有感唐藩承休王連雲芳草柳絲絲一上崇岡嘆黍離野鳥似吞亡國憾江流不斷後人思三分割據才非短一木難支厦己墮遺烈猶存增感慨仰高三復少陵詩遊卧龍岡唐莊王獨上龍岡曙靄收千章翠栢撼淸秋豫山雲與嵩山接淯水波通漢水流三顧當時成底事千年遺跡使人愁先生滿抱匡時策其奈英雄不自由卧龍岡陳正倫玄德從兹起卧龍草廬千古記遺縱君臣一語交投厚宇宙三分割據雄古木雲霞蒼蘚合斷碑風雨碧苔封登臨景仰淸名舊感激徒傷鼎峙功卧龍岡高信公自琅邪卧此岡不求聞達秪韜光夷吾比處才偏富梁父吟時憾更長一徑苔封三顧轍滿林烟鎖幾圍墻君臣際遇餘千載遺跡鍾靈在異鄕秋日遊卧龍岡楊應奎卧龍出處等非熊軍務勞神自鞠躬羽扇綸巾談笑裏謀王圖霸指揮中鳥啼花落人何在野曠山空誰爲雄勝蹟最宜絃管弄不堪岡勢起長風望卧龍岡陳洪謨卧龍人去幾千載岡阜巋然眼界中半靑畝松巢水鶴一簾斜日貫晴虹湯文吾遇心期在管樂何人自比同兩表精誠眞不昧可憐天運忌成功登卧龍樓李重卧龍岡上野雲橫宇宙千秋煥大名遠近桑田迷世代低昻草樹點山形出師久擬殱吳魏走敵眞堪笑死生此日登臨同弔古不勝囘首夕陽情登樓陶欽夔高樓縹緲接仙岑秋日登臨思不禁蜀漢望迷王氣歇草廬名在將星沈紫山影落龎公宅碧水秋明徐庶心勝地移從漫惆悵隔村梁父正哀吟題籌筆驛杜牧三吳列婺女九錫欺孤兒霸王業未半本朝心是誰永安宮受詔籌筆驛沈思畫地乾坤在濡毫勝負知艱難同草創得失計毫釐寂嘿經千慮分明渾一期川流縈智慮山聳助扶持慷慨匡時畧從容問罪師褒中秋鼓角渭曲晚旌旗仗義懸無敵鳴攻固有辭若非天奪去豈復慮能支子夜星纔落鴻毛鼎便移郵亭世自換白日事長垂何處躬耕者猶題殄瘁詩題籌筆驛羅隱抛擲南陽爲主憂北征東討盡良籌時來天地雖同力運去英雄不自由千里山河輕孺子兩朝冠劍憾譙周惟餘巖下多情水猶解年年傍驛流題籌筆驛薛逢天地三分魏蜀吳武侯崛起贊紆謀身依豪傑傾心術目斷雲山演陣圖赤伏運衰功莫就皇綱力振命先徂出師表上留遺憾猶自千年激壯夫籌筆驛李商隱魚鳥猶疑畏簡書風雲長爲護儲胥徒令上將揮神筆終見降王走傳車管樂有才眞不忝關張無命欲何如他年錦里經祠廟梁父吟成憾有餘籌筆驛殷潛之江東矜割據鄴下奪孤嫠霸畧非匡漢宏圖欲佐誰奏書辭後主仗劍出全師重襲襃斜路懸開反正旗欲將苞有截必使舉無遺沈慮經謀際揮毫決勝時圜觚當分畫前箸比操持山秀扶英氣川流入妙思算成功在彀運去事終虧命屈天方厭人亡國自隨艱難推舊姓𨳩創極初基總嘆曾過地甯探作敎資若歸新厯數誰復顧衰危報德兼明道長留識者知朝天嶺因懷孔明從此出師感賦任甲第朝天嶺上翠霞稠多少關山自壠頭九折險途雲外度一江湍水硤中流金城在昔稱天府劍閣凌空障益州𨚫憶漢師虛六出至今烟雨使人愁大相公嶺九折刺史坂七擒丞相橋沈黎漢原古嚴道蜀關遙策馬氷槽滑乘橇雪澝消我行再經此感慨一長謠是日至下馬磧憇於北山僧舍有閣曰懷賢南直斜谷西臨五丈原武侯所從出師也蘇軾南望斜谷口三山如犬牙西觀五丈原鬱屈如長蛇有懷諸葛公萬騎出漢巴吏士寂如水蕭蕭聞馬檛公才與曹丕豈止十倍加顧瞻三輔間勢若風卷沙一朝長星墜竟使蜀婦髽山僧豈知此一室老煙霞往事逐雲散故山依渭斜客來空弔古淸淚落悲笳登博望山亭次韻童承敘臺昃亭高當古驛短垣疎牖坐來淸濃烟密竹斜穿逕落日層岡曲抱城客裏雲霄勞聘望病中嵩洛愧經行卧龍寂寞邱原在惟有春農帶雨耕瀘水胡曾五月驅兵入不毛月明瀘水瘴烟高誓將雄畧酬三顧豈憚征蠻七縱勞諸葛鹽井蘇軾自注井有十四自山下至山上其十三井常空每盛夏水漲則鹽泉迤邐遷去常去於江水之所不及五行水本鹹安擇江與井如何不相入此意誰復省人心固難足物理偶相逞猶取嫌未多井上無閒綆五丈原胡曾蜀相西驅十萬來秋風原下久徘徊長星不爲英雄住半夜流光落九垓五丈原李東陽五丈原頭動地鼓魏人畏蜀如畏虎揮戈指天天宇漏將星墮空化爲土鍊石心勞竟何補侯歸上天多舊伍羽爲前驅飛後拒忠魂不逐降王車長衞英孫朝烈祖五丈原羅汝敬五丈原頭弔武侯野蒿叢棘滿山邱中原無復三分勢聚石空餘八陣謀不有忠誠千日月安能香火祀春秋天何弗永炎劉祚空使英靈萬古愁白帝城懷古杜應芳空城久寂寞弔古幾踟蹰躍馬雄稱帝揮蛇䜟泣姁連營三義重托幼一忠孤惟有年年栢常號夜夜烏晚過白帝城范淶早繞巫山翠雲堆暮馳夔門之西白帝臺靑絲黃勒絡頭角一息百里飛塵埃眼底乾坤眞駒隙古來廢興渾博奕咤雷叱電垓下雄驅山塞海秦世隔豈獨公孫躍馬曹睥睨井底龍豹韜赤水一出心徒勞只餘千山萬水中猿度絶壁烏橫空野花嬌樹春風紅皓魄弄影靑娥宮雙崕三峽鎖天鑰踞江灧澦相巃嵸扞關之陽侯翻浪還鬬攻虎鬚龍脊兩潭怒奔騰耳側隨轉蓬搜奇弔勝莫能至欲登突兀縱遠視漏聲已催玉箭高報語行人馬如駛人行馬駛難暫停鞭梢隱地掣流星褰帷半開山色冥風物須臾移幻形留蹟依稀夢寐經睠言英雄戰場在魚復永安只名改鼎足三分漢祚新風雲會合瞻丰采天生卧龍伊傅儔草廬應運懽相投縱橫宇宙歸正統將帥復有關張侯連吳伐魏王師震百牢關外無血刃麝山龍洞銀漢洗偃戈扶犂靑野潤憑高題咏後來人誰跡陽春白雪塵飄零子美瞿塘日咳吐宮商意獨眞祗今長歌短調存遏雲走石織天孫澄珠光涵混茫接風雅不絕標崑崙崑崙迢遞爭孕秀白鹽赤甲空馳驟羽扇崢嶸八陣傳草堂感慨千篇就我今所思一二賢征途囘首興蹁躚夜闌秉燭聊書案文章勳業俱茫然年不可復壯時不可復悞間關皮骨已二毛明朝猶走川西路夔州歌杜甫武侯祠堂不可忘中有松柏參天長干戈滿地客愁破雲日如火炎天凉古柏行杜甫孔明廟前有老柏柯如靑銅根如石霜皮溜雨四十圍黛色參天二千尺君臣已與時際會樹木猶爲人愛惜雲來氣接巫峽長月出寒通雪山白憶昨路繞錦亭東先主武侯同閟宮崔巍枝幹郊原古窈窕丹靑戸牖空落落盤踞雖得地冥冥孤高多烈風扶持自是神明力正直元因造化工大厦如傾要梁棟萬牛囘首立山重不露文章世已驚未辭剪伐誰能送苦心豈免容螻蟻香葉終經宿鸞鳳志士幽人莫怨嗟古來材大難爲用古柏李商隱蜀相階前柏龍蛇捧閟宮陰成外江畔老向惠陵東大樹思馮異甘棠憶召公葉凋湘鷰雨枝折海鵬風玉壘經綸遠金刀厯數終誰將出師表一爲問昭融古柏陸龜䝉密葉四時同一色高枝千𡻕對孤峯此中疑有精靈在爲見盤根似卧龍題古柏段文昌是草木有異於草木則靈武侯祠前柏夀千齡盤根擁門勢如龍形含碧太空散霧虛庭合抱在於旁枝駢梢葉之靑靑百尋及於半身蓄風雷之冥冥攢柯垂陰分翠間明忽如虬螭向空爭行上承翔雲孤鸞時鳴下蔭芳苔凡草不生古色天風蒼蒼冷冷曾到靈山老柏縱橫亦有大者莫之與京於惟武侯佐蜀有程神其不昏表此爲禎斯廟斯柏實播芳馨懷古諸葛武侯貢師泰劍江流水綠沄沄五丈原頭日又曛舊業未曾歸後主大星先已墮前軍南陽祠廟荒秋草西蜀關山隔暮雲正統不慚傳萬古莫將成敗論三分武侯吳澄含嘯沔陽春孫曹不敢臣若無三顧主何地着斯人武侯尹仲明建安天下如潰瓜一榻之外非吾家黃屋飄颻定何許龍爲魚兮鼠爲虎老瞞詐力敢欺天朶頤羊鼎方垂涎紫髯將軍一攘臂控荆引越三千里慷慨山東大耳兒南飛烏鵲棲無枝草廬一語君臣契目中久矣無吳魏堂堂大義凛不磨靈關劍閣爭嵯峨昨夜西南一星落六尺之孤竟誰托渭水旌旗歸故都江上空存八陣圖抱膝長吟出師表古柏蒼松爲誰老武侯陳剛中當塗哮吼健於虎卯金一脉如寒土民間只有大耳兒眞是高光宗社主南陽笑脫靑𤍠衣出試烏林萬火炬永安受遺輔太子漢賊未除忠膽苦峩睂山高錦江寒白旄一麾招搖怒出師兩紙流涕書三代而下無此語中營若不墜長星何心逆雛釁征鼓定知成事繼蒼姬禮樂光華耀千古憲宗皇帝御製諸葛武侯漢家神器逼姦雄帝胄恢宏起卧龍不是營星中道隕定敎吳魏盡朝宗諸葛武侯有序孔明値漢室板蕩隱於南陽司馬謂劉先主曰識時務者在乎俊傑諸葛孔明俊傑也徐庶亦謂先主曰諸葛孔明卧龍也將軍豈願見之乎先主信其言枉駕三顧與論天下事十去七八惟巴蜀用武之地今得之可以鼎足三分後果如其言孔明身爲將相竭力盡忠死而後已自漢以來一人豈不信哉勸君屈巳結孫吳畫策常排八陣圖忠力儘能恢漢室老天無意復東都感懷李白漢道昔云季羣雄方戰爭霸圖各未立割據資豪英赤伏起頺運卧龍得孔明當其南陽時隴畝躬自耕魚水三顧合風雲四海生武侯立岷蜀壯志吞咸京何人先見許但有崔州平余亦草間人頗懷極物情晚途値子玉華髮同衰榮託意在經濟結交爲弟兄毋令管與鮑千載獨知名感懷楊基鄧禹南陽來杖策歸光武孔明卧隆中不卽事先主英雄各有見何必問出處孫曹與更始未可同日語向非昭烈賢三顧猶未許君子當識時守身如處女宿夔門懷孔明子美張佳𦙍艤舟下席楚雲生落日靑霜白帝城踏蹟難忘諸葛陣野田曾爲杜陵耕休言天地終陳迹飜使江山借重名事業文章看二子風流無限古今情詠史周曇豫州軍敗信全窮徐庶推能薦卧龍不是卑詞三訪謁誰令玄德主巴卭一家區宇忽三分齷齪車書曷足論定有伊姜爲佐輔忍教鴻雁各乾坤詠史李華蜀主相諸葛功高名亦尊驅馳千萬眾怒目瞰中原曹伯任公孫國亡身不存社宮久蕪没白雁猶飛翻勿言君臣合可以濟黎元爲蜀諒不易如曹難復論讀出師表沈周兩篇忠告慷慨辭字字中間有涕洟天下二歸心屬呂隆中三顧道存伊老臣虛已六未解瞞子輸才十倍之講論堂堂誠激烈孤忠痯痯力驅馳轉征南北思何遠愴及桓靈語更危開濟莫酬徒有策英雄先死却無時天荒大野星俄隕水嚙空江石不移不朽文章千載事後人能鑒乃能悲梁父吟劉因功名且就漢庭多畢竟曹瞞累我何汶上千年英氣在有人梁父正高歌書漢丞相諸葛武侯傳後趙孟若寰海生民等釡魚先生高卧意何如當時不是劉玄德三顧何因出草廬魚水相歡分最深肯因生死負初心鞠躬盡力王師老一片忠忱貫古今街亭怱遽兵初敗箕谷倉皇戰亦休漢祚已亡天莫助千年掩卷淚如流當時一顧起隆中自許康時志略同萬古君臣一魚水死生不變見英雄蜀城懷古劉希夷蜀土繞水竹吳天積風霜窮覽通表裡氣色何蒼蒼舊國有年代靑樓思豔粧古人無𡻕月白骨宜邱荒寂厯彈琴地幽流讀書堂玄龜埋卜室采鳳滅詞場陣圖一一在柏樹雙雙行鬼神淸漢廟鳥雀參秦倉歎世已多感懷心益自傷賴䝉靈邱境時當明月光南陽東七里爲卧龍崗諸葛忠武侯草廬在焉遺像巋然慨題二十韻黃景昉恭謁淸高像襄南兩度看風雲緣傅築溪壑異嚴灘莫辨烏誰止總知龍所蟠墓猶連古冶居頗負崇巒三顧思疇昔六飛扈永安桓靈身痛憾荆益事艱難火適逢薪盡棋無奈子單開誠庸禕琬益智寫申韓鼎足基粗定秤心嘔易乾才高兵厭詭國小政懲寬忽忽歌梁父森森樹錦官悲來原五丈望去嶺千盤未少棲眞谷何勞拜將壇蛤蛙銅鑄皷牛馬木傳餐膝可終朝抱書惟大略觀佳兒生大慧嫫媛德相歡誰令馳驅許居然涕淚端微衷天日鑒往蹟雪霜漙曲筆嗤陳夀甘心帝魏瞞忍窺祠下井鳴咽至今寒漢丞相諸葛忠武侯集卷之十四賦八陣臺賦并序劉望之余與客登夔子城望八陣圖感忠武侯之行事憾世議者之弗獲於斯也作賦以悲之其詞曰靄孤臺之巋然臨千步之沙場石離離其班班紛栖雁之未翔山暝黑而更惡水雖波而不揚澹徙倚其不去含鬱訏之内傷是何以使之然哉客或吿之在漢之亡有人超然卧鄧南陽甚似阿衡樂未渠央感大耳之至意姑黽俛而徂征又佀子房初未意隆準之老也及其旣作亦不能巳手胼足胝夙夜赤子忽一龍與一蛇葢亦未可以優劣計大兵初來雷電下空璋孱小兒孰嬰我鋒駐師江郊坐向必東蒐我車乘取彼凶殘中原有狐憑陵宮墻我不往取高帝在天眾謂卯金之不可相而况天子之賢也運去道窮嘔血繼之非公實愚愚者不知自古聖賢亦行其義道之不濟已知之矣相夫子之所立固己無窮而不貲彼丕操父子烏雀犬之竊食雖甚饜而不害其驚疑愍世俗之隘陋徒顧瞻而涕洟請舉酒以酌公混一笑於江湄述賢亭賦并序閻苑黃星旣殞火井重炎孔明志在電掃荆揚席卷許洛布四頭八尾於平沙之上乃昔人臨流感嘆之所余慕其風烈而述其德業因名斯亭曰述賢考其陣法則方以八環一而爲九馬隆遵之以破賊圓以六包一而爲七李靖遵之以平虜葢戰守處畫部伍節制所重者勝所忽者敗所以觀宏規者仰服指奇蹤者稱美也且益州分應井絡僻在坤維而武侯以區區之蜀莅政至公董武立信貫許國之精誠伸命世之勇略令施竹帛不纊而温律嚴斧鉞不寒而慄方其鷹揚上國虎視中原驍將聞風而奪心壯士望塵而破膽擁精銳之眾者堅壁受辱稱骨鯁之臣者仗節包羞玩敵於股掌之上措勝於談笑之間比昔賢則過之責斯人而備矣余構亭於此俾其登之者識常山蛇勢知天下奇才壯雄圖之不朽想英風而猶在嗚呼天假其年則禮樂攸興天命有歸則智力無用大筆方籌長星遽墜陵谷已遷尙有典刑蠻戎雖化不忘武備况今夏賊千常遂竊位號晉豫遺民阻聲敎之施漢唐故地暌正朔之奉而受鉞登壇專長城之寄者節制可忽耶秘殿筆閣當方面之權者勤勞可繼耶今步遊灘上鑒前追往作古賦以述其始終使夔人𡻕時歌之不無感慨焉雖然孔明方躬耕之時處布衣之賤倘不遇三顧之主安能縱七擒之酋噫自古英雄之士時命不遇其名湮滅而無聞者惜哉賦曰鼎分率土姦賊陸梁孔明布石於平沙之上高步於大江之傍志馳許洛欲掃荆揚按井字九宮之法本河圖八卦之詳縱橫魚貫曲折雁行雖云蛇勢實曰龍驤其始也荷寫誠於傾葢遂感激而褰裳應雲龍之隱隱信魚水之洋洋其終也酬三顧而不爽縱七擒之所長資一時之談笑播千載而芬芳况夫才兼管樂政黜申商蜀則冬日魏則秋霜蜀民暖於布帛魏人困於豺狼於是并聲東下響應西方折曹氏之牙角挫仲達之鋒鋩至今秦隴恥其巾幗梁益詠乎甘棠論高節則勝棲岩之入夢鄙負鼎之干湯推治體則蕭何爲政之咳唾子産遺愛之粃糠量行事則用兵如晉文之示信敎民如周誥之成章觀施設則肩輿羽扇以節金皷木牛流馬以代梯航遵節制則馬隆以八陣用於晉李靖以六花顯於唐宜其斬王雙而走郭淮殺張郃而辱宣王吁哉飮渭之龍隨天數而已没吞吳之蛇如寶氣而難藏所以餘威遠振遺跡尤彰忠義撫劍而嘆息英雄沾襟而感傷戎蠻懷德而縞素士民追昔而蒸嘗余徘徊灘上不見鵝鸛奕奕龜蛇央央但覺雙魂失宅三甲負芒瞿唐風急起波聲之鳴咽巫峽雨散連天際以凄涼縱使秦雲變色魯日迴光竟與草木同朽皆無益於興亡宣和二年十月十五日魏陵閻苑述八陣圖賦楊維禎遐哉邈乎蠶藂故墟劍閣崢嶸兮石棧縈紆車不得而運兮馬不得以驅非王業之所基兮徒抗險乎中都帝中山之苗裔兮迺猶厄此斗隅黃星射乎宋野兮强猘狺乎江之東偉伏龍之感激兮起左顧乎隆中允識時之俊傑兮吞餘子於一空圖八陣以用武兮必先天而獨得六十四之成算兮本馬圖之全畫三十二之岐分兮妙陰陽之互宅天地衝宅兮風雲盤辟龍飛鳥逝兮蛇蟠虎翼撓之無跡兮運之無方進退不愆兮出没靡常奇不失於正正兮怪不越於堂堂伏至動於至靜兮寓能柔於能剛喻以常山之蛇勢兮曾未測其詳巴之水兮砅崖折璧峽之濤兮風霆礔礰彼箕張而翼布兮曾不轉其磈石非神物之陰衞兮孰萬夫之捍力想貔貅之對壘兮指白羽之一麾運縱擒於掌握兮算不出於八奇賊之望而走兮甘巾幗之受雌按渭濱之所屯兮實鼎國之王師自風后之有圖兮肆獯蚩之赫伐逮尙父之六弢兮佐牧野之黃鉞孫吳馬之剽掠兮徒生靈之肉血鄙敗事於腐儒兮彼譙生其又何法兹八陣之猶覺兮軼軒皇與天姥曰流馬與木牛兮又神機之所造歘中營之告變兮哀夫人之奪蚤訖黃芒以當天兮掩炎精之皓皓嗚呼西望岷峨兮南沂錦江山川相繆兮地老天荒歌梁父兮釃吾觴招謫仙兮呼子長訪魚復之砂磧兮弔新都之戰場雖武無用於今之時兮亦以發吾文之氣剛渡瀘賦何景明晨瞻崇邱鬱乎相袤扄以水峽隱以大洲沙莽寒日江深夕流葢將濟於瀘水傍人告予以理舟㳂洪波以直度迎迴飈於上游顧中原而緬邈文西域以滯留感逆旅之長勤懷古人而增憂想夫漢炎旣燼蜀都始家區土未闢士馬不加深入五溪橫制三巴冒險通塞柔邇來遐收𦍑髳以帶甲率庸盧而習戎撻吳權之堅銳摧魏懿之精華今其斷岸遺津寂寥水涯苦霧縈石悲風振沙音塵淪絕古今長嗟歎餘風兮莫覯幸故址兮重過西望開創之基形勢蒼蒼襟夔府而控荆門峙巫峽而流瞿唐簡書零落陣圖縱橫煙磧下月陰岸積霜風雲慘而猶憤魚鳥畏而將翔功雖殞而譽遠身旣没而國亡南瞻祠廟巍兮惝宏松柏蔭戸丹靑閟宮垣林蔓堦卷寒蓬亦徒嘻吁父老涕淚英雄而巳嗚呼當其長嘯之後三顧之餘氣感雲龍恩同水魚念季葉之否運思中興之遠謨偉雄並乎三分恥偏安乎一隅何遂違其懿志竟弗騁其長驅吾哀斯人遭時不淑宜三代以翺翔胡羣奸而馳逐矧功業兮難成且年𡻕兮易促嗟哉天道高不可摩得志者寡失志恆多苟道之不行雖孔孟其如何泛泛吾舟載揚其波艤彼淸潯陟彼中阿無人可邀聊獨行歌歌曰朔風起兮瀘水寒扣檝中流兮懷昔賢遇匪其時良獨艱嗟嗟遇匪其時兮良獨艱八陣圖磧賦羅士琥八陣圖有三永嘉薛氏云一在魚復一在廣都一在沔陽成都記以爲在夔者六十有四方陣法也在彌牟者一百二十有八當頭陣法也其在棋盤市者二百五十有六下營法也然則在魚復者其方陣法歟風后遠矣馬隆之贊獨孤及之記韜鈴裂素筆墨畦徑間爾磊磊落落晶晶熒熒長留水滴千載如新其諸葛公魚復之所陳歟篝燈賦之客有揮奇肱馳桂軸鞭素鸞御黃鵠出牂牁踰瓦屋策靑𦍑邁黃竹訪雪外之蓬姿超雲間之滴博探玉斧之界畫遡金精於寥廓千里一息忽經魚復於是俯鱉令之幽居尋孔明之遺躅但見𣺌湠漫之平灘列參差之低玉或週迴而維衞或拱揖而倚伏或軒豁而欲馳或蹙狹而如簇謂其爲遼海神鞭之斥麾也庚稽山之馬覊也神禹鑿餘之所飛媧皇補天之所遺也又謂其與水火土同時而生根先天氣之希夷也何喧豗漰湃如萬騎之西來激射蕩潏飛流湔沫亘古今而莫之移也俯而睨仰而思巳去而復顧盤辟而委蛇曰噫嘻我始知之矣風雲慘淡豪傑經綸蟄其猶龍者隆中之所藴神其妙用者八陣之所陳觀其蔽璧門兮重開倚却月兮連環天衡十六兮據兩端地軸十二兮居中間風八陣兮附天而前擁雲八陣兮附地而後環天地之前衝一變而爲虎踞其附天之風亦再變而爲蛇蟠天地之後衝一變而爲龍驟其附地之雲亦再變而爲鳥翔於是七八爲經九六爲緯以天地風雲爲四正以龍虎鳥蛇爲四奇而成八陣磐殳犬磐殳犬有中權後勁輕重之別有先陰後陽剛柔之節以實擊虛兮明彼此以先奪後兮定主客我簡而敵常繁我閒而敵常迫以正合兮以奇勝乘陰陽兮論生尅門具將發游軍補闕合之則一㪚之則八握機之妙在指掌屈伸之列凡其銅皷震而獦狑之頭開木牛騰而關隴之魄摧孟獲之所謂天威司馬之所謂奇才皆此圖之土苴塵埃也彼有方圓牝牡衝方車輪罘雁行四頭八尾托名於八卦倚重於武侯者特劍首之一吷而已得其儌而遺其微舍棟梁而拾節梲也雖然斯義也風后握之佐軒轅擒蚩尤而爲萬古兵家之師馬隆識之作鹿箱車破樹機能而成凉州一戰之奇何曠世之良材竟不卒其所施曾出師之未旣遽殞星之流輝凄凉乎梁父之吟際會乎風雲之期幡然於三顧之餘夫豈不知炎德之微而猶區區此圖之爲邪人亡事往名留蹟遺桓宣武見之僅識其常山一節之勢杜工部過之激而爲江流不轉之詩豈武侯忠赤貫此諸石陽侯川后者爲之呵護遺千古無窮之悲也葢公之所可能者人公之所不可能者天天運不復扶漢祚之衰是以天戈不能囘漢日之西未可以成敗利鈍而隨聲於黃口之蚩蚩也觀畢又從而爲之歌曰伯仲間兮呂伊失蕭曹兮定指麾才十倍兮曹丕遺巾幗兮懿慚而見揮操如鼠兮睨隣雞公如龍兮入天飛八陣圖兮雲栖尙見公兮杜德機圖不盡兮柏十圍後千載兮依依微斯人兮吾誰與歸記古栢記田况成都諸葛孔明祠古柏年祀寖遠喬柯鉅圍蟠固凌拔有足異者杜甫嘗作歌段文昌亦作文摹狀瓌奇人多諳誦故老相傳及記事者云自唐季凋瘁厯王孟二僞國蠧槁尤甚然以祠中樹無敢伐剪者皇朝乾德丁卯𡻕仲夏枯柯復生日益敷茂觀者歎聳以謂榮枯之變應時治亂武侯光靈如有意於兹者誠爲異哉因命工圖寫備述本末以貽好德者八陣圖集記趙忭八陣圖諸葛武侯作在府城北七十里新都彌牟鎭有廟存焉趙淸獻公集記曰武侯於八陣鄕以二爲隆基凡一百三十所葢左右六十四前二每基下五六寸皆江石也耆老相傳其石葢六數武侯於此教戰陣出入之法舊記謂四面開四門起六十四魁應六十四卦八八爲行周囘四百七十一步所謂六十四魁但得其半耳王恭簡公續記曰眉州賢良王當嘗論八陣法刻石廟下論云八陣之法四奇四正基部壁立其體皆方奇正相生風旋日暈其用皆圓葢方利於正方其體則其勢固密故其徐如林不動如山難知如陰此所以爲不可犯也圓利於動圓其用則其勢健決故其動如雷其疾如風侵掠如火此所以爲不可禦也其體雖方而圓在其中其用雖圓而方在其内此所以爲不可測也奇正相循出入往來如環之無端體用迭作合散變化如神之不窮圓之爲用如身使臂如臂使指雖五旅之師師如一身如木百圍根株相連各有體統友禦相屬各有條理雖五師之軍軍如一本故其法曰紛紛紜紜鬬亂而不可亂渾渾沌沌形圓而不可敗圓之爲利其來久矣圓之爲用務以分其勢而散其兵疑其心而亂其目勢分則陣薄兵散則氣怯心疑則易却目亂則易眩圓之爲用以將雜卒卒恃其將以强雜弱弱恃其强將卒相恃理必俱勝强弱相恃勢不偏敗突出爭先鷹揚兎脫不可拒也併力盡怒齊勇如一不可遏也其氣益銳則其節益險如驚湍巨浪不可涉也如層崖峻谷不可越也使敵得之如蟲之著網魚之在笱虎之䧟穽是以其將可却其兵可殺其重不可脫八陣之法也營室之法四奇四正屯亦如之戰陣之法左旋右轉教亦如之教之有法必欲其誠葢誠則久久則天天則神故前後相屬首尾相接如得於天如出於地莫知其所以然而然者入於神也教之爲法築土爲壇其形皆圓其數皆八壇之高下與人相稱壇之闊狹與陣相稱奇旋向左正旋向右旋向左者攻在外也旋向右者攻在内也或旋向左或旋向右便其用也或攻在内或攻在外紊其例也教之爲法在家則依比閭族黨之儀在軍則依伍倆卒旅之法使之更相親視有無相通患難相救疾病相扶自此以上皆文官主之教之忠厚教之正信教之孝友睦婣教之禮義廉恥自此以上皆武官主之教之出入變化教之射御擊剌教之先登啓行教之破陣劫將在家書其美惡而辨其賢愚在軍記其勇怯而别其利鈍𡻕終則以功行差次而進退之使之剛而不暴勇而知義入則可與同其安出則可與共其危故可生可死而不可使犯非義者八陣之法也常山蛇陣安則靜靜則直觸之則動動則圓孫武常山蛇陣杜牧以爲八陣勢取桓温說也傳謂推演兵法作八陣圖演孫武法也八陣取諸八卦欲包并八荒也旌旄旗幟各從其方之色欲别其屬也四維從其二方之色惟西南獨從土色依其相生之數則上實居北也八卦變而爲六十四象四陣散而爲六十四隊今成都東南隅號曰棋盤市此舊八陣營也故知其在陣則方城北彌牟鎭地名八陣見存土堆六十四此教閱之所也故知其在陣則圓八卦通神明之德類萬物之情非有此道不能用也或謂取遁之八卦非也此術也非孔明之事也夔州亦有八陣石壘在江濤中而彌牟八陣在平地其法一也疑孔明遠慮亦杜元凱襄陽刻碑之意云今按八陣謂天地風雲龍虎鳥蛇八者是也天取其覆地取其載風雲取其變化龍虎取其動靜鳥蛇取其相應風生於地而虎從之雲騰於天而龍從之鳥爲動物必翔於天蛇爲蟄物必蟠於地葢有同位相生之義焉八陣論謂彌牟見存土堆六十四考之舊圖經謂八陣圖凡三在夔州者六十有四方陣法也在彌牟者一百二十有八當頭陣法也在棋盤市者一百五十有六下營法也棋盤市今無其迹彌牟鎭土堆尙存凡一百二十有七與淸獻集記又不同葢恐崩摧之故然其布位參差不齊不可强曉兹兼圖於左以俟知者八陣圖記劉昉魚復陣磧創自武侯江流莫移若有神護雖經毁攺幾失其眞稽之圖經訪諸故老而遺迹隱然尙可見也顧將堙沒余心是悼亟令軍士裒石增累悉還其舊方圓曲直縱橫廣狹之不敢少加損焉尙慮它時復罹前厄刋圖於石用示後人界垣之内縮而計之以丈爲分其外圖山川城郭之勢而不計以度且命作侯祠於城上以俯臨之夔人𡻕以人日傾城徙市縱遊八陣之間謂之踏磧是役吿成適當是日賓僚咸集酧酒陳詞以落之昔侯嘗擒孟獲獲觀營陣心不服曰若祗如是固易勝耳逮至七縱七擒然後以爲天威及司馬仲達觀其軍壘則嘆服曰天下奇才也桓温過此雖能知其爲常山之蛇勢葢亦未究其妙然能知與否在孔明初何損益余非能知之者姑修故壘以俟來哲云紹興戊辰正月丙寅潮陽劉昉書萬里橋記劉光祖諸葛孔明用蜀以仁義公信懷而服之法度修明禮樂幾於可復夫厯周秦兩漢千有餘年孔明乃以蜀通吳抗魏三分天下存漢社稷學探伊傅而迹并管樂蜀人到今矜而誦之不忘今羅城南門外笮橋之東七星橋之一曰長星橋者古今相傳孔明於此送吳使張温曰此水下至揚州萬里後因以名或則曰費禕聘吳孔明送之至此曰萬里之道從此始也孔明沒又千載橋之遺迹亦粗耳非有所甚壯麗偉觀也以千載之間人事更幾興廢而橋獨以孔明故傳之亡窮其說雖殊名橋之義則一厥今天下兼有吳蜀朝廷命帥其遠萬里葢受孔明之任以來由蜀走闕道亦如之其於此橋孰不懷古以圖今追孔明之道德勳庸而思髣髴其行事侍御趙公之鎭蜀也始至謁古栢祠卽命葺之明年作祠廟于其故營又明年新其故宅廟貌每曰諸葛公三代遺才也用法而人不怨任政而主不疑非天下之至公其孰能與於此今其遺跡所存尙多而萬里橋者迺通吳之故事前帥沈公嘗修廣之猶陋弗稱則命增爲石魚釃水爲五道梁板悉易以木而屋之橋成耽耽屋成繩繩嚴嚴翼翼民不知役而公亦樂之風煙𣺌然岸木秀而川景麗公與客登此葢未嘗不徘徊而四顧也神交千古又安知諸葛公通吳之志亦未嘗一日不在於中原也乎光祖忝公元僚公命光祖爲之記記其大者而遺其細葢將以大者望公俾公之功名垂千萬世若曰橋美名公又與之爲美觀非知公者知公莫如光祖新都縣八陣圖記楊愼諸葛武侯八陣圖在蜀者二一在夔州之永安宮一在新都之彌牟鎭在夔者葢侯從先主伐吳防守江路行營布伍之遺制新都爲成都近郊則其恒所講武之場也武侯之人品事業前哲論之極詳不復勦同其說獨其八陣有重可嘅者史謂侯推演兵法作爲八陣咸得其要自今行師更不覆敗深識兵機者所不能洞了葢勝之於多算而出之於萬全非借一於背城而僥倖於深入也惜乎其方銳意以向中原而溪蠻洞獠左跳右跋以裂其勢外冦方殷内境自憊使夫八陣之妙不得加於二曹三馬之梟敵而乃止試於七縱七擒之孟獲天威神算不騁於中原王者之區宇而僅以服南中巴僰之偏方事機旣已遲精力又已虧勇賈其餘師用其分以爲大舉譬之逐盗救火之家挺刀決水猶恐不及而内有讐賊自相乘機胠篋助燎則雖有倍人之知力亦自無如之何侯之不幸勢正類此天之所壞誰能支之祚去炎漢不待殞星而後知矣嗟乎國之興亡天也而千載之下君子獨遺憾於蜀漢之事者非以武侯故邪至其故壘遺墟獨爲之愛惜不已乃其忠義之激人不獨其法制陣伍之妙也不然則竇憲嘗勒八陣以擊匈奴晉馬隆用八陣以復凉州是在侯前已有之而後亦未嘗亡也功旣有成而後世猶罕所稱述况能傳其遺跡至今乎愼嘗放舟過夔門弔永安之宮尋陣圖之跡維時春初水勢正殺自山上俯視下百餘丈皆聚細石爲之凡八行二十四蕝土人言夏水盛時没在深淵水落依然如故在吾新都者其地象城門四起中列土壘約高三尺耕者或剗平之經旬餘復突出此乃其精誠之貫天之所支而不可壞者葢非獨人愛惜之而已耳銘武侯八陣圖銘并序劉隅鴻茫六合之間或峻壁巍峯時而崩摧長濤巨浸時而澌竭亦或有磐石涓泉終古不可夷而絕者此固神理氣化之能然非至人莫能前識焉蜀諸葛武侯八陣圖有三其一在新都之彌牟鎭其一在夔之魚復沙上卽此是也數千年餘渦回浪湧每夏秋之交日星爲之暝晦蛟龍爲之駭匿大地羣壑爲之震摇而纍纍之石曾無損移顧不異甚矣哉庚寅春正之旦翌日艤舟浦次登觀奇蹟徐步而周望乃畧測其故而歎化理之微武侯神識之遠也葢浦之上有溪引江濤以趨北岸岸有土瀼易崩故江漲則益趨之唯浦石離離隆然介其中盤錯鬱結甚固浦之下則朿以瞿唐鎭以灧澦江流扼於吭隘漫渙而囘延匯數沱此浦又在囘沱之曲正其漩緩歇薄之會而盤激衝撼之所不及也故巫峽不剗灧澦不拔則石無可轉之期唯諸葛公智炳物始機測化終爰演兵圖於此靈渚擇坦極險厝至靜於至動使夫扶漢討賊之志忠貞雄武之槩昭垂萬世與天地江山俱敝爾余故刻石系銘樹之廟廡以俟觀者銘曰岷幡黑水實唯梁州乾關重險坤垠上游烈烈武侯炎精是噓靈威大暢于梁之區粤古軒皇風牧執象摧妖殛凶兵陣是創姜望佐周留侯授沛不有神契孰開草昧惟公獨生在漢季葉龍姿騰厲以翌昭烈奇機在握聖明同揆雷躍其行嶽峙其壘眷此魚復緜延斯干瞿唐下扼灧澦擁前江濤排天此無衝激終古不移離離者石乃布神規用訓貔虎蛇鳥舒蟠風雲飛怒式法太乙體喻常山分合游翼奇正循環蹙吳吞魏皇漢是衍頻頻其衷如石不轉業虧鼎足運丁星隕唯此無疆與天地凖我銘非石銘公之心悠悠萬紀玄理可尋漢丞相諸葛忠武侯集卷之十五碑記蜀丞相諸葛武侯祠堂碑銘裴度度嘗讀舊史詳求往哲或秉事君之節無開國之才得立身之道無治人之術四者備矣兼而行之則蜀丞相諸葛公其人也公本系在簡策大名葢天地不復以云當漢祚衰陵人心競逐取威定霸者求賢如不及藏器在身者擇主而後動公是時也躬耕南陽自比管樂我未從虎時稱卧龍詩曰潛雖伏矣亦孔之昭故州平心與元直神交洎乎三顧而許以驅馳一言而定其機勢於是翼扶劉氏纘承舊服結吳抗魏擁蜀稱漢刑政達於荒外道化行乎域中誰謂阻深殷爲强國誰謂遳脆厲爲勁兵則知地無常形人無常性自我而作若金在鎔故九州之地魏有其七我無其一由僻陋而啟雄圖出封疆以延大敵財用足而不曰浚我以生干戈動而不曰殘人以逞其底定南方也不以力制而取其心服震疊諸夏也不敢角其勝負而止候其存亡法加於人也雖死徙而無怨德及於人也雖奕葉而見思此所謂精義入神自誠而明者矣若其人存其政舉則四海可平五服可傾而陳夀之評未極其能事崔浩之說又詰其成功此皆以變詐之畧論節制之師以進取之方語化成之道不其謬歟夫委棄荆州不能遂有三郡此乃務增德以吞宇宙不黷武以爭尋常及出斜谷據武功分兵屯田爲久駐之計與敵對壘待可勝之期雜乎居人如適虛邑彼則喪氣我方養威若天假之年則繼大漢之祀成先主之志不難矣且權傾一國聲震八紘而上下無異詞始終無愧色苟非運膺五百道冠生知曷以臻於此乎故玄德知人之明者倚仗曰魚之有水仲達奸人之雄者嗟稱曰天下奇才度每迹其行事度其遠心願奮短札以排羣議而文字蚩鄙志願未果元和二年冬十月聖上以西南奥區寢亂餘烈罷耘未息污俗未淸輟我股肱爲之父母乃詔相國臨淮公由秉鈞之重承推轂之寄戎軒乃降藩服乃理將明帝道陬落綏懷溥暢仁風閭𨶒滋殖府中無留事宇下無棄材人知嚮方我有餘地則諸葛公在昔之治與相國當今之政異代而同法矣度謬以庸薄獲參管記隨旌旄而爰止望祠宇而修謁有儀可像以赫厥靈雖𡽪烈不忘而碑表未立古者或拳拳一善或師長一城尙流斯文以示來裔况如仁之嘆終古不絕其可闕乎乃刻貞石度此都之人存必拜之感云爾銘曰昔在先主思啟疆宇擾攘靡依英雄無輔爰得武侯先定蜀土道德城池禮義干櫓煦物如春化人如神勞而不怨用之有倫柔服蠻落鋪敦渭濱攝跡畏威雜居懷仁中原旰食不測不克以待可勝允臻其極天未悔禍公命不果漢祚其亡將星中墮反旗鳴鼓猶走司馬死而可作當小天下尙父作周阿衡左商兼齊管晏總漢蕭張易代而生易地而理遭遇豐約亦皆然矣鳴呼奇謀奮發美志天遏吁嗟嚴立咸受謫罰聞之痛之或泣或絕甘棠勿剪駢邑斯奪繇是而言殊途共轍本於忠恕孰不感悅苟非誠慤徒云固結古柏森森遺廟沉沉不殄禋祀以迄于今靡不駿奔若有昭臨蜀國之風蜀人之心錦江淸波玉壘峻岑入海際天如公德音刻武侯碑陰孫樵赤帝子火熾四百年大厭其熱洎獻燼矣武侯獨憤不顧收死灰於蜀欲嘘而再燃之艱乎爲力哉是以四稱武岐雍間地不尺闊抑非智不周天意炳炳然也夫以武侯之賢甯靡籌其不可也葢激備隆中天下託不欲曲肱安糓終兒女子手將驅馳死備志邪由是覈武侯之所爲殆庶幾矣然跨西南一隅與吳魏抗國提卒數萬綽綽乎去留無我支者是亦善爲兵矣史夀以爲短應變眞抑武侯哉俾武侯不早入地曹之君臣將奔走固圉之不暇鍾鄧甯能越巖懸兵決勝指取邪是井絡之野與武侯存亡俱矣天殱武侯其不愛劉愈明白其姜維何力焉曩蟠南陽時人不與仲毅伍洎受社稷寄擅刑賞柄曾心不愧畏人不疑黷何意氣明信卓卓也武侯死五百載迄今梁漢之民歌道遺烈廟而祭者如在其愛於民如此而久也獨謂武侯之治比於燕奭彼屠齊城合諸侯在下矣諸葛武侯廟記呂温天厭漢德俾絶其紐羣生墜塗四海飛灰武侯命世實念大極魏姦吳輕未獲心膂胥宇南陽堅卧待主三顧哾羣雄粗定必也篲掃是資鼎立變化消息謀成掌中戰龍玄黃再得雲雨於是右揭如天之府左提用武之國因山分力與水合勢蟠亘萬里張爲龍形亦欲首吞咸鎬尾朿河洛翼乎中夏飛于天衢然後魚驅勾吳東入晏海大勳未集天奪其魂至誠無忘炳在日月烈氣不散長爲風雷英雄痛心六百年矣於戲以武侯之才知已付託土雖狹國以勤儉富民雖寡兵以節制强魏武旣没晉宣非敵而戎車薦駕不復中原或曰奇謀非長則斬將覆軍無虛舉矣或曰餽糧不繼則築室反耕有成算矣嘗試念之頗頤其原夫民視德以爲歸撫則思虐則忘其思也不可使忘其忘也不可使思當漢道方休哀平無罪王莽乃欲憑戚寵造符命脅之以威動之以神使人忘漢終不可得也及高光舊德與世衰遠桓靈流毒在人骨髓武侯乃欲開季世振絕緒諭之以本臨之以忠使人思漢亦不可得也述於遺廟以俟通識唐正元十四年記重修先主武侯廟記任淵智力之不勝義也久矣昔自英雄豪傑乘時崛起有能仗義而行偉然正大指揮號令天下從之雖其不幸不克大有所成就於當時而風烈之餘猶足以聳動後世厯千百載尊仰而懷思之有不能自已者非以義勝故歟惟蜀先主昭烈帝以宗冑之英負非常之畧崎嶇奔走經理四方遂有蜀漢葢將憑藉高祖興王之地建立本基以紹復漢家大業當時丞相忠武諸葛侯實左右之人品意象高遠英特駸駸乎伊呂之間應變機權本於道德内修綜核之政外舉節制之師欲以攘除姦凶混一區宇不負其君付託之意可謂社稷臣矣彼其君臣仗義而行正大如此是以海内之士心與而誠服之舉無異論雖厄於運數屈於遠圖而後世有讀其遺書過其陵廟者未嘗不咨嗟流涕尊仰而懷思之也夫義之所在俯仰無愧天地且將直之見信於人亦其理之然哉成都之南三里所邱阜巍然山曰惠陵者實昭烈弓劍所藏之地有廟在其東所從來遠矣大殿南向昭烈弁冕臨之西偏少南有别廟忠武侯在焉老柏參天氣象甚古詩人嘗爲賦之廟久不治風雨摧剝殿廡門墻率皆頽圯破缺像設僅存至或露處紹興二十有八年秋九月蜀當謀帥上親擇廷臣文武兼資可屬方面者得中書舍人王公命以龍圖閣待制置四川使出鎭成都臨遣甚寵粤明年夏四月公始至用故事謁諸祠奠獻至此顧瞻太息曰有大功德於蜀人宜莫若昭烈忠武廟貌乃爾亦獨何心亟命有司繕治之鳩工庀材咸有程度以是𡻕十月已巳經始落成于明年三月已丑雖號爲因舊起廢實再造而一新之棟宇宏敞丹艧鮮明堅壯精密足以經久祠與惠陵皆護以垣墉限禁樵牧築室忠武祠北明潔幽邃有事於神者得以休焉葢舊所無也用工萬一千六百七十有八爲錢無慮二百萬木章竹箇取於津步商旅之征勞與費民不知焉旣成命淵記之淵懼陋不克稱固辭公不許乃冒昧書其事蓋嘗妄論王霸之說以爲義近王智力近霸竊觀昭烈忠武之所爲非深於王道未易明其心於千載上也今公之所學宏遠高明正論懔然一以宗王爲本嘗過公孫述廟笑唾不顧至劉蜀君臣嚴事之如此意固有在非特以欽崇秩祀爲牧守之所當先也鎭蜀未幾威德流聞蠻夏甯謐視忠武不愧異時志得道行其助恢漢業興三代之禮樂不難矣公名剛中鄱陽人開豁邁往而克勤庶事綜練周密治蜀之政百廢具舉不獨新此廟之可書也紹興三十年記忠武侯祠堂記張震漢昭烈以區區一隅當天下三分之二恃有忠武侯而已自操敗赤壁昭烈始收江南以侯督零陵桂陽長沙三郡及昭烈入蜀侯鎭荆州率張飛趙雲泝江而上與昭烈會以成平蜀之功其後永安受遺𡻕往反則在瞿塘控扼經營之地侯豈時有意於此哉今八陣故基不溺於波流而卧龍屯營迺不復見按晉永平中卧龍始以山名唐夔州治白帝侯廟在西郊杜少陵所謂卧龍無首封江濆者也不知自何時併爲寺寺故有祠又不知自何時已失之矣侯平生所眷眷者神物且知護之顧人獨不然予是以有感焉葢天下之才不乏其卓然特立於功名之會者固有知矣至責以大人之事則懔然如恐不及惟所志狹所施陋矣三國鼎立爭天下漢號最弱昭烈戰每不勝而四海之義皆歸之吳孫氏以江東伯人材視漢魏爲多其取江陵破猇亭功最俊偉然知摧其與而忘用之敵謀蜀則巧謀魏何拙也關羽在荆州攻曹仁於樊操議徙都避之此何與吳事而權甯屈於魏請取羽自效乎彼其志不在天下明矣昭烈以羽故用師於吳兵敗身困摧沮以死蜀之君臣父子讐吳當益甚而若直置不問此豈恝然眞忘吳者哉顧所讐者大魏窺神器而竊取之其罪與吳孰重使蜀日夜唯吳是圖則魏偷得自安或者持刺虎之術乘吳後是代魏受禍也嗚呼侯經營天下之畧其規摹意度與吳相絕如此邪世徒知周瑜呂蒙陸遜破三大敵功在當世鮮儷而侯不過拒司馬懿渭上而止其烈若少貶焉然百世而下望其品以爲三代人物者唯侯實當之數君子蓋不與也此所謂大人之事豈勉强用力所能致乎三國距今向千載其事之成敗得失人類能言之而吳人於數君子未始有奉常者侯於蜀迺特厚葢自當時固有巷祭野祀者矣朝議以禮不聽卒不能禁迺聽立廟沔陽其傳至今夔州豈獨忘之侯故第在成都像設甚偉望之儼然猶可想見風烈予始命卧龍寺僧慧璉爲侯創祠且繪其像以慰國人之思而紀其大畧使復有文中子者觀之當以予言爲然隆興甲申日南至右承議郎充敷文閣待制知夔州軍州提舉學士兼管内勸農事充夔州路兵馬都鈐轄兼本路安撫司事賜紫金魚袋張震謹記諸葛武侯廟記張栻自五霸功利之說興謀國者不知先王仁義之爲貴而競於末塗秦遂以勢力得天下然亦遂以亡漢高皇帝起布衣一時豪傑翕然從之而其所建立基本率滅項氏者乃三老董公仁不以勇義不以力之說也相傳四百餘年而曹氏纂漢諸葛忠武侯當此時間關百爲左右昭烈父子立國於蜀明討賊之義不以强弱利害二其心葢凛凛乎三代之佐也侯之言曰漢賊不兩立王業不偏安又曰臣鞠躬盡力死而後已至於成敗利鈍非臣明所能逆睹誦其所言則侯之心可見矣雖不幸功業未竟中道而殞然其扶皇極正人心挽囘先王仁義之風垂之萬世與日月同其光明可也夫有天地則有三綱人類之所以别於庶物者以是故耳若奮於利害之中而忘夫天理之正則雖有天下不能一日居此侯之所以不敢斯須而忘討賊之義盡心力至死不悔者也方天下雲擾之初侯獨高卧昭烈以帝室之冑三顧其廬而後起從之則出處之際固已有大過人者其治國立綱陳紀而不爲近圖其用兵正義明律而不爲詭計凡其所爲悉本大公曾無纎毫姑息之意顧皆非後世所可及至讀其將發上表之辭則知天下之物欲舉不足以動之所養者深則所發者大理固然也曾子曰士不可不宏毅若侯者所謂宏且毅者歟孟子曰富貴不能淫貧賤不能移威武不能屈此之謂大丈夫若侯者所謂大丈夫者耶侯旣没蜀人追思時節祭於道上後主用廷臣之議立廟沔陽使得申其敬去今千有餘𡻕蜀漢間往往有祠奉祀不替侯之澤在人者深矣衡州石鼓山舊亦有祠按蜀志昭烈牧荆州時侯以軍師中郎將駐兵臨蒸以督零陵桂陽長沙三郡調賦以充軍實今衡陽是也蒸水出縣境經石鼓山之左會於湘江則其廟食於此固宜考昌黎韓愈及刺史蔣防詩碑祠之立有自來矣乾道戊子之𡻕湖南路提舉常平萬君成象始以圖志搜訪舊迹得廢宇於榛莽中乃率提刑獄鄭君思泰知衡州趙君徙于高明而一新之移書俾栻爲記栻惟侯之名不待祠而顯而侯之心亦不待記而明然而仁賢昔時經履之地山川草木光彩猶存表而出之以詔來世使見聞者竦然知所敬仰思慕當道術衰微之際其爲有益葢非淺也惟栻不敏不足以推本侯胷中所存萬一則愧且懼焉移建武侯祠記王十朋武侯故祠在州之南門㳂城而西三十六步無斷碑遺刻以考其𡻕月之始見於圖經者略焉在隋唐時治白帝史載少陵詩曰西郊諸葛廟者其地於兹乎十朋涖事之初謁焉裴囘四顧敬想風烈歎廟貌之不稱它事未皇也首葺而新之且書其事于石矣然地卑巷隘混以民居汙渠糞壤溷乎其間臭朽之所蒸蝸螾之所家非所以妥靈而崇祀也門之東去祠一百八十五步城有臺下臨八陣圖登樓而望則常山之蛇四頭八尾之勢宛然在目北直郡倉倉故永安宮也據爽塏狀如屏宮之北有水曰淸瀼瀉出乎兩山之間東入於江又東過灧澦入於峽峽口有山卓然立乎羣峯之外者白鹽也可謂江山之勝矣侯昔經營天下於平沙之上輸忠盡誠受遺立孤於是宮之中江流洶而石如故宮闕廢而地猶存陵谷雖變而精神不亡宜於兩者之間祠之亦侯之志也遂與同僚謀而遷焉地初爲節度推官宅徙于它所因其址築而高之用其材斵而新之爲堂五楹廡萬椽南門于臺又門於西通往來之道像仍其舊新厥丹靑冕服用侯又塑關張像翼於左右故祠以婦配非禮也別爲室以奉之書史傳於壁之左而削其不公之論書少陵詩於壁之右以諸作者詩文次之乾道三年四月壬午告成詩以紀之詞曰白鹽峙天兮灧澦屹江風雲慘澹兮翺翔卧龍龍千秋兮何之新廟貌兮江之湄前八陣兮後故宮龍兮龍兮神其中望昭烈兮隔淸瀼遺廟存兮交精神於惚恍駕虛空兮雲爲馭臣東朝兮主西顧魚得水而相忘兮事無今古儼關張於左右兮一龍二虎祠有新故兮侯無重輕舍其故而新是卜兮邦人之情祠合於圖兮自今始祀事不絕兮有如此水漢丞相諸葛忠武侯廟碑王謙有至大至剛之氣然後能行至公至正之道是氣也藴於天地未分之前散於天地旣分之後不爲堯存不爲桀亡誠天地之正氣也古人有大行不加窮居不損遇患難不爲屈臨死生不少變者何善養此氣故也孔子而下惟孟子爲善養孟子而下其諸葛忠武侯乎漢自桓靈失德曹氏竊命一時智臣謀士悉爲之用獨武侯高卧草廬不求聞達若將終身焉及感昭烈三顧之恩奮然起應雲龍風虎千載一時振墜緖於一隅斗絕之地奪遺黎於羣盗垂涎之口武侯果何所見哉所見者至公至正之道行之果處之當不容一毫私僞雜乎其間非胸中剛大之氣培養有素疇克爾邪已而長驅祁山有飮馬河洛之志不幸天不祚漢大厦方隆而梁木吿摧則君子當歸之天而亦不敢以成敗例論之也向使昭烈武侯不死則復漢祚而成王業可翹足而待矣嘗謂出師二表見武侯所以吿後主一本於正殊非刻狹陰謀之說信可與伊訓說命相表裏昔人有言讀出師表而不流涕者其人必不忠非過論也宋鉅儒作史編書昭烈爲僭武侯爲冦嗚呼昭烈帝室冑也武侯王者佐也孰爲僭孰爲寇善讀者能自知奚喋喋爲哉距南陽治城西七里而近有岡曰卧龍俗以爲武侯隱居之所前人卜地一區起屋四楹繪像而祠祀焉厯幾𡻕月棟宇傾撓危基頽圮鞠爲瓦礫榛莽邱墟良可痛悼大德戊戌監郡奉直公馬哈馬拜謁竟顧謂左右曰武侯漢之賢相正義明道誠有功於後世若視廟貌久毁祭血久乾漫不加省守此土者能無愧乎退與少府朝列李君源貳政武略程公國僧總判承務公忽辛曁幕府高翊輩同其議遂庀徒蕆事一易而新之命典史李從善董役立象儀于中以雲長翼德從祀綸巾羽扇其容肅然足以起四方觀者之敬庚子春功已告成禮請解梁太虛觀道士張志和主住持事又割旁近田貳百畝有奇以爲𡻕時香火之具嗚呼若數公者可謂敬於事神矣神旣能敬一日遣兵曹掾劉熙來速文愚曰武侯大節陳夀且不能悉况碌碌者哉牢讓不可因掇民謠作迎送神辭以遺俾歌以侑神其辭曰侯之來兮飈馭雲車其冠峩峩兮其纓于于肴在爼兮酒在壺禮雖不足兮敬有餘侯之去兮何方溪風淸冷兮山月蒼凉望之不見兮我涕滂澤在人心兮終千古而不忘勅賜南陽諸葛書院碑程鉅夫皇帝卽位之四年冬十有二月集賢大學士臣顥言臣幸待罪周行在帝左右崇智下無以仰答聖明有能推尊聖人之道表章大賢之業作興民俗敷宏治化者此眞臣人之職而上之所宜聞也臣謹按南陽城西七里有岡阜隆然隱起曰卧龍岡有井淵然渟深曰諸葛井者相傳漢相忠武侯故居民𡻕祠之巫覡雜揉薦獻無節黷禮慢賢君子病之至大初故河南行省平章政事何璋行農至郡率官吏老長伏謁祠下顧瞻徘徊愾然興懷謂守史烜曰孔明三代而下一人而已武昌相去千有餘里猶建廟學而尊祀之况其所游處者哉出步祠東得隙地焉曰是以建廟學足矣遂諉烜烜下邑主簿趙守訓董其役迺合僚吏祿入之贏以備傭相山之有良木堅石而隸於官者以具材審制席地之輿記官養士之宜上省以聞報可至大二年春卽工大修侯祠而加廣焉祠之東爲孔子廟廟之後爲學凡堂序門廡庖湢庫庾肄業之齋庋書之閣官守之舍咸備以間計祠十有二廟學四十有六端莊廣直不務侈麗皇慶元年秋落成割官之廢地四十頃籍於學置山長一人掌其教訖功且再𡻕矣廟學之顔麗牲之碑惟陛下幸焉卽日下中書平章政事秦國公孟與翰林集議臣孟等言夫子廟宜因舊制殿曰大成之殿門曰大成之門侯之祠宜曰武侯之祠侯曰非澹泊無以明志非學無以廣才非靜無以成學學爲侯作也宜以講堂爲靜成之堂東序爲明志之齋西序爲廣才之齋閣所以叢羣書也宜曰崇文之閣合名之曰諸葛書院制曰可其命翰林學士承旨賡書之翰林學士承旨鉅夫爲碑文書篆并以付賡臣鉅夫竊謂周道旣衰孔子作春秋而萬世君臣之法定曹操纂竊羣雄起而爭之春秋幾廢先主揭大義發大號再造劉氏侯首稱漢賊不兩立王業不偏安間關百折期復漢祚春秋之義煥然復明至今三尺童子猶知賊曹而帝漢者侯之功也傳曰有功於民則祀之侯之功萬世之功也於祀爲宜祀於其居爲尤宜嗚呼我朝聖祖神孫武定文承薄海内外罔不臣妾諸學子以及有位之人師聖人之道仰大賢之業夙興夜寐可不思廟學之所以建聖天子之所以命豈徒誇前人聳後觀哉所以教天下知爲君臣之道也烜世有勳伐今守饒州守訓供養翰林云詩曰惟皇上帝降衷于民惟皇作極以君以臣皇風旣邈王霸迭作迺修春秋褒善黜惡漢有天下擬迹舜禹厥德旣衰冠屨易處不有先主孰扶大綱不有武侯春秋以亡河漢之間南陽之郭盤盤卧龍惟侯之宅山縈川絡霧矯霞舒尙想君王顧彼草廬惟侯之學伯仲伊呂惟侯之志光武漢祖躬耕之憂廊廟之蹈義信志詘四海共悼廟學之設惟侯之思天子之錫惟侯之儀高山景行君子所履詞臣作詩永作臣軌仁宗皇帝在位十年禮文具治昔未遑者彌綸大備煥乎燦然見諸事爲則設科舉以登俊良聘巖穴以崇隱逸百司胥史補之以儒豈徒然哉葢將丕變天下之俗承承繼繼貽謀億萬維年淵哉旨也時之臣鄰莫不仰副聖明佐興致治故汴省平章臣瑋行部南陽謁漢諸葛忠武侯遺廟壯侯之烈曉有司創書院以莪育人材爲請集賢大學士臣顥以聞命中書平章臣孟定其堂序宜召學士承旨臣鉅夫文其事書篆并以付學士承旨賡嗚呼盛哉陛下於一書院之切如此有司奉揚之道當何如哉閱六七年文猶未入刻至元洊紀之六年春二月山長臣嚴夀白之府臣知府事脫脫同知府事錄資判官雅納忒識禮推官矩知事郁提控案牘璟僉曰茲制敕也稽閤又可如是邪戒縣臣達魯花赤答失蠻縣尹仲謙主簿元禎典幕克明弗旬已劖之石矣倡興修廢顧不偉歟而今而後學之師生對越斯碑歌頌恩澤以明聖人之心爲體行聖人之道爲用正人綱識時措尊教報本何但作章句腐儒而已哉布衣臣懿稽首書勅賜諸葛書院增修學宮記張繼祖至元己丑冬諸葛書院山長洛川員時達過許昌予僑居草堂揖曰走承乏是役卧龍祠下以奉香火攷其故卽忠武隱居之地鄕人立祠血食有年大德戊戌尹是府者亦嘗葺之以關張配享比舊攺觀延祐二年聖天子御極開廣人文風勵名教近臣奏請創起孔明書院制下中書翰林詳定學制仍以孔子殿曰大成閣曰崇文取侯之遺訓講室曰靜成東西兩序曰明志曰廣才雄敞壯麗大其故制名之曰勅賜諸葛書院撥田奉祭廩給師生設山長主之迄今易四十星霜風雨震陵瓦木腐落走厯三換𡻕華戰懼無補坐視就荒其責愈重乃積其田租欲經營之會知府事朝請莊公下車以新養學士爲急務乃曰忠武侯故祠朝廷立爲書院俾其祀無終窮優禮古之元勳其亦隆矣弗增葺之無以副上崇儒重道之美意也山長汝其職勿怠於是掄材鳩匠廢者撤而新之無者補而完之如大成殿堂閣門廡悉輪奐焉聖哲儀像剝落復設色焉飾其牌扁繪其祠壁新其井亭與夫祠之額以及兩廊繚其周垣製祭器如香鼎罇罍爵玷籩豆之屬百件有畸凡五檠六供卓皆朱髹之起東西齋各三楹增蔣琬及侯之嗣瞻二將於祠下標著十將名額皆前無而今始有之弗紀𡻕月無以示將來然增葺皆知府公志走代其勞請予文其事刋諸石以示悠久不亦宜乎予聞其言義之竊謂侯之名氏因書院而始著侯之勳業依吾夫子而益彰而侯之盛心千載之下獨廣漢南軒先生知其然摭其本末爲之傳而後見侯平生大節佐昭烈興復漢祚剗除逆黨以定中原噫嘻朱子有云天運竟不囘王圖不偏昌惜哉侯之忠誠貫乎日月志節厲乎名教厯千古而不磨信矣綸巾羽扇儼然如生奚啻篡逆仲達之知畏亦豈陳夀之管見能窺其髣髴也子之新其學宮遇賢尹相與有成功與其曠者烏可同日語哉遂書以激後之君子漢丞相諸葛忠武侯集卷之十六碑記重修諸葛武侯祠記王直南陽郡城西有阜隆然而起曰卧龍岡漢諸葛武侯嘗居於此故卽其地建祠以祀焉元至大中河南行省平章政事何瑋行部謁祠下病其狹乃下有司充廣之又卽祠之東建書院以設官養士事聞朝廷名書院曰諸葛書院祠曰武侯之祠世移𡻕久書院蕪廢祠雖幸存然日亦就頽毁前之爲郡者莫克任之洪熙元年五月太守陳君正倫始至往謁焉周視祠宇蕭然破壞采椽敗席不蔽風雨退而嘆曰侯之德業在天下當百世祀之况其所居之地乎今祠如此何足以竭䖍妥靈乃於農隙伐材命工撤而新之冬十月成正堂三楹其餘方次第營之未就而當朝賀來京師明年春二月還郡適同知張永推官司憲南陽縣令李桓圭後先繼至相與恊圖其事未幾兩廡皆成繚以周垣前爲大門以時啟閉而祠堂之制始克大備祠之中塑武侯像凡其器用則南陽衞南陽中護衞具焉正倫吿祀以落其成又𡻕以八月二十八日率郡縣僚屬奉少牢致祭拜跽有位薦奠有所進退周旋克中儀度郡之人士皆欣然稱嘆曰陳公爲此其可謂尙德之君子矣然不爲之記則何以示後人俾維持之永勿壞至是正倫來請予記予謂先王之道以明倫爲本周衰王者之迹熄至於秦極矣漢興學者乃復得聞先王之說至光武明章其道庶幾明矣士之出於其時者皆秉禮義徇名節綱常之際截乎不可紊也降及靈獻大盗繼起建安以來曹氏最爲雄盛逞其詐力以誘脅天下豪傑之士莫不折而從之其所圖者皆僭竊暴悖之事豈復知有綱常之道哉逮華歆之志得李伏之說行而三綱絕矣當是時莫知有非之者雖吳國多才亦委曲順從之不暇是天下之人皆淪於逆理亂常之規獨武侯奮勵圖復漢室毅然以誅曹爲心出師二表正名定分懍乎王者之師使天下之人曉然知曹氏爲賊綱常之道賴以不冺後之君子因是而正誼明道以扶世立教則侯之功大矣豈特與勞定國死勤事禦大灾捍大患者比歟雖百世禮之可也且嘗遊處乎此神之所顧懷民之所向慕焄蒿悽愴如或見之則嚴祀之以視教焉葢宜矣然今之爲郡縣者於有司之事部使者之所督責尙勉勉焉有未至若先聖之祀學校之政亦有怠而廢者其能崇先賢以儀後進如此葢鮮矣而正倫能之非誠所謂尙德者哉則凡政教之所當務者其從容優裕可知矣正倫廬陵人由進士爲監察御史至今官能持大體以恭約愼靜之名宜今之所立有過人者故爲文俾刻石使後之人有考而繼之也新建諸葛忠武侯祠碑記楊士奇綱常之理原於天而具於人心者與天地同其覆載與日月同其照臨與四時同其錯行與五行同其禪續亘萬載猶一日不以前而豐不以後而嗇不有聖賢以扶持之則人道幾乎熄矣是故湯之興也有伊尹釋耒耜於莘野以佐之武之作也有呂望釋釣具於渭濱以相之宇宙爲之一新綱常爲之一振拔生民於塗炭之中登之於春臺之上聳殷周維新之氣象與唐虞比隆者伊呂之力也當漢之季諸葛武侯隱於隆中躬耕畎畝謳歌梁父有伊呂之志操人莫知之也惟司馬德操知之惟徐庶知之以之薦於先主遂枉駕三顧於草廬之中立談之頃嘉謀嘉猷足以破曹之鬼蜮搗權之鴞張吹噓炎精之煨燼俾之再熾於西南厥後身都將相鞠躬盡瘁直欲恢復舊疆混一區宇俾綱常正人極立奈何渭上之師方張營中之星遽殞觀出師二表則公志操同乎伊呂可徵矣彼以木牛流馬之功七擒七縱之奇八陣籌畫之妙爲公能事者知公之膚者也去南陽城七里許有岡焉曰卧龍有菴焉曰諸葛有井焉葢公嘗汲而飮者也有祀焉邦人尸祝公之處也𡻕久傾圯鞠爲荆棘建安陳侯悌以甲辰名進士烏臺御史奉簡命來守是邦顧瞻曰嘻勸節表忠事誠在我爰出俸貲爲鼎創倡寅寀及屬曁衞之武勳相與和之又俾郡之都紀募緣於富室以助之費旣足矣乃瀉材於川輦石於山陶甓於野庀工傭役中屹祠堂傍翼兩廡環以崇墉蔽以修門塑公像於中凡鐘皷几爼籩豆罍爵奉祭之需靡不畢備菴旣落成徵予紀其顚末刻之石庶幾嗣而奉祀於斯者得有考焉嗟夫詩不云乎天生蒸民有物有則民之秉彜好是懿德世之人惟其皆有是綱常之理故皆有是好德之心惟其皆有是好德之心故樂新公祠者不約而同此倡者和者助者之氏名皆宜書遂書而刻碑後繫以銘銘曰成湯肇殷伊起有莘武王造周呂奮渭濱聖臣何心孚乃一德用扶天綱用立人極湯誓泰誓時雖後先一德之純如日麗天惟忠武侯丁漢之季愍漢之疆瓜分鼎峙奮起隆中扶日當空志靖九圍俾之混同再表出師有䖍秉鉞火德旣衰吹之弗曄師進於渭星隕於營混一之志潰於垂成有子曰瞻死忠於國先志之承不匱之錫卧龍之岡實公舊廬昔有祠宇久焉榛蕪賢侯作守知政先務構之塗之丹艧如故乃潔罇罍乃聲笙鏞乃饎乃饔乃享新宮惟祀之崇惟忠之勸春蘭秋菊終古盥薦重修諸葛武侯祠堂記李東陽君子之用世必心存乎正則其猷爲功業光明俊偉天下信之後世知之苟所存不正則其所爲雖偶合幸中而疵類罅漏掩匿之不暇縱使欺於一人不能逃千萬人之目誑於一時不能免千萬世之口此諸葛武侯之忠所以通天地貫金石厯今古而猶存也昔公當漢祚傾危之日雖在畎畝而扶顚撥亂已預定乎胸中顧以獻帝之身方墮於曹賊之手失國寄命無復有可爲之勢帝冑之賢無出昭烈右者故委身而從之當是時苟可以存漢雖萬乘有不暇顧一劉璋宜無足䘏璋固擁兵坐視遣使致敬于賊者也及魏丕篡立昭烈顧命侯益自奮激佐庸主而不墮其志累蹶累進至於斃而後已焉是其心始終存没無一日而不在漢也可謂正矣若泣廖立死李嚴屈司馬懿而不敢動者豈獨其摧彊制勝之力邪亦平生忠義激發而讋伏之耳彼荀彧者以溝瀆之經爲成仁取義之舉雖幸免涑水之論而竟黜於考亭之筆豈非自失其正以貽天下後世之議哉彧不足道也以張子房之賢報韓扶漢世所並稱然究其心論之亦不免以術濟正未若侯之純乎正也程子謂其有王佐之心者其以是夫故後之學者當以侯爲正南陽府城西五里卧龍岡爲草廬舊址漢史稱侯躬耕南陽又曰寓居襄陽隆中葢秦南陽郡卽今鄧州而襄陽實在其界故也元建祠祀侯又置書院設山長聚徒講學給田數百頃國初祠燬宣德間知府陳正倫陳悌相繼修葺𡻕以八月二十八日爲侯忌辰而致祭焉成化間知府段堅重建堂宇復書院舊規擇士以教越二十年頽圯過半弘治乙卯河南參政顧君福分守兹地乃檄知府馬輿下知縣李通鳩工市材復爲堂六楹中肖侯像左右廡楹亦如之其復爲亭覆以茅扁曰草廬廬之後又爲堂六楹曰卧龍祠之左爲堂廡各四楹曰書院始事於戊午夏四月成於秋八月又歸其故田肆頃以供祀事是役也巡按御史李君瀚實主之按察副使劉君俊亦預焉顧君之巡汝甯也夜夢侯訪之若世所傳畫像者適草廬結搆日也夫忠義之在天下人心所同而君好古勤政嚮慕獨至故形諸寤寐如此然則學於此者亦可以監矣君比以書來請記修建始末以貽後人庶其久而不廢東陽亦慕侯深者故樂爲之役云助修武侯祠宇記葉桂章嘉靖乙酉年仲冬予奉簡命使唐府之南陽暇日得晉拜武侯祠於卧龍岡岡在郡城西南可七里許叢竹蕭蕭古樹森映祠之前有孟陽溪橫亘而東未百步爲石梁梁内爲正門門内爲坊坊内爲殿宇肖侯貌其中後𥪡碑亭刻侯前後出師二表岡脊爲八角亭圖以八陣卽草廬舊址也舊覆之草列縣𡻕入葺之今且易以瓦矣而草尙存其愛禮之意邪直上數步爲岡原竪客亭三間以資游息最上邱爲樓居四面洞開一望千里遠山長江舉目無際兩傍前後皆爲羣房以居道眾崇祀事焉地勢四面稍下惟中岡隆起故曰隆中葢南陽偉觀也第時久未葺率多草莽其坊亦坍塌唐甓垝坫鏝杇黝堊之屬亦皆有缺豈作者遠而繼者疎邪余方縱觀病無以爲興理也於是乃捐厥廩餼圖惟聿新因謀之南陽邑侯賈君東陽君慨然曰有司之責而煩執事吾顔且汗矣梓材丹艧圖維其終垂紹將來當昭其始執事尙識之庶風來者夫是役也前人創之大規弘制所少者潤色焉耳余安能爲役哉譬厥三軍餽以簞食若爲高山覆之一簣余安能爲役哉然善歌之人人繼其聲故犒師是用全魯偃息可以藩魏其聲使然也後之人同聲者豈少也哉余於是日卽北上抵葉別駕李公原任聞之尤樂爲助吾喜是役之有成也乃援筆書之以付賈侯經營規畫二君子有焉是日同遊者郡守宋公德威鄧州守余君懋賢州判金君信臣並書此誌之有樂助焉者當俟訖工書之碑陰重修忠武侯祠記陳鳳嘉靖十有五年二月南陽太守四明屠公諱倬字文卿尊奉天命肇禋祀以漢丞相諸葛忠武侯基迹隆中感會魚水中興炎祚實維王佐卧龍有祠厯世崇尙廬井依然一維厥舊熙朝有尊厥有恆祀儒臣撰策郡守從事亦孔之厚自楊公以來已十餘年不復繕治墻屋傾凹丹碧澷漶日就圯廢豈所以欽賢承德意維昔鄉先生没於社則祭畏壘之民猶厪爼豆矧如忠武侯伊呂之亞百代一人而使其祠久舊弗治不知其可爾乃飭庀五材勤兹百堵繕故爲新增陋爲美頽朽悉易加以宏麗棟宇侔雲漢光采照天地言言炳炳過者起敬一年再至躬進牲帛以稱朝廷崇古尙賢之意再踰年遠遷秩憲司以去其佐鳳乃採公言是用作頌刻之石著厥終始以詔來裔其辭曰常塗興䜟赤銳弗光桓桓帝冑奮志騰驤陽爻旣極乃戰於野栖栖襄漢誰與佐者睠兹南陽高卧維龍抱膝長嘯時乎不逢泥蟠天飛感厥三顧跨有梁益承天之序草廬碩畫無言弗讐受遺作輔志復神州大厦靡支玄象示變惜也未止志士攸嘆昭烈明府出牧此邦有惠有威時雨時暘有嚴閟宮龍岡之上往廢斯飭赫矣宏敞尊德上賢明祀敬共肅肅其敬穆穆其容君侯來思雙旌五馬從以賓佐魚魚雅雅君今去我風軌則存思君明惠望君車塵龍岡蜿蜒環以淯水告成有碑於千萬祀新建諸葛忠武侯祠碑記張時徹天下莫大於義而强有力不與焉智計不與焉昔漢鼎之播也曹操怙梟雄之資以擅中原孫權席父兄之業以據江左矜尙智力競求非望天下知有魏與吳耳而昭烈方以一旅興間關困踣非有如林之眾與可憑之土也當是時敢有言相輔以圖大事者哉而侯以草廬之夫承三顧之勤乃遽許以馳驅非徒以堂堂帝室之冑足以聲大義於天下耶已而雲雨旣得謀成掌中光啟雄國上延絕緒發獻帝之喪討曹瞞之逆義檄四馳荆楚響應直欲首吞鄜鎬尾控伊洛然後兼吳會而蕩楚越侯之言葢略酬矣卽其所自設施拳拳以開誠心布公道集眾思廣忠益爲務故其言曰若遠小嫌難相違覆曠闕損矣違覆而得中猶棄敝蹻而獲珠玉也然人心苦不能盡苟能慕元直之十一幼宰之殷勤有忠於國則亮可少過矣於乎三代而下有如侯之心事者乎故雖中道云亡漢紐不續跨有荆益僅成鼎峙之勢薦駕戎車未收混一之功而仲達生走平立死悲後之君子咸以伊呂許焉謂智計强有力者而有是乎以今觀之張弛協於人情綜核周於庶政斬將覆軍發無虛舉築室反耕動有成算八陣之圖不刋流馬之運非古則侯葢非無智計者故道化行於域中風聲振於徼外而頌功德稱神明巷祭而野祝者環梁益皆是也語所謂生而正直則死而爲神其然乎其然乎成都故有專祠旣以合祠於昭烈而廢檗谷王公曰侯之功德大矣不專何崇不崇何稱庸得已諸昔孔發如仁之嘆詩咏勿剪之思古今人情要豈相遠哉今夫釋老之宮鬼伯之構環城以内外矗如也而獨於侯靳之豈所以彰哲軌而翼休風乎是實在予其何敢後乃請於蜀王闢浣溪之隙地而祠焉而余實來代公遂述而碑之乃其行業之懿則裴晉公之記詳矣碑葢以昭蜀王尙德之美與王公興廢之績云辭曰嗟忠武侯曷躬畊南陽乎曷龍潛於野弗騰弗驤乎曷四海鼎沸如蜩如螗乎曷不吳不魏枕高岡乎曷草廬三顧魚水洋洋乎曷舉世皆霸獨以王乎曷親吳讐魏曷短曷長乎曷戎車薦駕亶劻勷乎曷三分鼎立戰玄黃乎曷信義旣布漢炎弗終乎曷將星告殞中道崩徂乎曷大志弗終以莫不傷乎曷廟貌尸祝墟落相望乎曷築爾新宮美棟美梁乎曷鳴鐘吹竽鼓堂堂乎曷踐爾籩豆奠椒漿乎曷衣裳楚楚以翺以翔乎曷降鑒我民四國于匡乎修諸葛井祠記楊名成都錦江街中舊有井其制與他井不同大約中虛方丈深二丈口徑尺許精巧堅固非俗工所能爲以創自諸葛忠武侯故託之名然侯之爲此也自有深意或曰蜀都上應井絡且當岷峨之勝故設此井以通王氣審如是則侯爲漢之心可謂無所不用其極矣侯本草茅一介之士窮卧隆中寄志甚高而託言甚近時未有能知者唯昭烈因徐庶之薦往造其廬問以事勢數語契合魚水斯投乃賊之不亡而漢之不帝惴惴旦夕是故智之所及力之所能眞鞠躬盡瘁死而後已且欲以人勝天以神設教如臨卭火井其勢漸微闞而噓之使之復盛由兹而觀則修井通氣亦事之所必有者侯之報漢何其忠且切哉顧𡻕久井且湮没匪但疎遠卽鄕里之人詢厥所在皆茫然莫能對殊可慨矣今年春蘖谷王公以大中丞拊循我蜀其治雖因時損益而其意則多述侯之舊大抵開誠心布公道以身許國以德飭政所以爲之主本者遠相符合故也考古修廢偶及此井遂命有司大加葺治井上覆以方亭設旱碾以利民用井南設屏門一内建正廳三楹以祀侯像左右爲廂各二門戸區别皆前此所未有者工已名適以訪醫入省成都知郡大夫馬君過予而吿以其事且屬爲之記余自有知以來嚮慕往哲每讀史傳至伊呂大致必掩卷嘆仰若難乎其繼至漢而得侯又復暢然以喜也由是而益究心焉乃知古今人所以爲學與夫學之所以爲用判乎其不相若而不覺然以悲夫身有出處道分體用固理勢所不能免然自宋儒始言之漢以上則不必然也伊呂余無庸論卽論忠武侯方其躬耕南陽與廣元公威輩何所優劣及䝉三顧而後出出而經畧中原謀猷舉動必中機宜雖其時尙紛爭未暇於制禮作樂興復古道其以安危爲已任親賢遠奸信賞必罰事先大義言合眾心規摹之弘非兩都將相可望至於用兵如神十發九中張韓鄧馬未許比倫其學之爲用果何如哉陳夀薛俞輩固不足道宋儒評品亦未超然乃曰若侯者體正大而學未至其甚者謂眞以管樂自許嘗爲後主寫申韓六韜書及勸昭烈取荆益以成伯業遂斷然以其學爲駁雜嗚呼出處有光體用無缺侯眞秦漢以上之醕儒也而宋儒之論乃如是不知彼所謂學又果何物也哉識者謂舉宋儒以秉鈞當軸未必於事有濟要未可不謂之知言也乃如木牛流馬八陣七縱之事特侯緒餘往往奇之大加稱賞見豹一斑恐非定論矣唯傳侯者云其餘力所及官府次舍橋梁道路無不繕理兹言其有確乎余嘗謂伯仲伊呂禮樂有興與三代遺才之嘆庶於評侯爲正而拘士之說政自無所損益也蘖谷公葺理斯井亦勿翦召棠不伐孔林之意且使後之人知賢者所遺萬世不冺而因小求大必有以侯爲之師者風教所係豈小小耶若以爲奇其事而章之不可以語二公異世之同德矣余明非知人直陳所見附於記井之末雖不及見侯尙幸見蘖谷公而請正之也公何以教余哉重建諸葛亭記俞大猷昔諸葛先生躬耕南陽時人以伏龍稱之故名其所居之岡曰卧龍是山因先生而得名也桂林郡有峻山古名卧龍後人以其名之相合結亭其巓塑先生之像而時祀之是先生因山而得祀也然先生爲天下後世仰止無已者其何以得之哉陳承祚爲先生理民之幹優於將畧是未足以知先生之大烏足服先生之心哉猷謂先生爲相亦優爲將亦優但此二者可以一人而並優不可以一人而並任可並優者人之才也不可並任者勢不行也相居閫内秉樞持衡若國難方殷大憝未殄興師十萬日費千金皆將取足於民理民無方則財用不給爲相臣者豈容一日使居外哉將治閫外張軍宿野常如見敵援桴而鼓呼吸存亡賞罰不當則兵不服號令不申則兵不齊節制不明則不能決勝爲將臣者豈遑一日使居内哉故蕭何爲相韓信爲將而漢興魏徵爲相李靖爲將而唐興將相不相越以相侵乃能相資以相成若一人之身將相之事兼理形疲神困兩不得成此不可謂其才之不並優實其勢之不可以並行耳噫先生之慮非不及此先生獨苦之心誰則知之方漢末擾亂宗廟傾危先生生逢其適進欲龍驤虎視振長策而淸宇内上無可同量之主下無可同事之人乃退而龍潛虎伏高卧南陽夫南陽北通中原南連荆襄天下之大通都也先生卜隱何取於此不過欲居此通都博求至人共成初志求君得君劉玄德公旣有帝王之量又爲中山靖王之後是可與有爲矣苟得其人焉如韓信如李靖先生爲相以成之可也苟得其人焉如蕭何如魏徵先生爲將以輔之亦可也而皆不可得雖幸有關張二人足稱名將乃驅馳未久相繼淪沒君子謂關張沒而蜀之事已去眞確論也天竟何如無意於漢劉玄德公隨亦沒矣先生之志不亦孤乎中夜思維託孤受遺言猶在耳漢室存亡寄吾一身舉目徬徨無可共圖或出或入或將或相攬機總握甚非先生之所樂爲也楊顒氏以先生不知位分之體失爲家主之法先生亦竟無辭以對但先生自知一日不任相事則軍需必窮而國政先墜一日不任將事則士心必離而敵國益橫不得已而並任之至於功業陵遲所志不竟自當付之於天非人智力所能爭也其在先生淡薄則氷玉共潔甯靜則山岳同體忠貞則霜雪爭嚴精誠則金石可貫存亡不易其心終始不異其志論者以三代而下人才唯先生一人豈欺我哉使幸而生於三代多才之時豈不能建周公作樂制禮之業立太公啟代開國之勳唯不幸而生於季世乏才之日反不能成蕭魏韓李諸人之事重使千古英雄墮淚於無情之地興嗟於感憤之際其心已不能堪不知先生當日身處其厄將何以爲心哉雖然炎漢江山在當時不能光復先生固不無遺憾然天下名山有稱名偶合者後世之人且以屬之先生得與北方堯山舜廟相悠久亦可自信而自慰矣乎亭宇𡻕久將傾大巡白野朱公感慕先生之風議重建之臬司諸公咸以其司多得此山之勝而又有先生之像在其上遂舉行之藩司諸公從而力贊之不踰月而工竣偉然西粤會城一大觀也命猷記之猷因論先生之大以吿同志重修昭烈帝諸葛丞相廟碑文梁士濟維皇明奄有四海通關梁不異遠方西蜀僻在坤維如宇下瞿塘走楚劍閣通秦周道踧踧也崇禎十有一年余奉天子命來巡捫參厯井造於蜀都於是察吏旣竣乃求古先百辟卿士之有益於民者而禮謁之乃曁藩臬諸司牧伯令尹謁漢昭烈皇帝君臣之祠而瞻拜焉禮旣成榱桷几筵殊有生氣徘徊顧瞻作而嘆曰夫草廬三顧誼隆於䀻莘永安受遺忠符於桐墓考載籍尙嘉之矣不踐斯土也安知古先哲人經綸之有本用意之宏閎乎皇漢在建安之末四分五裂矣世皆以三分鼎足爲諸葛公之本謀也察其地形險阻不足以自完先哲之謀應不如是故自金牛啟道據之者顚憑之者蹙是不一姓矣昭烈以興復漢業首事西南其三顧咨詢必有祕畫善乎草廬之初計議也曰益州天府之地高祖因之以成帝業故史稱收功實者常於西北禹興於𦍑湯起於毫周之王也以豐鎬代殷秦之帝雍州興漢之興自蜀漢葢昭烈君臣亦猶是志也觀其紹統之後今年出斜谷明年出祁山迄中營星隕無休歇而先主以不暇給之年尙窺吳幸三峽其不爲險阻以自雄亦明矣故曰漢賊不兩立王業不偏安興復漢室還於舊都斯則着着籌算皆出蜀漢還定三秦之祖武乎夫得天下有道得其民得其心而天下可得蜀山川險峻民生其間多雄傑武健之氣可以大義服而不可以私惠懷武侯專國十二年賞罰平明斗石以上必親而赦令不妄下其言曰治世以大德不以小惠至其沒也雖投荒罪廢之豪猶掩泣追慕而受遺輔導之際袁宏所謂劉后授之無疑心武侯當之無愧色視狼跋疐胡復予明辟之擾擾殆超而上之推其本則澹泊甯靜一脉信於君而孚於民乎初余讀漢事至孟獲之七擒七縱私心竊怪多材多藝武侯之好奇也今厯其地形方知蜀西南邊徼多反側不震以天威則反側不消諸蠻之反側不消而有事中原則邊民必睥睨其後師出在外而蠻叛於中首尾不相救險道也故渡瀘深入南方已定總爲奬帥三軍戡定中原計治遠先自近治外先自内王道施爲之次第洞焉觀火蕩蕩平平有何奇術哉朱考亭曰三國之興蜀爲正其志在興復也王仲淹曰孔明而無死禮樂其有興乎夫孔明不死則漢祚必復漢祚可復則中原無典午之篡弑世界猶天冠地履之世界也亂臣賊子不得污天位則戎狄何繇躡瑕乘釁五胡何得迭擾而致河洛爲墟神州陸沉且三百餘年哉此殆天地值板蕩之運而不繫於炎祚之旣熸王氣之遠蜀也聖賢不能違天夫旣不能爭禮樂干戈於世運又何能爭絕續於赤精之旣竭哉去蜀漢之興已千餘年而西土思慕如初君臣將相合祠以報功德維風教所從來久遠矣余與督撫傅公共事是邦交相警也日幾幾乎澹甯遺韵而平明廣大之體步步趨趨蘄毋或踰之法古無過先民是程斯廟之所以重修乎旣落成新廟奕奕萬民和悅迺論次其造邦始事之訏謨而勒石焉俾前哲心法與廟貌俱炳凛凛生氣正人心而齊光日月比夀乾坤是亦我後之人少抒對揚乎徯斯之役以屬華陽毛令而毋曰有事爲榮也請進而賦小雅之高山景行
