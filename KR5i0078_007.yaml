  text: 漢丞相諸葛忠武侯集重刊道藏輯要漢丞相諸葛忠武侯集卷之十七
  hash: sha256:7792ac324c5dfe3aa79dfec4c035b00f8ec18aab77707b9973c749b884243185
  markers:
  - {type: page-break, offset: 9, content: '', id: CK-KZ_KR5i0078_07p001a}
body:
  text: 三十六世孫羲基編輯評論習鑿齒曰昔管仲奪伯氏駢邑三百沒齒而無怨言聖人以為難諸葛亮之使廖立垂泣李嚴致死豈徒無怨言而已哉夫水至平而邪者取法鑑至明而醜者亡怒水鑑之所以能窮物而無怨者以其無私也水鑑無私猶以免謗况大人君子懷樂生之心流矜恕之德法行於不可不用刑加乎自犯之罪爵之而非私誅之而不怒天下有不服者乎東坡蘇氏軾曰孔明出師二表簡而且盡直而不肆大哉言乎與伊訓說命相表裏非秦漢而下以事君為悅者所能至龜山楊氏時曰或問陸宣公比諸葛武侯如何曰武侯氣象較大恐宣公不及武侯當面便說得如說孫權一假雖辨士不及其細密處不知比宣公如何只是武侯也密如橋梁道路井竈圊溷無不修繕市無醉人更是密只是武侯密得太嚴其氣象剛大嚴毅廬陵羅氏大經曰諸葛孔明云吾心如稱不能為人作輕重至哉言乎信能此則吾心即造化也殺之不怨利之不庸已不勞而萬物服矣乃知孔明長嘯草廬時其所講不在伊呂下杜少陵云伯仲之間見伊呂指揮若定失蕭曹可謂識孔明心事矣或謂既比之以伊呂又比之以蕭曹何也豫曰不然下句蓋惜其指揮未定而死耳使其指揮若定則雖蕭曹且不能當况司馬仲達乎河南程氏皓曰孔明有王佐之心道則未盡王者如天地之無私心焉行一不義而得天下不為孔明必求有成而取劉璋聖人寧無成耳此不可為也若劉表子琮將為曹公所并取而興劉則可也孔明不死三年可以取魏且宣王有英氣久不得伸必沮死不久也孔明營五丈原宣王言無能為此僞言安三軍耳兵自高地來可勝先主嘗自觀五丈原曰此地不可據英雄欺人不可盡信或問文中子謂諸葛武侯無死禮樂其有興乎諸葛武侯可以當此否曰禮樂則未敢望他只是諸葛武侯已近王佐又問如取劉璋事如何曰只有這一事大不是便是計較利害當時只為不得此則無以為資然豈有人持地去迎他𨚫於座上執之大段害事只是箇為利君子則不然只一箇義不可便休豈可苟為又問如湯兼弱攻昧如何曰弱者兼之非謂并兼取他只為助他與之相兼也昧者乃攻亂者乃取亡者乃侮程明道曰諸葛武侯近王佐之才或問武侯果王佐才何為僻守一蜀而不能有為於天下曰武侯固言明年欲取魏幾年定天下其不及而死則命也某嘗謂孫覺曰諸葛武侯有儒者氣象孫覺曰不然聖賢行一不義殺一不辜雖得天下不為武侯區區保完一國不知殺了多少人邪某謂之曰行一不義殺一不辜以利一已則不可若以天下之力誅天下之賊殺戮雖多亦何害陳恆弒君孔子請討孔子豈保得討陳恆時不殺一人耶蓋誅天下之賊則有所不得顧爾曰三國之興蜀為正曰蜀志在興復漢室則正也安子順曰讀諸葛孔明出師表而不墮淚者其人必不忠讀李令伯陳情表而不墮淚者其人必不孝讀韓退之祭十二郎文而不墮淚者其人必不友朱黼曰時亮懸兵遠出糧餉不繼懿以鋭師大衆乘氣而扞禦之猶狼狽如許况亮五丈原之出恩信行於中原威略震乎遠邇屯田積聚軍旅雜於居民而莫之間使不死數月懿其能與戰而遂取勝乎故懿非亮之敵也朱黼曰孔明高卧南陽自比管樂時人莫之許也余竊論之孔明王者之佐伊尹之儔也管樂之比特主乎撥亂繼絶之志一時自寓之言耳若陳夀者奚足以知孔明哉夫孔明之於伊尹所遇雖異處心則同夫躬耕有莘而樂堯舜之道躬耕南陽而吟梁父之詩同一隱晦也聘幣三往而後起枉駕三顧而後從同一出處也一夫不被則有納溝之恥漢室未復則為一已之責同是自任也伊尹往來湯桀之間二國不以為間就桀而復伐之天下不以為叛相太甲而復放之復太甲而終相之天下不以為專孔明兄弟分仕三國國人不以為二勸昭烈伐劉璋而迄取之後世不以為貪昭烈令輔後帝且曰苟不可輔公自取之孔明不以為嫌專國一十二年後帝不以為逼果何修而得此哉孟子曰伊尹耕於有莘之野非其道也非其義也祿之天下弗顧也繫馬千駟弗視也豈非其素所不屑者足以取信於人哉方孔明蕭然草廬之中資衣食於耒耜之業擁膝長嘯不求聞達顧豈有一毫富貴之念迫之而起要為天下大義撥亂繼絶耳其肯以天下動其心乎其肯負其主以利其家乎其肯為不義以利其身乎雙湖胡氏一桂曰蓋嘗論之昭烈帝以神明之胄又得衆賢戮力以為之佐方孔明躬耕隴畝抱膝長吟自比管樂實天下第一流乃為帝所有他如關雲長張翼德為爪牙法孝直為謀主許文休麋子仲簡憲和為賓友蔣公𤥎負社稷之器馬孟起兼文武之資黃漢升勇冠三軍龎士元冠冕南州董幼宰黃公衡李正方吳一費觀彭永年劉子初之徒咸擢顯要盡其器能宜可以復漢祚吊遺黎然卒局於一隅之蜀而不能取中原塊土者何哉陳同甫嘗謂孔明隆中之約謂吳可以為援而不可圖奈何自吳取荆州之後蜀不能無忘情於吳吳襲關羽定荆州蜀讐吳者愈深維陵之師急於報怨反貽白帝之辱小不忍以亂大謀蜀蓋失於此矣尚能并力以取魏哉後主禪才雖中下建興之初猶能委任賢相亮撫百姓約官職開誠心布公道盡忠益科教詳明賞罰必信道不拾遺彊不陵弱下至橋梁道路井竈圊溷無不修繕征西郡屯漢中攻祁山出散關拔武都陰平已而休士息民治兵講武木牛流馬之作八陳圖之制咸得精要三年而後用之於是約吳大舉軍於渭南分兵屯田為久駐之基司馬懿固拒不戰而孔明病且卒矣魏將鍾會鄧艾長驅入冦帝出降而漢始亡癸未至洛陽受魏封安樂公然綿竹之戰臣死於君見孔明之有子成都之降子死於父又信昭烈之有孫帝用譙周䇿降艾皇子北地王諶怒曰若勢窮力屈便當父子君臣背城一戰同死社稷以見先帝不納是日諶哭於昭烈之廟先殺妻子而後自殺數千百載之下讀史至此猶使人凛凛有生氣耳晦翁朱氏熹曰夫孔明之出祁山三郡嚮應既不能守而歸則魏人復取三郡必齮齕首事者墳墓矣拔衆而歸蓋所以全之非賊人諱空手之謂也故其言曰國家威力未舉使赤子困於豺狼之吻蓋傷此耳此見古人忠誠仁愛之心招徠懷附之略也義利之大分武侯知之有非他人所及者亦其天資有過人處朱晦翁曰孔明臨陳對敵意思安閒如不欲戰而符堅踊躍不寐而行師此其敗不待至淝水而决矣朱晦翁曰論三代而下以義為之只有一箇諸葛孔明若魏鄭公全只是利漢唐之興皆是為利須是有湯武之興始做得太宗亦只是為利亦做不得曰漢高祖見始皇出謂丈夫當如此耳項羽謂彼可取而代也其利心一也朱晦翁曰孔明失三郡非不欲盡徙其民意其倉卒之際力之所及止是而已若其心則豈有窮哉以其所謂困於豺狼之吻者觀之則亦安知前日魏人之暴其邊境之民不若今日之事哉孔明非急近功見小利詭衆而自欺者徙民而歸殆亦昭烈不肯棄民之意與朱晦翁曰孔明擇婦正得醜女奉身調度人所不堪彼其正大之氣經綸之藴固已得於天資然竊意其智慮之所以日益精明威望之所以日益隆重者則寡欲養心之助與為多焉南軒張氏栻曰或問魯兩生謂禮樂必百年可興文中子輕許孔明何也潛室陳氏曰叔孫通人物汙下故兩生𨚫之孔明人物正大故文中子許之問文中子曰諸葛孔明而無死禮樂其有興乎近思録程子亦以此許之敢問孔明自比管樂使果能興復漢室恐未必便能興禮樂如三代曰孔明是天資帶得又從學問中攛出來據他用事行師調度若當升平之時做出必須光明不止漢唐人物張南軒曰豫既作侯傳新安朱元晦以為不當抹去管樂自許事又謂為後主寫申韓管子六韜書及勸昭烈取荆益以成業未免雜霸豫曰否否侯胸中所存誠非三代以下人可睥睨豈管樂之流哉其言曰漢賊不兩立臣鞠躬盡瘁斃而後已成敗利鈍豈能逆覩嗚呼此夏少康四十年經營宗祀而卒以配天之本心也使當齊桓時必能尊王服周當燕昭時必能奉天討罪而必不止為二子之事方建興初務農訓兵內治國事徐及攻討軍旅將發惓惓內憂拜表納忠專以宮中府中為言親賢遠小薦郭攸之等使在左右殊非刻核陰謀之說故於手寫申韓管書之事亦疑之疑則可闕也豫每恨陳夀私且陋凡侯經略次第與夫燭微消患治國用人馭軍行師之要悉暗而不章幸雜見他傳及裴松之所注因裒而集之刪其妄者不敢飾辭以紊其實庶幾讀者得侯之心近史書編年乃以魏年號接漢獻之統豈所謂名正而言順乎豫謂獻帝雖廢而昭烈以正義立于蜀武侯輔之漢統尚未墜也盡後主末年始係魏而魏亦亡矣張南軒曰自五伯功利之說興謀國者不知先王仁義之為貴而競於末圖秦以勢力得天下然遂以亡漢高帝起布衣一時豪傑翕然從之而其所以建立基本卒滅項氏者乃三老董公仁不以勇義不以力之說也相傳四百餘年而曹氏篡漢諸葛忠武侯當此時間關百為左右昭烈父子立國於蜀明討賊之義不以强弱利害二其心蓋凛凛乎三代之佐也侯之言曰漢賊不兩立王業不偏安又曰臣鞠躬盡瘁死而後已至於成敗利鈍非臣之明所能逆覩嗟乎誦味斯言則侯之心可見矣雖不幸功業未就中道而隕然其扶皇極正人心挽回先王仁義之風垂之萬世與日月同其光明可也夫有天地則有三綱中國之所以異於戎狄人類之所以别於庶物者以是故耳若汨於利害之中而忘夫天理之正則雖有天下不能一朝居此侯所以不敢斯須而忘討賊之義盡其心力至死不悔者也方天下雲擾之初侯獨高卧昭烈以帝胄三顧其廬然後起而從之則其出處之際固巳有大過人者其治國立綱陳紀而不為近圖其用兵正義明律而不以詭計凡其所為悉本大公曾無纎毫姑息之意類皆非後世之所可及至讀其將殁自表之辭則知天下物欲舉不足以動之所養者深則所發者大理固然矣曾子曰士不可以不弘毅若侯者其所謂弘且毅者與孟子曰富貴不能淫貧賤不能移威武不能屈此可謂大丈夫若侯者名為大丈夫非邪侯既殁蜀人追思之時節祭于道後主用廷臣之議立廟沔陽使得申其敬去侯千有餘歲蜀漢間往往有祠奉祀不替侯之澤在人者深矣致堂胡氏寅曰司馬懿之言譎也實畏孔明屯五丈原又憚於逆擊故為此語以安其下爾孔明此舉蓋不復為退計矣親統大軍入他人境久駐而魏師不敢攻雜耕而居民無所苦三代之兵若時雨孔明其庶幾矣或譏其短於將略可謂誤矣胡致堂曰世之論將者往往以司馬諸葛不及一戰以决勝負為恨此殆以形求而不察理也五丈原之師正與赤壁之役等然曹公大敗於赤壁謀拒之者衆其勢亦搶攘傾側會天方佐佑孫劉故孟德以八十萬人為十艘油葦所挫幾不得免勝負之偉為快於無窮也若夫五丈原之師深入客地耕田積穀聲勢震薄而意思安閒司馬仲達奸雄善兵懾不敢動請戰示武情見勢窮甘受巾幗之辱殊無他計但快孔明食少幸其早斃固不俟兵刃之交而懿已披靡大敗矣惟漢不復興孔明亟死故以形迹觀者謂魏勝而蜀負雖杜甫善評亦有嘔血酸辛之嘆向使孔明未死豈但禽懿長安以東破竹而下矣至此然後可以歸之於天孔明云亡則知漢室之决不興也夫成敗之利害繫于一時而理之得失事之是非雖千載而不泯孔明忠義之行節制之兵皆可詳細思維反覆觀考使人懦氣激昂因以興起而曹操司馬懿欺人孤兒寡婦狐媚以取天下羯奴猶羞而不取然則雖誇奪雄伯於俄傾間何足道哉以是知古今一心理無間斷志士以遠大自期則本心正理常不屈于天下矣胡致堂曰玄德客寓荆州又值蕩析脫身南走未有所歸孫權據有江東已厯三世而孔明說權治操曰操軍破必北還則荆吳之勢强鼎足之形成矣是以荆州自處而分畫三國也不幾於大言乎曰此固草廬之所以語先主者也英雄俊傑不獨識時務蓋亦識天象當是時天下離而不合者數十年豈人力哉備與亮知之審矣二劉方保荆益孔明已欲跨而有之曾未幾時卒如其志蓋備亮不死必取分地以自容非坐而待禽者也魏兵東下聲震江海吳誠不自保方資玄德孔明關羽張飛共捍患難且志雖存荆州安得不以與先主哉胡致堂曰司馬氏以昭烈於中山靖王族屬踈遠不能紀其世數名位是非難辨遂抑之不使得紹漢統則未知其去取之意也自司馬氏至三國七百餘年固不能詳昭烈之世數而諸葛公去中山靖王才三百餘年草廬傾蓋之時即稱昭烈為帝室之胄豈憑虛無據而云爾耶若秦始皇明為呂不韋之子琅琊王睿顯著小吏牛金所生司馬氏尚係諸秦晉不革而正之乃推奬荀彧寬宥曹操至謂操取天下於羣盜非取之於漢室而抑退漢之昭烈不少假借於孔明北伐以入寇書之亦獨何哉胡致堂曰三國人才之盛後世鮮及然諸葛孔明則高邁獨出眉山蘇子以為巍然三代之佐未易以私論斯言當矣孔明何亞於伊溥而以管樂自許謙志也或曰方諸子房何如曰是殆難以優劣論也然志士尚友願希孔明而未必為子房此可為智者道耳君子有言劉備敏於曹操世多未喻愚謂英雄豪傑周遊中土莫不以人才為急曹操下荆州所得者韓嵩蒯越王粲之徒而天下第一流乃為玄德所有吳魏諸臣無能與對備敏於操殆謂是耶胡致堂曰南中之師此孔明受遺輔政第一舉也蓋昭烈初崩主幼國疑彼雍闓孟獲乃於益州境內為此不軌若稍加寬宥則用兵之始何以警其餘而圖其後乎故七縱七擒非特示威於孟獲也而其所以復中原清漢賊者皆以此威為之兆矣胡致堂曰或謂昭烈自知劉禪之不才群臣無出孔明之右者不能保孔明之必與禪也故于臨終正言之冀亮德而不忍取嗚呼可謂以小人之腹度君子之心矣玄德襟度弘廣磊磊落落與孔明兼君臣師友之契三代以還未見其比也夫豈以欺詐相待如市道之交乎曹操至病亡子孫滿前咿嬰涕泣留連妾婦分香賣履區處衣物平生奸僞死乃盡見方之玄德治命無一語及私豈不猶蔓草之與長松乎先主語禪曰勿以惡小而為之勿以善小而不為惟賢惟德可以服人旨哉此言皆可師法則知玄德天資既高克已亦力其從盧植陳元方鄭康成遊啓告詳至弘益多矣胡致堂曰勤者聖人之盛德而君子之賢行也其為人多暇日則出人不遠矣舜禹文王周公達而在上孔子窮而在下未嘗不勤猶天行日運誠不厭健不息而况于下乎周公孔孟當何如哉故陶士行有惜分陰之志焉曹孟德略平中土雖能尚節儉然鄴下已有臺觀之樂孫仲謀中年亦漸荒怠惟先主武侯勤勞躬儉以至沒世此其遠繼前哲不但三國稱雄胡致堂曰孔明一代之英遠謀宏議無不售者至其自明之語曰謹愼而已何其約也詩不云乎惟此文王小心翼翼昭事上帝聿懷多福若亮者有文王之小心矣彼劉禪凡庸何足以當元臣如此其敬而孔明事之靡不盡道握國魁柄總御六師而無專意恣行毫末可指者非盛德孰能臻此使曹操而聞孔明事幼主之規得不羞愧而入地乎胡致堂曰兵行詭道求勝而已延之計可用甚明而孔明不從或謂孔明長於治國而短於將略或謂孔明疑延不敢委也是皆不然曹操既死天下無孔明對使天而昌漢則孔明由斜谷出自足禽睿而馘懿矣魏延行險以僥幸者也孔明節制之師何以僥幸為此可為明道正義者言之非急於近功小利之人所能解也又曰先主孔明器識不相上下一時遇合真君臣也先主能因水鑑以知卧龍可謂超世之見矣而失於蔣琬龎統孔明器使群才各盡其用而失於馬謖故知人之難堯舜猶病也惟不護已短不庇私交大明賞罰馬謖雖死而無怨此則人之所難也遂昌尹氏起莘曰曹操乘時擅命脅制天子戕殺國母義士為歎憤苟有一夫唱義於天下皆君子之所豫况於堂堂帝室之胄英明蓋世者乎丕既篡位漢祀無主昭烈正位蜀漢親承大統名正言順本無可疑自陳夀志三國全以天子之制豫魏而以列國待漢故通鑑因之以魏紀年至綱目始以昭烈承獻帝之後紹漢遺統取春秋之義以示天下萬世之正論也按陳夀志昭烈涿縣人中山靖王勝之後勝子正元狩六年封涿縣陸城亭侯坐酎金失侯因家焉祖雄父弘生昭烈其世次本末甚明况諸葛一見昭烈首稱將軍帝室之胄及後求救孫權亦以豫州王室之胄對權稱之亮固非妄言者也是以張松之說劉璋且謂豫州使君之宗室而異時符堅答苻融諫伐晉之語亦曰劉禪豈非漢之遺祚然亦為中國所并然則昭烈之為漢裔顯然無疑以之紹統夫復何說是年曹丕既立昭烈即位號不使漢統墜地深合事宜其與光武即位于鄗晉元即位江左先後一轍固非其他僣竊急於自帝者之比斯事在綱目中最其大者豫故厯考顚末詳而辨之以告後之君子亦使朱子秉筆之志暴白於天下云尹遂昌曰自三代衰王政廢士之隨世就功名者多矣當漢之末群雄雲擾凡一智一能之士莫不乘時奮發蘄以自見孰謂一世人龍如孔明者方且高卧隆中抱膝長吟略無意於當世而又以管樂自許者哉向使昭烈不垂三顧之勤則將稿死岩穴與草木同腐耳及其一起則功名事業昭炳顯著不可得而泯沒亮豈大言無慙者彼其擇理甚精而處已甚明謂枉已不可以直人也故不苟合以求售謂托身不可以非所也故不肯苟仕於僭竊時乎未遇則高蹈邱園道苟可行則奮志事業君臣既合魚水相歡則聲大義於天下使興衰繼絶翊扶正統之志昭如日星然後篡竊之徒其罪始暴白而不可掩是豈區區一智一能之士隨世就功名者可同日語哉昔劉備見諸葛亮於隆中其與聘莘野訪渭濱者越千載如出一轍嗚呼三代而下孰謂出處之正有如孔明者哉不有君子表而出之則孔明亦後世人物耳噫又曰亮自三顧而出之後間關跋涉左右昭烈未幾受遺輔政雖曰平定南土然漢業未復國賊未清固當乘時進取今焉身率大軍北駐漢中將以規恢關洛克復舊物其志豈肯苟安一隅而已綱目書丞相亮率諸軍出屯漢中以圖中原其正大氣象讀之凛凛猶有生氣義聲充滿於天地之間矣戴氏少望曰有仁人君子之心者未必有英雄豪傑之才有英雄豪傑之才者未必有忠臣義士之節三者世人之所難全也全之者其惟諸葛亮乎漢末之季群雄角力曹操雄據中原號令諸侯孫氏籍父兄遺基割據江左先主區區敗亡奔走之餘起亮於草廬之中三顧禮勤一言道合於是解帶寫誠陳力就列仗順收兵因權略地結吳抗魏擁蜀稱漢䇿疲散而當强敵處僻陋而起雄圖三分之業自亮成之生而蜀興殁而蜀亡繫命於已非有英雄豪傑之才而能然乎以節制治兵以信義行師以漢室興復為已任以生民塗炭為已責南擒孟獲而不誅志在於綏南蠻也西拔祁山而不賀志在於混寰區也至于為政公平用法平允李嚴廖立之徒雖被罪罰而無所歸怨身死之日氓庶野祭遺愛在人至今祀之詩之甘棠殆不過是非有仁人君子之心而能然乎感知已之遇勵匪躬之節受遺詔輔幼主精誠貫乎金石大義感于神明內總朝綱外專戎律上下輯睦人無間言鞠躬盡力以死勤事非有忠臣義士之節而能然乎夫漢之李固孔融有是心有是節而無是才曹操司馬懿有是才無是心而無是節亮之素志自比管樂然仲能霸齊而不以禮毅能强燕而不克終較之于亮孰為優劣宜其擅美當年仰高後代古今一詞稱為王佐之才而不可加也雖然在天者有時有命在人者有才有德才高德厚而時與命不偶此天也非人之所能為也使亮際漢興之運輔神聖之君則其成就功業豈止是耶善觀人者論其才之高下德之厚薄不計其功之成否則于孔明豈可少貶云嗚呼賢哉葉平岩曰昭烈以信義聞天下而有攻劉璋之事何耶議者以璋善遇昭烈反扼其吭而奪之國豈得為有義吾竊以為不然昭烈之取劉璋正為義也方董卓之亂雄豪競逐猶皆以討賊尊漢為名劉焉乃陰懷異志乘間據有益州偃然有不臣之心造乘輿斷劒閣遣米賊殺漢使助馬騰襲長安自規便利圖竊神器此蓋漢之奸賊二袁董卓輩爾及璋以孳息暗弱復盜王土昭烈方仗義兵攘群盜以復漢室此而不誅漢室當何興耶故昭烈之舉上以攄漢帝之憤下以誅劉焉之奸厥功大矣何負義之有故曰取劉璋者正所以為義也象山陸氏九淵曰燕昭王之於樂毅漢高帝之於蕭何蜀先主之於孔明苻秦之於王猛相知之深相信之篤這般處所不可不理會讀其書不知其人可乎臨川吳氏澄曰楚三閭大夫竭其忠志欲强宗國懷王信讒疏之國事日非竟客死於秦襄王又信讒放之江南原不忍見宗國駸駸趨於亡遂沉江而死韓為秦所滅韓臣之子子房自以五世相韓散財結客為韓報讐博浪之椎不中則匿身下邳以俟時山東兵起從沛公入關立韓公子成續韓後秦亡而楚霸王沛公於漢又殺韓成良乃輔漢滅楚而後隱去諸葛孔明初見昭烈已知賊之必亡漢而勸昭烈跨有荆益圖伯業復帝室後卒償其所言晉陶淵明自其高祖長沙桓公為晉忠臣及桓玄篡逆劉裕起自布衣誅玄又滅秦滅燕挾震主之威晉祚將易既無昭烈可輔以興復又無高皇可倚以報復志願莫伸其憤悶之情往往發見於詩蓋四賢者其遇時不同其為人不同而君臣之義重則其心一也吳臨川曰淵明千載士也有華焉有實焉其實也事業不及試其華也文章猶有傳其華可與王風楚騷相上下究其實當與子房孔明相後先吳臨川曰開誠心布公道集衆思廣忠益謂有忠慮於國但勤攻吾之闕漢丞相諸葛亮忠武侯語也可以為萬世相天下者之法矣孔明豈不知為相之體哉於主簿楊顒之諫也生既謝之死又哀之孔明豈不知其言之忠哉然而罰二十以上皆親覽食少事繁至為敵國所窺而慶幸其不久孔明豈不知愛重其身哉其若是者何也嗚呼是未可以常情度淺識議也夫知相之體而未免自勞知言之忠而未見樂取知一身係國之存亡而竟取敵國慶幸之計苟非甚愚者或有所不為而謂蓋世絶人之智者為之乎豫故曰是未可以常情度淺識議也且當時事勢如何耶以一木支大厦之傾事君而致其身盡瘁於國遑恤其他夫豈可已而不已者楊顒之諫謂之愛孔明則可謂之知孔明則未也杜子美詩云三分割據紆籌䇿萬古雲霄一羽毛又云運移漢祚終難復志决身殱軍務勞此詩字字有意細味之庶乎知孔明之心而豈常情淺識之所能測度擬議者哉許衡曰不問利害只求義理孔明見得真當時只有復漢討賊為當然至于成敗利鈍非臣之明所能逆睹歸之于天而已只得如此做便是聖賢之心常人則必計其成敗利鈍也漢丞相諸葛忠武侯集卷之十八評論宋潛溪濂曰凡兵之為道好高而惡下貴陽而賤陰故營軍於山者必依山絶谷視下處高孔明五丈原之屯高平廣大守不可攻而攻不可取進不可禦而退不可追所謂先據不可勝之地以待敵之可勝者也懿實畏孔明屯五丈原又憚於逆擊故為譎語以安其下若果曰無事何為受巾幗之辱而不敢出兵逆戰哉宋潛溪曰夫延之謀特欲僥幸於楙之不敢抗然熟思度之使楙不即棄城而走或塞險出奇以挫其鋭或堅壁清野以拒其師則延軍深入進退路窮豈不坐受敗滅也哉故亮以為危計其不用之是矣方正學孝孺曰孔明以布衣至於為相而人不以為速以討賊為已任而不任將帥人不以為自用兵敗而功不成人不以為無勇一國之政賞罰豫奪無所貸人不以為專世皆謂孔明才智之可以服人不知其不自肆其才智而取諸人此孔明之所以服人也當是之時天下一孔明耳而無所與讓及其為相顧乃深有資于僚佐而懇懇求忠益之言以孔明之賢豈待乎僚佐求益舉全蜀之士豈復有出于孔明智慮之右者乎賢人君子之用心也遠而期待也大常自見其不足而不見其有餘常恐已闕之不聞而不敢謂人言為不可孔明之為相然虛己以求聞已之過秦漢以下為相者皆不及不幸而功不成天也安得以成敗論孔明哉方正學曰司馬𡽪以孔明龎統並稱吾竊有疑焉論者惜統早死故功業不及孔明余謂使統不死終非孔明比也孔明之學庶乎王道而統之言皆矯詐功利之習劉璋之迎昭烈或說昭烈就取益州昭烈恐失信於天下統則請就其來迎而襲殺之昭烈之不即從所以堅益州之民服從之志猶有仁者之用心也統獨切切焉欲奪璋之位其器量何淺哉劉仁齊剡曰愚按先儒之說謂孔明左右昭烈為漢討賊聲大義於天下功雖不就名則正矣自陳夀志三國以魏為主例書入寇夀固萬世之罪人也而司馬公亦因而書之何哉今依朱子綱目以昭烈紹漢之統故於孔明興師則改書伐魏而魏兵犯境則改書入寇然後名正言順而正僞之辨自明矣丁南湖奉曰龎統之見擢有四美存焉昭烈急於用賢故魯肅雖敵國之臣亦惟其言之是聽是美在昭烈也魯肅以人才為恤而不以敵國為嫌是美在魯肅也孔明薦引後進而同升諸公是美在孔明也龎統不負所舉乃忠言妙算以取益州而輔成漢業是美在龎統也按統為德公之從子為孔明司馬𡽪之姻朋性好奬進士類蓋南州之冠冤而荀彧之比配云羅豫章從彥曰西漢人才可與適道東漢人才可與立三國人才可與權杜欽谷永可與適道而不可與立故附王氏陳蕃竇武可與立而不可與權故困於官至於諸葛孔明然後可與權夫人才至可與權而不可以有加張良近太公之材略孔明近伊尹之出處然良佐高祖論其時則宜語其德則合孔明處三國則才大任小惜哉茅鹿門坤曰國讐必報國恥必雪故古人用兵有為吊民伐罪出者湯武是也有為復讐雪恥出者光武是也孔明之用蜀亦難矣今年出祁山明年出五丈原蓋其勢有不容已者讀出師前表賢邪臧否是孔明識治道之大規模讀出師後表偏安兩立見孔明識立國之大本比之宴安江左者豈足以知孔明之事哉袁了凡宏曰大哉先主之君臣非三代以下可望也彼憑几之遺命涕泣之披對豈猶有不盡諒者耶蓋先主知祖之讐當復而不復知有其子孔明知君之嗣當輔而不復知有其躬夫先主有堯舜之心之大焉孔明有伊周之志之誠焉晚近何足以知之袁了凡曰諺云虬驤層霄不紲豢龍之轡鳳鳴瑶林不屈伶倫之籠其諸葛孔明乎當張昭薦於孫權亮不就人問其故曰孫將軍可謂人主然觀其度能賢亮而不能盡亮余以權之雄略豈其不能盡亮正亮不樂為權盡耳方龍卧南陽時乃心帝室之胄久矣視仲謀席餘威據江東蓋盜而竊者而足枉孔明乎曹操亦遣人招之亮陳不願仕操謝之曰義不使高士辱於汚朝也蓋庶幾知孔明心矣而不殺何也操無容人之量而惡殺士之名故殺禰衡借手於劉表殺孔融借口於路粹若殺孔明而口實於天下士操所不敢也及辟司馬懿不就則使人剌之劫之矣操知孔明不得而用又不得而殺懿則可以富貴動威武屈也又自度能用懿而不能用孔明故能容孔明之辭徵而不能容懿之索價也袁了凡曰孔明之治蜀事無巨細咸親決焉至躬校簿書流汗終日費禕繼之常以朝晡視事其間接納賓客盡人之歡夫以材則優劣分以時則盛衰異然勞逸不同而皆以治何哉孔明當其創而文禕䝉其成也故孔明之勞蕭何之規而文禕之逸曹參之守也雖然孔明之治蜀也田野闢蓄積饒其帥師也營壘井竈藩籬障塞皆應繩墨則勤之故也禕卒以歡飮沉醉遇害於降人蓋濶防檢而忽細微所謂禍成於此而兆見於彼也袁了凡曰孔明有王佐才而隴首抒志乃自比於管樂亮觀化洞微逆自涯其所至也鼎殊天下形勢于胸中矣或曰孔明少游學獨觀大略輔相日手寫申韓書道固弗淵於伊呂也袁了凡曰古云千人為俊萬人為傑漢高祖謂蕭張韓皆人傑吾用之所以定天下至先主始定蜀魏博士傅幹亦稱諸葛亮達治知變關張勇而有義為之將相此三人者皆人傑豫謂孔明以治國為賢相以䇿敵為謀臣蓋兼蕭張而駕軼之關張之材差劣於韓然其義勇識君臣之分豈信可望是蜀漢三傑賢於漢初矣唐明皇嘗同日拜宋璟張說源乾曜三故相官帝賦三傑詩自寫以賜蓋意有所擬然宋璟無愧也說乾曜亦濫竽乎袁了凡曰兩將相敵則賢者勝兩賢將相敵則主之能任賢者勝范蠡之於伍子胥也田單之於樂毅也白起之於廉頗也王剪之於李牧也韋孝寬之於斛律光也主有任與不任也諸葛孔明之於司馬懿也皆任也故功不能獨成焉說者謂亮善攻懿善守謬矣使天假亮以年懿其能終守哉惜天不祐漢而中營星殞矣炎運已去人力固無如之何也程墩篁敏政曰孔明嘗自嘆法孝直在必能制主上東行然則孔明之智不逮正矣曰非也孔明嘗勸取益州昭烈不聽而聽於正伐吳之舉孔明亦必諫之不聽而思其人也正言難入詭謀易從雖大賢君子有所不免而况昭烈乎蔡虛齊清曰孔明之治蜀也爵不可以匪人幸罰不可以親故免若嫌於過嚴矣然繼璋之暗弱專權恣睢者或跳梁於法外不繩之以嚴不可也非所謂亂國之民用重典者乎况昭烈寬仁大度而吾不以嚴濟之是以水濟水也故上以寬吾以肅上以緩吾以急上以仁吾以義不猶徐疾甘苦之相成耶吾故曰昭烈之厚恩德以收衆心者君道也孔明之以嚴治蜀者相道也楊升菴愼曰宋儒論孔明為後主寫申韓管子六韜曰孔明不以經術輔導少主而乃以刑名兵法何耶唐子西云人君不問撥亂守文要以制略為貴後主寬厚襟量有餘而權略知謀不足當時識者咸以為憂六韜述兵權多奇計管子貴輕重愼權衡申子核名實韓子攻事情施之後主正中其病藥無高下要在對病萬金良藥與病不對亦何補哉此言當矣豫又觀古文苑載先主臨終敕後主曰申韓之書益人意智可觀誦之三國志載孟孝裕問卻正太子情尚正以䖍恭仁恕答之孝裕曰如君所道皆家門所有耳吾今所問欲知其權略知調何如耳然則孝裕之見蓋與孔明合而觀申韓書亦先主遺命也獨以是病孔明不惟不成人之美亦不識時務矣楊升菴曰輟耕録載俞豹論諸葛孔明忠於玄德而非忠於漢獻以漢獻尚在而玄德之立為不當也此說謬矣習鑿齒曰惠公朝秦而子圉以立更始猶存而光武舉號先主合議討賊是宜速尊以奉大統民欣反正出觀舊物可謂識時之卓見豹蓋亦未嘗見此論也寡陋不學如此不自知而輕議大君子真可惡也陶九成取之亦輕薄子哉楊升菴曰諸葛孔明草廬中與昭烈論取天下先取荆益待天下有變則一軍出隴右一軍出荆襄亦欲犄角取雍耳其後關羽已失襄陽則孔明右臂已斷天下形勢非復草廬中所料矣是故魏延嘗欲以奇兵取長安孔明不從蓋無犄角故也天若祚漢關羽尚在襄陽孔明以大軍出隴右而許洛之間又有徙都之警則孔明可以端坐而得長安何至乘危僥幸用魏延之䇿哉楊升菴曰張華問李密曰孔明言教何碎密曰昔舜禹皋陶相與語故得簡大雅語與凡人言宜碎孔明與言者無已敵言教是以碎耳華善之楊升菴曰漢昭烈於十六年冬從劉璋之迎而擊張魯是時孔明留守荆州至明年乃自葭萌據涪出法正之計昭烈亦强忍從之若使孔明在舉措當不如此今以取劉璋為孔明病蓋亦未之考也楊升菴曰正德戊寅豫訪余方池編修於武侯祠見壁間有詩云劍江春水緑沄沄五丈源頭日又曛舊業未能歸後主大星先已落前營南陽祠宇空秋草西蜀關山隔暮雲正統不慙傳萬古莫將成敗論三分後有題云此詩始終皆武侯事子美或未過之方池不以為然豫曰此微顯闡幽不隨人觀場者也惜不知其姓氏楊升菴曰宋書引諸葛孔明之言曰來敏亂郡過于孔文舉此事不經見當表出之蓋孔文舉名過其實清談廢事已有晉人之風使遇孔明必遭李平廖立之罰後人稱之只以才學耳楊升菴曰杜子美詩不嫁惜娉婷此句有妙理讀者忽之耳陳后山衍之云當年不嫁惜娉婷傅粉施朱學後生不惜捲簾通一顧怕君著眼未分明深得其解矣蓋士之仕也猶女之嫁也士不可輕於從仕女不可輕於許人也著眼未分明相知之不深也古人有相知之深審而始出以成其功者伊尹孔明是也有相知不深確乎不出以全其名者嚴光蘇雲卿是也有相知不深闖然以出身名俱失者劉歆荀彧是也白樂天詩寄言癡小人家女愼勿將身輕許人亦子美之意乎楊升菴曰非淡泊無以明志非寧靜無以致遠非寬大無以兼覆非慈厚無以懷衆非平正無以制斷此五語出淮南子主術訓下篇蓋古之格言而淮南述之孔明又舉以教子也然五語之中淡泊寧靜二語足以該下三語矣孔明博學而精擇如此又心欲小而膽欲大智欲圓而行欲方能欲多而事欲鮮亦出淮南子而孫思邈引之然膽欲大之語有病不若志欲大之善也能欲多而事欲鮮此句不可少孔明思邈同引淮南子語而優劣不同也楊升菴曰文子引老子曰人生而靜天之性也感物而動性之欲也漢儒取入禮記遂為經矣若知其出於老氏宋儒必曲為譏評但知其出於經則護持交贊此亦矮人之觀場也又如淡泊明志寧靜致遠本出於淮南子而諸葛稱之若儒者知其為劉安語又肯取乎楊升菴曰武侯出師表今世所傳皆本三國志按文選所載先帝之靈下若無興德之言六字他本皆無於義有缺當以文選為正楊升菴曰抱朴子曰魏武帝嚴刑峻法果於殺戮乃欲用諸葛孔明孔明自陳不樂出身武帝謝遣之曰義不使高世之士辱於汚君之朝也其鞭撻九有草創皇基亦不妄矣按此則操嘗徵召孔明矣事不見於史當表出之嗚呼操之不屈孔明不殺關羽真有人君之度豈止雄于三國耶楊升菴曰朱子謂孔明之學本申韓淵明之學本老莊此語末學不敢議亦不敢從楊升菴曰詩有頍者辨士冠禮注滕薛名蔮為頍今未笄冠者著卷幘頍象之所生也輿服志夫人有紺繪幗古畫婦女有頭施紺冪者即此制也諸葛武侯以巾幗遺司馬懿巾幗女子未笄之冠燕京名雲髻蜀中名曇籠蓋笑其堅壁不出如閨女之匿藏也幗音與巾貴同古對切今音與國同非也楊升菴曰隋內史李德林著論曰後主傳云蜀無史職故災祥靡聞按黃氣見於柿歸群烏墮於江水成都言有景星出益州言無宰相氣若史官不置此事安得從而書之蓋由父辱受髠故加茲謗議者也志稱王崇補東觀許蓋掌禮儀又郤正為祕書郎廣求益部書籍斯則典校無闕屬辭有所矣而陳評云蜀不置史官者得非厚誣諸葛乎又按後主景耀元年史官奏景星見大赦攺元夀自書之而自戾之何耶楊升菴曰傅玄云武侯誠一時之異人也入無遺刃出有餘糧楊升菴曰漢末之董承耿紀晉初之諸葛母丘齊興而有劉康袁粲周滅而有王謙尉逈斯皆破冢徇國視死猶生而厯代諸史皆書之曰逆將何以激揚名教何以勸事君者乎古之書事也令賊臣逆子懼今之書事也使忠臣義士羞若使南董有靈必切齒於九泉之下矣王弇州世貞曰孔明與子瑜為親昆季而公休則從弟也孔明為漢丞相秉國子瑜至大將軍亦參預吳大政而公休仕魏至司空各以身分事三國而不相猜又皆三公也又皆自致功名封徹侯而公休獨不終即世說所載蜀得其龍吳得其虎魏得其狗而公休之望實俱下下矣第考其行事恐公休亦不分為狗也在洛與夏侯太初齊名為吏部郎中丞尚書皆有望實出鎮夀春使一方肅戢及敗死而麾下數百人無一降敵者且曰為諸葛公死不恨此豈常人所能及哉抑不但公休而巳也即子瑜之子元遜事事效孔明孔明相幼主則亦相幼主孔明伐魏則亦伐魏孔明斬馬謖則亦斬朱異孔明責李嚴則亦責孫默循跡而效之此其所以愈速禍也且夫山越之收何下於孟獲之擒而淮南之勝亦有光於祁山之捷其所以人情相徑庭後事遂霄壤者孔明密元遜疏孔明靜元遜躁孔明遂而順元遜遂而踞孔明嚴而仁元遜嚴而刻耳嗟乎孔明之忠漢也與子瑜之忠吳也思遠之繼孔明而死忠也尚之死孝也夀知之亦能言之公休之忠魏也夀不知之矣後世尚能知之而元遜之忠吳也後世亦不知嗚呼夀不惟不知也而列公休於鍾會列元遜於孫峻孫琳不亦𡨚哉王弇州曰儒至宋而衰矣彼其睥睨三代之後以末世無一可者而不能不心折於孔明乃孔明則自比於管樂而勸後主讀韓非子之書何以故宋儒之所得淺而孔明之所得深故也宋以名舍之是故小遇遼小不振大遇金大不振孔明以實取之是故蕞爾之蜀與强魏角而恆踞其上寧都董天錫曰古者寓兵于農居則有養而變則有衛故不得巳而用之而民樂從後之論兵者奇正變通大本不出乎此嘗讀漢書見武侯之勸農講武木牛之運八陳之圖深得古人兵農相資之意及覩是編又知其治兵之法有不泥古而可行今者知論將之先才器忠善用人之以擇以試以勵務俾各盡其能與夫應機謹候察情之有益于兵蠧弊驕惡之為兵害者皆發前人之未發信兵家之至論也書不曰兵而曰心表其獨得之妙又以見天下事無不出於一心也是書傳布已久士多習聞而用之有效者幾譬之大匠然規矩能與人而巧不能與人耳然舍是規矩亦無以為方圓矣夫蜀魏之强弱不待辨而魏乃懼之如虎者以有武侯在也抑侯之能此卓有本源觀靜以成學學以廣才之論則平日之涵養造就固無容議而所謂漢賊不兩立王業不偏安又其心純乎忠義之發宜其事業光明俊偉克稱王佐之才也莆田林文俊曰豫讀史至諸葛忠武侯事未嘗不反覆太息也漢之末造群雄竝起曹操以鬼蜮之雄逞其詐力以脅制天下孫權亦乘間據有江東當時一時才智之士爭為之用不復知有劉氏矣侯獨起從先主于三顧之後曰帝室之胄也曹丕既篡漢乃勸先主正位于蜀以紹漢統而其為心直以滅賊興漢為巳任其言曰漢賊不兩立王業不偏安侯之志蓋可見矣所惜者火又祚告終使其功不克就然千載之下讀出師二表猶凛然知討賊大義而背君徇利者無所逃于天地之間其于綱常豈不重有賴哉漵浦鄧啓愚曰余考漢世佐命之勳如子房者始以黃石運略繼以赤松逃名弄丸於楚漢間絶不受人世𡽪纒高絶千古漢之末季火又光燼矣而挽虞淵之日無過武侯試稽其運籌决策與子房埒奈功不酬志業不盡忠秋風五丈原而後往往令人於邑此于侯何憾蓋侯所能盡者子房之略所不能得者子房之遇子房之遇高祖赤符初剖虎將策士如林如雨何難恢霍武侯之遇後主譬之大匠扶既傾之厦而支吾侏儒之內匠之才竭矣竭才而無救于傾此非匠之過也意有大物者主之所謂成敗利鈍不能逆睹者耶侯起家南陽當其躬耕時容與草廬已耳其鼎足三分之略豹變八陳之圖實豫定之非卒辦之鈴閣則草廬何可眇乎莘野一犁春雨潤商祚三亳桐江一線金風繫漢家九鼎則南陽誅茅之地固天地之隩區帝王之䇿府哉余筮仕時橫襟而思往哲每讀出師二表輒欲泣下詎意承簡命厠守南陽當坐嘯行部之暇披閲輿圖見龍岡蜿蜒而起伏淯波澄泓而蕩漾問侯之廬何在則見飾以殿閣秀以松楸豈其與始基相肖似惟是後之人為侯尸祝之飾耳侯固計神州之陸沉者安計草廬哉宛人宗令幹卿先生因以志侯其為圖傳詩記諸體備焉夀諸梓余曰此幹卿不忘武侯權輿之雅意也夫龍岡與淯波常在則此志應不朽誰謂稗官野史不足以備汗青之一七也幹卿泗水寅槇也漢丞相諸葛忠武侯集卷之十九評論龍川陳諒酌古論曰英雄之士能為智者之所不能為則其未及為者蓋不可以常理論矣騏驥之馬足如奔風升高不軒履濕不濡度山越塹瞬息千里而適值一馬蓋亦能然則雖有此駿而不足以勝之也于是駕以輕車鳴以和鸞步驟中度緩急中節鏘鏘乎道途之間能行千里而能不行雖無一時之駿而久則有萬全之功所以然者乖所能而出其所不能可以扼其喉而奪之氣也且譎詐無方術略橫出智者之能也去譎詐而示之以大義置術略而臨之以正兵此英雄之事而智者之所不能為矣故夫譎詐者司馬仲達之所長也使孔明而出于此則是以智攻智以勇擊勇而勝負之數未可判孰若以正而攻智以義而擊勇此孔明之志也而何敢以求近效哉故仲達以姦孔明以忠仲達以私孔明以公仲達以曓孔明以仁仲達以詐孔明以信兵未至而仲達之氣且沮矣八陳列于前四頭八尾觸處為首進無速奔退無遽走突兵不能觸其膺奇兵不能繚其背伏兵不能衝其脅追兵不能襲其後諜間無所窺詐謀無所用當之則破觸之則靡鋒未交而仲達之能已乖矣夫仲達出奇制勝變化如神天下莫不憚之雖孫權亦以為可憚而仲達亦自負其能也孔明以步卒十餘萬西行千里行行然求與之戰而仲達以徑騎三十萬僅能自守來不敢敵去不敢追賈詡等嘗逼之戰矣兵交即敗不敢復出姑以待斃為名而其為計者不過日夕望其死而無他術也彼豈孔明敵哉論者以孔明制戎為長奇謀為短雖知者亦止以為知其短而不用吾獨謂其能為而能不為將以乖仲達之所能而出其所不能也故吾嘗論孔明而無死則仲達敗關中平魏可舉吳可并禮樂可興請遂言之夫仲達以所能要其君壓其同列而誇其國人令斂重兵而自守姑白待其斃然孔明始試其兵或以饑退晚年雜耕渭濱為久駐之基木牛流馬日運而至則其斃不可待矣遲之一二年仲達將何辭哉不戰則君疑之同列議之國人輕之其身不安其英氣無所騁固不免于戰戰之則敗耳敗則魏人破膽郡縣響震引兵略地關中可有分慰居民彰明漢德然後舉兵而臨關東勢如破竹所攻者下關東平則諭以信義燕趙可指揮而定矣至五六年而魏明即世齊王踐位上下相疑蕭墻釁起引兵合進可以一舉而覆其巢穴俘其君臣分定州縣安集流亡魏既舉則吳人膽破矣况權之末年猜疑益甚果于殺戮雖陸遜不能自明至十年而遜又沒彼步隲全琮之徒復相繼云亡權之勇決之氣亦已就衰嫡庶分爭內不能制于是使蜀漢之師順流而下荆襄之師乘勢而進一軍出夏口一軍出晥城一軍出廣陵吳之群臣無亮敵也攻城略地孰能禦之盡一年之力而吳可舉江東既平天下既一偃武修文彰善疸惡崇教化移風俗數年之間天下略治然後興典禮修正樂斯民復見太平之盛矣且孔明之治蜀王者之治也治者實也禮樂者文也焉有為其實而不能為其文者乎人能捐千金之璧而不能辭遜者天下未之有吾固知其必能興禮樂也不幸而天不相蜀孔明早喪天下猶未能一而况禮樂乎使後世妄儒得各肆所見以議孔明者天也非人之所能為也又曰孔明伊周之徒也而論之者多異說以其適時之難而處英雄之不幸也夫衆人皆進而我獨退雍容草廬三顧後起挻身托孤不放不攝而人無間言權逼人主而上不疑勢傾群臣而下不忌厲精治蜀風化肅然宥過無大刑故無小帝者之政也以佚道使人雖勞不怨以生道殺人雖死不怨殺者王者之事也孔明皆優為之信其為伊周之徒也而論者乃謂其自比管樂委身偏方特霸者之臣爾是何足與論哉甚者至以為非仲達敵此無異于兒童之見也彼豈非以仲達之言而信之耶而不知其言皆譎也仲達不能逞其譎於孔明故常伺孔明之開闔妄為大言以譎其下論者特未之察耳如孔明出祁山仲達出兵拒之聞孔明將芟上邽之麥卷甲疾行晨夜往赴孔明糧乏已退仲達譎言曰吾倍道疲勞此曉兵者之所貪也亮不敢據渭水此易與耳軍無見糧而轉軍與戰縱能勝之後得以繼此亦少辨事機者之所必不為也仲達心知其然外為大言以譎其下耳已而孔明出斜谷仲達又率兵拒之知孔明兵未逼渭引軍而濟背水為壘孔明移軍且至仲達譎言曰亮若勇者當出武功依山而陳若西上五丈原諸軍無事矣夫敵人之兵已在死地而率衆直進來與之戰此亦少辨事機者之所不為也仲達知其必不出此姑誑為此言以妄表其怯以示吾之能料且以少安其三軍之心也故孔明持節制之師不用權譎不貪小利彼則曰亮志大而不見機多謀而少決好兵而無權凡此者皆伺孔明之開闔妄為大言以譎其下此豈其真情也夫善觀人之真情者不于敵存之時而于敵亡之後孔明之存也仲達之言則然及其殁也仲達按行其營壘斂袵而嘆曰天下奇才也彼見其規矩法度出于其所不能為恍然自失不覺其言發也可以觀其真情矣論者不此之信而信其譎豈非復為仲達所譎哉唐李靖談兵之雄者也吾嘗讀其問對之書見其述孔明兵制之妙曲折備至曾不一齒仲達彼曉兵者固有以窺之矣書生之論曷為其不然也孔明距今且千載矣未有能諒其心者吾憤孔明之不幸故備論之使世之成敗論人物者其少戒也赫瀛曰余嘗俯仰古今尚友往哲上下千百年間若蜀武侯者竊嘉其才猷忠藎足埒三代人物逮按部公餘披閲雜録則有野史俞文龍氏置異議於侯者大都謂備稱中山靖王之後世數難考藉令為劉族屬西伐東征當如光武之事更始且備初言主上蒙塵孤不度德量力欲伸大義於天下其詞甚正自侯以跨荆益成伯業之說進而備志始移後亦未嘗使一介行李詣行在請命獻帝帝尚在輒自稱王及聞遇害又不能如董公說高祖縞素討賊且拒費詩之諫遽即帝位天無二日民無二王侯顧悖之猶嘵嘵以興復漢室為辭萬一果能興復將置漢帝於何地總之侯識時務而不明大義忠於備而不忠于漢室噫果若俞言是以尾孝之行責奇男子而訾王良造父不能引敝轅䇿羸馬也夫玄德之興距中山靖王才三百餘年其世數載在譜牒章明較著而侯草廬傾蓋之間輒稱曰帝胄又豈馮虛無稽之談矧劉荆州呼為弟董國戚與之盟劉公子又尊為叔而阿瞞君臣狡猾伎倆易變黑白卒不聞一言誣誹宣非劉氏以惑亂天下視聽夫王郎一起而真僞立破備而假劉氏也當時耳目誰得而盡掩之且天下者高祖之天下非獻帝之天下帝方蒙塵火又燼幾絶侯非不欲間關秦隴冀向虞淵取日而捧之九霄上但操之心無獻帝久矣獻帝在許不啻贅旒必欲輔帝雖使伊尹持籌呂望秉鉞方叔騰劍召虎揚戈無能為也將駢首就斃已爾帝既不可輔則簡族屬中賢者而從之立之是社稷為重之義其誰曰不宜若謂獻帝尚在當如光武之於更始一切禀命則是時帝幽别所臣下且不知所在將誰禀而誰聽之設曰吾盡吾心而姑此之行則操必矯天子之命散放兵仗即今年所合萬餘明年所合三萬一朝俱盡又以徵詣許下當此之時何以為計若不聽焉而彼固有辭若一聽焉而危亡立至而玄德之大事去即鼎足之業亦罔濟矣侯豈慮不及此哉故不得已而王又不得已而帝以為昭烈可扶吳魏可平中原可復則新莽雖出文叔復興將重覩建武盛事如不可為亦天也吾敢逆覩成敗而遂甘心耶且漢中之王在九錫建魏之後武擔之為立獻帝遇害之年亦非朝起義暮徽稱者埒也彼縞素發喪者董公假義之謀侯出師二表義動鬼神祁山六出愾搖萬祀直欲與湯武竝駕而伯仲伊呂顧肯踵襲故智貽笑方來為哉自蜀有昭烈火又運復熾漢家宗廟尚血食者數十年是忠昭烈者忠漢室也向使侯堅卧不出則分鼎事業必不成吾恐魏之篡漢不在黃初而在建安之十九年矣侯豈識時務而不明大義者哉夫懸臆說以商陳跡疇曰不能管要樞以中肯棨誰敢言易當侯之時處侯之地請藉君一籌假君一鉞能自必懸定鼎分之勢豫中荆益之謀若持左劵若契虎符矣乎能親扶日輦使鐘𥵂不移廟貌如故矣乎能前竝當塗後肩典午左右馳突扼吭撫背而制其命矣乎建武之賊雖遍天下而挈短論長較相比對曾不足當孫曹司馬之一侯徒以討賊一念與之馳逐則鼎足之功主固難乎光武臣尤難于馮鄧也聞擲樗蒲者較盧雉操艨艦者審風雲今者盧雉之勢常在孫曹而獻皇則否風雲之變躬於昭烈而吳魏倡之故尫羸喘息之餘潰北孤危之氣縱使援神羿之弓不能落竝出之日仗鏌邪之劍不能定羣起之兵奈何獨以天無二日民無二王責昭烈之為日為王也夫獻帝之日巳隕矣獻帝之王已授矣此而不自為日不自為王又將誰為之避二日二王之嫌而忍絶皇統甘付賊臣雖黃髫尺孺且知不可矣故其言曰漢賊不兩立王業不偏安又曰臣鞠躬盡瘁繼之以死其不肯㩦日與王而付之賊臣也亦決矣志三國者徒以讐憾竄剌典實攟托事故至帝魏寇蜀貶侯太甚故當時興復討賊之事修問臣節之禮皆蕩泊無聞是故羣後來之吻也至元晦作綱目豫之正統以續春秋天王之義而侯之忠始白侯而不知大義孰為知大義哉余展謁侯祠於益州城南援筆識此因表侯之心與其所遇之時以辨夫議侯者且俟後之君子擇焉王士騏冏伯曰孔明與徐庶方是相知庶自見先主而於孔明則勸先主就見知孔明之必不屈也庶已從先主而失母之後亮任之詣曹公知庶之必不留也庶雖降曹乃心在蜀黃權亦爾噫此非孔明之通物情乎王冏伯曰諸葛公七縱七擒振古未有狄人心服千載如新而本傳第以三語盡之苦心妙用俱不可尋夀于是乎可恨王冏伯曰李邈之免死亮之力也而一言失意直以狼虎目之邈真險人哉後主怒而誅之差强人意按華陽國志曰李邈字漢南昭烈領益州牧邈讓昭烈為不宜有司將殺之武侯為請得免久之為丞相參軍侯殺馬謖邈諫失侯意侯卒邈上疏曰呂祿霍禹未必懷反叛之心孝宣不好為殺臣之君直以臣懼其逼主畏其威故姦萌生亮身杖强兵狼顧虎視五大不在邊臣嘗危之今亮殞沒蓋宗族得全西戎靜息大小為慶帝怒下獄誅之王冏伯曰後出師表云劉繇王朗各據州郡論安言計動引聖人羣疑滿腹衆難塞胸今歲不戰明年不征使孫䇿坐大遂并江東此臣之未解二也按此似借影而少照應先後文勢俱不如此此下定有一轉似以劉繇王朗自譬而以孫䇿譬曹丕然千餘年來未經拈出小子騏亦何敢自信一日過庭敬質於先司寇司寇沈吟久之曰汝言亦似有理此本出於張儼默記容有脫誤耳王冏伯曰許靖欲踰城出降先主薄之不用法正說曰天下有獲虛譽而無其實者許靖是也若其不禮天下之人以是謂主公為賤賢宜加敬重以眩遠近是以丞相孔明至為之拜所謂英雄所見略同也王冏伯曰東坡謂出師二表與伊訓說命相表裏知言哉而陳夀則先之其曰論者或怪亮文彩不豔而過于丁寧周至臣愚以為咎繇大賢也周公聖人也考之尚書咎繇之謨略而雅周公之誥煩而悉何則咎繇與舜禹共談周公與羣下矢誓故也亮所與言盡衆人凡士故其文指不及遠也以周公為比其尊之亦至矣至于將略之貶非夀本心以媚司馬懿耳而夀實知武侯其所稱述亦多斟酌如曰亮才於治戎為長奇謀為短理民之幹優於將略而所與對敵或值人傑加衆寡不侔攻守異體故雖連年動衆未能有克昔蕭何薦韓信管仲舉王子城父皆忖已之長未能兼有故也亮之器能理政抑亦管蕭之亞匹也而時之名將無韓信城父故便功業陵遲大義不及耶蓋天命有歸不可以智力爭也此語灼然孔明聞之必且為之三嘆獨東坡所謂既不能全其信義以服天下之心又不能奮其知謀以絶曹氏之手足宜其屢戰屢卻則其誣孔明甚矣取劉璋何妨信義曹丕僞位已定植何能為死諸葛猶能走生仲達何嘗屢戰屢卻而輕于持論如此此則可恨耳于夀奚譏焉或謂子既輯武侯全書矣是集亦可已乎曰彼以紀事此以紀言彼主于經世非識時務者見以為雜此則文人墨士一觸目而可知武侯公誠之心形于文墨可以知其人之意理而有補於當世此亦陳夀之言爾爾夀未為不知也附載楊去奢刻侯集序引論一十九則楊去奢合刻忠武靖節二編序云忠武靖節者漢諸葛忠武侯晉陶靖節先生二編合刻也客過而問焉曰聞之先正出則為孔明處則為元亮今是之合也强同焉其若潛見之分何答曰唯唯否否夫易稱龍德時乘御天解不在易地皆然之旨乎漢晉末造天命人心既委轡於操裕乃心王室者不勝其故主遺民之悲思而無可奈何其屯否同是故抱膝長嘯不帝胄不玄德不三顧不田不淵也而述酒荆軻等作殆欲為孔明之事徒寄之酒巾籬菊之間而志節同不寧惟是東漢尚節義晉人喜風流而二季之族望如荀文若陳長文王謝子弟輩咸甘心佐逆攘臂元勳節義風流掃地盡矣綿竹一戰父子殉國而後鞠躬盡瘁之燕貽始萬全而無憾雖有五男兒總不好紙筆以幸免入洛之機雲無慙忠孝之瞻尚而試較彼聲華門第祇貽文墨紙筆之𨾗詬者竟何如也其才不才迥異而承考克家卒酬本志同乃若東漢文章去西京間不啻萎薾矣晉人詩賦流連光景綿弱綺靡不堪大雅而淸真簡貴一洗當時習陋匪特出師二表歸去一詞為然日月經天光彩常新未見鼎立而三者其為典謨風雅同而揆厥誦讀或獨觀大略或不求甚解其深心妙悟蓋罔弗同也昔謝叠山先生編次文章軌範一書人為評注而獨至出師歸去二篇則斂手閣筆嗚呼此豈獨重其文哉而景仰之同然亦可槩見已况夫龍德何常魚水君臣曾未展其雲霄之一羽而成都桑畝還復蕭然隆中薖軸無心出岫倦飛知還宛爾神龍含霧卷舒自如奚潛匪見奚見匪潛而又奚潛見之不同客曰善乃今知尚友論世不必易地而始同也是編之合復奚疑焉明萬厯已未嵗立夏前三日楊去奢題諸葛忠武侯書序云按陳夀志所載諸葛氏二十四篇開府作牧等書具存目録而裴松之注時引亮集云云至蘇東坡葉水心乃有不見全書之嘆則侯集之亡久矣追惋散軼彌深豔羡近歲婁東王冏伯重輯武侯全書匪特在侯不容少此至於弘濟世業勸奬忠孝鬱為大觀而世多不見見亦不賞嗟乎枕中鴻寶帳內論衡豈為不知者道哉今余是編實本冏伯更張位置僅三之一增損事辭殆十之九蓋因合刻而自成别本匪掩前書而故立同異也互考當自悉之又味傳言好為梁父吟不言自作若今所傳步出齊城門意義庸淺奚取而好吟之黃陵廟記亦絶不類當時語氣别有附乙以俟明者又按傳封武鄉侯諡忠武而後人只稱武侯不解何義因題其端曰諸葛忠武侯書言書不言集不忘集也原集既亡安得云全而取贋慁真疑誤後學如新書將苑等類則匪必陳裴不載冏伯不取而始辨也是用商之同志寧核毋濫云萬厯已未夏至楊時偉識楊去奢曰按全書遺事篇搜輯諸書及各乘志浩衍閎博良見苦心特太繁雜間多冗長至引抱朴子訛妄之談韋南康胡僧之事未經駁正評論篇惟楊戲陳夀張儼袁孝尼習鑿齒諸人可爾碑銘僅劉鎮南裴晉公二篇詩則太白少陵東坡數首餘直為芟去楊去奢曰玄德孔明堯舜之心也托孤受遺唐虞之盛也陳夀稱其心神無二君臣之至公古今之盛軌斯知言哉而孫盛謂為詭僞其謬甚矣後此彌留豈少話言而釁隙旋起安能以榻前數語縶人手足耶楊去奢曰忠孝大節千古難之子孫世美抑又難之難矣惟忠武獨無遺憾焉當其兄弟三人分仕三國匪不各忠所事而瑾以峻夷誕以昭族雖處不幸皆非其罪也而視孔明之榮衰思慕固已懸矣恪才搆禍死不殉國去瞻尚之從容慷慨又何如哉楊去奢曰博望燒屯事陳夀志原載建安十一年以前而三顧隆中則十二年事也今俗說屬之孔明有初出茅廬第一功語頃來謝少連王冏伯皆誤歸之三顧以後蓋不知昭烈自善用兵正不必盡歸美孔明也且自燒屯不云敵屯楊去奢曰後主四十年無可表見者後世遂以庸懦為嫌而愚獨謂其弘量英斷其大有三宮府內外悉委丞相既不中制又絶嫌猜一也及丞相亡殁三十年不事更張不設丞相二也怒誅李邈三也而誅邈更奇豈特差强人意而已哉楊去奢曰孔明與兄子瑜書云既蒙東朝遇厚依依於子弟又子喬良器為之惻愴見其所與亮器物感用流涕按幼記此牘謂是痛惜子喬家庭感愴耳近檢吳書孫翊傳曰翊子松為射聲校尉都鄉侯黃龍三年卒蜀丞相諸葛亮與兄瑾書云云其悼松如此由亮養子喬咨述故云據此則有不勝疑異者因考子喬之卒在建興元年癸卯今云松卒黃龍三年辛亥去喬卒已九年矣豈喬向時之咨述始為今日之惻愴耶披尋書意都不涉松區區咨述遂至感涕揆之情事無一合者絶不省其所謂悼松者果安在也將以陳志為不審又無是理裴注素精參駁亦無一語殆不可曉故特拈所疑以俟商確楊去奢曰孔明與吳王書云所送白毦薄少按白毦結毦向誤認為帽毦借用吾友錢功甫云羽毛飾也從耳不從目方知讀書不識字何啻千里因改正之楊去奢曰建興十二年孔明師出武功屯田渭濱約吳同時大舉向使營星助曜魏難支矣即元遜所謂吳攻其東漢入其西彼救西則東虛重東則西輕蓋良算也元遜不死伯約不孤漢事或未可知而天不祚漢可為永恨若元遜不負門風雅志忠孝千載而下猶凛凛生氣足繼周公瑾魯子敬云楊去奢曰忠武南征事炳耀宇宙今古無兩而陳氏紀之甚略信如伯冏所恨楊去奢曰按陳傳諸葛集本名北出全書改云北伐名義正矣第後主一詔實六師之前矛孔明二表竝千古之正氣而敘列混淆今為整揭若夫營星告隕遺恨未酬英雄襟淚千載扼腕故雖文長公𤥎之危計伯約元遜之虛䇿亦為節録以附侯志焉楊去奢曰按仲達之當孔明也一遇於城固而遁還再遇於上邽而斂跡才有鹵城之戰喪師衄將自是渭南之壘藉口仗節據原得勢本其所深忌也而故言無事以安衆心遂至甘受畏蜀如虎之譏巾幗婦人之辱然則孔明將略益見所長而懿且不能料之亦足驗矣彼奕棋二國手之喻豈其然乎楊去奢曰按衛公六花猶元子云常山蛇勢也善乎東坡詩云神兵非學到自古不留訣馬隆李靖之說謂善師其意而巧借其名可耳按李靖有六花陳謂本武侯八陳舊法楊去奢曰昭烈伐吳侯不在行也而升菴八陳圖記曰八陳圖在夔者蓋侯從先主伐吳防守江路行營布伍之遺制豈誤耶永安宮即魚復縣改名少陵詩崩年亦在永安宮所稱白帝城是也昭烈病篤召侯託孤於此蓋曾至焉而制作先後則未容輕辨矣楊去奢曰孔明之寓荆州知之者惟德公德操元直輩耳雖以昭烈久同流寓思賢若渴而未之前聞必因元直之言而始見曹瞞未得荆州何緣欲用孔明且污君之云豈操自謂抑誰指耶夫鞭撻九有草創皇基而不得人士第一流奚取不妄而蘇子瞻楊用修皆據為談資殆所不解楊去奢曰荆州自景升作牧玄德流寓時曹操方與袁氏父子相持用師幽冀者幾及數年故襄郡無曹劉之爭而昭烈有髀肉之歎也如果為兵衝安得長嘯登游高吟樂山耶蓋弇州亦偶未之思耳李安即太傅椽李興王隱晉書云興一名安按弇州宛委餘編曰南陽有諸葛祠又有諸葛草廬在郡城西南七里卧龍岡上疑在漢末曹劉兵衝非諸葛避兵之所復閲宋人一小說云南陽乃襄中之鄉名也水經沔水又東過山都縣東北注新野山都縣治沔水又東經樂山北注諸葛好為梁父吟多所登遊俗以樂山為名沔水又東經隆中注孔明舊宅所謂三顧臣於草廬之中即此地也劉弘之鎮襄陽命李安作宅銘此似可據楊去奢曰擇主而得英雄擇婦而得醜女雖曰天作之合而千古善擇者蓋無如孔明矣然木牛流馬法實繇婦傳蓋亦一大英雄而天所生以佐侯者也楊去奢曰豫編次諸葛忠武書既竣客有卒業而笑云忠武書盡於此哉文中子曰諸葛亮而無死禮樂其有興乎子遺之何也時偉蹶然而起曰吾誤矣遂因而思宋儒諸先生評論無一載焉者即微客言自知其善忘而多遺也客曰夫一人之見不足以盡一書一書之紀不足以備千古又奚疑焉時偉曰竊觀宋儒諸先生咸不以文中子之言許孔明敢問何說也客曰名不正則言不順言不順則事不成而禮樂不興孔明之言曰漢賊不兩立名正言順何事不成揖讓征誅何所不備而刑罰之中至有感泣而發病者唐虞三代之規模高光二祖之締構蓋至孔明而略無遺憾焉舍此而别求所謂禮樂此則後世之禮樂而決非堯舜周孔之禮樂也且孔明正名於蜀亦猶夫子正名於衛其雍容禮樂亡論已即身死敵庭子若孫死戰地慷慨從容竟與天地同其和節彼南渡之宋乃至不可名言而禮固已壞矣而樂固已崩矣而方且釋干戈以談禮樂又且外干戈以求禮樂然則蜀未嘗亡而宋未嘗存也為宋計者惟有君死苫塊臣死金革如嶽武穆之壯心怒髮直搗黃龍府而後已設不幸而斬焉滅亡不猶愈於奄然靦然偏安百年之為多辱乎哉曰孔明鵬舉必能殱魏搗金乎曰未可知也司馬懿之善守宗弼之善謀非一時足制其死命者而孔明鵬舉皆孤忠獨運協贊者少若夫營星告墜誣獄沉𡨚雖天不助順而要亦未必非所以善二侯之終也客退而憶其言若有可思者併録之以自志遺忘之警時已未六月望酷暑日裸孫記於瓜牛廬中漢丞相諸葛忠武侯集卷之二十論八陳論李昭玘兵陳之事有不可以言者有不得不言者衛靈公在諸侯之任當以守法為職不當問陳有不仁之資宜以修德為務不宜問陳然且問之此孔子所以不對也所謂不可以言者也然孔子不對衛靈公之問將以立教耳至其自謂則曰我戰則克其請伐罪則曰以魯之衆加齊之半宜可克是則使孔子中天下而立定四海之民其行兵用師之際必有道矣其不肯驅烏合無律之民以用之立死之地決矣當是時也兵陳之事將習之不暇而况於言乎此所謂不得不言者也世之不善講學者恥於戎事之不知則未嘗不以孔子闢衛靈為藉口彼不知孔子之闢其旨有在而文事必有武備乃吾儒之所當言倘曰吾知道而已兵非吾之所知其不當問者闢之以此而當問者亦闢之以此是無乃拘而害事也哉儒者之於天下亦何所用也哉今夫古之用仁義之師者莫如武王為王者之佐者莫如太公為武王太公者疑若專以曲直老壯為定計凡覆殺之機布設軍勢之事當絶弗道而其六韜之書乃有鳥雲山兵鳥雲澤兵等篇其所以較勝負利害之際者甚詳豈武王太公至是而變仁義為譎詐邪直以為德之不懷則兵之必用則凡所以御兵制敵之道不可不講之耳然此尚有可諉者曰六韜非太公之書蓋戰國相傾之士借太公以為巿者至於詩書為帝王之遺跡豈復有可諉者耶而有扈之役則曰左不攻於左汝不恭命右不攻于右汝不恭命御非其馬之正汝不恭命牧野之誓則曰今日之事不愆於六步七步乃止齊焉不愆於四伐五伐六伐七伐乃止齊焉宣王征徐方之詩亦曰綿綿翼翼不測不克又何敦陳整旅之能廢也夫左治其左右治其右六步七步之旅進不可不同心四伐五伐六伐七伐之擊剌不可不併力與夫綿綿以為奇而使敵不測翼翼以為正而使敵不克自帝王之時已然而書與詩載之未嘗以為恥後世之士乃獨恥言之豈非好名而不適實之弊哉蓋聞古之制陳其名不一有以三才名者日月星辰斗杓一左一右一迎一背謂之天陳邱陵水泉左右前後之利謂之地陳用車用馬用文用武謂之人陳此三才之辨也有以五時名者春為牝陳弓為前行夏為方陳㦸為前行季夏為圓陳矛為前行秋為牡陳劍為前行冬為伏陳盾為前行此五時之辨也有以四獸名者使商人為前兵象白虎使羽人為前兵象玄武使徵為人前兵象朱雀使角為人前兵象青龍此四戰之辨也有以五行名者木之直金之圓火之鋭水之曲土之方此五行之辨也凡若是者因類制名固不可殫數而八陳之名尤為異同若所謂一方二圓三牝四牡五衝方六車輪七罘八鴈行是一八陳也若所謂金木水火土天地人又一八陳也若所謂車箱洞當金車上中黃土鳥雲鳥翔火折衝木龍騰𨚫月水鴈行行鵝鸛天車輪地虎翼人又一八陳也紛紜異口其無定論如是至於天地風雲龍虎鳥蛇以是八物制為八名兵家者流多於此歸焉則八陳之定論亦有在矣然是八物者亦信其所從名之當否耳考其根抵陳之所以八者自有所祖述蓋其法肇於黃帝具於成周而變化於諸葛孔明非諸葛孔明之獨能為是也昔黃帝潛通八卦而建一都之法默會九天而設三軍之制是以周公則而象之以九夫為井四井為邑四邑為邱四邱為甸四甸為縣四縣為都自九夫之井至於四縣之都而得乎一都之法又以五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍自五人之伍至於五師之軍而合乎三軍之制至於孔明則又上探黃帝之微意下采成周之遺法因而循之與道神之革而化之與時宜之而陳法備焉故其制為八陳自九夫為井而演之縱橫皆八而有八八六十四陳者所以通乎八卦也立為三軍自五人為伍而演之周旋皆九而有九九八十一陳者所以會乎九夫也然則孔明之所祖述者可謂深且遠矣非與夫古人之精神心術流通為一者疇能爾哉李興曰推之八陳不在孫吳若求八陳於孫吳之書則孫吳之書固無有也是不知孔明之祖述在彼而不在此也愚故曰肇於黃帝具於成周變化於諸葛孔明非孔明之獨能為是也嗚呼八陳之法黃帝既以北逐獯鬻南平蚩尤戡黎於板泉省方於崆峒底定萬國旁羅七曜周公既以此誅紂伐奄膺戎狄懲荆舒而孔明又以此平定南中響震關輔斬王雙走郭淮殺張郃以成鼎足之强則其明效大驗已可見矣後世之言兵孰不欲得其遺法而師承之然昧其法者莫如晉之桓溫明其法者莫如唐之李靖此又不可不知也壘石八行行去二丈此其為武侯之遺跡真與僞皆未可知而桓溫幸僚屬之不識遽欺之曰此常山蛇勢也夫常山蛇者在兵法謂之率擊其首則尾至擊其尾則首至擊其中則首尾俱至考之陳勢特曲直一陳勢耳烏在為八哉且武侯所祖在黃帝周公而溫信於率然之說比之李興謂不在孫吳者尚或有愧故曰昧其法者莫溫若也唐太宗問李靖曰卿所製六花陳出何術乎靖曰臣本諸葛亮八陳法也大陳包小陳大營包小營隅落鈎連曲折相對古制如此乃為圖陳之夫驅馳於戎馬之間識兵形陳法者莫如太宗而靖有六花之制乃不知其所出必待剖喻明白而後悟則靖之於八陳深矣又非守其緒餘糟粕者之比也愚故曰明其法者莫靖若也雖然論其深妙固未易以立談判考其大綱則不過奇正二字而已蓋古之制軍合萬二千五百人而為軍其為伍者一千一百二十五其為兩者二百五十十取三焉而為奇其餘七以為正四奇四正而八陳生焉是其分陳之數有奇有正也回旋九攢以象天四平正列以象地散渙邪直以為風前大後鋭以為雲天地風雲四者陳之正也延邪綿直以為龍蟠前合後開以為虎翼彌蔓散洽以為鳥翔回屈包羞以為蛇蟠龍鳥虎蛇四者陳之奇也是其布陳之形有奇有正也天子上將居中而不動疑兵游軍出沒而無常是其用陳之勢有奇有正也乃若陳行之踈陳戰之密其人之列面之相向背之相承陳間容陳隊間容隊曲間容曲前禦其前後當其後左防其左右防其右行必魚貫立必鴈行長以衛短短以救長回軍轉陳以前為後以後為前進無速奔退無遽走雖絶成陳雖散成行四頭八尾觸處為首先動為陽輕疾猛厲其勢險其節短後動為陰持重固密不動如山其倐忽幽暗神出鬼沒千變萬態而不可致窮則又所謂奇正之相生如環之無端者八陳之制如此然則為今日計將欲誅不庭戡亂略可不務乎雖王者之兵鼓之以道德征之以仁義有征無戰善師不陳也而其不幸有頑然不服者以是為權謀之助非小補也嗟乎物不終靜故受之以動當純坤用事則陰疑於陽而飛龍野戰當大朴既散則聖道竝起而戎馬生郊則有力吞八荒爭截九有而生民之類騷然不寧黃帝於此順殺氣以作兵法文昌以命將而又制為陳法以貽後代豈得巳者哉蓋所謂生道殺民威不軌而成文德也而後世經生儒士爭非之并與孔明之祖述者黜焉一旦乘以倉卒之變而有抗衝之事其將若之何然非黃帝孔明者既以大繆而法之不守德之不修專以嗜殺自封殖為事者其為生民之禍亦豈細故耶故鄭之魚麗鵝鸛魏之鶴列晉之三行楚之二廣二盂徒以逞一巳之欲而挈赤子於肝腦塗地耳其得罪於君子不亦甚乎孔子所以不對衛靈公而孟子亦嘗闢善陳善戰為民賊者豈非為此等者慮哉夫仁義權謀後世不可偏廢一於仁義則拘而不通專於權謀則寖入於詐而無以自反於正區區之慮每及乎此故力陳武侯八陳之美以謹後世之武備而又闢魚麗鵝鸛之屬以終孔子爼豆之意焉說八陳圖說范蓀夔州八陳之磧聞天下厯千有餘年至今存於峽口之江浦往時每過其下惑於傳聞眩於目擊終莫得其說今䝉恩從宦於此始得以暇日登崇臺而縱觀之臺高而磧平纍石粲然一一數之而無差於是推尋其意而為之說曰陳法之大要方圓奇正而巳爾武侯之法前為八者八皆東嚮其勢直而方後為十二者二皆南北嚮其勢曲而圓方者所以為正也圓者所以為奇也夫奇者正之餘李靖所論握奇文是也方圓相生奇正相救而陳法無餘事矣然則前為八者八後為十二者二何也曰此分數之法皆以八計之是以為八陳也前為八者八總而計之為八八六十四後為十二者二總而計之為三八二十四凡為八者十一絶長補短而三分之以其二為正而以一為奇合為八八矣古八陳之法其别凡八李筌陰經以為常山之勢者是也武侯之法為陳者一而已非古八陳也然而為常山之勢者固自若桓溫之言近之矣若武侯之所以為八者未知溫能悉之否也五人為伍五伍為兩萬二千五百人為隊二百五十十取三而以為奇者古也武侯之法八八六十四為正三八二十四為奇是十一取三焉以為奇則精於古矣夫奇正也方圓也陰陽也一而已矣方者其陰圓者其陽也前為方者八八六十四後為圓者三八二十四絶長補短大槩二陰而一陽其在易二陰而一陽為震倍之四陰而二陽為臨嗟乎武侯之意倘取諸此乎古者用奇之法或取於中或列於左右或伏於後處於中者李靖之握奇是也列於左右者淮陰侯與楚戰垓下之勢也伏於後則武侯之法司馬遷書言漢與楚決勝垓下淮陰侯自以二十萬當之皇帝在後孔將軍居左費將軍居右絳侯柴將軍又在皇帝後淮陰侯先合不利𨚫孔將軍費將軍縱楚兵不利淮陰侯復乘之楚以大敗史傳之紀軍陳未有詳於此者淮陰侯與高帝絳侯柴將軍所居之軍正也孔費二將列於左右者奇也淮陰侯喜以弱致人故其為奇者列於左右將佯𨚫而後勝武侯節制之師使為奇而將出於左右者常匿於後以固其軍正兵既有所恃而奇兵唯無出出將不可禦此司馬仲達之所避而終身不敢與戰也然武侯之法亦密矣贊忠武侯贊楊戲忠武英高獻䇿江濱攀吳連蜀權我世真受遺阿衡整武齊文敷陳德教理物移風賢愚競心僉忘其身誕靜邦內四裔以綏屢臨敵庭實耀其威研精大國恨於未期三國名臣贊蘇軾西漢之士多知謀薄於名義東漢之士尚風節短於權略兼之者三國名臣也而孔明巍然三代王者之佐殆未易以世論諸葛武侯畫像贊蘇軾密如神鬼疾若風雷進不可當退不可追晝不可攻夜不可襲多不可敵少不可欺前後應會左右指揮移五行之性變四時之令人也神也仙也吾不知之真卧龍也諸葛武侯畫像贊張栻維忠武侯識其大者仗義履正卓然不舍方卧南陽若將終身三顧而起時哉屈伸難平者事不昧者幾大綱既得萬目乃隨我奉天討不震不悚惟一其心而以時動噫侯此心萬世不泯遺像有嚴瞻者起敬諸葛忠武侯贊楊維禎連東吳服南粵未為侯之功歌渭濱祭道上未為侯之德衍八陳運木馬未為侯之能朝無赦民無譁未為侯之職於戲立鼎峙於三方受孤庸於六尺輔國政而國不疑竭民勞而民愈力知之者以為伊周之未遇其未知者以為齊仲父漢宗臣之匹也諸葛忠武侯贊宋濂龍門子曰三代而下有合於先王之道者孔明一人而其師以正動義也委身事君忠也開誠布公信也御衆以嚴知也其功之不能成天也議者則謂其應變將略非其所長又謂其出師不攻瑕而攻堅一出師乃與魏氏角其亡則宜又謂其仁義詐力雜用以取天下所以失之是皆以權謀術數測孔明而孔明明白正大之心初未嘗知之也若三者之議真蛇鼠之見哉武侯贊方孝孺漢治任法難乎大臣惟忠武公千載一人綜核萬變以義而動虎耀龍驤天下震恐極其智能亂不足平天實厄之大勳無成成敗紛然處之甚暇論其所存伊呂流亞古學不傳士氣益卑公心不亡百世之師武侯贊楊溥草廬三顧出師二表志復中原天日皎皎諸葛忠武侯贊劉惟德嗟炎漢之失鹿得南陽之卧龍遂扶三分之國於天下復立八陳之圖於蜀中忠精貫日義氣吐虹為一朝之俊傑邁千古之英雄出師獻表方陳要略休兵千屯欲建大功雖云魏吳之主在智謀自謂超于管仲樂毅脫使湯武之君出其才實可配於伊尹周公噫為臣盡忠希公之蹤猗歟武侯德侔三代抱膝長吟孰易其介自都將相孰以為泰轉危為安以小擊大雖嫌不辭之死靡懈人雖云亡不亡者在三國名臣頌贊袁宏頌曰孔明盤桓俟時而動遐想管樂遠明風流治國以禮人無怨聲刑罰不濫沒有餘泣雖古之遺愛何以加茲及其臨終顧託受遺作相劉后授之無疑心武侯受之無懼色繼體納之無二情百姓信之無異辭君臣之際良可詠矣贊曰堂堂孔明基宇宏邈器同生民獨禀先覺標榜風流遠明管樂初九龍盤雅志彌確百六道喪干戈迭用苟非命世孰掃氛雺宗子思寧薄言解控釋褐中林鬱為時棟祭文祭諸葛忠武侯文維嘉靖十八年歲次己亥三月已巳朔越初八丙子大明皇帝遣駙馬都尉塢景和禮部侍郎諭祭于漢忠武侯諸葛亮曰養高隆中非三顧不起戮力王室拜二表乃行觀其褫孟德走仲達孔明其人豪也歟惜乎將星殞地中道而殂漢遂不振皆天也非人之所能為也表忠有祠諭祭有儀靈爽不昧尚其歆之祭漢先主昭烈皇帝丞相諸葛忠武侯文明蜀王維洪武二十四年歲次辛未十二月二十八日敢昭告於漢昭烈皇帝漢丞相諸葛忠武侯曰龍興雲從君明臣良曠千載而一遇何會合之不常曰若稽古實惟成湯三聘莘野承筐是將咸有一德革夏為商厯嬴秦而兩漢孰能襲其遺芳偉中山之帝胄當羣雄之擾攘噓炎舀火又於寒灰時三顧於南陽情交歡於魚水言靡間於關張保岷峨控荆湘三分天下開拓封疆信同心而協力視當代而有光豫丕仰於休風幸開國於是邦覩閟宮之頽圯歎古柏之荒涼命我將士繚以垣墻屹棟宇之崔嵬煥丹青之焜煌新規模於今日聚精神於一堂告厥成功我心孔臧遣官致祭釃酒刲羊惟帝與侯神其洋洋佑我蜀民降福穰穰春秋制祭維年月日河南南陽府知府某欽奉朝命致祭於漢丞相諸葛忠武侯之神惟神學術正大出處光明功蓋三分首委身於帝胄忠宣二表早發跡於隆中眷此邦人永懷風節念草廬之久敝復祠宇之更新茲值仲春仲秋恪修祀事仰祈靈貺昭格無窮祭諸葛武侯文王十朋丞相忠武蜀之伊呂高卧南陽悲吟梁甫草廬之中三顧先主將漢是興非劉曷與君臣魚水蛟龍雲雨才十曹丕志小寰宇假令無死師一再舉吳魏可吞禮樂可許寧使英雄墮淚今古將略非長庸史之語某受命天子來帥茲土夢觀八陳果至夔州廟貌僅存風流可覩旁有關張一龍二虎安得斯人以消外侮漢丞相諸葛忠武侯集卷之二十一别見晉武昭王李皓寫諸葛武侯訓誡以勖諸子曰吾負荷艱難寧濟之勳未建雖外總良能憑股肱之力而戎務孔殷坐而待旦以維城之固宜兼親賢故使汝等未及師保之訓皆弱年受任常愳弗克以貽咎悔古今之事不可以不知苟近而可師何必遠也覽諸葛亮訓勵應璩奏諫尋其終始周孔之教盡在其中矣為國足以致安立身足以成名質略易通寓目則了雖言發往人道師於此且經史道德如採菽中原勤之者則功多汝等可不勉哉稽康與山濤書曰諸葛孔明不迫元直以八蜀華子魚不强幼安以卿相此可謂能相終始真相知者也張柬之論戌姚疏云臣按姚州古哀牢國垣工荒外山岨水深漢世未與中國通唐䝉開夜郎滇南而哀牢不附東漢光武末始請內屬置永昌郡統之賦其鹽布氊罽以利中土其國西大秦南交趾奇珍之貢不闕劉備據蜀甲兵不充諸葛武侯五月渡瀘收其産入以益軍使張伯岐選取徑兵以增武備故蜀志稱武侯南征後國以富饒此前世置郡以其利之也今鹽布之稅不供珍奇之貢不入戈㦸之用不實於戎行賨貨之資不輸於大國而空竭府庫驅率平人受役蠻戎肝腦塗地臣竊為陛下惜之往諸葛武侯破南中即用渠率統之不置漢官不留戌兵言置官留兵有三不易置官必夷漢雜居猜嫌將起留兵轉糧為患滋重後復反叛勞費必甚故粗設綱紀自然久定臣謂武侯之策誠盡羈縻蠻戎之要也節文蘇子瞻任人䇿曰臣以為宜如諸葛亮之治蜀王猛之治秦使天下悚然人人不敢飾非務盡其心凡此者皆庸人之所大惡而讒言之所由興也是故先主拒關張之間而後孔明得以盡其才苻堅斬樊世逐仇騰黜席寶而後王猛得以畢其功節文朱元晦武侯畫像跋云乾道丁亥豫遊長沙見張敬夫書室有武侯畫像甚古云是劉丈子駒家藏唐𨶒立本筆因謂敬夫盍為之贊敬夫欣然口占立就語簡意到聞者歎服以為非深知武侯心事者不能道也王兄齊賢因摹本而屬敬夫手題其上後二十九年齊賢諸子出以視豫俯仰疇昔如昨日事而三君子皆不可見矣為之太息記其下方朱元晦南軒集序云孟子沒而義利之說不明於天下中間董相仲舒諸葛武侯兩程先生屢發明之而世之學者莫之能信是以其所以自為者鮮不溺於人欲之私而其所以謀人之國家則亦曰功利焉而已爾爰自國家南渡以來乃有丞相魏國張忠獻公倡明大義以斷國論侍讀南陽胡文定公誦說遺經以開聖學其託於空言見於行事雖若不同而於孟子之言董葛程氏之意則皆有所謂千載而一轍者節文黃源上制置使書云自古用蜀者諸葛亮當第一而李德裕次之德裕南抗宦北引天下之力以自重其為功易就而亮獨以蕞爾之國南抗蠻西抗戎東備吳北敵魏無天下之大援而功視德裕過之夫亮為力難矣昭烈亡後亮一步不出大城門者三年而後為渡瀘之役而後為渭上之役夫堂之不植則其本顚大城其堂也故三年而治之藩之不固則有後憂蠻戎其藩也故力戰而服之蜀已安矣蠻戎已服矣於是乎出其兵以與魏人角于其門亮之用蜀本末如此節文陽節潘氏榮曰觀人才之吉凶知邦家之休戚漢儒有言曰正其誼不謀其利明其道不計其功蓋人品不同而事業亦異是不可以成敗論英雄也諸葛亮輔漢於蜀狄仁傑反周為唐其心一也郭汾陽克復二京而終身富貴嶽武穆志存雪恥而身死權姦其道同也孟德睥睨神器狐媚欺孤恨文若九錫之勸而致之死篡逆之所為也子儀功蓋天下位極人臣杖郭曖肆言之失而歸朝待罪臣子之所安也平生姦僞死見真性操之所以如鬼也鞠躬盡瘁死而後已亮之所以如龍也蘇武持漢節於胸奴是舍生而取義真卿陳禍福於希烈乃殺身以成仁李陵衛律罪通于天邦昌劉豫心委于寇霍光擁立二君而子孫誅滅是履盛滿而不止也韓琦定䇿兩朝而德望蓋世識用舍行藏之道也陶潛為晉處士心逸而日休楊雄為莽大夫心勞而日拙諸葛入寇晉史自帝魏也丞相出師漢賊明大義也廢帝為王唐經亂周紀也帝在房州萬古開羣䝉也故自初命晉大夫為諸侯以來千三百六十二年之間誅亂賊於既死正名分於當時定褒貶於往前示勸懲於來世此綱目之所以繼獲麟而作也節文葉水心曰余每惜晉人集諸葛亮事而今不存張輔樂管優劣論曰孔明包文武之德文以寧內武以折衝其行軍也路不拾遺毫毛不犯雅規宏濶已有功則讓于下下有闕則躬自咎見善則遷納諫則改故聲烈震于遐邇也殆將與伊呂爭儔豈徒樂管為伍哉徐氏曰漢祚傾覆當時降賊貪生者非一人而諸葛瞻父子獨能冒犯鋒刃視死如歸雖其姿質有過人者亦家法之有自也孔明可謂有子有孫矣嗚呼瞻尚雖死其忠烈之風至今凛凛猶有生氣彼為臣不忠而偷生者視瞻能無愧乎宋陳郁曰諸葛武侯薦馬超于先主關羽恐其出已右移書問之武侯曰可與翼德竝驅馳衡然非髯將軍比也羽聞而喜余謂武侯此語既不掩超之美又有以結羽之心深沉大略可涯涘耶當其兵數敗衄時下教曰今非將不善兵不衆而敗蓋亮未聞過耳諸君攻亮之過則兵決可勝夫人有失誰不懷忌而武侯獨願聞其過豈不誠大丈夫哉張文成曰輔幼主者為周公易為孔明難柳子六逆論云昭烈之顧孔明三代明良之盛事方正學王履道孝思堂記云履道家乎蜀蜀之士若司馬相如楊雄雖能顯其親於無窮而德不足李令伯以孝稱于後世而君子不能無憾可以當仁人孝子而無愧者惟諸葛武侯張敬夫為然斯二賢者皆百世之士也人不以百世之士自期則其所思者不遠矣履道好古而文篤行而溫他日致其身為名臣以不忘其親使天下後世因孝思之堂誦履道之德其尚有考於吾言也節文袁了凡曰苻堅得王猛擬先主之得孔明以余觀之孔明龍卧南陽且不為吳魏起况羌狄耶雖先主帝室之胄猶必三顧而後出而猛起徒以呂婆樓一呼且孔明志殱漢賊以宏王業而猛不過語及時事堅大悅是堅實懷公子光之心將起猛以圖大事而猛慫恿以成之苻生之變又不特與聞乎故而已出處大致夷夏大防君臣大分猛鹵莽如此以擬孔明不亦蛣𧎉之比神龍乎若夫以衆望誅苻法而不能救以辱已譖樊世而殺之視開誠布公者又遠矣吳養心曰孔明三代之遺才王猛豈其儔匹哉若論劉玄德之信任則堅實無愧之矣按晉時秦王生飲酒無晝夜乘醉多所殺戮東海王堅殺之自立為秦天王先是尚書呂婆樓薦王猛於堅謂其人謀略不世出堅因婆樓以招猛一見如舊友語及時事堅大悅自謂如劉玄德之遇諸葛孔明也熊禾上書言孔明之在南陽管幼安之在東海張九齡之在曲江陽城之在晉鄙三代而下論天下人物亦當首稱又如蜀之文翁閩之常衮首開一方文治凡若此類宜悉詔郡國按其舊志採其尤著者悉以來上列之羣祀楊升菴楚雄府定遠縣新建儒學記云雲南楚雄府屬縣曰定遠舊未有學按察司提學副使仰齊胡公堯時建議上請于朝始命建學盛舉也經始於嘉靖二十六年孟秋釋菜於二十七年長至學成宜有記縣之官師請于胡公公乃猥以愼嘗從事秉筆後屬為記之愼參按圖經域志定遠在漢為越嶲郡地三國時諸葛忠武侯征南中營於此今之望子洞遺址尚存唐武德中置西濮州貞觀中更名髳州後訛稱牟州宋世淪於段高二僭至於元立牟州千戶至正改為定遠州國朝因定遠之名而降州為縣百七十年而始建學皇明文治之遙聲名之盛使仲尼之道與王化遠邇多士生斯時斯地亦厚幸矣嗚呼漢之斥土名越嶲者以斯地實越嶲水以彰休盛然特為僻土服遠言爾武侯南征天威赫著而文治猶未遑唐則先服後叛宋則畫界陸沉雖合為一統而其俗無譏焉國家以綱常為治禮樂為教雲臯雖去神臯萬里而氣厚風和君子道行洪武初元已入榮被天言之褒矣咨爾多士涵泳聖涯豈可以憬彼自棄乎矧髳濮之名巳見牧野其歸仁膺化已兆於武王允淸之代而武侯之所過化則淡泊明志之道真寧靜致遠之心學諸士子獨無興起之思乎夫學亦多說矣肇始于六經而發揮於諸儒更僕不可終而起也獨舉武侯淡泊寧靜之二言者以古者建學立師必本其地望希賢懷古恆首其儒先武侯在定遠固名宦之首稱巨擘亦後學之指南元龜藏焉修焉之餘而俯焉仰焉息焉游焉之暇而詠焉繹焉亦可以為成人矣由是而之焉以上希乎聖教敢謂無其人乎庸書以俟若夫建學諸與有勞者皆列其名銜於碑之陰黃孟起三國志序曰三志所載惟蜀為簡夀歸咎于相亮之不設史官似也而後主紀乃云史官言景星見豈是時史官主禨祥不司記注耶即使史缺專官而當時蜀士秦宓譙周之倫皆博雅好論著聞見宜非乏也不寧惟是相亮王佐之才其用兵經武司馬宣王至畏之如虎八陳圖木牛流馬迄今無能窺其祕者夀為蜀人親見其行事乃謂管蕭亞匹將略非其所長則何也豈所謂修𨚫于相亮父子者不盡誣耶抑亮所敵者司馬氏而夀後為晉臣不得不枉其筆耶嗟乎夀欲絀蜀蜀不為絀也掩亮亮不為掩也索米貽譏祇足自點耳朝氏曰序稱謹進便宜十六事一治國二君臣三視聽四納言五察疑六治民七舉措八考黜九治軍十賞罰十一喜怒十二治亂十三教令十四斬斷十五思慮十六陰察陳夀録孔明書不載此䇿疑依託者按此板翻刻在大梁李獻吉序東漢總論略云後主纘位孔明以文武之才兼將相之任八不毛而七擒孟獲忘歲月而六出祁山功蓋三分名高八陳司馬懿畏之如虎甘受巾幗之遺方圖鞠躬盡力而中營星已告殞先正云天心去漢孔明扶之不足亶其然乎誠齊文膾云民心思漢王郎假之而有餘天心去漢孔明扶之而不足表宜以遠大為本不以華藻為先若曹子建之表可謂成文矣諸葛武侯之表劉主裴公之辭侍中羊公之讓開府可謂德音矣李克翰林論三蘇不取孔明老泉謂孔明棄荆州而就巴蜀吾知其無能為也止為棄荆一事全然不考孔明草廬見先主之言已云荆州用武之地棄而不取乃先主之失以此病孔明不亦誤乎湖廣志辨疑論語稱季氏富於周公可見周公當時亦富諸葛武侯身殁之後亦有桑八百株田數十頃古之人不貪財不近名如此蓋其心大公至正之心也五什爼元楊奐讀通鑑至論漢魏正閏大不平之遂修漢書駁正其事因作詩云風烟慘火又駐三巴漢燼將燃蜀婦髽欲起溫公問書法武侯入寇寇誰家後見通鑑綱目其書乃寢陳仁錫曰親賢臣遠小人隆中之言也若問小人為誰平耶謖耶延耶儀耶皆擢用之人也何以置對雖然勇任過嚴立法隆中豈可及哉張遺曰宣和畫譜稱諸葛武侯能畫故八陳圖之形勢見于分布粲然可觀馬援聚米為山谷定是好手此豈濡毫砥墨規唐撫宋者所能夢見耶藏弆集
